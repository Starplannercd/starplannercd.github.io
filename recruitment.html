<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siege Recruitment Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0805; color: #e8e4d0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 10px; color: #f0e8d8; }
    .desc { font-size: 13px; color: #a89878; margin-bottom: 20px; }
    .controls { background: #1a1410; padding: 16px; border-radius: 6px; border: 1px solid #3a3028; margin-bottom: 20px; }
    .control-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .control-row:last-child { margin-bottom: 0; }
    label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #b8a878; min-width: 120px; }
    input, select { background: #0a0805; border: 1px solid #3a3028; color: #e8e4d0; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
    input:focus, select:focus { outline: none; border-color: #8868c8; }
    button { background: #8868c8; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
    button:hover { background: #9878d8; }
    button:disabled { background: #5a5048; cursor: not-allowed; opacity: 0.6; }
    .status { font-size: 12px; color: #a89878; margin-top: 10px; }
    .status.loading { color: #8868c8; }
    .status.error { color: #c84848; }
    .status.success { color: #48a868; }
    .results { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; background: #1a1410; border: 1px solid #3a3028; border-radius: 6px; overflow: hidden; }
    th { background: #2a2218; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #b8a878; font-weight: 600; border-bottom: 1px solid #3a3028; }
    td { padding: 10px 12px; border-bottom: 1px solid #2a2218; font-size: 12px; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #251f18; }
    .class-icon { display: inline-block; width: 18px; height: 18px; border-radius: 3px; margin-right: 6px; vertical-align: middle; font-weight: bold; color: white; font-size: 10px; text-align: center; line-height: 18px; }
    .pug-tag { display: inline-block; background: #8868c8; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .unguilded-tag { display: inline-block; background: #c88848; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .empty { text-align: center; padding: 40px 20px; color: #6a5a48; }
    .login-section { background: #1a1410; padding: 16px; border-radius: 6px; border: 1px solid #3a3028; margin-bottom: 20px; }
    .login-btn { background: #48a868; }
    .login-btn:hover { background: #58b878; }
    .version-bar { font-size: 11px; text-align: right; margin-bottom: 8px; color: #6a5a48; }
    .version-bar a { color: inherit; text-decoration: none; }
    .version-bar a:hover { text-decoration: underline; }
    .v-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .v-ok { background: #48a868; }
    .v-stale { background: #c8a848; }
    .v-unknown { background: #6a5a48; }
  </style>
</head>
<body>
  <div class="container">
    <div class="version-bar" id="versionBar"><span class="v-dot v-unknown"></span>Checking version...</div>
    <h1>⚔️ Siege Recruitment Scanner</h1>
    <p class="desc">Find unguilded/pug DPS performing well in Normal Siege of Orgrimmar</p>

    <div id="loginSection" class="login-section" style="display: none;">
      <div style="font-size: 13px; margin-bottom: 10px;">You need to authenticate with WarcraftLogs to scan logs.</div>
      <button class="login-btn" onclick="handleWCLLogin()">Login with WarcraftLogs</button>
    </div>

    <div class="controls">
      <div class="control-row">
        <label>Min Percentile:</label>
        <input type="number" id="minPercentile" value="75" min="1" max="99" style="width: 80px;">
        <label style="margin-left: 20px;">Date Range:</label>
        <select id="dateRange" style="width: 150px;">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30">Last 30 days</option>
        </select>
        <button id="scanBtn" onclick="startScan()">Scan Logs</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="results">
      <table id="resultsTable" style="display: none;">
        <thead>
          <tr>
            <th>Character</th>
            <th>Realm</th>
            <th>Class</th>
            <th>Spec</th>
            <th>Guild</th>
            <th>DPS</th>
            <th>Rank Range</th>
            <th>Encounter</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
      <div class="empty" id="emptyMsg" style="display: none;">No results found. Try adjusting the filters.</div>
    </div>
  </div>

  <script>
    // WCL OAuth setup
    const WCL_CLIENT_ID = 'a181f533-c14e-4f52-9b17-252b64aa1585';
    const WCL_TOKEN_KEY = 'tot_rcd_wcl_token';
    const WCL_TOKEN_EXP = 'tot_rcd_wcl_exp';
    const WCL_AUTH_URL = 'https://www.warcraftlogs.com/oauth/authorize';
    const WCL_TOKEN_URL = 'https://www.warcraftlogs.com/oauth/token';
    const WCL_REDIRECT = location.origin + location.pathname;
    const WCL_API = 'https://www.warcraftlogs.com/api/v2/user';

    let WCL_TOKEN = localStorage.getItem(WCL_TOKEN_KEY);

    const CLASS_COLORS = {
      'Warrior': '#c79c6e', 'Paladin': '#f58cba', 'Hunter': '#abd473',
      'Rogue': '#fff569', 'Priest': '#ffffff', 'DeathKnight': '#c41e3a',
      'Shaman': '#0070de', 'Mage': '#69ccf0', 'Warlock': '#9482ca',
      'Monk': '#00ff96', 'Druid': '#ff7d0a', 'DemonHunter': '#a335ee'
    };

    async function startScan() {
      if (!WCL_TOKEN) {
        setStatus('Error: Not authenticated with WarcraftLogs. Please log in first.', 'error');
        return;
      }

      const btn = document.getElementById('scanBtn');
      btn.disabled = true;

      setStatus('Scanning logs... this may take 30-60 seconds', 'loading');

      try {
        const candidates = await findPugDps();
        displayResults(candidates);
      } catch (e) {
        setStatus('Error: ' + e.message, 'error');
        console.error(e);
      } finally {
        btn.disabled = false;
      }
    }

    // Fetched dynamically from zone 1054 (MoP Classic SoO)
    let SOO_ENCOUNTERS = [];
    let SOO_HEROIC_BLACKLIST = null; // built once per session

    async function wcl(query) {
      const resp = await fetch(WCL_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${WCL_TOKEN}` },
        body: JSON.stringify({ query })
      });
      if (!resp.ok) throw new Error(`WCL API error: ${resp.status}`);
      const json = await resp.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data;
    }

    function isPugOrUnguilded(guildName) {
      if (!guildName) return true;
      const lower = guildName.toLowerCase();
      return lower.includes('pug') || lower.includes('lfr') || lower.includes('pickup')
          || lower.includes('gdkp') || lower.includes('no guild') || lower.includes('unguild');
    }

    async function findPugDps() {
      const candidates = new Map();

      // Fetch encounter list if not cached
      if (SOO_ENCOUNTERS.length === 0) {
        setStatus('Fetching encounter list...', 'loading');
        const zoneData = await wcl(`{ worldData { zone(id: 1054) { encounters { id name } } } }`);
        const encounters = zoneData?.worldData?.zone?.encounters || [];
        SOO_ENCOUNTERS.push(...encounters);
        if (SOO_ENCOUNTERS.length === 0) throw new Error('Zone 1054 returned no encounters.');
      }

      // Pass 1 — scan SoO normal page 3 per encounter, track guilds seen per player (US only)
      const allPlayers = new Map();
      const guildsSeenBy = new Map();
      const encCountByPlayer = new Map(); // playerKey -> number of encounters in top 300
      let totalChecked = 0;

      for (let i = 0; i < SOO_ENCOUNTERS.length; i++) {
        const enc = SOO_ENCOUNTERS[i];
        setStatus(`Scanning ${enc.name} (${i + 1}/${SOO_ENCOUNTERS.length})...`, 'loading');
        const data = await wcl(`{
          worldData {
            encounter(id: ${enc.id}) {
              characterRankings(difficulty: 3 metric: dps page: 3)
            }
          }
        }`);
        const cr = data?.worldData?.encounter?.characterRankings;
        if (!cr?.rankings?.length) continue;

        totalChecked += cr.rankings.length;
        cr.rankings.forEach(r => {
          if ((r.server?.region || '').toUpperCase() !== 'US') return;
          const playerKey = `${r.name}@${r.server?.name}`;
          const guildName = r.guild?.name || null;

          if (guildName && !isPugOrUnguilded(guildName)) {
            if (!guildsSeenBy.has(playerKey)) guildsSeenBy.set(playerKey, new Set());
            guildsSeenBy.get(playerKey).add(guildName);
          }

          // Count unique encounters this player appears in top 300 for
          const encKey = `${playerKey}@${enc.id}`;
          if (!allPlayers.has(encKey)) {
            encCountByPlayer.set(playerKey, (encCountByPlayer.get(playerKey) || 0) + 1);
          }
          if (!allPlayers.has(encKey) || r.amount > (allPlayers.get(encKey).rawAmount || 0)) {
            allPlayers.set(encKey, {
              playerKey,
              name: r.name,
              realm: r.server?.name || '—',
              classStr: r.class || '',
              spec: r.spec || '',
              guild: guildName || 'Unguilded',
              dps: Math.round(r.amount || 0).toLocaleString(),
              rawAmount: r.amount || 0,
              encounter: enc.name,
            });
          }
        });
        await new Promise(r => setTimeout(r, 150));
      }

      // Pass 1b — batch-scan SoO heroic pages 1-3 to build exclusion blacklist.
      // Cached per session since it doesn't change between scans.
      if (!SOO_HEROIC_BLACKLIST) {
        setStatus('Building heroic SoO exclusion list...', 'loading');
        SOO_HEROIC_BLACKLIST = new Set();
        for (let page = 1; page <= 5; page++) {
          const aliases = SOO_ENCOUNTERS.map((enc, i) =>
            `e${i}: encounter(id: ${enc.id}) { characterRankings(difficulty: 4 metric: dps page: ${page}) }`
          ).join(' ');
          const hData = await wcl(`{ worldData { ${aliases} } }`);
          SOO_ENCOUNTERS.forEach((enc, i) => {
            const cr = hData?.worldData?.[`e${i}`]?.characterRankings;
            (cr?.rankings || []).forEach(r => {
              if ((r.server?.region || '').toUpperCase() !== 'US') return;
              SOO_HEROIC_BLACKLIST.add(`${r.name}@${r.server?.name}`);
            });
          });
          await new Promise(r => setTimeout(r, 200));
        }
        console.log(`Heroic SoO blacklist: ${SOO_HEROIC_BLACKLIST.size} players`);
      }

      // Pass 2 — apply guild filter, heroic blacklist, and encounter count (consistency check)
      const MIN_ENCOUNTERS = 3; // must appear in top 300 on at least this many SoO normal bosses
      allPlayers.forEach((c, encKey) => {
        if (guildsSeenBy.has(c.playerKey)) return;
        if (SOO_HEROIC_BLACKLIST.has(c.playerKey)) return;
        if ((encCountByPlayer.get(c.playerKey) || 0) < MIN_ENCOUNTERS) return;
        candidates.set(encKey, c);
      });

      console.log(`Scanned ${totalChecked} | heroic blacklist ${SOO_HEROIC_BLACKLIST.size} | min ${MIN_ENCOUNTERS} enc filter | passed ${candidates.size}`);

      return Array.from(candidates.values()).sort((a, b) => b.rawAmount - a.rawAmount);
    }

    function displayResults(candidates) {
      const table = document.getElementById('resultsTable');
      const body = document.getElementById('resultsBody');
      const empty = document.getElementById('emptyMsg');

      body.innerHTML = '';

      if (candidates.length === 0) {
        table.style.display = 'none';
        empty.style.display = 'block';
        setStatus(`Scan complete: No candidates found.`, 'success');
        return;
      }

      candidates.forEach(c => {
        const row = document.createElement('tr');
        const color = CLASS_COLORS[c.classStr] || '#aaa';
        const guildTag = c.guild === 'Unguilded'
          ? '<span class="unguilded-tag">Unguilded</span>'
          : `<span class="pug-tag">Pug</span>`;

        row.innerHTML = `
          <td><strong>${c.name}</strong></td>
          <td>${c.realm}</td>
          <td><span class="class-icon" style="background: ${color};">${c.classStr.charAt(0)}</span>${c.classStr}</td>
          <td>${c.spec}</td>
          <td>${guildTag}</td>
          <td>${c.dps}</td>
          <td><strong style="color: #48a868;">Top 300</strong></td>
          <td>${c.encounter}</td>
        `;
        body.appendChild(row);
      });

      table.style.display = 'table';
      empty.style.display = 'none';
      setStatus(`Scan complete: Found ${candidates.length} candidates.`, 'success');
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    // WCL OAuth helpers
    async function genVerifier() { return btoa(String.fromCharCode(...crypto.getRandomValues(new Uint8Array(32)))).replace(/[+/=]/g, c => ({'+':'-','/':'_','=':''}[c])); }
    async function genChallenge(v) { var hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v)); return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/[+/=]/g, c => ({'+':'-','/':'_','=':''}[c])); }

    async function handleWCLLogin() {
      var v = await genVerifier(), ch = await genChallenge(v);
      var state = Math.random().toString(36).slice(2);
      sessionStorage.setItem('wcl_v', v);
      sessionStorage.setItem('wcl_s', state);
      var p = new URLSearchParams({client_id:WCL_CLIENT_ID, redirect_uri:WCL_REDIRECT, response_type:'code', code_challenge:ch, code_challenge_method:'S256', state, scope:'view-user-profile'});
      location.href = WCL_AUTH_URL + '?' + p;
    }

    async function handleCallback() {
      var p = new URLSearchParams(location.search);
      var code = p.get('code'), state = p.get('state');
      if (!code || state !== sessionStorage.getItem('wcl_s')) return false;
      var v = sessionStorage.getItem('wcl_v');
      var body = new URLSearchParams({grant_type:'authorization_code', client_id:WCL_CLIENT_ID, redirect_uri:WCL_REDIRECT, code, code_verifier:v});
      var res = await fetch(WCL_TOKEN_URL, {method:'POST', body, headers:{'Content-Type':'application/x-www-form-urlencoded'}});
      var data = await res.json();
      if (data.access_token) {
        localStorage.setItem(WCL_TOKEN_KEY, data.access_token);
        localStorage.setItem(WCL_TOKEN_EXP, String(Date.now() + (data.expires_in||3600)*1000));
        sessionStorage.removeItem('wcl_v');
        sessionStorage.removeItem('wcl_s');
        WCL_TOKEN = data.access_token;
        history.replaceState({}, '', location.pathname);
        return true;
      }
      return false;
    }

    // Version check — compares latest GitHub commit date against page's Last-Modified header
    async function checkVersion() {
      const bar = document.getElementById('versionBar');
      try {
        const res = await fetch('https://api.github.com/repos/Starplannercd/starplannercd.github.io/commits?path=recruitment.html&per_page=1');
        if (!res.ok) throw new Error();
        const data = await res.json();
        const latestCommit = data[0];
        const commitDate = new Date(latestCommit.commit.committer.date);
        const commitSha = latestCommit.sha.slice(0, 7);
        const commitMsg = latestCommit.commit.message.split('\n')[0];
        const pageDate = new Date(document.lastModified);
        const diffMs = commitDate - pageDate;
        const commitUrl = `https://github.com/Starplannercd/starplannercd.github.io/commit/${latestCommit.sha}`;
        const timeAgo = formatTimeAgo(commitDate);

        if (diffMs > 60000) {
          // Page is more than 1 min older than latest commit — needs refresh
          bar.innerHTML = `<span class="v-dot v-stale"></span>Update available — <a href="${commitUrl}" target="_blank">${commitSha}</a>: ${commitMsg} (${timeAgo}) · <strong style="cursor:pointer;color:#c8a848;" onclick="location.reload(true)">Hard refresh to update</strong>`;
        } else {
          bar.innerHTML = `<span class="v-dot v-ok"></span>Up to date — <a href="${commitUrl}" target="_blank">${commitSha}</a>: ${commitMsg} (${timeAgo})`;
        }
      } catch(e) {
        bar.innerHTML = `<span class="v-dot v-unknown"></span>Version unknown`;
      }
    }

    function formatTimeAgo(date) {
      const mins = Math.round((Date.now() - date) / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.round(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.round(hrs / 24)}d ago`;
    }

    // Check auth on load
    window.addEventListener('DOMContentLoaded', async () => {
      if (location.search.includes('code=')) {
        await handleCallback();
      }
      WCL_TOKEN = localStorage.getItem(WCL_TOKEN_KEY);
      const scanBtn = document.getElementById('scanBtn');
      const loginSection = document.getElementById('loginSection');
      if (!WCL_TOKEN) {
        if (loginSection) loginSection.style.display = 'block';
        if (scanBtn) scanBtn.disabled = true;
      } else {
        if (loginSection) loginSection.style.display = 'none';
        if (scanBtn) scanBtn.disabled = false;
      }
      checkVersion();
    });
  </script>
</body>
</html>
