<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raid DPS Estimator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0e0e; color: #ccc; font-family: monospace; font-size: 13px; padding: 32px; max-width: 820px; margin: 0 auto; }

h1 { color: #999; font-size: 14px; letter-spacing: 0.12em; margin-bottom: 6px; }
.subtitle { color: #3a3a3a; font-size: 11px; margin-bottom: 28px; }
h2 { color: #484848; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; }
.section { margin-bottom: 22px; }

input, select {
  background: #161616; border: 1px solid #2a2a2a; color: #ccc;
  padding: 5px 10px; border-radius: 3px; font-family: monospace; font-size: 12px;
}
input:focus, select:focus { outline: none; border-color: #484848; }
select option { background: #1a1a1a; }

button {
  background: #181818; border: 1px solid #333; color: #aaa;
  padding: 6px 16px; border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 12px;
  transition: border-color 0.1s, color 0.1s;
}
button:hover { border-color: #666; color: #eee; }

#login-btn {
  background: #1a1a10; border-color: #4a4a20; color: #c8c870;
  padding: 8px 22px; font-size: 13px;
}
#login-btn:hover { border-color: #8a8a40; color: #efe080; }

.auth-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding-bottom: 18px; border-bottom: 1px solid #1a1a1a; }
.auth-status { font-size: 11px; }
.ok   { color: #6d6; }
.warn { color: #fa3; }
.err  { color: #f77; }
.dim  { color: #444; }

.row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.row-num { color: #383838; width: 18px; text-align: right; font-size: 11px; }

.boss-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.boss-row label { color: #3a3a3a; font-size: 11px; margin-left: 4px; }

#calc-btn {
  background: #121a12; border-color: #2a4a2a; color: #8a8; padding: 8px 28px; font-size: 13px; margin-top: 6px;
}
#calc-btn:hover { border-color: #4a8a4a; color: #afa; }

/* Results */
#results { margin-top: 26px; }
.res-header { color: #3a3a3a; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid #181818; }
.res-row { display: flex; align-items: baseline; gap: 0; padding: 8px 0; border-bottom: 1px solid #181818; }
.res-name { color: #ddd; width: 100px; }
.res-spec { color: #555; width: 140px; }
.res-ilvl { color: #3a3a3a; width: 70px; }
.res-dps  { color: #7ab8e8; font-weight: bold; width: 120px; }
.res-note { color: #383838; font-size: 11px; }

.total-block { margin-top: 18px; padding-top: 14px; border-top: 1px solid #252525; }
.total-label { color: #555; font-size: 11px; margin-bottom: 4px; }
.total-dps { color: #5af; font-size: 20px; font-weight: bold; }
.total-sub { color: #444; font-size: 11px; margin-top: 6px; }

.enrage-block { margin-top: 14px; font-size: 12px; }
.enrage-ok   { color: #6d6; }
.enrage-warn { color: #fa3; }
.enrage-bad  { color: #f77; }

.caveat { margin-top: 20px; color: #2c2c2c; font-size: 11px; line-height: 1.7; }

.loading { color: #3a3a3a; font-style: italic; margin-top: 16px; }
.back-link { color: #3a3a3a; font-size: 11px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
.back-link:hover { color: #777; }
</style>
</head>
<body>

<a href="/" class="back-link">← cooldown planner</a>

<h1>RAID DPS ESTIMATOR</h1>
<div class="subtitle">median expected DPS per spec at target ilvl, from WCL ranking data</div>

<!-- Auth -->
<div class="auth-bar">
  <button id="login-btn" onclick="doLogin()">Login with WCL</button>
  <span id="auth-status" class="auth-status dim">not connected</span>
</div>

<!-- Boss -->
<div class="section">
  <h2>Boss</h2>
  <div class="boss-row">
    <select id="boss-select" style="width:220px" onchange="onBossChange()">
      <option value="">— Select Boss —</option>
    </select>
    <select id="diff-select" style="width:120px">
      <option value="3">Normal</option>
      <option value="4" selected>Heroic</option>
    </select>
    <label>Enrage</label>
    <input id="enrage" type="number" placeholder="sec" style="width:68px" title="Enrage timer in seconds">
    <span class="dim" style="font-size:11px">s</span>
  </div>
</div>

<!-- Raiders -->
<div class="section">
  <h2>Raiders</h2>
  <div id="raider-rows"></div>
</div>

<button id="calc-btn" onclick="calculate()">Calculate</button>

<div id="results"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const WCL_CLIENT_ID = 'a181f533-c14e-4f52-9b17-252b64aa1585';
const WCL_REDIRECT  = 'https://starplannercd.github.io';
const WCL_AUTH_URL   = 'https://www.warcraftlogs.com/oauth/authorize';
const WCL_TOKEN_URL  = 'https://www.warcraftlogs.com/oauth/token';
const WCL_GQL_URL    = 'https://www.warcraftlogs.com/api/v2/user';
const WCL_TOKEN_KEY  = 'tot_rcd_wcl_token';
const WCL_TOKEN_EXP  = 'tot_rcd_wcl_exp';

// SoO encounter IDs (fallback)
const SOO_ENCOUNTERS = {
  'Immerseus': 1132, 'The Fallen Protectors': 1133, 'Norushen': 1134,
  'Sha of Pride': 1135, 'Galakras': 1136, 'Iron Juggernaut': 1137,
  "Kor'kron Dark Shaman": 1138, 'General Nazgrim': 1139, 'Malkorok': 1140,
  'Spoils of Pandaria': 1141, 'Thok the Bloodthirsty': 1142,
  'Siegecrafter Blackfuse': 1143, 'Paragons of the Klaxxi': 1144,
  'Garrosh Hellscream': 1145,
};

// Rough enrage timers in seconds for SoO normal
const ENRAGE_TIMERS = {
  'Immerseus': 660, 'Norushen': 540, 'Sha of Pride': 600,
  'Iron Juggernaut': 600, "Kor'kron Dark Shaman": 600,
  'General Nazgrim': 600, 'Malkorok': 540, 'Siegecrafter Blackfuse': 600,
  'Paragons of the Klaxxi': 720, 'Garrosh Hellscream': 900,
};

// ── PKCE Auth (same as cooldown planner) ─────────────────────────────────────
async function genVerifier() {
  var arr = new Uint8Array(32); crypto.getRandomValues(arr);
  return btoa(String.fromCharCode.apply(null,arr)).replace(/[+/=]/g,function(c){return{'+':'-','/':'_','=':''}[c];});
}
async function genChallenge(v) {
  var hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode.apply(null,new Uint8Array(hash))).replace(/[+/=]/g,function(c){return{'+':'-','/':'_','=':''}[c];});
}
function getToken() { return localStorage.getItem('tot_rcd_wcl_token'); }
function isAuthed() { var e=localStorage.getItem('tot_rcd_wcl_exp'); return !!getToken()&&!!e&&Date.now()<parseInt(e); }
async function doLogin() {
  var v=await genVerifier(), ch=await genChallenge(v), state=Math.random().toString(36).slice(2);
  sessionStorage.setItem('wcl_v',v); sessionStorage.setItem('wcl_s',state); sessionStorage.setItem('wcl_return','/dps.html');
  var p=new URLSearchParams({client_id:WCL_CLIENT_ID,redirect_uri:WCL_REDIRECT,response_type:'code',code_challenge:ch,code_challenge_method:'S256',state:state,scope:'view-user-profile'});
  window.location.href='https://www.warcraftlogs.com/oauth/authorize?'+p;
}

// ── GQL (with variable support, same endpoint as cooldown planner) ─────────────
async function wclQuery(query, variables) {
  var res = await fetch('https://www.warcraftlogs.com/api/v2/user', {
    method:'POST',
    headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},
    body:JSON.stringify({query:query, variables:variables||{}})
  });
  var data = await res.json();
  if (data.errors) throw new Error(data.errors[0].message);
  return data.data;
}

// ── SoO encounter list (same candidates as cooldown planner) ──────────────────
const SOO_ENCOUNTERS = {"Immerseus":1132,"The Fallen Protectors":1133,"Norushen":1134,"Sha of Pride":1135,"Galakras":1136,"Iron Juggernaut":1137,"Kor'kron Dark Shaman":1138,"General Nazgrim":1139,"Malkorok":1140,"Spoils of Pandaria":1141,"Thok the Bloodthirsty":1142,"Siegecrafter Blackfuse":1143,"Paragons of the Klaxxi":1144,"Garrosh Hellscream":1145};
const ENRAGE_TIMERS  = {'Norushen':540,'Sha of Pride':600,'Iron Juggernaut':600,"Kor'kron Dark Shaman":600,'General Nazgrim':600,'Malkorok':540,'Siegecrafter Blackfuse':600,'Paragons of the Klaxxi':720,'Garrosh Hellscream':900};

let zoneLoaded = false;
async function loadZone() {
  if (zoneLoaded) return; zoneLoaded = true;
  var bossSel = document.getElementById('boss-select');
  bossSel.innerHTML = '<option value="">Loading…</option>';
  var candidates = [1054,1098,1105,1106,5];
  var encounters = null;
  for (var i=0;i<candidates.length;i++) {
    try {
      var d = await wclQuery('{worldData{zone(id:'+candidates[i]+'){encounters{id name}}}}',{});
      var encs = d&&d.worldData&&d.worldData.zone&&d.worldData.zone.encounters||[];
      if (encs.length) { encounters = encs; break; }
    } catch(e) {}
  }
  if (!encounters) encounters = Object.keys(SOO_ENCOUNTERS).map(n=>({id:SOO_ENCOUNTERS[n],name:n}));
  bossSel.innerHTML = '<option value="">— Select Boss —</option>' + encounters.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
}

function onBossChange() {
  var sel=document.getElementById('boss-select'), name=sel.options[sel.selectedIndex]&&sel.options[sel.selectedIndex].text;
  var t=ENRAGE_TIMERS[name]; if(t) document.getElementById('enrage').value=t;
}

// ── Specs ─────────────────────────────────────────────────────────────────────
const SPECS = [
  {cls:'DeathKnight',spec:'Frost',label:'Death Knight — Frost'},{cls:'DeathKnight',spec:'Unholy',label:'Death Knight — Unholy'},
  {cls:'Druid',spec:'Balance',label:'Druid — Balance'},{cls:'Druid',spec:'Feral',label:'Druid — Feral'},
  {cls:'Hunter',spec:'BeastMastery',label:'Hunter — Beast Mastery'},{cls:'Hunter',spec:'Marksmanship',label:'Hunter — Marksmanship'},{cls:'Hunter',spec:'Survival',label:'Hunter — Survival'},
  {cls:'Mage',spec:'Arcane',label:'Mage — Arcane'},{cls:'Mage',spec:'Fire',label:'Mage — Fire'},{cls:'Mage',spec:'Frost',label:'Mage — Frost'},
  {cls:'Monk',spec:'Windwalker',label:'Monk — Windwalker'},
  {cls:'Paladin',spec:'Retribution',label:'Paladin — Retribution'},
  {cls:'Priest',spec:'Shadow',label:'Priest — Shadow'},
  {cls:'Rogue',spec:'Assassination',label:'Rogue — Assassination'},{cls:'Rogue',spec:'Combat',label:'Rogue — Combat'},{cls:'Rogue',spec:'Subtlety',label:'Rogue — Subtlety'},
  {cls:'Shaman',spec:'Elemental',label:'Shaman — Elemental'},{cls:'Shaman',spec:'Enhancement',label:'Shaman — Enhancement'},
  {cls:'Warlock',spec:'Affliction',label:'Warlock — Affliction'},{cls:'Warlock',spec:'Demonology',label:'Warlock — Demonology'},{cls:'Warlock',spec:'Destruction',label:'Warlock — Destruction'},
  {cls:'Warrior',spec:'Arms',label:'Warrior — Arms'},{cls:'Warrior',spec:'Fury',label:'Warrior — Fury'},
];
const SPEC_OPTS = SPECS.map(s=>`<option value="${s.cls}|${s.spec}">${s.label}</option>`).join('');

function buildRaiders() {
  var c=document.getElementById('raider-rows');
  for (var i=0;i<3;i++) {
    var row=document.createElement('div'); row.className='row';
    row.innerHTML=`<span class="row-num">${i+1}.</span><input id="rname-${i}" placeholder="Name" style="width:88px"><select id="rspec-${i}" style="width:210px"><option value="">— Spec —</option>${SPEC_OPTS}</select><input id="rilvl-${i}" type="number" placeholder="ilvl" style="width:62px" min="400" max="600">`;
    c.appendChild(row);
  }
}

function median(arr) {
  if (!arr.length) return 0;
  var s=arr.slice().sort(function(a,b){return a-b;}), m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

// ── Fetch DPS data using fightRankings + DamageDone table (same as cooldown planner) ──
async function fetchAllSpecDps(encId, difficulty) {
  var cacheKey = 'dps_cache_'+encId+'_'+difficulty;
  try { var cached=localStorage.getItem(cacheKey); if(cached) { var c=JSON.parse(cached); if(c.ts&&Date.now()-c.ts<3600000) { console.log('Using cached DPS data'); return c.data; } } } catch(e){}

  var crawlQuery = 'query($id:Int!,$pg:Int!){worldData{encounter(id:$id){fightRankings(difficulty:'+difficulty+',size:10,metric:execution,page:$pg)}}}';
  var allFights = [];
  for (var page=1; page<=10 && allFights.length<140; page++) {
    var d = await wclQuery(crawlQuery, {id:parseInt(encId), pg:page});
    var rankings = (d&&d.worldData&&d.worldData.encounter&&d.worldData.encounter.fightRankings&&d.worldData.encounter.fightRankings.rankings)||[];
    if (!rankings.length) break;
    allFights = allFights.concat(rankings);
  }
  console.log('Got '+allFights.length+' fight rankings');

  // Skip first 39 like cooldown planner (they're too fast / outliers)
  var fights = allFights.slice(39, 140);
  if (!fights.length && allFights.length) fights = allFights; // fallback if not enough

  var specDpsMap = {}; // "ClassName-SpecName" → [dps values]
  var reportQ = 'query($c:String!,$fid:Int!){reportData{report(code:$c){fights(fightIDs:[$fid]){startTime endTime} damageDone:table(fightIDs:[$fid],dataType:DamageDone,startTime:0,endTime:9999999)}}}'

  var resultsEl = document.getElementById('results');
  for (var i=0; i<fights.length; i++) {
    var fight = fights[i];
    var code=fight.report&&fight.report.code, fid=fight.report&&fight.report.fightID;
    if (!code||!fid) continue;
    resultsEl.innerHTML = '<p class="loading">Fetching fight data… ('+( i+1)+'/'+fights.length+')</p>';
    try {
      var rd = await wclQuery(reportQ, {c:code, fid:fid});
      var rep = rd&&rd.reportData&&rd.reportData.report;
      if (!rep) continue;
      var f = rep.fights&&rep.fights[0]; if (!f) continue;
      var dur = (f.endTime-f.startTime)/1000; if (dur<30) continue;
      var dd = rep.damageDone;
      var table = typeof dd==='string'?JSON.parse(dd):dd;
      var entries = (table&&table.data&&table.data.entries)||table&&table.entries||[];
      entries.forEach(function(e){
        if (!e.icon||!e.total) return;
        var key = e.icon; // e.g. "Mage-Frost", "Warrior-Fury"
        if (!specDpsMap[key]) specDpsMap[key]=[];
        specDpsMap[key].push(Math.round(e.total/dur));
      });
    } catch(e) { console.warn('Fight '+i+' error:',e.message); }
  }

  console.log('Spec keys found:', Object.keys(specDpsMap).join(', '));
  try { localStorage.setItem(cacheKey, JSON.stringify({ts:Date.now(), data:specDpsMap})); } catch(e){}
  return specDpsMap;
}

// ── Calculate ─────────────────────────────────────────────────────────────────
async function calculate() {
  var resultsEl=document.getElementById('results');
  var encId=document.getElementById('boss-select').value;
  var diff=document.getElementById('diff-select').value;
  var enrageSec=parseInt(document.getElementById('enrage').value)||null;

  if (!isAuthed()) { resultsEl.innerHTML='<p class="err" style="margin-top:16px">Not connected.</p>'; return; }
  if (!encId)      { resultsEl.innerHTML='<p class="err" style="margin-top:16px">Select a boss.</p>'; return; }

  var raiders=[];
  for (var i=0;i<3;i++) {
    var name=document.getElementById('rname-'+i).value.trim()||('Raider '+(i+1));
    var specVal=document.getElementById('rspec-'+i).value;
    var ilvl=parseInt(document.getElementById('rilvl-'+i).value)||0;
    if (specVal&&ilvl) { var parts=specVal.split('|'); raiders.push({name:name,cls:parts[0],spec:parts[1],ilvl:ilvl}); }
  }
  if (!raiders.length) { resultsEl.innerHTML='<p class="err" style="margin-top:16px">Fill in at least one raider.</p>'; return; }

  resultsEl.innerHTML='<p class="loading">Fetching fight rankings from WCL…</p>';

  try {
    var specDpsMap = await fetchAllSpecDps(encId, diff);
    var rows=[];

    raiders.forEach(function(r) {
      // WCL icon key: "ClassName-SpecName" e.g. "Mage-Frost", "DeathKnight-Frost"
      var key = r.cls+'-'+r.spec;
      var values = specDpsMap[key]||[];
      // Also check lowercase variants just in case
      if (!values.length) {
        Object.keys(specDpsMap).forEach(function(k){
          if (k.toLowerCase()===key.toLowerCase()) values=specDpsMap[k];
        });
      }
      var dps = values.length ? Math.round(median(values)) : 0;
      rows.push({name:r.name,spec:r.spec,ilvl:r.ilvl,dps:dps,count:values.length,key:key});
    });

    var totalDps=rows.reduce(function(t,r){return t+r.dps;},0);
    var html='<div class="res-header">Results</div>';
    rows.forEach(function(r){
      html+='<div class="res-row"><span class="res-name">'+r.name+'</span><span class="res-spec">'+r.spec+'</span><span class="res-ilvl">ilvl '+r.ilvl+'</span><span class="res-dps">'+(r.dps?r.dps.toLocaleString()+' DPS':'No data')+'</span><span class="res-note">'+(r.count?r.count+' fights sampled':'key: '+r.key+' — not found')+'</span></div>';
    });
    html+='<div class="total-block"><div class="total-label">Total expected DPS</div><div class="total-dps">'+totalDps.toLocaleString()+'</div>';
    if (enrageSec) html+='<div class="total-sub">→ '+(totalDps*enrageSec/1e6).toFixed(1)+'M damage in '+enrageSec+'s enrage window</div>';
    html+='</div><div class="caveat">Median DPS from '+diff=='3'?'normal':'heroic'+' 10-man WCL logs.<br>Real output varies with movement, mechanics, and skill.</div>';
    resultsEl.innerHTML=html;
  } catch(e) {
    resultsEl.innerHTML='<p class="err" style="margin-top:16px">Error: '+e.message+'</p>';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  buildRaiders();
  var statusEl=document.getElementById('auth-status'), loginBtn=document.getElementById('login-btn');
  if (isAuthed()) {
    statusEl.textContent='Connected ✓'; statusEl.className='auth-status ok';
    loginBtn.textContent='Reconnect WCL';
    await loadZone();
  } else {
    statusEl.textContent='not connected'; statusEl.className='auth-status dim';
  }
}
init();
</script>
</body>
</html>
