<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-auth-compat.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Throne of Thunder — Raid Cooldown Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --bg2: #12141a;
    --bg3: #1a1c24;
    --border: #22242e;
    --border2: #2e3040;
    --text: #e8eaf2;
    --text2: #8a8da8;
    --text3: #4a4d62;
    --accent: #c8a84b;
    --accent2: #a07830;
    --red: #c84848;
    --blue: #4888c8;
    --green: #48a868;
    --purple: #8868c8;
    --orange: #c87838;
    --teal: #38a8b8;
    --pink: #c84888;
    --yellow: #c8b838;
    --gold: #d4a832;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* TOP BAR */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
    backdrop-filter: blur(0);
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.06em;
    white-space: nowrap;
    margin-right: 4px;
  }

  .boss-select {
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    min-width: 200px;
    transition: border-color 0.15s;
  }
  .boss-select:hover { border-color: var(--accent); }
  .boss-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,168,75,0.15); }

  .btn {
    background: #1a1c26;
    border: none;
    border-radius: 0px;
    color: var(--text2);
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,168,75,0.06); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); background: rgba(200,72,72,0.06); }

  .hint {
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
    letter-spacing: 0.03em;
  }

  /* MAIN LAYOUT */
  .main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .main-top { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* BOTTOM PANEL */
  .bottom-panel {
    flex-shrink: 0;
    height: 320px;
    min-height: 38px;
    max-height: 90vh;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .resize-handle { display: none; }

  /* Auth screen */
  #authScreen { position:fixed;inset:0;background:#08090d;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0; }
  .auth-box { background:#0e0f13;border:1px solid #2e3040;border-radius:12px;padding:36px 40px;width:380px;max-width:92vw;display:flex;flex-direction:column;align-items:center;gap:20px; }
  .auth-title { font-size:18px;font-weight:800;color:#c8a84b;letter-spacing:0.06em;text-align:center; }
  .auth-sub { font-size:11px;color:#4a4d62;text-align:center;letter-spacing:0.04em; }
  .auth-google-btn { display:flex;align-items:center;gap:10px;padding:11px 20px;border-radius:6px;border:1px solid #3a3d52;background:#1e2028;color:#d4d6e8;font-size:13px;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:border-color 0.15s; }
  .auth-google-btn:hover { border-color:#c8a84b; }
  .auth-google-btn svg { flex-shrink:0; }
  .auth-status { font-size:11px;color:#8a8da8;text-align:center;min-height:16px; }
  .auth-error { font-size:11px;color:#c84848;text-align:center; }
  .auth-pending { background:#12141a;border:1px solid #c8a84b33;border-radius:8px;padding:16px;font-size:11px;color:#8a8da8;text-align:center;line-height:1.7;width:100%; }
  .auth-pending strong { color:#c8a84b; }
  .auth-signout { position:fixed;top:8px;right:12px;font-size:10px;color:#3a3d52;background:transparent;border:none;cursor:pointer;letter-spacing:0.04em;z-index:10000; }
  .auth-signout:hover { color:#8a8da8; }

  /* Fill state indicators */
  .fill-banner { background: linear-gradient(90deg,#c8a84b22,#c8a84b11,transparent); border-bottom: 2px solid #c8a84b; padding: 5px 16px; display:flex; align-items:center; gap:10px; font-size:11px; font-weight:700; color:#c8a84b; letter-spacing:0.06em; }
  .fill-banner-pill { background:#c8a84b22; border:1px solid #c8a84b66; border-radius:20px; padding:2px 10px; font-size:10px; color:#c8a84b; font-weight:700; }
  .fill-stripe { height:3px; background:linear-gradient(90deg,#c8a84b,#c8a84b88,transparent); }
  .fill-sidebar-badge { position:fixed; left:0; top:50%; transform:translateY(-50%); background:#c8a84b; color:#0a0b0f; font-size:9px; font-weight:900; letter-spacing:0.1em; writing-mode:vertical-rl; text-orientation:mixed; padding:12px 4px; border-radius:0 4px 4px 0; z-index:50; cursor:default; }
  .fill-topbar-badge { background:#c8a84b; color:#0a0b0f; font-size:9px; font-weight:900; letter-spacing:0.08em; padding:3px 8px; border-radius:3px; text-transform:uppercase; }
  .fill-pulse-dot { width:9px; height:9px; border-radius:50%; background:#c8a84b; animation:fill-pulse 1.8s ease-in-out infinite; flex-shrink:0; }
  @keyframes fill-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  /* EXPAND BUTTON STYLES */
  .expand-tabbar-btn {
    margin-left: auto;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    border-left: 1px solid var(--border);
    border-bottom: 2px solid transparent;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .expand-tabbar-btn:hover { color: var(--accent); }
  .expand-tabbar-btn.expanded { color: var(--accent); border-bottom-color: var(--accent); }

  .expand-fullbar {
    width: 100%;
    height: 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: ns-resize;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    user-select: none;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .expand-fullbar:hover { background: var(--border); color: var(--accent); }

  .expand-corner-btn {
    position: absolute;
    top: 6px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: border-color 0.15s, color 0.15s;
  }
  .expand-corner-btn:hover { border-color: var(--accent); color: var(--accent); }
  .bottom-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .bottom-tab {
    padding: 7px 18px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    cursor: pointer;
    border-right: 1px solid var(--border);
    border-bottom: 2px solid transparent;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.15s, background 0.15s;
  }
  .bottom-tab:hover { color: var(--text2); background: var(--bg3); }
  .bottom-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg2); }
  .bottom-content {
    flex: 1;
    overflow: auto;
    padding: 12px 18px;
  }

  /* SUMMARY PANEL */
  .summary-toolbar { display:flex; align-items:center; gap:6px; margin-bottom:8px; flex-shrink:0; }
  .summary-view-btn { padding:3px 10px; border-radius:3px; font-size:10px; cursor:pointer; border:1px solid var(--border2); background:var(--bg3); color:var(--text3); letter-spacing:0.04em; text-transform:uppercase; }
  .summary-view-btn.active { border-color:var(--accent); color:var(--accent); }
  .summary-empty { color: var(--text3); font-size: 12px; padding: 8px 0; }

  /* VIEW: TABLE */
  .sv-table { width:100%; border-collapse:collapse; font-size:11px; }
  .sv-table th { text-align:left; color:var(--text3); font-weight:500; padding:2px 8px 5px 0; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; border-bottom:1px solid var(--border); }
  .sv-table td { padding:4px 8px 4px 0; border-bottom:1px solid var(--border); vertical-align:middle; }
  .sv-table td:first-child { color:var(--text2); width:160px; font-size:11px; }
  .sv-icons { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
  .sv-icon-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .sv-icon { width:28px; height:28px; border-radius:4px; border:1.5px solid; object-fit:cover; display:block; }
  .sv-icon-label { font-size:9px; font-weight:600; text-align:center; max-width:32px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sv-offset-badge { font-size:9px; color:var(--text3); }

  /* VIEW: CARDS */
  .sv-cards { display:flex; flex-wrap:wrap; gap:8px; }
  .sv-card { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:7px 10px; min-width:140px; }
  .sv-card-title { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
  .sv-card-icons { display:flex; flex-wrap:wrap; gap:4px; }

  /* VIEW: COMPACT */
  .sv-compact { display:flex; flex-direction:column; gap:5px; }
  .sv-compact-row { display:flex; align-items:center; gap:12px; padding:5px 0; border-bottom:1px solid var(--border); }
  .sv-compact-label { width:200px; flex-shrink:0; font-size:15px; font-weight:500; color:var(--text); }
  .sv-compact-icons { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .sv-compact-icon { width:40px; height:40px; border-radius:5px; border:1.5px solid; object-fit:cover; }
  .sv-tip-label { font-size:9px; font-weight:600; opacity:0; transition:opacity 0.15s; text-align:center; }
  .sv-compact-row:hover .sv-tip-label { opacity:1; }

  /* SHEET PREVIEW */
  .sp-table { width:100%; border-collapse:collapse; font-size:11px; }
  .sp-table th { text-align:left; color:var(--accent); font-weight:600; padding:4px 8px; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; border-bottom:1px solid var(--border2); background:var(--bg3); white-space:nowrap; }
  .sp-table td { padding:4px 8px; border-bottom:1px solid var(--border); vertical-align:middle; white-space:nowrap; color:var(--text); }
  .sp-table tr:hover td { background:var(--bg3); }
  .sp-boss-header td { background:var(--bg3); color:var(--accent); font-weight:600; font-size:12px; padding:6px 8px; border-bottom:1px solid var(--border2); border-top:2px solid var(--border2); }
  .sp-who { font-weight:600; }
  .sp-cd-name { display:flex; align-items:center; gap:5px; }
  .sp-cd-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .sp-offset { color:#8a8da8; }
  .sp-custom { color:#c87020; font-style:italic; }

  /* NOTES PANEL */
  .notes-area {
    width: 100%; height: 100%; min-height: 140px;
    background: transparent; border: none; resize: none;
    color: var(--text); font-family: inherit; font-size: 12px;
    line-height: 1.6; outline: none;
  }
  .notes-area::placeholder { color: var(--text3); }

  /* CD PALETTE */
  .palette {
    width: 196px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 10px 8px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .palette-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    padding: 4px 4px 2px;
  }

  .cd-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    user-select: none;
    transition: border-color 0.12s, opacity 0.15s, background 0.12s;
    background: var(--bg3);
    position: relative;
    cursor: grab;
  }
  .cd-chip:active { cursor: grabbing; }
  .cd-chip:hover { border-color: var(--border2); background: var(--bg2); }
  .cd-chip.reorder-dragging { opacity: 0.35; }
  .cd-chip.reorder-over { border-color: var(--accent); border-style: dashed; }

  .cd-chip.placed-fade { opacity: 0.3; }
  .cd-chip.placed-fade:hover { opacity: 0.55; }


  .cd-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cd-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; letter-spacing: 0.01em; }
  .cd-cooldown { font-size: 11px; color: var(--text3); }

  /* TIMELINE AREA */
  .timeline-area {
    flex: 1;
    overflow: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .boss-info {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    padding: 2px 0;
  }
  .boss-ready-wrap {
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .boss-ready-wrap input[type=checkbox] { display: none; }
  .boss-ready-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    color: var(--text3);
    background: transparent;
    transition: all 0.15s;
  }
  .boss-ready-wrap.ready .boss-ready-label {
    border-color: transparent;
    background: #48a868;
    color: #0a0b0f;
  }

  .boss-name { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; text-transform: uppercase; }
  .boss-desc { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }

  /* TIMELINE GRID */
  .timeline-grid { position: relative; }

  /* Time ruler */
  .ruler {
    position: relative;
    height: 24px;
    margin-bottom: 2px;
  }

  .ruler-tick {
    position: absolute;
    top: 0;
    font-size: 10px;
    color: var(--text3);
    transform: translateX(-50%);
    white-space: nowrap;
  }

  .ruler-tick::after {
    content: '';
    display: block;
    width: 1px;
    height: 6px;
    background: var(--border2);
    margin: 2px auto 0;
  }

  /* ABILITY ROW */
  .ability-row {
    display: flex;
    align-items: stretch;
    margin-bottom: 3px;
    min-height: 69px;
    height: 69px;
  }
  .ability-label {
    width: 180px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 4px 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 4px 0 0 4px;
  }
  .ability-label-text { font-size: 13px; color: var(--text2); line-height: 1.3; font-weight: 500; letter-spacing: 0.01em; }
  .ability-marker { width: 3px; align-self: stretch; border-radius: 0; margin-right: 8px; flex-shrink: 0; }
  .track {
    flex: 1;
    position: relative;
    overflow: visible;
    min-height: 40px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 0 4px 4px 0;
  }
  .track-gridline {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--border2);
    opacity: 0.9;
    pointer-events: none;
  }



  /* CD PLACED ON TRACK */
  .placed-cd {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 75px !important;
    min-width: 75px;
    height: 57px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    cursor: pointer;
    z-index: 3;
    border: 2px solid transparent;
    opacity: 0.9;
    letter-spacing: 0.04em;
    transition: opacity 0.12s;
  }
  .placed-cd { overflow: hidden; position: absolute; }
  .placed-cd:hover { opacity: 1; z-index: 10; transform: translateY(-50%) scale(1.06); }
  .cd-icon-text { transition: opacity 0.12s; }
  .cd-offset-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.12s;
    pointer-events: none;
    background: rgba(0,0,0,0.55);
    border-radius: inherit;
  }
  .cd-offset-value {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .cd-offset-hint {
    font-size: 9px;
    font-weight: 500;
    opacity: 0.6;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .placed-cd:hover .cd-icon-text { opacity: 0; }
  .placed-cd:hover .cd-offset-inner { opacity: 1; }


  /* DRAG GHOST */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    opacity: 0.9;
    display: none;
  }

  /* SECTION DIVIDER */
  .phase-divider {
    width: 100%;
    height: 1px;
    background: var(--border2);
    margin: 8px 0;
    position: relative;
  }
  .phase-divider::before {
    content: attr(data-label);
    position: absolute;
    left: 164px;
    top: -8px;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--bg);
    padding: 0 6px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* RA-DEN HEALTH BAR */
  .health-ruler {
    position: relative;
    height: 24px;
    margin-bottom: 2px;
  }
  .health-tick {
    position: absolute;
    top: 0;
    font-size: 10px;
    color: var(--text3);
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .health-tick::after {
    content: '';
    display: block;
    width: 1px;
    height: 6px;
    background: var(--border2);
    margin: 2px auto 0;
  }

  /* OFFSET POPUP */
  .offset-popup {
    position: fixed;
    z-index: 99999;
    background: var(--bg2, #161820);
    border: 1px solid var(--border2, #3a3d52);
    border-radius: 6px;
    padding: 10px 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 180px;
  }
  .offset-popup label {
    font-size: 11px;
    color: #8a8da8;
  }
  .offset-popup input[type=number] {
    width: 100%;
    background: #0e0f13;
    border: 1px solid #3a3d52;
    color: #d4d6e8;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  .offset-popup .popup-btns {
    display: flex;
    gap: 6px;
  }
  .offset-popup button {
    flex: 1;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #3a3d52;
    background: #1e2028;
    color: #d4d6e8;
  }
  .offset-popup button.confirm {
    border-color: #4888c8;
    color: #88c8ff;
  }
  .offset-popup button:hover { opacity: 0.8; }

  .modal-overlay {
    position: fixed; inset: 0;

    display: flex; align-items: center; justify-content: center;
  }
  .modal-box {
    background: #161820;

    border-radius: 8px;

    flex-direction: column;
    gap: 12px;

    flex: 1;
    background: #0e0f13;

  .manage-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;

  .manage-item {
    display: flex;

    font-size: 9px !important;

    font-size: 9px;

    letter-spacing: 0.12em;
    color: var(--text3);

    border-radius: 10px !important;
    border: 1px solid var(--border2) !important;

    font-size: 13px !important;
    font-weight: 700 !important;
    letter-spacing: 0.06em !important;
    text-transform: uppercase !important;
    color: var(--accent) !important;

  .cd-cooldown { font-size: 10px; color: var(--text3); letter-spacing: 0.03em; }


  .ruler-tick {
    font-size: 9px !important;
    letter-spacing: 0.02em;
    font-weight: 500;
  }

  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }


  /* Icon style: Flat (baked in) */
  .placed-cd { border-radius: 6px; border: 1px solid transparent; }
  /* ghost — outline only, no fill */
  [data-icon="ghost"] .placed-cd { border-radius:8px; background:transparent !important; border:2px solid transparent; }

  /* rounded — soft corners, semi-transparent fill */
  [data-icon="rounded"] .placed-cd { border-radius:12px; border:1.5px solid transparent; }

  /* square — hard corners */
  [data-icon="square"] .placed-cd { border-radius:0px; border:1.5px solid transparent; }

  /* sharp-ghost — ghost with sharp corners */
  [data-icon="sharp-ghost"] .placed-cd { border-radius:2px; background:transparent !important; border:2px solid transparent; }

  /* filled — full solid color */
  [data-icon="filled"] .placed-cd { border-radius:8px; border:none; }

  /* filled-sharp — solid, no radius */
  [data-icon="filled-sharp"] .placed-cd { border-radius:0px; border:none; }

  /* tag — left accent bar only */
  [data-icon="tag"] .placed-cd { border-radius:3px; border:none; border-left:4px solid transparent; }

  /* tag-ghost — transparent with left bar */
  [data-icon="tag-ghost"] .placed-cd { border-radius:3px; background:transparent !important; border:none; border-left:4px solid transparent; }

  /* top-bar — accent bar on top */
  [data-icon="top-bar"] .placed-cd { border-radius:4px; border:none; border-top:4px solid transparent; }

  /* top-bar-ghost — transparent with top bar */
  [data-icon="top-bar-ghost"] .placed-cd { border-radius:4px; background:transparent !important; border:none; border-top:4px solid transparent; }

  /* bold-outline — thick border, no fill */
  [data-icon="bold-outline"] .placed-cd { border-radius:8px; background:transparent !important; border:3px solid transparent; }

  /* notched — alternating corners */
  [data-icon="notched"] .placed-cd { border-radius:10px 2px 10px 2px; border:1.5px solid transparent; }

  /* notched-ghost — notched, no fill */
  [data-icon="notched-ghost"] .placed-cd { border-radius:10px 2px 10px 2px; background:transparent !important; border:2px solid transparent; }

  /* cut-corner — one corner cut */
  [data-icon="cut-corner"] .placed-cd { border-radius:10px 2px 10px 10px; border:1.5px solid transparent; }

  /* cut-corner-ghost */
  [data-icon="cut-corner-ghost"] .placed-cd { border-radius:10px 2px 10px 10px; background:transparent !important; border:2px solid transparent; }

  /* double-border — thin inner + outer ring */
  [data-icon="double-border"] .placed-cd { border-radius:8px; background:transparent !important; border:2px solid transparent; outline:1px solid; outline-offset:3px; }

  /* pill — rounded ends */
  [data-icon="pill"] .placed-cd { border-radius:28px; border:1.5px solid transparent; }

  /* pill-ghost — pill outline only */
  [data-icon="pill-ghost"] .placed-cd { border-radius:28px; background:transparent !important; border:2px solid transparent; }

  /* flat — very subtle border, light fill */
  [data-icon="flat"] .placed-cd { border-radius:6px; border:1px solid transparent; }

  /* inset-shadow — filled with inner shadow effect via border */
  [data-icon="inset-shadow"] .placed-cd { border-radius:8px; border:1px solid transparent; border-bottom:3px solid transparent; }


  /* ── ANIMATION SYSTEM ── */
  @keyframes anim-pop-in {
    0%   { transform: translateY(-50%) scale(0.3); opacity: 0; }
    70%  { transform: translateY(-50%) scale(1.12); opacity: 1; }
    100% { transform: translateY(-50%) scale(1); opacity: 0.9; }
  }
  @keyframes anim-pop-out {
    0%   { transform: translateY(-50%) scale(1); opacity: 0.9; }
    100% { transform: translateY(-50%) scale(0); opacity: 0; }
  }
  @keyframes anim-swap-flash {
    0%,100% { filter: none; }
    50%      { filter: brightness(2) saturate(0); }
  }
  @keyframes anim-row-flash-red {
    0%,100% { background: transparent; }
    50%      { background: rgba(200,72,72,0.18); }
  }
  @keyframes anim-export-pulse {
    0%,100% { box-shadow: none; }
    50%      { box-shadow: 0 0 0 3px rgba(200,168,75,0.4); }
  }
  @keyframes anim-check-draw {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }

    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes anim-palette-tilt {
    0%   { transform: rotate(0deg) scale(1); }
    100% { transform: rotate(4deg) scale(1.05); }
  }
  @keyframes anim-timeline-fade-in {
    0%   { opacity: 0; transform: translateX(-6px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes anim-tab-slide {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Applied via JS when animations enabled */
  .anim-pop-in  { animation: anim-pop-in  0.18s cubic-bezier(.34,1.56,.64,1) forwards; }

  .anim-check-draw { animation: anim-check-draw 0.22s cubic-bezier(.34,1.56,.64,1) forwards; }
  .anim-timeline-fade { animation: anim-timeline-fade-in 0.15s ease forwards; }
  .anim-tab-slide { animation: anim-tab-slide 0.15s ease forwards; }

// ---- Roster Functions ----
function snapshotBaseWho() {
  CD_POOL.forEach(cd => { if (!baseWhoLabels[cd.id]) baseWhoLabels[cd.id] = cd.who; });
}

function swapPlacementsAllBosses(cdFrom, cdTo, newWho) {
  BOSSES.forEach(boss => {
    const bossData = placedCDs[boss.id];
    if (!bossData) return;
    Object.entries(bossData).forEach(([rowKey, row]) => {
      if (!row) return;
      row.forEach(p => {
        if (p.cdId === cdFrom) {
          if (cdTo) { p.cdId = cdTo; if (newWho) p.who = newWho; }
          else { p.cdId = '__removed__'; }
        }
      });
      // Remove marked, then compact — shift remaining icons to fill gaps
      const before = row.filter(p => p.cdId === '__removed__').map(p => p.cell ?? getCellIndex(p.time));
      row.splice(0, row.length, ...row.filter(p => p.cdId !== '__removed__'));
      // For each removed cell position, shift all icons that were after it one cell left
      before.forEach(removedCell => {
        row.forEach(p => {
          const pCell = p.cell ?? getCellIndex(p.time);
          if (pCell > removedCell) {
            p.cell = pCell - 1;
            p.time = (p.cell * 30) + 15;
          }
        });
      });
    });
  });
}

function refreshActiveSetFromFills() {
  snapshotBaseWho();
  // Restore base WHO labels
  CD_POOL.forEach(cd => { if (baseWhoLabels[cd.id]) cd.who = baseWhoLabels[cd.id]; });
  // Update WHO labels for active fills (for export purposes)
  Object.values(activeRosterFills).forEach(fill => {
    (fill.fillCds || []).forEach(id => {
      const cd = CD_POOL.find(c => c.id === id);
      if (cd && fill.fillWho) cd.who = fill.fillWho;
    });
  });
  // Palette always shows the base active set — fills don't change what's available to drag
buildPalette();
  renderTimeline();
}

function updateFillIndicator() {
  // Remove old indicators
  document.getElementById('fillBannerEl')?.remove();
  document.getElementById('fillStripeEl')?.remove();
  document.getElementById('fillSidebarEl')?.remove();
  const badge = document.getElementById('fillTopbarBadge');
  if (badge) badge.style.display = 'none';

  const fills = Object.entries(activeRosterFills);

  // Always update the Fill button regardless of fill state
  const rosterBtn = document.getElementById('rosterBtn');
  if (rosterBtn) {
    if (!fills.length) {
      rosterBtn.textContent = 'Sub';
      rosterBtn.style.color = '';
      rosterBtn.style.borderColor = '';
      rosterBtn.style.background = '';
    } else {
      const firstCol = SPEC_CLASS_COLORS[fills[0][1].fillSpec] || '#c8a84b';
      const parts = fills.map(([, f]) => SPEC_SHORT_NAMES[f.fillSpec] || f.fillSpec.split(' ').map(w=>w[0]).join(''));
      rosterBtn.textContent = 'Sub: ' + parts.join(' · ');
      rosterBtn.style.color = firstCol;
      rosterBtn.style.borderColor = firstCol;
      rosterBtn.style.background = firstCol + '18';
    }
  }

  if (!fills.length) return;

  const summary = fills.map(([, f]) => `${f.fillSpec}`).join(' · ');
  const label = `FILL ACTIVE — ${summary}`;

  switch(fillIndicatorStyle) {
    case 'banner': {
      const el = document.createElement('div');
      el.id = 'fillBannerEl';
      el.className = 'fill-banner';
      el.innerHTML = `<div class="fill-pulse-dot"></div><span>${label}</span>`;
      const topbar = document.getElementById('topbar');
      topbar?.after(el);
      break;
    }
    case 'stripe': {
      const el = document.createElement('div');
      el.id = 'fillStripeEl';
      el.className = 'fill-stripe';
      const topbar = document.getElementById('topbar');
      topbar?.after(el);
      break;
    }
    case 'topbar-badge': {
      if (badge) {
        badge.style.display = 'flex';
        badge.innerHTML = `<span class="fill-topbar-badge">⚡ FILL: ${summary}</span>`;
      }
      break;
    }
    case 'pulse-dot': {
      if (badge) {
        badge.style.display = 'flex';
        badge.innerHTML = `<div class="fill-pulse-dot" title="${label}"></div>`;
      }
      break;
    }
    case 'sidebar': {
      const el = document.createElement('div');
      el.id = 'fillSidebarEl';
      el.className = 'fill-sidebar-badge';
      el.textContent = 'FILL ACTIVE';
      el.title = label;
      document.body.appendChild(el);
      break;
    }
    case 'none': default: break;
  }
}

// ── Saved Fill States ──
// Key: "OUTGOING_WHO::INCOMING_SPEC" e.g. "ELE1::Retribution"
const SAVED_FILLS_KEY = 'tot_rcd_saved_fills';

function getSavedFills() {
  try { return JSON.parse(localStorage.getItem(SAVED_FILLS_KEY) || '{}'); } catch(e) { return {}; }
}

function saveFillState(playerWho, fillSpecName, fillPlacedState, basePlacedState) {
  const key = `${playerWho}::${fillSpecName}`;
  const saves = getSavedFills();
  saves[key] = {
    playerWho,
    fillSpecName,
    placedCDs: JSON.parse(JSON.stringify(fillPlacedState)),
    basePlacedCDs: basePlacedState ? JSON.parse(JSON.stringify(basePlacedState)) : null,
    savedAt: Date.now(),
  };
  localStorage.setItem(SAVED_FILLS_KEY, JSON.stringify(saves));
}

function loadSavedFillState(key) {
  const saves = getSavedFills();
  return saves[key] || null;
}

function deleteSavedFillState(key) {
  const saves = getSavedFills();
  delete saves[key];
  localStorage.setItem(SAVED_FILLS_KEY, JSON.stringify(saves));
}

function getFillKey(playerWho, fillSpecName) {
  return `${playerWho}::${fillSpecName}`;
}

function checkForSavedFill(playerWho, fillSpecName, onLoad, onFresh) {
  const key = getFillKey(playerWho, fillSpecName);
  const saved = loadSavedFillState(key);
  if (!saved) { onFresh(); return; }

  // Show saved fill menu based on style
  showSavedFillMenu(playerWho, fillSpecName, saved, onLoad, onFresh);
}

    case 'sidebar-panel': {
      const ov = document.createElement('div');
      ov.id = 'savedFillMenuEl';
      ov.style.cssText = `position:fixed;top:0;right:0;bottom:0;width:280px;background:#0e0f13;border-left:1px solid ${col}44;z-index:2000;display:flex;flex-direction:column;padding:24px 20px;box-shadow:-8px 0 32px rgba(0,0,0,0.8);`;
      ov.innerHTML = `<div style="font-size:12px;font-weight:700;color:${col};margin-bottom:8px;letter-spacing:0.06em;">SAVED FILL FOUND</div>
        <div style="font-size:11px;color:#8a8da8;margin-bottom:24px;line-height:1.6;"><span style="color:${col};font-weight:700;">${short}</span> replacing ${playerWho}<br/><span style="color:#4a4d62;">Saved ${savedDate} at ${savedTime}</span></div>
        <button id="sfLoad" style="padding:10px;border-radius:6px;border:1px solid ${col};background:${col}18;color:${col};font-size:12px;font-weight:700;cursor:pointer;margin-bottom:8px;">Load Saved Plan</button>
        <button id="sfFresh" style="padding:10px;border-radius:6px;border:1px solid #2e3040;background:transparent;color:#8a8da8;font-size:12px;cursor:pointer;margin-bottom:auto;">Start Fresh</button>
        <button id="sfDelete" style="padding:8px;border:none;background:transparent;color:#c84848;font-size:10px;cursor:pointer;">Delete saved plan</button>`;
      document.body.appendChild(ov);
      ov.querySelector('#sfLoad').addEventListener('click', () => { ov.remove(); onLoad(saved); });
      ov.querySelector('#sfFresh').addEventListener('click', () => { ov.remove(); onFresh(); });
      ov.querySelector('#sfDelete').addEventListener('click', () => { deleteSavedFillState(getFillKey(playerWho, fillSpecName)); ov.remove(); onFresh(); });
      break;
    }
    case 'inline': {
      // Will be shown inside the Fill tab — just call fresh for now, tab handles it
      onFresh();
      break;
    }
  }
}

function applyFill(playerWho, fillSpecName) {
  snapshotBaseWho();
  const player = DEFAULT_ROSTER.find(p => p.who === playerWho);
  const fillSpec = SPEC_CD_MAP[fillSpecName];
  if (!player || !fillSpec) return;

  const originalCds = player.cds;
  const fillCds = fillSpec.cds;
  const fillWho = fillSpec.who;

  // Snapshot the ENTIRE placedCDs state before making any changes
  const placedSnapshot = JSON.parse(JSON.stringify(placedCDs));

  // Swap original CDs to fill CDs on the live timeline
  originalCds.forEach((cdId, i) => {
    const replacementId = fillCds[i] || null;
    swapPlacementsAllBosses(cdId, replacementId, fillWho);
  });

  activeRosterFills[playerWho] = { fillSpec: fillSpecName, originalCds, fillCds, fillWho, placedSnapshot };
  updateFillIndicator();
  isDirty = true;
  refreshActiveSetFromFills();
}

function revertFill(playerWho) {
  const fill = activeRosterFills[playerWho];
  if (!fill) return;

  // Save the current fill state (what was built during this fill) before reverting
  saveFillState(playerWho, fill.fillSpec, placedCDs, fill.placedSnapshot);

  // Restore the full placedCDs snapshot taken at fill time
  if (fill.placedSnapshot) {
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    Object.assign(placedCDs, JSON.parse(JSON.stringify(fill.placedSnapshot)));
  }

  delete activeRosterFills[playerWho];
  updateFillIndicator();
  isDirty = true;
  refreshActiveSetFromFills();
}

function showRosterModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  function getSpecOpts() {

      'Healers':  ['Holy Paladin','Discipline','Holy Priest','Restoration Sham','Restoration Dru','Mistweaver'],
      'Tanks':    ['Brewmaster','Protection Pal','Protection War','Blood DK','Guardian Dru'],
      'Ranged':   ['Shadow Priest','Elemental','Enhancement','Balance Dru','Frost Mage','Fire Mage','Arcane Mage','Destruction','Affliction','Demonology','Survival Hunt','Marksmanship','Beast Mastery'],
      'Melee':    ['Arms Warrior','Fury Warrior','Assassination','Combat Rogue','Subtlety','Unholy DK','Frost DK','Windwalker','Feral Dru','Retribution'],

      html += `<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:6px 0 3px;">${roleLabels[role]}</div>`;
      players.forEach(player => {
        const fill = activeRosterFills[player.who];
        const hasCds = player.cds.length > 0;
        const cdTags = player.cds.map(id => {
          const cd = CD_POOL.find(c => c.id === id);
          return cd ? `<span class="roster-cd-tag" style="border-color:${cd.color};color:${cd.textColor};background:${cd.color}22">${cd.short}</span>` : '';
        }).join('');
        const fillCdTags = fill ? (fill.fillCds || []).map(id => {
          const cd = CD_POOL.find(c => c.id === id);
          return cd ? `<span class="roster-cd-tag" style="border-color:${cd.color};color:${cd.textColor};background:${cd.color}22">${cd.short}</span>` : '';
        }).join('') : '';
        // Build per-CD swap display with large arrow for 1-for-1, faded+X for removed
        let fillDisplay = '';
        if (fill) {
          const origIds = fill.originalCds || [];
          const fillIds = fill.fillCds || [];
          const maxLen = Math.max(origIds.length, fillIds.length);
          const is1for1 = origIds.length === 1 && fillIds.length === 1;
          const parts = [];
          for (let i = 0; i < maxLen; i++) {
            const fromCd = origIds[i] ? CD_POOL.find(c => c.id === origIds[i]) : null;
            const toCd   = fillIds[i]  ? CD_POOL.find(c => c.id === fillIds[i])  : null;
            if (fromCd && toCd) {
              const arrowSize = is1for1 ? '20px' : '12px';
              parts.push(`<span class="roster-cd-tag" style="border-color:${fromCd.color};color:${fromCd.textColor};background:${fromCd.color}22">${fromCd.short}</span><span style="font-size:${arrowSize};color:var(--text3);line-height:1;">→</span><span class="roster-cd-tag" style="border-color:${toCd.color};color:${toCd.textColor};background:${toCd.color}22">${toCd.short}</span>`);
            } else if (fromCd && !toCd) {
              parts.push(`<span class="roster-cd-tag" style="border-color:${fromCd.color};color:${fromCd.textColor};background:${fromCd.color}22;opacity:0.35;">${fromCd.short}</span>`);
            } else if (!fromCd && toCd) {
              parts.push(`<span class="roster-cd-tag" style="border-color:${toCd.color};color:${toCd.textColor};background:${toCd.color}22">${toCd.short}</span>`);
            }
          }
          fillDisplay = parts.join('<span style="font-size:10px;color:var(--text3);margin:0 2px;">·</span>');
        }
        html += `<div class="roster-config-item${fill ? ' active-config' : ''}">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:14px;font-weight:600;color:${player.color};">${player.name}</span>
              <span style="font-size:11px;color:var(--text3);">${player.spec}</span>

            <div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center;">

  function renderModal() {
    overlay.innerHTML = `
      <div class="modal-box" style="width:560px;max-height:82vh;overflow-y:auto;">
        <h3>Current Roster</h3>
        <div class="modal-sub" style="margin-bottom:10px;font-size:13px;">Click "Set Sub" to replace a player with a substitute. Their CDs will be automatically swapped across every boss.</div>

          <button id="rosterClose" class="copy-btn">Done</button>
        </div>
      </div>`;

    overlay.querySelector('#rosterClose').addEventListener('click', () => overlay.remove());
    overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });
    wireRosterButtons();
  }

  function wireRosterButtons() {
    overlay.querySelectorAll('.set-fill-btn').forEach(btn => {
      btn.addEventListener('click', () => showFillPicker(btn.dataset.who));
    });
    overlay.querySelectorAll('.revert-fill-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        revertFill(btn.dataset.who);
        overlay.querySelector('#rosterList').innerHTML = buildRosterHtml();
        wireRosterButtons();
      });
    });
  }

  function showFillPicker(playerWho) {
    const player = DEFAULT_ROSTER.find(p => p.who === playerWho);
    const existing = overlay.querySelector('#fillPickerArea');
    if (existing) existing.remove();

    const picker = document.createElement('div');
    picker.id = 'fillPickerArea';
    picker.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#161820;border:1px solid #3a3d52;border-radius:8px;padding:20px;width:420px;z-index:99999;display:flex;flex-direction:column;gap:12px;';
    picker.innerHTML = `
      <h3 style="font-size:14px;font-weight:500;color:#c8a84b;">${player.name} is out — who is subbing in?</h3>
      <div style="font-size:11px;color:#5a5d78;">Their CDs: ${player.cds.map(id => { const cd = CD_POOL.find(c=>c.id===id); return cd ? cd.name : id; }).join(', ') || 'none'}</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="font-size:11px;color:#8a8da8;">Fill spec</label>
        <select id="fillSpecSelect" style="background:#0e0f13;border:1px solid #3a3d52;color:#d4d6e8;padding:6px 10px;border-radius:4px;font-size:13px;">
          ${getSpecOpts()}
        </select>
      </div>
      <div id="fillPreview" style="background:#0e0f13;border:1px solid #2e3040;border-radius:4px;padding:10px;font-size:11px;color:#8a8da8;min-height:48px;"></div>
      <div style="display:flex;gap:8px;">
        <button id="confirmFill" class="btn copy-btn">Confirm Swap</button>
        <button id="cancelFill" class="btn">Cancel</button>
      </div>`;

    document.body.appendChild(picker);

    function updatePreview() {
      const specName = picker.querySelector('#fillSpecSelect').value;
      const spec = SPEC_CD_MAP[specName];
      const preview = picker.querySelector('#fillPreview');
      const outIds = player.cds;
      const inIds = spec?.cds || [];
      if (outIds.length === 0 && inIds.length === 0) {
        preview.innerHTML = '<span style="color:#5a5d78;">No CD changes — only WHO label updates.</span>';
        return;
      }
      const maxLen = Math.max(outIds.length, inIds.length);
      let rows = '<div style="margin-bottom:6px;color:#5a5d78;">Changes across all bosses:</div>';
      for (let i = 0; i < maxLen; i++) {
        const fromCd = outIds[i] ? CD_POOL.find(c => c.id === outIds[i]) : null;
        const toCd   = inIds[i]  ? CD_POOL.find(c => c.id === inIds[i])  : null;
        const fromLabel = fromCd ? fromCd.name : '—';
        const toLabel   = toCd   ? `${toCd.name} (${spec.who})` : '<span style="color:#c84848;">removed</span>';
        rows += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
          <span style="color:#ff8888;min-width:140px;">− ${fromLabel}</span>
          <span style="color:#5a5d78;">→</span>
          <span style="color:${toCd ? '#88ff88' : '#c84848'};">+ ${toLabel}</span>
        </div>`;
      }
      preview.innerHTML = rows;
    }

    picker.querySelector('#fillSpecSelect').addEventListener('change', updatePreview);
    updatePreview();

    picker.querySelector('#confirmFill').addEventListener('click', () => {
      const specName = picker.querySelector('#fillSpecSelect').value;
      picker.remove();
      overlay.remove(); // close the roster modal so saved fill menu is unobstructed
      checkForSavedFill(playerWho, specName,
        (saved) => {
          // Restore base state first so applyFill snapshots the correct original
          const baseState = saved.basePlacedCDs || {};
          Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
          Object.assign(placedCDs, JSON.parse(JSON.stringify(baseState)));
          applyFill(playerWho, specName);
          // Now overwrite placedCDs with the saved fill work
          Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
          Object.assign(placedCDs, JSON.parse(JSON.stringify(saved.placedCDs)));
          renderTimeline();
        },
        () => {
          applyFill(playerWho, specName);
        }
      );
    });

    picker.querySelector('#cancelFill').addEventListener('click', () => picker.remove());
  }

  document.body.appendChild(overlay);
  renderModal();
}

// ---- Build palette ----
let paletteReorderDrag = null;

function buildPalette() {
  const el = document.getElementById('palette');
  const boss = getBoss();
  const fadeActive = fadeModeByBoss[boss.id] || false;
  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 4px 6px;">
    <div class="palette-label" style="padding:0;">Active Raid Cooldowns</div>
    <button id="fadeModeBtn" title="Fade raid cooldowns when placed in the timeline" style="font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid ${fadeActive ? 'var(--accent)' : 'var(--border2)'};background:var(--bg3);color:${fadeActive ? 'var(--accent)' : 'var(--text3)'};cursor:pointer;white-space:nowrap;">◑ Fade</button>
  </div>`;
  el.querySelector('#fadeModeBtn').addEventListener('click', () => {
    fadeModeByBoss[boss.id] = !fadeModeByBoss[boss.id];
    isDirty = true;
    buildPalette();
  });
  getCDS().forEach(cd => {
    const chip = document.createElement('div');
    chip.className = 'cd-chip';
    chip.dataset.cdId = cd.id;
    // Check if this CD is placed anywhere on the current boss
    const boss = getBoss();
    const bossData = placedCDs[boss.id] || {};
    const isPlaced = Object.values(bossData).some(row => row && row.some(p => p.cdId === cd.id));
    if (fadeModeByBoss[boss.id] && isPlaced) chip.classList.add('placed-fade');

    chip.innerHTML = `
      <div class="cd-dot" style="background:${cd.color}"></div>
      <div style="flex:1;">
        <div class="cd-name">${cd.name}</div>
        ${cd.cd > 0 ? `<div class="cd-cooldown">${cd.cd/60}M CD</div>` : (cd.id === 'personals' ? `<div class="cd-cooldown">No CD</div>` : '')}
      </div>
    `;

    // Unified drag: vertical = reorder, horizontal = palette drag to timeline
    chip.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const startX = e.clientX, startY = e.clientY;
      let decided = false;

      function onFirstMove(ev) {
        const dx = Math.abs(ev.clientX - startX);
        const dy = Math.abs(ev.clientY - startY);
        if (dx < 5 && dy < 5) return;
        decided = true;
        document.removeEventListener('mousemove', onFirstMove);
        document.removeEventListener('mouseup', onCancel);

        if (dy >= dx) {
          // Vertical — reorder
          paletteReorderDrag = cd.id;
          chip.classList.add('reorder-dragging');
          function onMove(ev2) {
            const target = document.elementFromPoint(ev2.clientX, ev2.clientY);
            const targetChip = target ? target.closest('.cd-chip') : null;
            document.querySelectorAll('.cd-chip').forEach(c => c.classList.remove('reorder-over'));
            if (targetChip && targetChip !== chip) targetChip.classList.add('reorder-over');
          }
          function onUp(ev2) {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            chip.classList.remove('reorder-dragging');
            document.querySelectorAll('.cd-chip').forEach(c => c.classList.remove('reorder-over'));
            const target = document.elementFromPoint(ev2.clientX, ev2.clientY);
            const targetChip = target ? target.closest('.cd-chip[data-cd-id]') : null;
            const targetId = targetChip ? targetChip.dataset.cdId : null;
            if (targetId && targetId !== paletteReorderDrag) {
              const current = getCDS().map(c => c.id);
              const fromIdx = current.indexOf(paletteReorderDrag);
              const toIdx = current.indexOf(targetId);
              current.splice(fromIdx, 1);
              current.splice(toIdx, 0, paletteReorderDrag);
              paletteOrder = current;
              buildPalette();
              isDirty = true;
            }
            paletteReorderDrag = null;
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        } else {
          // Horizontal — timeline drag
          startDragFromPalette(e, cd);
        }
      }

      function onCancel() {
        document.removeEventListener('mousemove', onFirstMove);
      }

      document.addEventListener('mousemove', onFirstMove);
      document.addEventListener('mouseup', onCancel, { once: true });
    });

    el.appendChild(chip);
  });
}

// ---- Render timeline ----
function getBoss() { return BOSSES.find(b => b.id === currentBossId); }

function renderTimeline() {
  const boss = getBoss();
  const area = document.getElementById('timelineArea');
  area.innerHTML = '';

  // Boss title
  const info = document.createElement('div');
  info.className = 'boss-info';
  const isReady = bossReady[boss.id] || false;
  info.innerHTML = `
    <span class="boss-name">${boss.name}</span>
    <span class="boss-desc">~${Math.floor(boss.duration/60)}:${String(boss.duration%60).padStart(2,'0')} avg</span>
    <label class="boss-ready-wrap${isReady ? ' ready' : ''}" title="Mark as ready for export">
      <input type="checkbox" id="bossReadyCheck" ${isReady ? 'checked' : ''}>
      <span class="boss-ready-label">${isReady ? '✓ Ready' : 'Mark Ready'}</span>
    </label>`;
  info.querySelector('#bossReadyCheck').addEventListener('change', e => {
    bossReady[boss.id] = e.target.checked;
    isDirty = true;
    const wrap = info.querySelector('.boss-ready-wrap');
    const lbl = info.querySelector('.boss-ready-label');
    if (e.target.checked) { wrap.classList.add('ready'); lbl.textContent = '✓ Ready'; }
    else { wrap.classList.remove('ready'); lbl.textContent = 'Mark Ready'; }
    refreshBossSelectLabels();
  });
  area.appendChild(info);

  const grid = document.createElement('div');
  grid.className = 'timeline-grid';

  const PX_PER_SEC = 2.8;
  const LABEL_W = 160;
  const totalW = boss.duration * PX_PER_SEC;

  // Ruler — tick marks only, no time labels
  const ruler = document.createElement('div');
  ruler.className = 'ruler';
  ruler.style.paddingLeft = LABEL_W + 'px';
  for (let t = 0; t <= boss.duration; t += 30) {
    const tick = document.createElement('div');
    tick.className = 'ruler-tick';
    tick.style.left = (LABEL_W + t * PX_PER_SEC) + 'px';
    ruler.appendChild(tick);
  }
  grid.appendChild(ruler);

  // Collect all abilities flat per section
  const bossData = getPlacedKey(boss.id);

  boss.sections.forEach((section, si) => {
    if (section.label && si > 0) {
      const div = document.createElement('div');
      div.className = 'phase-divider';
      div.dataset.label = section.label;
      grid.appendChild(div);
    } else if (section.label && si === 0) {
      const div = document.createElement('div');
      div.className = 'phase-divider';
      div.dataset.label = section.label;
      grid.appendChild(div);
    }

    section.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${ai}`;
      const row = buildAbilityRow(boss, rowKey, ab, totalW, PX_PER_SEC, LABEL_W, bossData);
      grid.appendChild(row);
    });
  });

  area.appendChild(grid);
  buildPalette();
  renderBottomPanel();
}

function buildAbilityRow(boss, rowKey, ab, totalW, pps, LABEL_W, bossData) {
  const row = document.createElement('div');
  row.className = 'ability-row';

  const label = document.createElement('div');
  label.className = 'ability-label';
  if (ab.encounterStart) {
    label.innerHTML = `<div class="ability-marker" style="background:#ffffff66"></div><div class="ability-label-text" style="color:#8a8da8;font-style:italic;">${ab.name}</div>`;
  } else if (ab.hpAssign) {
    label.innerHTML = `<div class="ability-marker" style="background:${ab.color}"></div><div class="ability-label-text" style="display:flex;flex-direction:column;justify-content:center;gap:2px;"><span style="font-size:12px;font-weight:600;color:${ab.color};">HP Assign</span></div>`;
  } else {
    label.innerHTML = `<div class="ability-marker" style="background:${ab.color}"></div><div class="ability-label-text" style="display:flex;flex-direction:column;justify-content:center;gap:2px;"><span style="font-size:12px;font-weight:600;color:${ab.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ab.name}</span><span style="font-size:10px;font-weight:500;color:var(--text);letter-spacing:0.04em;">${formatTime(ab.time)}</span></div>`;
  }
  row.appendChild(label);

  const track = document.createElement('div');
  track.className = 'track';
  track.style.width = totalW + 'px';

  // Grid lines every 30s
  for (let t = 30; t < boss.duration; t += 30) {
    const gl = document.createElement('div');
    gl.className = 'track-gridline';
    gl.style.left = (t * pps) + 'px';
    track.appendChild(gl);
  }

  // Placed CDs on this row
  renderPlacedOnTrack(boss, rowKey, track, totalW, pps, bossData);

  // Drop target
  track.addEventListener('dragover', e => { e.preventDefault(); });
  track.addEventListener('drop', e => { handleDrop(e, boss, rowKey, track, totalW, pps); });
  track.addEventListener('contextmenu', e => { e.preventDefault(); }); // suppress browser menu

  // Mouse drop for custom drag
  track.dataset.rowKey = rowKey;
  track.dataset.bossId = boss.id;
  track.dataset.castTime = ab.time;
  track.classList.add('drop-target');

  row.appendChild(track);
  return row;
}

function renderPlacedOnTrack(boss, rowKey, track, totalW, pps, bossData) {
  // Look up the ability object for this row so we can pass it to popups
  const [_si, _ai] = rowKey.split('-').map(Number);
  const _ab = boss.sections[_si]?.abilities[_ai] || null;
  const placed = (bossData[rowKey] || []);
  placed.forEach(p => {
    const cd = CDS.find(c => c.id === p.cdId);
    if (!cd) return;
    const ICON_W = 75;
    const CELL_W = 30 * pps; // 60px per cell
    // p.time is stored as center of cell (e.g. 15, 45, 75...)
    // cellIndex = floor(p.time / 30), cell center = cellIndex * CELL_W + CELL_W/2
    const cellIndex = Math.floor(p.time / 30);
    const cellCenterX = cellIndex * CELL_W + CELL_W / 2;
    const left = Math.max(0, Math.min(cellCenterX - ICON_W / 2, totalW - ICON_W));

    const el = document.createElement('div');
    el.className = 'placed-cd';
    el.dataset.placedId = p.id;
    el.dataset.rowKey = rowKey;
    // Get effective colour (custom ability overrides cd colour)
    let ec = cd.color, et = cd.textColor;
    if (cd.customType && p.customAbility && CUSTOM_ABILITY_COLORS[p.customAbility]) {
      ec = CUSTOM_ABILITY_COLORS[p.customAbility].color;
      et = CUSTOM_ABILITY_COLORS[p.customAbility].textColor;
    }
    // Compute bg/border/text per icon style
    const _iconSt = 'flat';
    const _noFill = ['ghost-square','ghost-rounded','bold','bold-rounded','underline'].includes(_iconSt);
    const _solidFill = ['solid','solid-sharp'].includes(_iconSt);
    const _tagLeft   = ['tag-left','stamp'].includes(_iconSt);
    const _tagTop    = ['stamp'].includes(_iconSt);
    const _tagBottom = _iconSt === 'tag-bottom';
    const _tagTopOnly = _iconSt === 'tag-top';
    let cdBg = _noFill ? 'transparent' : _solidFill ? ec : ec + '22';
    let cdBorder, cdTextCol;
    if (_tagLeft && !_tagTop)    { cdBorder = `border-left-color:${ec};`; }
    else if (_tagTopOnly)        { cdBorder = `border-top-color:${ec};`; }
    else if (_tagBottom)         { cdBorder = `border-bottom-color:${ec};`; }
    else if (_iconSt === 'stamp'){ cdBorder = `border-left-color:${ec};border-top-color:${ec};`; }
    else if (_iconSt === 'inset'){ cdBorder = `border-color:${ec}44;border-top-color:${ec};`; }
    else if (_iconSt === 'double'){ cdBorder = `border-color:${ec};outline-color:${ec}44;`; }
    else                          { cdBorder = `border-color:${ec};`; }
    cdTextCol = _solidFill ? '#0a0b0f' : et;
    el.style.cssText = `left:${left}px; background:${cdBg}; ${cdBorder} color:${cdTextCol};`;
    const offsetStr = p.offset != null ? ` +${p.offset}s` : '';
    const displayWho = (cd.customType) ? (p.customWho || cd.who || 'ALL') : cd.who;
    el.title = `${cd.name} (${displayWho})${offsetStr} · Right-click to edit · Middle-click to remove`;

    const iconText = document.createElement('span');
    iconText.className = 'cd-icon-text';
    const _cd = CD_POOL.find(c => c.id === p.cdId); if (_cd && _cd.customType) {
      let shortLabel = '';
      if (p.customAbility) {
        shortLabel = CUSTOM_ABILITY_SHORTS[p.customAbility] || p.customAbility.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 4);
      } else {
        const who = p.customWho || 'CUS';
        const rosterMatch = typeof DEFAULT_ROSTER !== 'undefined' && DEFAULT_ROSTER.find(r => r.who === who);
        shortLabel = rosterMatch ? rosterMatch.name.slice(0, 4).toUpperCase() : who.replace(/[0-9]/g, '').slice(0, 4);
      }
      iconText.textContent = shortLabel;
      el.style.fontSize = '9px';
    } else {
      iconText.textContent = cd.short;
    }
    el.appendChild(iconText);
    // Offset shown inside icon on hover
    if (_ab && _ab.hpAssign) {
      const hpPct = p.hpPct != null ? p.hpPct : 40;
      const inner = document.createElement('div');
      inner.className = 'cd-offset-inner';
      inner.innerHTML = `<span class="cd-offset-value">${hpPct}%</span><span class="cd-offset-hint">health</span>`;
      inner.style.color = cd.textColor;
      el.appendChild(inner);
    } else if (p.offset != null) {
      const offText = p.offset === 0 ? '0s' : (p.offset > 0 ? '+' : '') + p.offset + 's';
      const inner = document.createElement('div');
      inner.className = 'cd-offset-inner';
      inner.innerHTML = `<span class="cd-offset-value">${offText}</span><span class="cd-offset-hint">offset</span>`;
      inner.style.color = cd.textColor;
      el.appendChild(inner);
    }
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      showOffsetPopup(e, boss.id, rowKey, p, cd, _ab);
    });
    el.addEventListener('mousedown', e => {
      if (e.button === 1) {
        e.preventDefault();
        e.stopPropagation();
        removePlaced(boss.id, rowKey, p.id);
        return;
      }
      if (e.button !== 0) return;
      if (e.ctrlKey || e.metaKey) return;
      e.preventDefault();
      e.stopPropagation();
      startDragPlaced(e, boss.id, rowKey, p, cd);
    });
    el.addEventListener('click', e => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        e.stopPropagation();
        showOffsetPopup(e, boss.id, rowKey, p, cd, _ab);
      }
    });
    track.appendChild(el);
  });
}

// ---- Drag & Drop ----
// activeDrag: { cd, isMove, moveBossId, moveRowKey, movePlacedId, moveOffset }
let activeDrag = null;
let dragMoved = false;
let _dragStartX = 0, _dragStartY = 0;

function startDragFromPalette(e, cd) {
  if (e.button !== 0) return;
  activeDrag = { cd, isMove: false };
  dragMoved = false;
  _dragStartX = e.clientX; _dragStartY = e.clientY;
  showDragGhost(cd.color, cd.textColor, cd.short);
  moveDragGhost(e);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragUp);
  e.preventDefault();
}

function startDragPlaced(e, bossId, rowKey, p, cd) {
  activeDrag = { cd, isMove: true, moveBossId: bossId, moveRowKey: rowKey, movePlacedId: p.id, moveOffset: p.offset, moveCell: p.cell != null ? p.cell : getCellIndex(p.time) };
  dragMoved = false;
  _dragStartX = e.clientX; _dragStartY = e.clientY;
  const offsetStr = p.offset != null ? ` +${p.offset}s` : '';
  showDragGhost(cd.color, cd.textColor, cd.short + offsetStr);
  moveDragGhost(e);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragUp);
}

function showDragGhost(color, textColor, label) {
  dragGhostEl.style.display = 'block';
  dragGhostEl.style.background = color + '33';
  dragGhostEl.style.border = '1px solid ' + color;
  dragGhostEl.style.color = textColor;
  dragGhostEl.textContent = label;
}

function onDragMove(e) {
  if (!dragMoved) {
    const dx = Math.abs(e.clientX - _dragStartX);
    const dy = Math.abs(e.clientY - _dragStartY);
    if (dx > 8 || dy > 8) dragMoved = true;
  }
  moveDragGhost(e);
}

function moveDragGhost(e) {
  dragGhostEl.style.left = (e.clientX + 12) + 'px';
  dragGhostEl.style.top = (e.clientY - 10) + 'px';

  // Visual feedback: turn ghost red if this CD already exists in the hovered row
  if (activeDrag) {
    dragGhostEl.style.display = 'none';
    const hit = document.elementFromPoint(e.clientX, e.clientY);
    dragGhostEl.style.display = 'block';
    const track = hit ? hit.closest('.drop-target') : null;
    if (track) {
      const rowKey = track.dataset.rowKey;
      const bossId = track.dataset.bossId;
      const cdId = activeDrag.cd.id;
      const rowPlacements = (placedCDs[bossId] || {})[rowKey] || [];
      // For moves, exclude the dragged item itself from the check
      const _ghostCd = CD_POOL.find(c => c.id === cdId);
      const isDuplicate = (_ghostCd && _ghostCd.customType) ? false : (activeDrag.isMove
        ? rowPlacements.some(p => p.cdId === cdId && p.id !== activeDrag.movePlacedId && !(rowKey === activeDrag.moveRowKey))
        : rowPlacements.some(p => p.cdId === cdId));
      if (isDuplicate) {
        dragGhostEl.style.background = '#c8484833';
        dragGhostEl.style.border = '2px solid #c84848';
        dragGhostEl.style.color = '#ff8888';
        dragGhostEl.textContent = '✕ ' + activeDrag.cd.short;
      } else {
        const cd = activeDrag.cd;
        dragGhostEl.style.background = cd.color + '33';
        dragGhostEl.style.border = '1px solid ' + cd.color;
        dragGhostEl.style.color = cd.textColor;
        dragGhostEl.textContent = cd.short;
      }
    }
  }
}

function onDragUp(e) {
  dragGhostEl.style.display = 'none';
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragUp);

  if (!activeDrag) return;
  const drag = activeDrag;
  activeDrag = null;

  // If barely moved, treat as click (no-op for move drags)
  if (!dragMoved && drag.isMove) return;

  // Find drop target — temporarily hide ghost so elementFromPoint works
  dragGhostEl.style.display = 'none';
  const hit = document.elementFromPoint(e.clientX, e.clientY);
  const track = hit ? hit.closest('.drop-target') : null;

  if (track) {
    const boss = getBoss();
    const pps = 2.8;
    const rowKey = track.dataset.rowKey;
    const bossId = track.dataset.bossId;

    // Snap to center of the 30s grid cell the cursor is over
    const rect = track.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    const cellSize = 30;
    const cellIndex = Math.floor(relX / (cellSize * pps));
    // Store cell center as time — icon will be centered on this
    let time = (cellIndex * cellSize) + (cellSize / 2);
    time = Math.max(0, Math.min(boss.duration, time));

    if (drag.isMove) {
      // Check if target cell is occupied — if so, swap displaced CD to source cell
      const targetRow = (placedCDs[bossId] || {})[rowKey] || [];
      const displaced = targetRow.find(p => (p.cell != null ? p.cell : getCellIndex(p.time)) === cellIndex);

      // Remove dragged item from its origin (sync)
      // Snapshot custom meta before removing so we can restore it
      const _draggedRow = (placedCDs[drag.moveBossId] || {})[drag.moveRowKey] || [];
      const _draggedP = _draggedRow.find(p => p.id === drag.movePlacedId);
      const _dragMeta = _draggedP ? { customWho: _draggedP.customWho, customTts: _draggedP.customTts, customName: _draggedP.customName, customAbility: _draggedP.customAbility, customSpellId: _draggedP.customSpellId, customBossAbility: _draggedP.customBossAbility } : null;
      __rawRemove(drag.moveBossId, drag.moveRowKey, drag.movePlacedId);

      if (displaced && (drag.moveBossId !== bossId || drag.moveRowKey !== rowKey)) {
        // Move displaced CD to source position (different row swap)
        const srcCellIndex = drag.moveCell;
        const srcCellCenter = (srcCellIndex * 30) + 15;
        const displacedMeta = { customWho: displaced.customWho, customTts: displaced.customTts, customName: displaced.customName, customAbility: displaced.customAbility, customSpellId: displaced.customSpellId, customBossAbility: displaced.customBossAbility };
        __rawRemove(bossId, rowKey, displaced.id);
        placeCdWithOffset(drag.moveBossId, drag.moveRowKey, displaced.cdId, srcCellCenter, displaced.offset, srcCellIndex, displacedMeta);
      } else if (displaced && drag.moveRowKey === rowKey) {
        // Same row swap: remove displaced then move it to source cell
        const srcCellIndex = drag.moveCell;
        const srcCellCenter = (srcCellIndex * 30) + 15;
        const displacedMeta = { customWho: displaced.customWho, customTts: displaced.customTts, customName: displaced.customName, customAbility: displaced.customAbility, customSpellId: displaced.customSpellId, customBossAbility: displaced.customBossAbility };
        __rawRemove(bossId, rowKey, displaced.id);
        placeCdWithOffset(bossId, rowKey, displaced.cdId, srcCellCenter, displaced.offset, srcCellIndex, displacedMeta);
      }

      placeCdWithOffset(bossId, rowKey, drag.cd.id, time, drag.moveOffset, cellIndex, _dragMeta);
    } else {
      // Fresh drag from palette — just replace whatever is there
      placeCd(bossId, rowKey, drag.cd.id, time, cellIndex);
    }
  }
}

function getCellIndex(time) { return Math.floor(time / 30); }

function placeCd(bossId, rowKey, cdId, time, cell) {
  if (!placedCDs[bossId]) placedCDs[bossId] = {};
  if (!placedCDs[bossId][rowKey]) placedCDs[bossId][rowKey] = [];
  // Prevent duplicate same CD in same row — but allow multiple 'custom' CDs
  const _cd = CD_POOL.find(c => c.id === cdId);
  if (!(_cd && _cd.customType) && placedCDs[bossId][rowKey].some(p => p.cdId === cdId)) return;
  const c = cell != null ? cell : getCellIndex(time);
  placedCDs[bossId][rowKey] = placedCDs[bossId][rowKey].filter(p => (p.cell != null ? p.cell : getCellIndex(p.time)) !== c);
  placedCDs[bossId][rowKey].push({ cdId, time, offset: 0, cell: c, id: Date.now() + Math.random() });
  isDirty = true;
  renderTimeline();
}

function placeCdWithOffset(bossId, rowKey, cdId, time, offset, cell, _preserveMeta) {
  if (!placedCDs[bossId]) placedCDs[bossId] = {};
  if (!placedCDs[bossId][rowKey]) placedCDs[bossId][rowKey] = [];
  // Prevent duplicate same CD in same row — but allow multiple 'custom' CDs
  const cd = CD_POOL.find(c => c.id === cdId);
  if (!(cd && cd.customType) && placedCDs[bossId][rowKey].some(p => p.cdId === cdId)) return;
  const c = cell != null ? cell : getCellIndex(time);
  placedCDs[bossId][rowKey] = placedCDs[bossId][rowKey].filter(p => (p.cell != null ? p.cell : getCellIndex(p.time)) !== c);
  const newEntry = { cdId, time, offset: offset ?? null, cell: c, id: Date.now() + Math.random(), hpPct: 40 };
  // Preserve custom meta if provided (for moves)
  if (_preserveMeta) { Object.assign(newEntry, _preserveMeta); }
  placedCDs[bossId][rowKey].push(newEntry);
  isDirty = true;
  renderTimeline();
}

function removePlaced(bossId, rowKey, placedId) {
  if (!placedCDs[bossId] || !placedCDs[bossId][rowKey]) return;
  placedCDs[bossId][rowKey] = placedCDs[bossId][rowKey].filter(p => p.id !== placedId);
  isDirty = true;
  renderTimeline();
}

function handleRightClick(e, boss, rowKey, bossData) {
  // Find closest placed CD to click
  const track = e.currentTarget;
  const rect = track.getBoundingClientRect();
  const relX = e.clientX - rect.left;
  const placed = bossData[rowKey] || [];
  if (placed.length === 0) return;
  const pps = 3.5;
  let closest = null, minDist = Infinity;
  placed.forEach(p => {
    const cd = CDS.find(c => c.id === p.cdId);
    const left = p.time * pps;
    const width = Math.max((cd ? cd.dur : 10) * pps, 30);
    const center = left + width / 2;
    const dist = Math.abs(relX - center);
    if (dist < minDist) { minDist = dist; closest = p; }
  });
  if (closest && minDist < 80) {
    removePlaced(boss.id, rowKey, closest.id);
  }
}

      return;

    const offsetInput = popup.querySelector('#offsetInput');

      setCustomPlacementMeta(bossId, rowKey, p.id, who, spellId, tts, customName, isNaN(offVal) ? null : offVal);
      const placedRow = (placedCDs[bossId] || {})[rowKey] || [];

      if (placedItem) {
        if (ability) placedItem.customAbility = ability;
        placedItem.customBossAbility = bossAbility || null;
      }
      renderTimeline();

      setPlacementMeta(bossId, rowKey, p.id, cd.who, isNaN(offVal) ? null : offVal);

  });
  if (!isCustom) {
    popup.querySelector('#offsetClear').addEventListener('click', () => {
      setPlacementMeta(bossId, rowKey, p.id, cd.who, null);
      closeOffsetPopup();
    });
  }
  popup.querySelector('#offsetCancel').addEventListener('click', closeOffsetPopup);

  const offsetInputEl = popup.querySelector('#offsetInput');
  if (offsetInputEl) {
    function colorOffsetInput() {
      const v = parseInt(offsetInputEl.value) || 0;
      offsetInputEl.style.color = v < 0 ? '#ff8888' : v > 0 ? '#88ff88' : '#d4d6e8';
    }
    colorOffsetInput();
    offsetInputEl.addEventListener('input', colorOffsetInput);
    // Scroll on hover without requiring focus
    offsetInputEl.addEventListener('mouseenter', () => offsetInputEl.focus());
    offsetInputEl.addEventListener('wheel', e => {
      e.preventDefault();
      offsetInputEl.value = Math.max(-60, Math.min(300, (parseInt(offsetInputEl.value) || 0) - Math.sign(e.deltaY)));
      colorOffsetInput();
    }, { passive: false });
    offsetInputEl.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') { popup.querySelector('#offsetConfirm').click(); }
      if (ev.key === 'Escape') { closeOffsetPopup(); }
    });
    offsetInputEl.focus();
    offsetInputEl.select();
  }
  setTimeout(() => {
    document.addEventListener('mousedown', outsidePopupClose);
  }, 10);
}

function outsidePopupClose(e) {
  if (activePopup && !activePopup.contains(e.target)) {
    closeOffsetPopup();
  }
}

function closeOffsetPopup() {
  if (activePopup) { activePopup.remove(); activePopup = null; }
  document.removeEventListener('mousedown', outsidePopupClose);
}

function setOffset(bossId, rowKey, placedId, offset) {
  if (!placedCDs[bossId] || !placedCDs[bossId][rowKey]) return;
  const p = placedCDs[bossId][rowKey].find(x => x.id === placedId);
  if (p) { p.offset = offset; }
  renderTimeline();
}

function setPlacementMeta(bossId, rowKey, placedId, who, offset) {
  if (!placedCDs[bossId] || !placedCDs[bossId][rowKey]) return;
  const p = placedCDs[bossId][rowKey].find(x => x.id === placedId);
  if (p) { p.who = who; p.offset = offset; }
  isDirty = true;
  renderTimeline();
}

function setCustomPlacementMeta(bossId, rowKey, placedId, who, spellId, tts, customName, offset) {
  if (!placedCDs[bossId] || !placedCDs[bossId][rowKey]) return;
  const p = placedCDs[bossId][rowKey].find(x => x.id === placedId);
  if (p) { p.customWho = who; p.customSpellId = spellId; p.customTts = tts; p.customName = customName; p.offset = offset; if (arguments[8] !== undefined) p.customAbility = arguments[8]; }
  isDirty = true;
  renderTimeline();
}

// Determine which boss ability key to use for a row
function getBossAbilityKey(boss, rowKey, abName) {
  if (abName === 'Encounter Start') {
    const keyMap = { darkanimus: 'ANIMUS_ENC_START', raden: 'RADEN_ENC_START', ironqon: 'QON_ENC_START' };
    return keyMap[boss.id] || boss.id.toUpperCase() + '_ENC_START';
  }
  if (abName && abName.startsWith('HP Assign')) {
    return 'RADEN_HEALTH';
  }
  if (boss.id === 'ironqon') {
    if (abName && abName.toLowerCase().includes('fist')) return BOSS_ABILITY_KEYS['ironqon_fist'].key;
    if (abName && abName.toLowerCase().includes('windstorm')) return 'QON_WINDSTORM';
    return BOSS_ABILITY_KEYS['ironqon'].key;
  }
  if (boss.id === 'leishen') {
    if (abName && abName.toLowerCase().includes('diffusion')) return 'LEISHEN_DIFFUSION_CHAIN_P3';
    if (abName && abName.includes('P3')) return BOSS_ABILITY_KEYS['leishen_p3'].key;
    if (abName && abName.includes('P2')) return BOSS_ABILITY_KEYS['leishen_p2'].key;
    return BOSS_ABILITY_KEYS['leishen_p1'].key;
  }
  return (BOSS_ABILITY_KEYS[boss.id] || { key: boss.id.toUpperCase() }).key;
}

// Extract cast number from ability name (e.g. "Discharge 3" -> 3)
function getCastNumber(abName) {
  // Handle "Ball Lightning-P2 (1)" style — number in parens at end
  const mp = abName.match(/\((\d+)\)\s*$/);
  if (mp) return parseInt(mp[1]);
  // Handle "Bestial Cry 3" style — trailing number
  const m = abName.match(/(\d+)\s*$/);
  return m ? parseInt(m[1]) : 1;
}

function buildFojiExport() {
  const lines = [];

  BOSSES.forEach(boss => {
    const bossData = placedCDs[boss.id];
    if (!bossData) return;

    // Iterate in canonical section → ability order so export is always sorted earliest to latest
    boss.sections.forEach((section, si) => {
      section.abilities.forEach((ab, ai) => {
        const rowKey = `${si}-${ai}`;
        const placements = bossData[rowKey];
        if (!placements || placements.length === 0) return;

        // HP assign rows use the per-placement hpPct as cast number (health %), always count 1 per row
        const castNum = ab.hpAssign ? 1 : getCastNumber(ab.name);
        const bossAbKey = getBossAbilityKey(boss, rowKey, ab.name);

        const sortedPlacements = [...placements].sort((a, b) => (a.offset ?? 0) - (b.offset ?? 0));
        sortedPlacements.forEach(p => {
          // For HP assign rows, cast number = the placement's health % value
          const _pCastNum = ab.hpAssign ? (p.hpPct != null ? p.hpPct : 40) : castNum;
          const cd = CDS.find(c => c.id === p.cdId);
          if (!cd) return;
          const _exportCd = CD_POOL.find(c => c.id === p.cdId); const isCustomPlacement = !!(_exportCd && _exportCd.customType);
          // Allow custom placements to override which boss ability row they export under
          let _bossAbKey = bossAbKey;
          let _castNum = castNum;
          if (isCustomPlacement && p.customBossAbility && FOJI_ABILITY_KEYS[p.customBossAbility]) {
            _bossAbKey = FOJI_ABILITY_KEYS[p.customBossAbility];
            _castNum = getCastNumber(p.customBossAbility);
          }
          const isPersonals = p.cdId === 'personals';
          const isDem = p.cdId === 'dem';
          const isGoak = p.cdId === 'goak';
        const spellId = isCustomPlacement
          ? (p.customAbility && CUSTOM_ABILITY_SPELL_IDS[p.customAbility] ? CUSTOM_ABILITY_SPELL_IDS[p.customAbility] : (p.customSpellId || 'nil'))
          : (CD_SPELL_IDS[p.cdId] || 'nil');
        const customIconId = isCustomPlacement ? (p.customSpellId || 'nil') : 'nil';
          const who = isCustomPlacement ? (p.customWho || _exportCd.who || 'ALL') : (cd.who || 'UNKNOWN');
          const offset = p.offset != null ? p.offset : 0;
          const ttsText = isPersonals ? 'Personals' : isDem ? 'Green banner' : (isCustomPlacement && p.customTts ? p.customTts : 'nil');
          const displayText = isPersonals ? 'Personals' : isDem ? 'Green banner' : (isCustomPlacement && p.customName ? p.customName : ttsText);
          const iconId = isPersonals ? 'Personals' : customIconId;
          lines.push(`${_bossAbKey}/${_pCastNum}/${who}/${offset}/${spellId}/nil/${ttsText}/${displayText}/${iconId}`);
        });
      });
    });
  });

  return lines.join('*');
}

  const text = buildFojiExport();

  const overlay = document.createElement('div');

  ];

  function makeCdItem(cd) {
    const isActive = activeSetIds.has(cd.id);
    return `<div class="manage-item ${isActive ? 'active' : ''}" data-cdid="${cd.id}">
      <div class="manage-item-dot" style="background:${cd.color}"></div>

    </div>`;
  }

  const activeCDs = orderedCDs.filter(c => activeSetIds.has(c.id));
  const inactiveCDs = orderedCDs.filter(c => !activeSetIds.has(c.id));

  const itemsHtml = `
    <div style="font-size:11px;font-weight:600;color:#48a868;padding:4px 4px 2px;grid-column:1/-1;border-bottom:1px solid #1e2028;margin-bottom:4px;">● Active</div>
    ${activeCDs.map(makeCdItem).join('')}
    <div style="font-size:11px;font-weight:600;color:#5a5d78;padding:12px 4px 2px;grid-column:1/-1;border-bottom:1px solid #1e2028;margin-bottom:4px;">○ Inactive</div>
    ${inactiveCDs.map(makeCdItem).join('')}
  `;

  overlay.innerHTML = `
    <div class="modal-box" style="width:520px;">
      <h3>Manage Raid Cooldowns</h3>
      <div class="modal-sub">Toggle which cooldowns appear on the timeline and palette. Use this when your roster changes or you have fills.</div>
      <div class="manage-grid" id="manageGrid">${itemsHtml}</div>
      <div class="modal-footer">
        <button id="manageDone" class="copy-btn">Done</button>
        <button id="manageCancel">Cancel</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  // Snapshot current state for cancel
  const snapshot = new Set(activeSetIds);

  overlay.querySelector('#manageGrid').addEventListener('click', e => {
    const item = e.target.closest('.manage-item');
    if (!item) return;
    const cdId = item.dataset.cdid;
    if (activeSetIds.has(cdId)) {
      activeSetIds.delete(cdId);
      item.classList.remove('active');
      item.querySelector('.manage-check').textContent = '';
    } else {
      activeSetIds.add(cdId);
      item.classList.add('active');
      item.querySelector('.manage-check').textContent = '✓';
    }
  });

  overlay.querySelector('#manageDone').addEventListener('click', () => {
    overlay.remove();
    buildPalette();
    renderTimeline();
  });

  overlay.querySelector('#manageCancel').addEventListener('click', () => {
    activeSetIds = snapshot;
    overlay.remove();
  });

  overlay.addEventListener('mousedown', e => {
    if (e.target === overlay) {
      activeSetIds = snapshot;
      overlay.remove();
    }
  });
}
