function buildSummaryForBoss(boss) {
  const bossData = placedCDs[boss.id] || {};
  const rows = [];
  boss.sections.forEach((sec, si) => {
    sec.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${ai}`;
      const placements = bossData[rowKey];
      if (!placements || !placements.length) return;
      const sorted = [...placements]
        .filter(p => p.cdId !== 'custom' && !['goak','holyavenger','avwrath','lhammer','lhammer2','divfavor'].includes(p.cdId))
        .sort((a, b) => (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
      if (sorted.length) rows.push({ ab, sorted });
    });
  });
  return rows;
}

function attachSsIconErrors(container) {
  container.querySelectorAll('.ss-real-icon').forEach(img => {
    img.onerror = function() {
      const fallback = decodeURIComponent(this.dataset.fallback);
      this.outerHTML = fallback;
    };

}

      <div style="font-size:19px;font-weight:800;color:#c8d0e8;letter-spacing:0.02em;">${name}</div>
    </div>
  </div>`;
}

function renderSsBossBlock(boss) {
  const rows = buildSummaryForBoss(boss);
  if (!rows.length) return '';
  const portraitUrl = BOSS_PORTRAIT_URLS[boss.id] || null;

  const rowsHtml = rows.map(({ ab, sorted }) => {
    const iconsHtml = sorted.map(p => {
      const cd = CD_POOL.find(c => c.id === p.cdId);
      if (!cd) return '';
      return buildSsIconEl(cd, p, ab);
    }).join('');
    return buildSsRow(ab, iconsHtml);
  }).join('');

  return `<div class="ss-boss-block" style="margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid #1e2030;">
    ${buildSsBossHeader(boss, portraitUrl)}
    <div class="ss-rows-wrap">${rowsHtml}</div>
  </div>`;
}

function showScreenshotModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.alignItems = 'flex-start';
  overlay.style.padding = '20px';

  function buildContent() {
    return BOSSES.map(b => renderSsBossBlock(b)).filter(Boolean).join('') ||
      '<div style="color:#5a5d78;font-size:13px;padding:20px 0;">No assignments placed yet.</div>';
  }

  overlay.innerHTML = `
    <div class="ss-modal">
      <div class="ss-toolbar">
        <h3>Screenshot</h3>
        <button id="ssShareLinkBtn" style="padding:4px 12px;border-radius:3px;border:1px solid #3a3d52;background:#1e2028;color:#4888c8;font-size:11px;cursor:pointer;margin-left:auto;letter-spacing:0.04em;">🔗 Share Link</button>
        <button id="ssClose" style="padding:4px 12px;border-radius:3px;border:1px solid #3a3d52;background:#1e2028;color:#8a8da8;font-size:11px;cursor:pointer;margin-left:8px;">✕ Close</button>
      </div>
      <div class="ss-content ss-page" id="ssContent"></div>
    </div>`;

  document.body.appendChild(overlay);

  const ssContent = overlay.querySelector('#ssContent');
  ssContent.innerHTML = buildContent();
  attachSsIconErrors(ssContent);

  overlay.querySelector('#ssClose').addEventListener('click', () => overlay.remove());

  overlay.querySelector('#ssShareLinkBtn')?.addEventListener('click', function() {
    createShareLink(this);
  });

  // Full-page screenshot of the ss content
  overlay.querySelector('#ssCaptureBtn').addEventListener('click', () => {
    const btn = overlay.querySelector('#ssCaptureBtn');
    btn.textContent = 'Capturing…';
    const loadH2C = (cb) => {
      if (window.html2canvas) { cb(); return; }
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = cb;
      s.onerror = () => { btn.textContent = '📷 Screenshot'; alert('Failed to load screenshot library.'); };
      document.head.appendChild(s);
    };
    loadH2C(() => {
      const clone = ssContent.cloneNode(true);
      clone.style.cssText = `position:fixed;top:0;left:0;width:1100px;height:auto;overflow:visible;background:#08090d;padding:20px 24px;z-index:-9999;pointer-events:none;`;
      document.body.appendChild(clone);
      html2canvas(clone, { backgroundColor:'#08090d', scale:3, useCORS:true, allowTaint:true, width:1100, height:clone.scrollHeight }).then(canvas => {
        clone.remove();
        const a = document.createElement('a');
        a.download = 'rcd-screenshot.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        btn.textContent = '📷 Screenshot';
      }).catch(() => { clone.remove(); btn.textContent = '📷 Screenshot'; });
    });
  });

  overlay.querySelector('#ssIconInfoBtn')?.addEventListener('click', function(ev) {
    ev.stopPropagation();
    const existing = document.getElementById('ssIconInfoPicker');
    if (existing) { existing.remove(); return; }
    const picker = document.createElement('div');
    picker.id = 'ssIconInfoPicker';
    picker.style.cssText = 'position:absolute;top:42px;right:80px;background:#12141a;border:1px solid #2e3040;border-radius:8px;padding:10px;z-index:100;width:400px;display:grid;grid-template-columns:1fr 1fr;gap:6px;box-shadow:0 8px 32px rgba(0,0,0,0.8);';
    SS_ICON_INFO_STYLES.forEach(s => {
      const btn = document.createElement('button');
      const isSel = s.id === ssIconInfoStyle;
      btn.style.cssText = `padding:8px 10px;border-radius:5px;border:${isSel?'1px solid #c8a84b':'1px solid #2e3040'};background:${isSel?'#c8a84b18':'#0e0f13'};color:${isSel?'#c8a84b':'#8a8da8'};text-align:left;cursor:pointer;`;
      btn.innerHTML = `<div style="font-size:11px;font-weight:700;margin-bottom:2px;">${s.name}</div><div style="font-size:9px;opacity:0.5;">${s.desc}</div>`;
      btn.addEventListener('click', () => {
        ssIconInfoStyle = s.id;
        localStorage.setItem('tot_rcd_ss_icon_info', s.id);
        ssContent.innerHTML = buildContent();
        attachSsIconErrors(ssContent);
        picker.remove();
      });
      picker.appendChild(btn);
    });
    const toolbar = overlay.querySelector('.ss-toolbar');
    toolbar.style.position = 'relative';
    toolbar.appendChild(picker);
    const closeP = e => { if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', closeP); } };
    setTimeout(() => document.addEventListener('click', closeP), 50);
  });




  overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });




}

// ---- Helpers ----
function formatTime(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;

function formatAbilityName(name) {
  // Reformat "Ball Lightning P1-2" based on current style
  const m = name.match(/^Ball Lightning-(P[23]) \((\d+)\)$/);
  if (!m) return name;
  const phase = m[1], cast = m[2];
  if (blLabelStyle === 'prefix') return `${phase}: Ball Lightning ${cast}`;
  return `Ball Lightning (${phase}) · ${cast}`;
}

// Spell icon URL from Blizzard CDN via wowhead
function spellIconUrl(spellId) {
  if (!spellId || spellId === 'nil') return null;
  return `https://wow.zamimg.com/images/wow/icons/medium/spell_${spellId}.jpg`;
}

// Build icon element html for a CD placement
function cdIconHtml(cd, p, size) {
  const spellId = CD_SPELL_IDS[cd.id];
  const offStr = p && p.offset != null && p.offset !== 0 ? `${p.offset > 0 ? '+' : ''}${p.offset}s` : '';
  const iconUrl = spellId && spellId !== 'nil'
    ? `https://wow.zamimg.com/images/wow/icons/medium/inv_misc_questionmark.jpg`
    : null;
  // We use a colored square as fallback since we can't fetch cross-origin icons
  return `<div class="sv-icon-wrap">
    <div class="sv-icon" style="width:${size}px;height:${size}px;border-radius:4px;border:1.5px solid ${cd.color};background:${cd.color}33;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.38)}px;font-weight:700;color:${cd.textColor};flex-shrink:0;">${cd.short}</div>
    ${offStr ? `<div class="sv-offset-badge">${offStr}</div>` : ''}
  </div>`;
}

function getSummaryRows() {
  const boss = getBoss();
  const bossData = placedCDs[boss.id] || {};
  const rows = [];
  boss.sections.forEach((sec, si) => {
    sec.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${ai}`;
      const placements = bossData[rowKey];
      if (!placements || !placements.length) return;
      const sorted = [...placements].sort((a, b) => (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
      rows.push({ ab, sorted });
    });
  });
  return rows;
}

function renderSheetPreview(el) {
  const boss = getBoss();
  const bossData = placedCDs[boss.id] || {};

  // Build rows in section/ability order
  const rows = [];
  boss.sections.forEach((sec, si) => {
    sec.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${ai}`;
      const placements = bossData[rowKey];
      if (!placements || !placements.length) return;
      const castNum = getCastNumber(ab.name);
      const sorted = [...placements].sort((a, b) => ab.hpAssign ? (b.hpPct ?? 40) - (a.hpPct ?? 40) : (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
      sorted.forEach(p => {
        const cd = CD_POOL.find(c => c.id === p.cdId);
        if (!cd) return;
        const who = p.cdId === 'custom' ? (p.customWho || 'ALL') : cd.who;
        const playerName = getPlayerName(who);
        const playerColor = getPlayerColor(who);
        const offset = ab.hpAssign ? 1 : (p.offset != null ? p.offset : 0);
        const cdName = p.cdId === 'custom' ? 'Custom Spell Assignment' : cd.name;
        const tts = p.cdId === 'custom' && p.customTts ? p.customTts : (p.cdId === 'personals' ? 'Personals' : '');
        const displayName = p.cdId === 'custom' && p.customName ? p.customName : (p.cdId === 'personals' ? 'Personals' : '');
        const customIcon = p.cdId === 'personals' ? '134951' : '';
        const _rowCastNum = ab.hpAssign ? (p.hpPct != null ? p.hpPct : 40) : castNum;
        rows.push({ ab, castNum: _rowCastNum, who, playerName, playerColor, offset, cd, cdName, tts, displayName, customIcon });
      });
    });
  });

  if (!rows.length) {
    el.innerHTML = '<div class="summary-empty">No cooldowns assigned for ' + boss.name + ' yet.</div>';
    return;
  }

  let html = `<table class="sp-table">
    <thead><tr>
      <th>#</th>
      <th>Boss / Spell</th>
      <th>Count</th>
      <th>Delay</th>
      <th>PlayerKey</th>
      <th>Player Name</th>
      <th>Cooldown Spell</th>
      <th>Override TTS</th>
      <th>Custom Name</th>
      <th>Custom Icon</th>
    </tr></thead><tbody>`;

  rows.forEach((r, i) => {
    const delayColor = r.offset < 0 ? '#ff8888' : r.offset > 0 ? '#88ff88' : '#8a8da8';
    html += `<tr>
      <td style="color:#5a5d78;">${i + 1}</td>
      <td>${formatAbilityName(r.ab.name)}</td>
      <td style="color:#d4d6e8;">${r.castNum}</td>
      <td style="color:${delayColor};font-weight:600;">${r.offset}</td>
      <td class="sp-who" style="color:${r.playerColor};">${r.who}</td>
      <td style="color:${r.playerColor};">${r.playerName}</td>
      <td><div class="sp-cd-name"><div class="sp-cd-dot" style="background:${r.cd.color};"></div>${r.cdName}</div></td>
      <td style="color:#c87020;">${r.tts || ''}</td>
      <td style="color:#c87020;">${r.displayName || ''}</td>
      <td style="color:#8a8da8;">${r.customIcon || ''}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

function parseFojiImport(raw) {
  const lines = raw.split('*').map(l => l.trim()).filter(Boolean);
  if (!lines.length) throw new Error('No entries found.');
  let count = 0;

  // Build reverse lookup: Foji key → { boss, si, ai, ab }
  const keyMap = {};
  BOSSES.forEach(boss => {
    boss.sections.forEach((sec, si) => {
      sec.abilities.forEach((ab, ai) => {
        const key = getBossAbilityKey(boss, `${si}-${ai}`, ab.name);
        if (!keyMap[key]) keyMap[key] = [];
        keyMap[key].push({ boss, si, ai, ab });
      });
    });
  });
  // Also add FOJI_ABILITY_KEYS reverse lookup for custom entries
  Object.entries(FOJI_ABILITY_KEYS).forEach(([name, key]) => {
    // already handled above via getBossAbilityKey
  });

  // Reverse CD lookup: spellId → cdId
  const spellToCd = {};
  Object.entries(CD_SPELL_IDS).forEach(([cdId, spellId]) => {
    if (spellId && spellId !== 'nil') spellToCd[spellId] = cdId;
  });
  // Custom abilities
  Object.entries(CUSTOM_ABILITY_SPELL_IDS).forEach(([name, spellId]) => {
    if (spellId) spellToCd['custom:' + spellId] = name;
  });

  lines.forEach(line => {
    const parts = line.split('/');
    if (parts.length < 9) return;
    const [bossAbKey, castNumStr, who, offsetStr, spellId, , tts, displayText] = parts;
    const castNum = parseInt(castNumStr) || 1;
    const offset = parseInt(offsetStr) || 0;

    // Find matching rows
    const matches = keyMap[bossAbKey] || [];
    const rowMatch = matches.find(m => getCastNumber(m.ab.name) === castNum) || matches[0];
    if (!rowMatch) return;

    const { boss, si, ai } = rowMatch;
    const rowKey = `${si}-${ai}`;
    if (!placedCDs[boss.id]) placedCDs[boss.id] = {};
    if (!placedCDs[boss.id][rowKey]) placedCDs[boss.id][rowKey] = [];

    // Find cdId from spellId
    let cdId = spellId && spellId !== 'nil' ? spellToCd[spellId] : null;

    // Special cases
    if (spellId === 'nil' && tts === 'Personals') cdId = 'personals';
    if (spellId === '114203') cdId = 'dem';

    if (!cdId) {
      // Try matching by WHO for custom assign
      cdId = 'custom';
    }

    const cd = CD_POOL.find(c => c.id === cdId);
    if (!cd) return;

    const placement = {
      cdId,
      time: rowMatch.ab.time,
      offset: offset || null,
      cell: getCellIndex(rowMatch.ab.time),
      id: Date.now() + Math.random(),
    };

    // For custom, set meta
    if (cdId === 'custom') {
      placement.customWho = who;
      placement.customTts = tts !== 'nil' ? tts : '';
      placement.customName = displayText !== 'nil' ? displayText : '';
      // Try to find matching custom ability by spell ID
      const customAbEntry = Object.entries(CUSTOM_ABILITY_SPELL_IDS).find(([, sid]) => sid === spellId);
      if (customAbEntry) placement.customAbility = customAbEntry[0];
    }

    // Avoid duplicate non-custom CDs on same row
    if (cdId !== 'custom' && placedCDs[boss.id][rowKey].some(p => p.cdId === cdId)) return;
    placedCDs[boss.id][rowKey].push(placement);
    count++;
  });

  return count;
}

function startFirebaseSync() {
  _fbDb  = firebase.database();
  _fbRef = _fbDb.ref(FB_PATH);
  updateSyncIndicator('connecting');

  _fbRef.on('value', snapshot => {
    if (_fbIgnoreNext) { _fbIgnoreNext = false; return; }
    const data = snapshot.val();
    if (!data) return;
    _fbListening = true;
    fbApplyData(data);
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
    renderTimeline();
    renderBottomPanel();
    refreshBossSelectLabels();
    updateNotesTabIcon();
    _fbListening = false;
    updateSyncIndicator('connected');
  });

  firebase.database().ref('.info/connected').on('value', snap => {
    updateSyncIndicator(snap.val() ? 'connected' : 'disconnected');
  });
}

function _initFirebaseCore() {
  try {
    _fbApp = firebase.initializeApp(firebaseConfig);

    // Google sign-in
    document.getElementById('authGoogleBtn')?.addEventListener('click', () => {
      setAuthStatus('Opening sign-in…');
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider).catch(err => {
        setAuthStatus('Sign-in failed. Try again.', true);
        console.warn(err);
      });
    });

    // Sign out
    document.getElementById('authSignOut')?.addEventListener('click', () => {
      firebase.auth().signOut().then(() => showAuthScreen(true));
    });

    // Auth state
    firebase.auth().onAuthStateChanged(user => {
      // If this is a shared view link, skip auth entirely
      if (_viewId) return;
      if (!user) { showAuthScreen(true); return; }
      _currentUser = user;
      const email = (user.email || '').toLowerCase();

      if (APPROVED_EMAILS.includes(email)) {
        showAuthScreen(false);
        startFirebaseSync();
      } else {
        showAuthScreen(true);
        const key = email.replace(/[.#$[\]]/g, '_');
        firebase.database().ref(PENDING_PATH + '/' + key).set({
          email: user.email, name: user.displayName || '', requestedAt: Date.now()
        });
        showPendingMessage(user.email);
      }
    });

  } catch(e) {
    console.warn('Firebase init failed:', e);
    updateSyncIndicator('disconnected');
  }
}

function autoSave() {
  const data = fbGetData();
  // Always save locally
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  // Push to Firebase if connected — strip undefined values which Firebase rejects
  if (_fbRef) {
    updateSyncIndicator('saving');
    _fbIgnoreNext = true;
    // JSON round-trip removes all undefined values
    const cleanData = JSON.parse(JSON.stringify(data));
    _fbRef.set(cleanData).then(() => {
      updateSyncIndicator('connected');
    }).catch((err) => {
      _fbIgnoreNext = false;
      console.error('Firebase save failed:', err.code, err.message);
      updateSyncIndicator('disconnected');
    });
  }
}

function autoLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    return fbApplyData(JSON.parse(raw));
  } catch(e) { return false; }
}

// ---- Bottom panel drag-to-expand (snap back on release) ----
(function() {
  const panel = document.getElementById('bottomPanel');
  const bar = document.getElementById('expandFullbar');
  if (!panel || !bar) return;
  const DEFAULT_H = 320;
  const COLLAPSED_H = 38; // just the bar itself
  const COLLAPSE_THRESHOLD = 60; // drag down this many px to collapse
  let dragStartY = null, dragStartH = null, isDragging = false;
  let isCollapsed = false;

  function setCollapsed(v) {
    isCollapsed = v;
    panel.style.transition = 'height 0.2s ease';
    panel.style.height = (v ? COLLAPSED_H : DEFAULT_H) + 'px';
    panel.style.minHeight = (v ? COLLAPSED_H : 110) + 'px';
    bar.textContent = v ? '▲ Expand' : '▼ Collapse';
  }

  bar.style.cursor = 'ns-resize';

  bar.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragStartY = e.clientY;
    dragStartH = panel.offsetHeight;
    isDragging = false;
    panel.style.transition = 'none';

    function onMove(ev) {
      const dy = dragStartY - ev.clientY; // drag up = positive, drag down = negative
      if (Math.abs(dy) > 4) isDragging = true;
      if (!isDragging) return;
      if (!isCollapsed) {
        const newH = Math.max(COLLAPSED_H, Math.min(window.innerHeight * 0.9, dragStartH + dy));
        panel.style.height = newH + 'px';
      }
    }

    function onUp(ev) {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (!isDragging) {
        // Click — toggle collapse
        setCollapsed(!isCollapsed);
        return;
      }
      const dy = dragStartY - ev.clientY;
      if (!isCollapsed && dy < -COLLAPSE_THRESHOLD) {
        // Dragged down far enough — collapse
        setCollapsed(true);
      } else if (!isCollapsed) {
        // Snap back to default
        panel.style.transition = 'height 0.2s ease';
        panel.style.height = DEFAULT_H + 'px';
      }
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

async function wclGenVerifier() {
  var arr = new Uint8Array(32); crypto.getRandomValues(arr);
  return btoa(String.fromCharCode.apply(null, arr)).replace(/[+/=]/g, function(c){return{'+':'-','/':'_','=':''}[c];});
}
async function wclGenChallenge(v) {
  var hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode.apply(null, new Uint8Array(hash))).replace(/[+/=]/g, function(c){return{'+':'-','/':'_','=':''}[c];});
}
function wclGetToken() { return localStorage.getItem(WCL_TOKEN_KEY); }
function wclIsAuthed() {
  var exp = localStorage.getItem(WCL_TOKEN_EXP_KEY);
  return !!wclGetToken() && !!exp && Date.now() < parseInt(exp);
}
async function wclLogin() {
  var v = await wclGenVerifier(), ch = await wclGenChallenge(v);
  var state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('wcl_v', v); sessionStorage.setItem('wcl_s', state);
  var p = new URLSearchParams({client_id:WCL_CLIENT_ID,redirect_uri:WCL_REDIRECT,response_type:'code',code_challenge:ch,code_challenge_method:'S256',state:state,scope:'view-user-profile'});
  window.location.href = WCL_AUTH_URL + '?' + p.toString();
}
async function wclHandleCallback() {
  var p = new URLSearchParams(window.location.search);
  var code = p.get('code'), state = p.get('state');
  if (!code || state !== sessionStorage.getItem('wcl_s')) return false;
  var v = sessionStorage.getItem('wcl_v');
  var body = new URLSearchParams({grant_type:'authorization_code',client_id:WCL_CLIENT_ID,redirect_uri:WCL_REDIRECT,code:code,code_verifier:v});
  try {
    var res = await fetch(WCL_TOKEN_URL, {method:'POST',body:body,headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    var data = await res.json();
    if (data.access_token) {
      localStorage.setItem(WCL_TOKEN_KEY, data.access_token);
      localStorage.setItem(WCL_TOKEN_EXP_KEY, String(Date.now() + (data.expires_in||3600)*1000));
      sessionStorage.removeItem('wcl_v'); sessionStorage.removeItem('wcl_s');
      window.history.replaceState({}, '', window.location.pathname);
      return true;
    }
  } catch(e) { console.error('WCL token error', e); }
  return false;
}
async function wclQuery(gql, variables) {
  var res = await fetch(WCL_GQL_URL, {method:'POST',headers:{'Authorization':'Bearer '+wclGetToken(),'Content-Type':'application/json'},body:JSON.stringify({query:gql,variables:variables})});
  var data = await res.json();
  if (data.errors) throw new Error(data.errors[0].message);
  return data.data;
}

  box.querySelector('#wclFetch').addEventListener('click', async function(){

      var bossSpells = getBossSpellsForName(bossName);
      var bossSpellIds = []; bossSpells.forEach(function(s){(s.ids||[]).forEach(function(id){bossSpellIds.push(id);});});

      results.innerHTML = '<div style="color:#4a4d62;font-size:12px;">Fetching rankings 51-75...</div>';
      var rankQ = 'query($id:Int!){worldData{encounter(id:$id){fightRankings(difficulty:4,size:10,metric:execution,page:3)}}}';
      var rd = await wclQuery(rankQ, {id:encId});
      var pageRankings = (rd&&rd.worldData&&rd.worldData.encounter&&rd.worldData.encounter.fightRankings&&rd.worldData.encounter.fightRankings.rankings)||[];

      if (!pageRankings.length) {
        results.innerHTML='<div style="color:#c84848;font-size:12px;">No logs found for this boss.</div>';
        btn.textContent='Fetch CD Timing Data'; btn.disabled=false; return;
      }

      var logsData = []; // [{duration, casts:{sid:[times]}, code, rank}]
      var fightDurations = [];
      var processed = 0;
      var limit = Math.min(pageRankings.length, 10);

      for (var ri=0; ri<limit; ri++) {
        var r = pageRankings[ri];
        var code = r.report&&r.report.code, fid = r.report&&r.report.fightID;
        if (!code||!fid) continue;
        try {
          var q = 'query($c:String!,$fid:Int!){reportData{report(code:$c){fights(fightIDs:[$fid]){startTime endTime} events(fightIDs:[$fid],dataType:Casts,startTime:0,endTime:9999999){data}}}}';
          var d = await wclQuery(q, {c:code, fid:fid});
          var rep = d&&d.reportData&&d.reportData.report;
          var evts = (rep&&rep.events&&rep.events.data)||[];
          var fight = rep&&rep.fights&&rep.fights[0];
          if (!fight) continue;
          var fStart = fight.startTime;
          var fDur = fight.endTime - fight.startTime;
          fightDurations.push(fDur);

          // Fetch boss ability events separately if we have spell IDs for this boss
          // Fetch boss ability times from DamageTaken events
          var bossEvtTimes = {}; // groupIndex -> [relTime, ...] (deduplicated per 3s window)
          if (bossSpells.length) {
            try {
              var bq = 'query($c:String!,$fid:Int!){reportData{report(code:$c){events(fightIDs:[$fid],dataType:DamageTaken,startTime:0,endTime:9999999,hostilityType:Friendlies){data}}}}';
              var bd = await wclQuery(bq, {c:code, fid:fid});
              var bevts = (bd&&bd.reportData&&bd.reportData.report&&bd.reportData.report.events&&bd.reportData.report.events.data)||[];
              // Build a lookup: spellId -> groupIndex
              var idToGroup = {};
              bossSpells.forEach(function(spell, gi) {
                spell.ids.forEach(function(id){ idToGroup[id] = gi; });
              });
              // Sort by timestamp so simultaneous multi-ID events (e.g. 4x Rampage variants) dedup correctly
              bevts.sort(function(a,b){return a.timestamp-b.timestamp;});
              bevts.forEach(function(ev){
                var sid = ev.abilityGameID;
                var gi = idToGroup[sid];
                if (gi === undefined) return;
                var rel = ev.timestamp - fStart;
                if (rel<0||rel>900000) return;
                if (!bossEvtTimes[gi]) bossEvtTimes[gi]=[];
                // 25s dedup — Rampage lasts 20s, phases are 40-45s apart, so 25s safely catches all ticks
                var times = bossEvtTimes[gi];
                if (!times.length || rel - times[times.length-1] > 25000) times.push(rel);
              });
              if (processed===0) {
                console.log('Boss evt results:', JSON.stringify(bossEvtTimes));
              }
            } catch(be) { console.warn('Boss events fetch error:', be); }
          }

          // Group by spell+source, pick best caster per spell
          var castsBySrc = {};
          evts.forEach(function(ev){
            if (ev.type!=='cast') return;
            var sid = ev.abilityGameID;
            if (!WCL_SPELLS[sid]) return;
            var rel = ev.timestamp - fStart;
            if (rel<0||rel>900000) return;
            var key = sid+'_'+(ev.sourceID||'0');
            if (!castsBySrc[key]) castsBySrc[key]=[];
            castsBySrc[key].push(rel);
          });
          var spellSources = {};
          Object.keys(castsBySrc).forEach(function(key){
            var sid = key.split('_')[0];
            if (!spellSources[sid]) spellSources[sid]={};
            spellSources[sid][key] = castsBySrc[key];
          });
          var logCasts = {};
          Object.keys(spellSources).forEach(function(sid){
            var sources = spellSources[sid];
            var best = Object.keys(sources).sort(function(a,b){
              var diff = sources[b].length - sources[a].length;
              return diff!==0 ? diff : (sources[a][0]||0)-(sources[b][0]||0);
            })[0];
            logCasts[sid] = sources[best].sort(function(a,b){return a-b;});
          });

          logsData.push({ duration: fDur, casts: logCasts, code: code, rank: 51+ri, bossEvts: bossEvtTimes });
          processed++;
          results.innerHTML='<div style="color:#4a4d62;font-size:12px;">Processing '+processed+'/'+limit+' logs...</div>';
        } catch(le){ console.warn('WCL log error:', le); }
      }

      if (!processed) {
        results.innerHTML='<div style="color:#c84848;font-size:12px;">No logs could be processed.</div>';
        btn.textContent='Fetch CD Timing Data'; btn.disabled=false; return;
      }

      var avgDuration = fightDurations.length ? Math.round(wclMedian(fightDurations)) : 300000;
      var bossName = bossEl.options[bossEl.selectedIndex].text;
      renderWclDisplay(results, logsData, processed, bossName, avgDuration, bossSpells);
    } catch(e){ results.innerHTML='<div style="color:#c84848;font-size:12px;">Error: '+e.message+'</div>'; }
    btn.textContent='Fetch CD Timing Data'; btn.disabled=false;
  });
}

// plan constants moved up

function getPlans() {
  try { return JSON.parse(localStorage.getItem(PLANS_KEY) || '{}'); } catch(e) { return {}; }
}

function savePlans(plans) {
  localStorage.setItem(PLANS_KEY, JSON.stringify(plans));
}

function getActivePlanId() {
  return localStorage.getItem(ACTIVE_PLAN_KEY) || FULL_RAID_ID;
}

function setActivePlanId(id) {
  localStorage.setItem(ACTIVE_PLAN_KEY, id);
}


function saveFullRaidSnapshot() {
  try {
    const snapshot = captureCurrentTimeline();
    localStorage.setItem(FULL_RAID_SNAPSHOT_KEY, JSON.stringify(snapshot));
  } catch(e) {}
}

function getFullRaidSnapshot() {
  try {
    const raw = localStorage.getItem(FULL_RAID_SNAPSHOT_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // Fallback to autosave
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.placedCDs) return data.placedCDs;
    }
  } catch(e) {}
  return {};
}

function captureCurrentTimeline() {
  return {
    placedCDs: JSON.parse(JSON.stringify(placedCDs)),
    activeSetIds: [...activeSetIds],
    paletteOrder: paletteOrder ? [...paletteOrder] : null,
    cdWho: Object.fromEntries(CD_POOL.map(c => [c.id, c.who])),
  };
}

function applyTimelineSnapshot(snapshot) {
  if (!snapshot) return;
  // Restore placedCDs
  const pCDs = snapshot.placedCDs || snapshot; // backwards compat
  Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
  Object.assign(placedCDs, JSON.parse(JSON.stringify(pCDs)));
  // Restore activeSetIds
  if (snapshot.activeSetIds) {
    activeSetIds = new Set(snapshot.activeSetIds);
  }
  // Restore cdWho
  if (snapshot.cdWho) CD_POOL.forEach(c => { if (snapshot.cdWho[c.id]) c.who = snapshot.cdWho[c.id]; });
  // Restore paletteOrder
  if (snapshot.paletteOrder !== undefined) paletteOrder = snapshot.paletteOrder;
  buildPalette();
  renderTimeline();
  // Animate plan switch
  playPlanSwitchAnim();
}

function saveCurrentAsPlan(name, subWho, subSpec, subbedOut) {
  const plans = getPlans();
  const id = 'plan_' + Date.now();
  const snapshot = captureCurrentTimeline();
  plans[id] = {
    id,
    name,
    subWho: subWho || null,
    subSpec: subSpec || null,
    subbedOut: subbedOut || [],
    placedCDs: snapshot.placedCDs,
    activeSetIds: snapshot.activeSetIds,
    paletteOrder: snapshot.paletteOrder,
    cdWho: snapshot.cdWho,
    savedAt: Date.now(),
  };
  savePlans(plans);
  return id;
}

function updatePlanSnapshot(id) {
  if (id === FULL_RAID_ID) {
    saveFullRaidSnapshot();
    autoSave();
    return;
  }
  const plans = getPlans();
  if (!plans[id]) return;
  const snapshot = captureCurrentTimeline();
  plans[id].placedCDs = snapshot.placedCDs;
  plans[id].activeSetIds = snapshot.activeSetIds;
  plans[id].paletteOrder = snapshot.paletteOrder;
  plans[id].cdWho = snapshot.cdWho;
  plans[id].savedAt = Date.now();
  savePlans(plans);
}

function deletePlan(id) {
  if (id === FULL_RAID_ID) return;
  const plans = getPlans();
  delete plans[id];
  savePlans(plans);
}

function switchToPlan(id) {
  const currentId = getActivePlanId();

  // Immediately save current state before switching — no debounce
  if (currentId === FULL_RAID_ID) {
    saveFullRaidSnapshot();
    autoSave();
  } else {
    const plans = getPlans();
    if (plans[currentId]) {
      plans[currentId].placedCDs = captureCurrentTimeline();
      plans[currentId].savedAt = Date.now();
      savePlans(plans);
    }
  }

  setActivePlanId(id);

  if (id === FULL_RAID_ID) {
    // Restore Full Raid from its dedicated snapshot
    const snapshot = getFullRaidSnapshot();
    applyTimelineSnapshot(snapshot);
  } else {
    const plans = getPlans();
    const plan = plans[id];
    if (plan && plan.placedCDs) {
      applyTimelineSnapshot(plan.placedCDs);
    }
  }
  renderBottomPanel();
  updatePlansBtn();
}

  function close() {
    box.style.transform = 'translateY(-8px)';
    box.style.opacity = '0';

  function rebuildList() {
    box.innerHTML = buildBoxHtml();

    // Animate out active, animate in new

    setTimeout(() => {

    box.querySelector('#plansCloseBtn')?.addEventListener('click', close);

    box.querySelectorAll('.plan-card').forEach(card => {

      card.addEventListener('mouseleave', () => { if (getActivePlanId() !== card.dataset.id) card.style.background = 'transparent'; });

        close();
        showEditPlanPicker(btn.dataset.id);
      });

    box.querySelectorAll('.plan-del-x').forEach(btn => {
      btn.addEventListener('mouseenter', () => { btn.style.color = '#c84848'; });
      btn.addEventListener('mouseleave', () => { btn.style.color = '#2e3040'; });
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (getActivePlanId() === btn.dataset.id) switchToPlan(FULL_RAID_ID);
        deletePlan(btn.dataset.id);
        rebuildList();
        updatePlansBtn();
      });
    });

    box.querySelector('#newPlanBtn')?.addEventListener('mouseenter', () => { const b = box.querySelector('#newPlanBtn'); if(b) b.style.background='#2e3040'; });
    box.querySelector('#newPlanBtn')?.addEventListener('mouseleave', () => { const b = box.querySelector('#newPlanBtn'); if(b) b.style.background='#1e2030'; });
    box.querySelector('#importPlanBtnMenu')?.addEventListener('mouseenter', () => { const b = box.querySelector('#importPlanBtnMenu'); if(b) b.style.background='#2e3040'; });
    box.querySelector('#importPlanBtnMenu')?.addEventListener('mouseleave', () => { const b = box.querySelector('#importPlanBtnMenu'); if(b) b.style.background='#1e2030'; });
    box.querySelector('#newPlanBtn')?.addEventListener('click', () => {
      close();
      showNewPlanPicker();
    });

    box.querySelector('#importPlanBtnMenu')?.addEventListener('click', () => {
      close();

    });
  }

  wireBox();
  ov.addEventListener('mousedown', (e) => { if (e.target === ov) close(); });
}

  function createPlan(name, subbedWhos, subInMap) {
    const fullSnap = getFullRaidSnapshot();
    const newPlacedCDs = JSON.parse(JSON.stringify(fullSnap.placedCDs || fullSnap || {}));
    let newActiveSetIds = [...(fullSnap.activeSetIds || [...activeSetIds])];
    const newCdWho = JSON.parse(JSON.stringify(fullSnap.cdWho || {}));

    // Remove subbed-out CDs
    const removedCdIds = new Set();
    subbedWhos.forEach(who => {
      const player = DEFAULT_ROSTER.find(r => r.who === who);
      if (!player) return;
      player.cds.forEach(cdId => {
        newActiveSetIds = newActiveSetIds.filter(id => id !== cdId);
        removedCdIds.add(cdId);
      });
    });

    // Add sub-in CDs
    Object.entries(subInMap).forEach(([who, specName]) => {
      if (!specName) return;
      const spec = SPEC_CD_MAP[specName];
      if (!spec || !spec.cds.length) return;
      spec.cds.forEach(cdId => {
        if (!newActiveSetIds.includes(cdId)) newActiveSetIds.push(cdId);
        // Update WHO label for this CD to the sub-in's WHO
        newCdWho[cdId] = spec.who;
      });
    });

    // Strip removed CDs from placements
    Object.keys(newPlacedCDs).forEach(bossId => {
      const bossData = newPlacedCDs[bossId];
      if (!bossData) return;
      Object.keys(bossData).forEach(rowKey => {
        bossData[rowKey] = (bossData[rowKey] || []).filter(p => !removedCdIds.has(p.cdId));
      });
    });

    // Apply
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    Object.assign(placedCDs, newPlacedCDs);
    activeSetIds = new Set(newActiveSetIds);
    CD_POOL.forEach(c => { if (newCdWho[c.id]) c.who = newCdWho[c.id]; });

    const id = saveCurrentAsPlan(name, null, null, subbedWhos);
    setActivePlanId(id);
    buildPalette();
    renderTimeline();
    updatePlansBtn();
    ov.remove();
  }

  renderStep1();
  ov.appendChild(box);

}

      const newPlacedCDs = JSON.parse(JSON.stringify(plan.placedCDs || {}));

      const newCdWho = JSON.parse(JSON.stringify(fullSnap.cdWho || {}));
      const removedCdIds = new Set();
      subbedWhos.forEach(who => {
        const player = DEFAULT_ROSTER.find(r => r.who === who);
        if (!player) return;
        player.cds.forEach(cdId => { newActiveSetIds = newActiveSetIds.filter(id => id !== cdId); removedCdIds.add(cdId); });
      });
      Object.entries(subIns).forEach(([who, specName]) => {
        if (!specName) return;
        const spec = SPEC_CD_MAP[specName];
        if (!spec || !spec.cds.length) return;
        spec.cds.forEach(cdId => { if (!newActiveSetIds.includes(cdId)) newActiveSetIds.push(cdId); newCdWho[cdId] = spec.who; });
      });
      Object.keys(newPlacedCDs).forEach(bossId => {
        const bd = newPlacedCDs[bossId]; if (!bd) return;
        Object.keys(bd).forEach(rk => { bd[rk] = (bd[rk]||[]).filter(p => !removedCdIds.has(p.cdId)); });
      });
      // Update plan in place
      const allPlans = getPlans();
      allPlans[planId].name = name;
      allPlans[planId].subbedOut = subbedWhos;
      allPlans[planId].placedCDs = newPlacedCDs;
      allPlans[planId].activeSetIds = newActiveSetIds;
      allPlans[planId].cdWho = newCdWho;
      allPlans[planId].savedAt = Date.now();
      savePlans(allPlans);
      // If this is the active plan, apply changes
      if (getActivePlanId() === planId) {
        Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
        Object.assign(placedCDs, newPlacedCDs);
        activeSetIds = new Set(newActiveSetIds);
        CD_POOL.forEach(c => { if (newCdWho[c.id]) c.who = newCdWho[c.id]; });
        buildPalette(); renderTimeline();
      }
      updatePlansBtn();
      ov.remove();
    });
  }

  renderStep1();
  ov.appendChild(box);
  document.body.appendChild(ov);
  ov.addEventListener('mousedown', e => { if (e.target === ov) ov.remove(); });
}

      <button id="importPlanClose" class="btn">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#importPlanClose').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#importPlanName').focus();

  overlay.querySelector('#importPlanConfirm').addEventListener('click', () => {
    const name = overlay.querySelector('#importPlanName').value.trim();
    const raw = overlay.querySelector('#importFojiPlanInput').value.trim();
    const status = overlay.querySelector('#importPlanStatus');
    if (!name) { status.textContent = 'Please enter a plan name.'; return; }
    if (!raw) { status.textContent = 'Please paste a Foji string.'; return; }

    // Start from Full Raid snapshot, then apply import on top
    const savedPlaced = captureCurrentTimeline();
    const fullRaidSnapshot = getFullRaidSnapshot();
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    Object.assign(placedCDs, JSON.parse(JSON.stringify(fullRaidSnapshot)));

    try {
      const count = parseFojiImport(raw);
      const id = saveCurrentAsPlan(name);
      setActivePlanId(id);
      // Restore original state for Full Raid
      Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
      Object.assign(placedCDs, savedPlaced);
      // Now switch to the new plan (which has the import)
      switchToPlan(id);
      status.style.color = '#48a868';
      status.textContent = `Imported ${count} assignments into "${name}".`;
      setTimeout(() => overlay.remove(), 900);
    } catch(e) {
      Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
      Object.assign(placedCDs, savedPlaced);
      renderTimeline();
      status.style.color = '#c84848';
      status.textContent = 'Import failed: ' + e.message;
    }
  });
}

// ── Share Link / View Mode ──
function generateShareId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function buildShareData() {
  return {
    placedCDs: JSON.parse(JSON.stringify(placedCDs)),
    bossReady: JSON.parse(JSON.stringify(bossReady)),
    createdAt: Date.now(),
  };
}

async function createShareLink(btn) {
  if (!_fbDb) { alert('Not connected to Firebase.'); return; }
  btn.textContent = 'Generating…';
  btn.disabled = true;

  // Save current plan state first so share reflects latest changes
  const currentId = getActivePlanId();
  if (currentId === FULL_RAID_ID) {
    saveFullRaidSnapshot();
  } else {
    const plans = getPlans();
    if (plans[currentId]) {
      const snapshot = captureCurrentTimeline();
      plans[currentId].placedCDs = snapshot.placedCDs;
      plans[currentId].activeSetIds = snapshot.activeSetIds;
      plans[currentId].savedAt = Date.now();
      savePlans(plans);
    }
  }
  try {
    const id = generateShareId();
    const data = buildShareData();
    await _fbDb.ref(FB_SHARES_PATH + '/' + id).set(data);
    const url = window.location.origin + window.location.pathname + '?view=' + id;
    await navigator.clipboard.writeText(url);
    btn.textContent = '✓ Copied!';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = btn.id === 'screenshotBtn' ? 'Share Link' : '🔗 Share Link'; }, 3000);
  } catch(e) {
    console.error(e);
    btn.textContent = btn.id === 'screenshotBtn' ? 'Share Link' : '🔗 Share Link';
    btn.disabled = false;
    alert('Failed to generate link: ' + e.message);
  }
}

    </div>
    <div id="viewContent" style="padding:20px 28px;"></div>`;

  document.body.appendChild(viewEl);

  const viewContent = viewEl.querySelector('#viewContent');
  viewContent.innerHTML = '<div style="color:#4a4d62;font-size:13px;padding:20px 0;">Loading…</div>';

  try {
    const db = firebase.database();
    const snap = await db.ref(FB_SHARES_PATH + '/' + viewId).once('value');
    const data = snap.val();
    if (!data) { viewContent.innerHTML = '<div style="color:#c84848;padding:20px 0;">Plan not found or expired.</div>'; return; }

    // Apply data into state — clear first to avoid stale data bleeding in
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    if (data.placedCDs) Object.assign(placedCDs, data.placedCDs);
    if (data.bossReady) Object.assign(bossReady, data.bossReady);

    // Force corner-tr style for view page
    const _prevStyle = ssIconInfoStyle;
    ssIconInfoStyle = 'pill-corner-tr';

    // Build content
    const html = BOSSES.map(b => renderSsBossBlock(b)).filter(Boolean).join('') ||
      '<div style="color:#5a5d78;font-size:13px;padding:20px 0;">No assignments placed.</div>';
    viewContent.innerHTML = html;
    attachSsIconErrors(viewContent);

    ssIconInfoStyle = _prevStyle;
  } catch(e) {
    viewContent.innerHTML = `<div style="color:#c84848;padding:20px 0;">Error loading plan: ${e.message}</div>`;
  }
}

// Check for view mode on load
const _urlParams = new URLSearchParams(window.location.search);
const _viewId = _urlParams.get('view');
if (_viewId) {
  // Immediately hide auth/app so nothing flashes
  const _authEl = document.getElementById('authScreen');
  const _appEl = document.getElementById('app');
  if (_authEl) _authEl.style.display = 'none';
  if (_appEl) _appEl.style.display = 'none';
  // Wait for Firebase to init then load view
  const _waitForFb = setInterval(() => {
    if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length) {
      clearInterval(_waitForFb);
      initViewMode(_viewId);
    }
  }, 100);
  setTimeout(() => clearInterval(_waitForFb), 10000);
}

          <span style="font-size:10px;font-weight:600;color:#e8eaf2;padding-left:2px;">${abTime}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">${sorted.map(p=>{const cd=CD_POOL.find(c=>c.id===p.cdId);return cd?buildHPalaIconEl(cd,'38px'):''}).join('')}</div>
      </div>`;

    case 'condensed':
      return `<div style="display:flex;align-items:center;border-bottom:1px solid #0f1018;min-height:40px;padding:0 14px;gap:10px;">
        <div style="width:3px;align-self:stretch;background:${c};flex-shrink:0;margin-right:2px;"></div>
        <span style="font-size:11px;font-weight:600;color:${c};width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</span>
        <span style="font-size:10px;font-weight:600;color:#e8eaf2;width:38px;flex-shrink:0;">${abTime}</span>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">${sorted.map(p=>{const cd=CD_POOL.find(c=>c.id===p.cdId);return cd?buildHPalaIconEl(cd,'30px'):''}).join('')}</div>
      </div>`;

    case 'no-border':
      return `<div style="display:flex;align-items:stretch;min-height:56px;background:${c}06;">
        <div style="width:3px;background:${c};flex-shrink:0;"></div>
        <div style="width:160px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:0 14px;">
          <span style="font-size:12px;font-weight:600;color:${c};">${name}</span>
          <span style="font-size:10px;color:#e8eaf2;margin-top:2px;">${abTime}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;padding:8px 14px;flex-wrap:wrap;">${sorted.map(p=>{const cd=CD_POOL.find(c=>c.id===p.cdId);return cd?buildHPalaIconEl(cd,'40px'):''}).join('')}</div>
      </div>`;

    case 'timeline':
    default:
      return `<div style="display:flex;align-items:stretch;border-bottom:1px solid #161820;min-height:58px;background:${c}08;">
        <div style="width:3px;background:${c};flex-shrink:0;"></div>
        <div style="width:160px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-right:1px solid ${c}22;">
          <span style="font-size:12px;font-weight:600;color:${c};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</span>
          <span style="font-size:10px;font-weight:500;color:#e8eaf2;">${abTime}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;padding:8px 14px;flex-wrap:wrap;">
          ${sorted.map(p=>{const cd=CD_POOL.find(c=>c.id===p.cdId);if(!cd)return'';return`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">${buildHPalaIconEl(cd,'40px')}<span style="font-size:8px;font-weight:700;color:${cd.color};">${getHpalaShort(cd)}</span></div>`;}).join('')}
        </div>
      </div>`;
  }
}

function buildHPalaContent() {
  let html = '';
  BOSSES.forEach(boss => {
    const bossData = placedCDs[boss.id] || {};
    const rows = [];
    boss.sections.forEach((sec, si) => {
      sec.abilities.forEach((ab, ai) => {
        const rowKey = `${si}-${ai}`;
        const placements = (bossData[rowKey] || []).filter(p => HPALA_CDS.includes(p.cdId));
        if (!placements.length) return;
        const sorted = [...placements].sort((a,b) => (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
        rows.push({ ab, sorted });
      });
    });
    if (!rows.length) return;

    const portraitUrl = BOSS_PORTRAIT_URLS[boss.id] || null;
    const pImg = portraitUrl ? `<img src="${portraitUrl}" onerror="this.style.display='none'" style="width:80px;height:60px;object-fit:cover;object-position:center top;flex-shrink:0;filter:brightness(0.75);border-right:1px solid #2e3040;">` : '';

    const header = `<div style="display:flex;overflow:hidden;height:60px;background:#0d0f15;border-bottom:1px solid #2e3040;">
      ${pImg}
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 16px;background:#0a0c12;">
        <div style="font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#c8a84b66;margin-bottom:3px;">Cooldowns</div>
        <div style="font-size:16px;font-weight:800;color:#c8d0e8;letter-spacing:0.02em;">${boss.name}</div>
      </div>
    </div>`;

    const rowsHtml = rows.map(({ab, sorted}) => buildHPalaRow(ab, sorted, hpalaViewStyle)).join('');
    html += `<div style="border:1px solid #1e2030;border-radius:8px;overflow:hidden;margin-bottom:16px;">${header}<div>${rowsHtml}</div></div>`;
  });
  return html || '<div style="color:#5a5d78;font-size:13px;padding:20px;">No holy paladin CDs placed yet.</div>';
}

function showHPalaView() {
  const existing = document.getElementById('hpalaViewOverlay');
  if (existing) { existing.remove(); return; }

  const overlay = document.createElement('div');
  overlay.id = 'hpalaViewOverlay';
  overlay.className = 'modal-overlay';
  overlay.style.alignItems = 'flex-start';
  overlay.style.padding = '20px';

  overlay.innerHTML = `<div class="ss-modal">
    <div class="ss-toolbar" style="position:relative;">
      <h3>Holy Paladin CDs</h3>
      <button id="hpalaSsBtn" style="padding:4px 12px;border-radius:3px;border:1px solid #3a3d52;background:#1e2028;color:#48a868;font-size:11px;cursor:pointer;letter-spacing:0.04em;">📷 Screenshot</button>
      <button id="hpalaClose" style="padding:4px 12px;border-radius:3px;border:1px solid #3a3d52;background:#1e2028;color:#8a8da8;font-size:11px;cursor:pointer;margin-left:8px;">✕ Close</button>
    </div>
    <div class="ss-content" id="hpalaContent" style="background:#08090d;padding:20px 24px;overflow-y:auto;flex:1;"></div>
  </div>`;

  document.body.appendChild(overlay);

  const contentEl = overlay.querySelector('#hpalaContent');
  contentEl.innerHTML = buildHPalaContent();

  overlay.querySelector('#hpalaClose').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });

  // Screenshot button — use html2canvas via CDN
  overlay.querySelector('#hpalaSsBtn').addEventListener('click', () => {
    const btn = overlay.querySelector('#hpalaSsBtn');
    btn.textContent = 'Capturing…';
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.onload = () => {
      // Create a temp full-height clone so html2canvas captures everything
      const clone = contentEl.cloneNode(true);
      clone.style.cssText = `position:fixed;top:0;left:0;width:1100px;height:auto;overflow:visible;background:#08090d;padding:20px 24px;z-index:-9999;pointer-events:none;`;
      document.body.appendChild(clone);
      html2canvas(clone, { backgroundColor:'#08090d', scale:3, useCORS:true, allowTaint:true, width:1100, height:clone.scrollHeight }).then(canvas => {
        clone.remove();
        const a = document.createElement('a');
        a.download = 'hpala-cds.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        btn.textContent = '📷 Screenshot';
      }).catch(() => { clone.remove(); btn.textContent = '📷 Screenshot'; });
    };
    script.onerror = () => { btn.textContent = '📷 Screenshot'; alert('Screenshot failed to load.'); };
    document.head.appendChild(script);
  });


}

// Shift+M shortcut
document.addEventListener('keydown', e => {
  if (e.shiftKey && e.key === 'M') showHPalaView();
});





// ── Animation System ──
// Animations: drop, remove, bossSwitch, readyCheck always on
function anim(key) { return key === 'remove'; }

// ── Drop pop animation ──
// Patch renderPlacedOnTrack to fire anim on freshly placed icons
const _origRenderPlaced = renderPlacedOnTrack;
let _lastPlacedId = null;
window.renderPlacedOnTrack = function(boss, rowKey, track, totalW, pps, bossData) {
  _origRenderPlaced(boss, rowKey, track, totalW, pps, bossData);
  if (anim('drop') && _lastPlacedId) {
    const el = track.querySelector(`[data-placed-id="${_lastPlacedId}"]`);
    if (el) { el.classList.remove('anim-pop-in'); void el.offsetWidth; el.classList.add('anim-pop-in'); }
    _lastPlacedId = null;
  }
}

// Patch placeCd to record last placed id
const __origPlaceCd2 = placeCd;
window.placeCd = function(bossId, rowKey, cdId, time, cell) {
  const before = (placedCDs[bossId]?.[rowKey] || []).map(p => p.id);
  __origPlaceCd2(bossId, rowKey, cdId, time, cell);
  const after = placedCDs[bossId]?.[rowKey] || [];
  const newP = after.find(p => !before.includes(p.id));
  if (newP) _lastPlacedId = newP.id;
};

// ── Remove animation ──
const __origRemovePlaced = removePlaced;
function __rawRemove(bossId, rowKey, placedId) { __origRemovePlaced(bossId, rowKey, placedId); }
window.removePlaced = function(bossId, rowKey, placedId) {
  if (anim('remove')) {
    const el = document.querySelector(`[data-placed-id="${placedId}"]`);
    if (el) {
      el.classList.add('anim-pop-out');
      el.addEventListener('animationend', () => __origRemovePlaced(bossId, rowKey, placedId), { once: true });
      return;
    }
  }
  __origRemovePlaced(bossId, rowKey, placedId);
};







// ── Boss switch fade ──
let _bossJustSwitched = false;
const __bossSelectEl = document.getElementById('bossSelect');
if (__bossSelectEl) {
  __bossSelectEl.addEventListener('change', () => { _bossJustSwitched = true; }, true);
}
const __origRenderTimelineAnim = renderTimeline;
window.renderTimeline = function() {
  __origRenderTimelineAnim();
  if (anim('bossSwitch') && _bossJustSwitched) {
    const area = document.getElementById('timelineArea');
    if (area) { area.classList.remove('anim-timeline-fade'); void area.offsetWidth; area.classList.add('anim-timeline-fade'); }
    _bossJustSwitched = false;
  }
};



// ── Ready check ──
document.addEventListener('change', e => {
  if (!anim('readyCheck')) return;
  if (e.target && e.target.id === 'bossReadyCheck' && e.target.checked) {
    const label = e.target.closest('label') || e.target.parentElement;
    if (label) { label.classList.remove('anim-check-draw'); void label.offsetWidth; label.classList.add('anim-check-draw'); }
  }
});





</script>
