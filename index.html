    } catch(e){ results.innerHTML='<div style="color:#c84848;font-size:12px;">Error: '+e.message+'</div>'; }
    btn.textContent = wclMode==='personal' ? 'Fetch Personal Defensives' : 'Fetch Raid CDs'; btn.disabled=false;
  });
}

function saveFullRaidSnapshot() {
  try {
    const snapshot = captureCurrentTimeline();
    localStorage.setItem(FULL_RAID_SNAPSHOT_KEY, JSON.stringify(snapshot));
  } catch(e) {}
}

function getFullRaidSnapshot() {
  try {
    const raw = localStorage.getItem(FULL_RAID_SNAPSHOT_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // Fallback to autosave
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.placedCDs) return data.placedCDs;
    }
  } catch(e) {}
  return {};
}

function captureCurrentTimeline() {
  return {
    placedCDs: JSON.parse(JSON.stringify(placedCDs)),
    activeSetIds: [...activeSetIds],
    paletteOrder: JSON.parse(JSON.stringify(paletteOrder)),
    cdWho: Object.fromEntries(CD_POOL.map(c => [c.id, c.who])),
  };
}

function applyTimelineSnapshot(snapshot) {
  if (!snapshot) return;
  // Restore placedCDs
  const pCDs = snapshot.placedCDs || snapshot; // backwards compat
  Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
  Object.assign(placedCDs, JSON.parse(JSON.stringify(pCDs)));
  // Restore activeSetIds. Raid-wide utilities (Personals, Healthstone, Custom)
  // aren't tied to any player, so they stay available even when the plan was
  // saved before they existed. (Player CDs are NOT merged back — a sub plan
  // legitimately removes the subbed-out player's CDs.)
  if (snapshot.activeSetIds) {
    const utilIds = CD_POOL.filter(c => c.who === 'ALL').map(c => c.id);
    activeSetIds = new Set([...snapshot.activeSetIds, ...utilIds]);
  }
  // Restore cdWho
  if (snapshot.cdWho) CD_POOL.forEach(c => { if (snapshot.cdWho[c.id]) c.who = snapshot.cdWho[c.id]; });
  // Restore paletteOrder
  paletteOrder = snapshot.paletteOrder && !Array.isArray(snapshot.paletteOrder) ? snapshot.paletteOrder : {};
  buildPalette();
  renderTimeline();
  // Animate plan switch
  playPlanSwitchAnim();
}

function saveCurrentAsPlan(name, subs, subbedOut) {
  const plans = getPlans();
  const id = 'plan_' + Date.now();
  const snapshot = captureCurrentTimeline();
  const subsArr = Array.isArray(subs) ? subs : (subs ? [{who: subs, spec: subbedOut}] : []);
  plans[id] = {
    id,
    name,
    subs: subsArr,
    // legacy single-sub fields for backward compat
    subWho: subsArr[0]?.who || null,
    subSpec: subsArr[0]?.spec || null,
    subbedOut: Array.isArray(subbedOut) ? subbedOut : [],
    placedCDs: snapshot.placedCDs,
    activeSetIds: snapshot.activeSetIds,
    paletteOrder: snapshot.paletteOrder,
    cdWho: snapshot.cdWho,
    savedAt: Date.now(),
  };
  savePlans(plans);
  return id;
}

function updatePlanSnapshot(id) {
  if (id === FULL_RAID_ID) {
    saveFullRaidSnapshot();
    autoSave();
    return;
  }
  const plans = getPlans();
  if (!plans[id]) return;
  const snapshot = captureCurrentTimeline();
  plans[id].placedCDs = snapshot.placedCDs;
  plans[id].activeSetIds = snapshot.activeSetIds;
  plans[id].paletteOrder = snapshot.paletteOrder;
  plans[id].cdWho = snapshot.cdWho;
  plans[id].savedAt = Date.now();
  savePlans(plans);
}

function deletePlan(id) {
  if (id === FULL_RAID_ID) return;
  const plans = getPlans();
  delete plans[id];
  savePlans(plans);
}

function switchToPlan(id) {
  const currentId = getActivePlanId();

  // Immediately save current state before switching — no debounce
  if (currentId === FULL_RAID_ID) {
    saveFullRaidSnapshot();
    autoSave();
  } else {
    const plans = getPlans();
    if (plans[currentId]) {
      plans[currentId].placedCDs = captureCurrentTimeline();
      plans[currentId].savedAt = Date.now();
      savePlans(plans);
    }
  }

  setActivePlanId(id);

  if (id === FULL_RAID_ID) {
    // Restore Full Raid from its dedicated snapshot
    const snapshot = getFullRaidSnapshot();
    applyTimelineSnapshot(snapshot);
  } else {
    const plans = getPlans();
    const plan = plans[id];
    if (plan && plan.placedCDs) {
      applyTimelineSnapshot(plan.placedCDs);
    }
  }
  renderBottomPanel();
  updatePlansBtn();
}



function updatePlansBtn() {
  const btn = document.getElementById('rosterBtn');
  if (!btn) return;
  const id = getActivePlanId();
  if (id === FULL_RAID_ID) {
    btn.textContent = '⬤ Full Raid';
    btn.style.color = '#48a868';
    btn.style.background = '#48a86818';
    btn.style.borderColor = '#48a86866';
    btn.style.fontWeight = '600';
    btn.style.letterSpacing = '0.02em';
  } else {
    const plans = getPlans();
    const plan = plans[id];
    const name = plan ? plan.name : 'Plan';
    const subbedOut = plan && plan.subbedOut ? plan.subbedOut : [];
    const firstColor = subbedOut.length > 0
      ? (DEFAULT_ROSTER.find(r => subbedOut.includes(r.who))?.color || '#c84848')
      : '#c84848';
    btn.textContent = '⬤ ' + name;
    btn.style.color = firstColor;
    btn.style.background = firstColor + '22';
    btn.style.borderColor = firstColor + '88';
    btn.style.fontWeight = '700';
    btn.style.letterSpacing = '0.02em';
  }
}

        deletePlan(btn.dataset.id);

        updatePlansBtn();

    box.querySelector('#newPlanBtn')?.addEventListener('mouseleave', () => { const b = box.querySelector('#newPlanBtn'); if(b) b.style.background='#2a2218'; });
    box.querySelector('#importPlanBtnMenu')?.addEventListener('mouseenter', () => { const b = box.querySelector('#importPlanBtnMenu'); if(b) b.style.background='#3a2e20'; });
    box.querySelector('#importPlanBtnMenu')?.addEventListener('mouseleave', () => { const b = box.querySelector('#importPlanBtnMenu'); if(b) b.style.background='#2a2218'; });
    box.querySelector('#newPlanBtn')?.addEventListener('click', () => {
      close();
      showNewPlanPicker();
    });

    box.querySelector('#importPlanBtnMenu')?.addEventListener('click', () => {
      close();
      showImportFojiAsPlan();
    });
  }

  wireBox();
  ov.addEventListener('mousedown', (e) => { if (e.target === ov) close(); });
}


function showNewPlanPicker() {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.style.alignItems = 'center';

  const box = document.createElement('div');
  box.className = 'np-box';

  const subIns = {};                    // who -> specName (sub-in spec)

  let sourceId = FULL_RAID_ID;         // which plan the new one copies from

  function getSourceName() {
    if (sourceId === FULL_RAID_ID) return 'Full Raid';
    return getPlans()[sourceId]?.name || 'Full Raid';
  }

  const SPEC_GROUPS = {
    'Healers':  ['Holy Paladin','Discipline','Holy Priest','Restoration Sham','Restoration Dru','Mistweaver'],
    'Tanks':    ['Brewmaster','Protection Pal','Protection War','Blood DK','Guardian Dru'],
    'Ranged':   ['Shadow Priest','Elemental','Enhancement','Balance Dru','Frost Mage','Fire Mage','Arcane Mage','Destruction','Affliction','Demonology','Survival Hunt','Marksmanship','Beast Mastery'],
    'Melee':    ['Arms Warrior','Fury Warrior','Assassination','Combat Rogue','Subtlety','Unholy DK','Frost DK','Windwalker','Feral Dru','Retribution','None / Absent'],
  };

  function renderStep1() {
    const roles = ['tank','healer','ranged','melee'];
    const roleLabels = { tank:'Tanks', healer:'Healers', ranged:'Ranged', melee:'Melee' };
    const playersHtml = roles.map(role => {
      const players = DEFAULT_ROSTER.filter(p => p.role === role);
      if (!players.length) return '';
      return `<div class="np-role">${roleLabels[role]}</div>
        <div class="np-players">
          ${players.map(p => {
            const isSel = selectedOut.has(p.who);
            const cdNames = p.cds.map(id => { const cd = CD_POOL.find(c => c.id === id); return cd ? cd.short : id; }).join(', ');
            return `<div class="np-pcard sub-player-btn" data-who="${p.who}" style="${isSel?`border-color:${p.color};background:${p.color}1a;`:''}">
              <span class="np-pcheck" style="${isSel?`background:${p.color};border-color:${p.color};`:''}">${isSel?'✓':''}</span>
              <span class="np-ptext">
                <span class="np-pname" style="${isSel?`color:${p.color};`:''}">${p.name}</span>
                <span class="np-pspec">${p.spec}${cdNames?' · '+cdNames:''}</span>
              </span>
            </div>`;
          }).join('')}
        </div>`;
    }).join('');

    const anySelected = selectedOut.size > 0;
    const selectedNames = [...selectedOut].map(who => DEFAULT_ROSTER.find(r => r.who === who)?.name || who).join(', ');

    // "Start from" — copy the timeline of any existing plan, not just Full Raid
    const planEntries = Object.values(getPlans()).sort((a,b) => a.savedAt - b.savedAt);
    const sourceOptsHtml = `<option value="${FULL_RAID_ID}" ${sourceId===FULL_RAID_ID?'selected':''}>Full Raid</option>` +
      planEntries.map(p => `<option value="${p.id}" ${sourceId===p.id?'selected':''}>${p.name}</option>`).join('');

    box.innerHTML = `
      <div class="np-head">
        <div class="np-title">New Plan</div>
        <div class="np-steps"><span class="np-step-dot active"></span><span class="np-step-bar"></span><span class="np-step-dot"></span></div>
        <button id="npClose" class="np-close">×</button>
      </div>
      <div class="np-body">
        <div class="np-role" style="margin:0 0 6px;">Start from</div>
        <select id="npSource" class="np-select" style="margin-bottom:6px;">${sourceOptsHtml}</select>
        <div style="font-size:10px;color:#6a5848;margin-bottom:15px;line-height:1.4;">The new plan copies this plan's timeline, then applies your subs on top.</div>
        <div class="np-hint">Select players who are <b>subbing out</b> — pick as many as you need.</div>
        ${playersHtml}
      </div>
      <div class="np-foot">
        <div class="np-summary">${anySelected?'Subbing out: <b>'+selectedNames+'</b>':'Nothing selected — you can still create a plain copy of '+getSourceName()+'.'}</div>
        <div class="np-actions">
          <button id="npNext" class="np-btn-primary">${anySelected?'Next →':'Create Copy of '+getSourceName()}</button>
          <button id="npCancel" class="np-btn-ghost">Cancel</button>
        </div>
      </div>`;

    box.querySelector('#npSource')?.addEventListener('change', e => {
      sourceId = e.target.value;
      renderStep1();
    });
    box.querySelectorAll('.sub-player-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const who = btn.dataset.who;
        if (selectedOut.has(who)) { selectedOut.delete(who); delete subIns[who]; }
        else selectedOut.add(who);
        renderStep1();
      });
    });
    box.querySelector('#npClose')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npCancel')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npNext')?.addEventListener('click', () => {
      if (selectedOut.size === 0) { createPlan('Copy of ' + getSourceName(), [], {}); return; }
      step = 2; renderStep2();
    });
  }

  function renderStep2() {
    const subbedPlayers = [...selectedOut].map(who => DEFAULT_ROSTER.find(r => r.who === who)).filter(Boolean);

    const specOptsHtml = Object.entries(SPEC_GROUPS).map(([group, specs]) =>
      `<optgroup label="${group}">${specs.filter(s => SPEC_CD_MAP[s]).map(s => `<option value="${s}">${s}</option>`).join('')}</optgroup>`
    ).join('');

    const playersHtml = subbedPlayers.map(p => {
      const currentSub = subIns[p.who] || '';
      const subSpec = currentSub ? SPEC_CD_MAP[currentSub] : null;
      const subCdTags = subSpec ? subSpec.cds.map(id => { const cd = CD_POOL.find(c => c.id === id); return cd ? `<span class="sub-cd-tag" style="border-color:${cd.color};color:${cd.textColor};background:${cd.color}22">${cd.short}</span>`:''; }).join('') : '';
      return `<div class="np-srow">
        <span class="np-saccent" style="background:${p.color};"></span>
        <div class="np-sinfo">
          <div class="np-sname" style="color:${p.color};">${p.name}<span>subbing out</span></div>
          <select class="np-select sub-in-select" data-who="${p.who}">
            <option value="">— No sub-in —</option>${specOptsHtml}
          </select>
        </div>
        <div class="np-spreview">${subCdTags || '<span style="color:#3a2e20;font-size:10px;">no CDs</span>'}</div>
      </div>`;
    }).join('');

    const selectedNames = subbedPlayers.map(p => p.name).join(', ');

    box.innerHTML = `
      <div class="np-head">
        <button id="npBack" class="np-back">← Back</button>
        <div class="np-title">New Plan</div>
        <div class="np-steps"><span class="np-step-dot"></span><span class="np-step-bar"></span><span class="np-step-dot active"></span></div>
        <button id="npClose" class="np-close">×</button>
      </div>
      <div class="np-body">
        <div class="np-hint">Choose who's <b>subbing in</b> for each player. Their cooldowns get added to the palette.</div>
        ${playersHtml}
      </div>
      <div class="np-foot">
        <input id="npName" type="text" class="np-name-input" placeholder="Plan name…" value="Sub: ${selectedNames}" />
        <div class="np-actions">
          <button id="npCreate" class="np-btn-primary">Create Plan</button>
          <button id="npCancel" class="np-btn-ghost">Cancel</button>
        </div>
      </div>`;

    // Wire selects
    box.querySelectorAll('.sub-in-select').forEach(sel => {
      if (subIns[sel.dataset.who]) sel.value = subIns[sel.dataset.who];
      sel.addEventListener('change', () => {
        subIns[sel.dataset.who] = sel.value;
        renderStep2();
      });
    });
    box.querySelector('#npBack')?.addEventListener('click', () => { step = 1; renderStep1(); });
    box.querySelector('#npClose')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npCancel')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npCreate')?.addEventListener('click', () => {
      const name = (box.querySelector('#npName')?.value || '').trim() || 'New Plan';
      createPlan(name, [...selectedOut], subIns);
    });
  }

  function getSourceSnapshot() {
    if (sourceId !== FULL_RAID_ID) {
      const src = getPlans()[sourceId];
      if (src) {
        // A plan's placedCDs may be a plain map OR a nested full snapshot
        // ({placedCDs, activeSetIds, ...}) depending on how it was last saved.
        const nested = src.placedCDs && src.placedCDs.placedCDs ? src.placedCDs : null;
        return {
          placedCDs:    (nested ? nested.placedCDs : src.placedCDs) || {},
          activeSetIds: (nested ? nested.activeSetIds : src.activeSetIds) || [...activeSetIds],
          cdWho:        (nested ? nested.cdWho : src.cdWho) || {},
          paletteOrder: (nested ? nested.paletteOrder : src.paletteOrder) || {},
        };
      }
    }
    const fullSnap = getFullRaidSnapshot();
    return {
      placedCDs:    fullSnap.placedCDs || fullSnap || {},
      activeSetIds: fullSnap.activeSetIds || [...activeSetIds],
      cdWho:        fullSnap.cdWho || {},
      paletteOrder: fullSnap.paletteOrder || {},
    };
  }

  function createPlan(name, subbedWhos, subInMap) {
    const srcSnap = getSourceSnapshot();
    const newPlacedCDs = JSON.parse(JSON.stringify(srcSnap.placedCDs));
    let newActiveSetIds = [...srcSnap.activeSetIds];
    // Raid-wide utilities are always available, even if the source plan predates them
    CD_POOL.filter(c => c.who === 'ALL').forEach(c => { if (!newActiveSetIds.includes(c.id)) newActiveSetIds.push(c.id); });
    const newCdWho = JSON.parse(JSON.stringify(srcSnap.cdWho));

    // Remove subbed-out CDs
    const removedCdIds = new Set();
    subbedWhos.forEach(who => {
      const player = DEFAULT_ROSTER.find(r => r.who === who);
      if (!player) return;
      player.cds.forEach(cdId => {
        newActiveSetIds = newActiveSetIds.filter(id => id !== cdId);
        removedCdIds.add(cdId);
      });
    });

    // Add sub-in CDs
    Object.entries(subInMap).forEach(([who, specName]) => {
      if (!specName) return;
      const spec = SPEC_CD_MAP[specName];
      if (!spec || !spec.cds.length) return;
      spec.cds.forEach(cdId => {
        if (!newActiveSetIds.includes(cdId)) newActiveSetIds.push(cdId);
        // Update WHO label for this CD to the sub-in's WHO
        newCdWho[cdId] = spec.who;
      });
    });

    // Strip removed CDs from placements
    Object.keys(newPlacedCDs).forEach(bossId => {
      const bossData = newPlacedCDs[bossId];
      if (!bossData) return;
      Object.keys(bossData).forEach(rowKey => {
        bossData[rowKey] = (bossData[rowKey] || []).filter(p => !removedCdIds.has(p.cdId));
      });
    });

    // Apply
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    Object.assign(placedCDs, newPlacedCDs);
    activeSetIds = new Set(newActiveSetIds);
    CD_POOL.forEach(c => { if (newCdWho[c.id]) c.who = newCdWho[c.id]; });
    paletteOrder = JSON.parse(JSON.stringify(srcSnap.paletteOrder));

    const subsArr = Object.entries(subInMap).filter(([, s]) => s).map(([who, spec]) => ({ who, spec }));
    const id = saveCurrentAsPlan(name, subsArr, subbedWhos);
    setActivePlanId(id);
    buildPalette();
    renderTimeline();
    updatePlansBtn();
    ov.remove();
  }

  renderStep1();
  ov.appendChild(box);
  document.body.appendChild(ov);
  ov.addEventListener('mousedown', e => { if (e.target === ov) ov.remove(); });
}

function showEditPlanPicker(planId) {
  const plans = getPlans();
  const plan = plans[planId];
  if (!plan) return;

  // Pre-populate from saved plan
  const preSelectedOut = new Set(plan.subbedOut || []);
  const preSubIns = {};
  // Try to infer sub-ins from saved cdWho vs full raid cdWho
  const fullSnap = getFullRaidSnapshot();
  const fullCdWho = fullSnap.cdWho || {};
  const planCdWho = plan.cdWho || {};
  Object.entries(planCdWho).forEach(([cdId, who]) => {
    if (fullCdWho[cdId] && fullCdWho[cdId] !== who) {
      // Find which spec maps to this WHO
      const spec = Object.entries(SPEC_CD_MAP).find(([, v]) => v.who === who);
      if (spec) {
        // Find which original player owns this cd slot
        preSelectedOut.forEach(outWho => {
          preSubIns[outWho] = preSubIns[outWho] || spec[0];
        });
      }
    }
  });

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.style.alignItems = 'center';

  const box = document.createElement('div');
  box.className = 'np-box';

  const selectedOut = new Set(preSelectedOut);
  const subIns = Object.assign({}, preSubIns);
  let step = 1;

  const SPEC_GROUPS = {
    'Healers':  ['Holy Paladin','Discipline','Holy Priest','Restoration Sham','Restoration Dru','Mistweaver'],
    'Tanks':    ['Brewmaster','Protection Pal','Protection War','Blood DK','Guardian Dru'],
    'Ranged':   ['Shadow Priest','Elemental','Enhancement','Balance Dru','Frost Mage','Fire Mage','Arcane Mage','Destruction','Affliction','Demonology','Survival Hunt','Marksmanship','Beast Mastery'],

  function renderStep1() {

    const playersHtml = roles.map(role => {

      return `<div class="np-role">${roleLabels[role]}</div>

          ${players.map(p => {
            const isSel = selectedOut.has(p.who);
            const cdNames = p.cds.map(id => { const cd = CD_POOL.find(c => c.id === id); return cd ? cd.short : id; }).join(', ');
            return `<div class="np-pcard sub-player-btn" data-who="${p.who}" style="${isSel?`border-color:${p.color};background:${p.color}1a;`:''}">

          }).join('')}

    box.innerHTML = `
      <div class="np-head">
        <div class="np-title">Edit Plan</div>
        <div class="np-steps"><span class="np-step-dot active"></span><span class="np-step-bar"></span><span class="np-step-dot"></span></div>
        <button id="npClose" class="np-close">×</button>
      </div>
      <div class="np-body">
        <div class="np-hint">Adjust who's <b>subbing out</b>.</div>
        ${playersHtml}
      </div>
      <div class="np-foot">
        ${selectedNames?`<div class="np-summary">Subbing out: <b>${selectedNames}</b></div>`:''}
        <div class="np-actions">
          <button id="npNext" class="np-btn-primary">Next →</button>
          <button id="npCancel" class="np-btn-ghost">Cancel</button>
        </div>
      </div>`;

    box.querySelectorAll('.sub-player-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const who = btn.dataset.who;
        if (selectedOut.has(who)) { selectedOut.delete(who); delete subIns[who]; }
        else selectedOut.add(who);
        renderStep1();
      });
    });
    box.querySelector('#npClose')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npCancel')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npNext')?.addEventListener('click', () => { step = 2; renderStep2(); });
  }

  function renderStep2() {
    const subbedPlayers = [...selectedOut].map(who => DEFAULT_ROSTER.find(r => r.who === who)).filter(Boolean);
    const specOptsHtml = Object.entries(SPEC_GROUPS).map(([group, specs]) =>
      `<optgroup label="${group}">${specs.filter(s => SPEC_CD_MAP[s]).map(s => `<option value="${s}">${s}</option>`).join('')}</optgroup>`
    ).join('');

    const playersHtml = subbedPlayers.map(p => {
      const currentSub = subIns[p.who] || '';
      const subSpec = currentSub ? SPEC_CD_MAP[currentSub] : null;
      const subCdTags = subSpec ? subSpec.cds.map(id => { const cd = CD_POOL.find(c => c.id === id); return cd ? `<span class="sub-cd-tag" style="border-color:${cd.color};color:${cd.textColor};background:${cd.color}22">${cd.short}</span>`:''; }).join('') : '';
      return `<div class="np-srow">
        <span class="np-saccent" style="background:${p.color};"></span>
        <div class="np-sinfo">
          <div class="np-sname" style="color:${p.color};">${p.name}<span>subbing out</span></div>
          <select class="np-select sub-in-select" data-who="${p.who}">
            <option value="">— No sub-in —</option>${specOptsHtml}
          </select>
        </div>
        <div class="np-spreview">${subCdTags||'<span style="color:#3a2e20;font-size:10px;">no CDs</span>'}</div>
      </div>`;
    }).join('');

    box.innerHTML = `
      <div class="np-head">
        <button id="npBack" class="np-back">← Back</button>
        <div class="np-title">Edit Plan</div>
        <div class="np-steps"><span class="np-step-dot"></span><span class="np-step-bar"></span><span class="np-step-dot active"></span></div>
        <button id="npClose" class="np-close">×</button>
      </div>
      <div class="np-body">
        <div class="np-hint">Adjust sub-ins and rename if needed.</div>
        ${playersHtml}
      </div>
      <div class="np-foot">
        <input id="npName" type="text" class="np-name-input" placeholder="Plan name…" value="${plan.name}" />
        <div class="np-actions">
          <button id="npCreate" class="np-btn-primary">Save Changes</button>
          <button id="npCancel" class="np-btn-ghost">Cancel</button>
        </div>
      </div>`;

    box.querySelectorAll('.sub-in-select').forEach(sel => {
      if (subIns[sel.dataset.who]) sel.value = subIns[sel.dataset.who];
      sel.addEventListener('change', () => { subIns[sel.dataset.who] = sel.value; renderStep2(); });
    });
    box.querySelector('#npBack')?.addEventListener('click', () => { step = 1; renderStep1(); });
    box.querySelector('#npClose')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npCancel')?.addEventListener('click', () => ov.remove());
    box.querySelector('#npCreate')?.addEventListener('click', () => {
      const name = (box.querySelector('#npName')?.value || '').trim() || plan.name;
      const subbedWhos = [...selectedOut];
      const fullSnap = getFullRaidSnapshot();
      const newPlacedCDs = JSON.parse(JSON.stringify(plan.placedCDs || {}));
      let newActiveSetIds = [...(fullSnap.activeSetIds || [...activeSetIds])];
      const newCdWho = JSON.parse(JSON.stringify(fullSnap.cdWho || {}));
      const removedCdIds = new Set();
      subbedWhos.forEach(who => {
        const player = DEFAULT_ROSTER.find(r => r.who === who);
        if (!player) return;
        player.cds.forEach(cdId => { newActiveSetIds = newActiveSetIds.filter(id => id !== cdId); removedCdIds.add(cdId); });
      });
      Object.entries(subIns).forEach(([who, specName]) => {
        if (!specName) return;
        const spec = SPEC_CD_MAP[specName];
        if (!spec || !spec.cds.length) return;
        spec.cds.forEach(cdId => { if (!newActiveSetIds.includes(cdId)) newActiveSetIds.push(cdId); newCdWho[cdId] = spec.who; });
      });
      Object.keys(newPlacedCDs).forEach(bossId => {
        const bd = newPlacedCDs[bossId]; if (!bd) return;
        Object.keys(bd).forEach(rk => { bd[rk] = (bd[rk]||[]).filter(p => !removedCdIds.has(p.cdId)); });
      });
      // Update plan in place
      const allPlans = getPlans();
      allPlans[planId].name = name;
      allPlans[planId].subbedOut = subbedWhos;
      allPlans[planId].placedCDs = newPlacedCDs;
      allPlans[planId].activeSetIds = newActiveSetIds;
      allPlans[planId].cdWho = newCdWho;
      allPlans[planId].savedAt = Date.now();
      savePlans(allPlans);
      // If this is the active plan, apply changes
      if (getActivePlanId() === planId) {
        Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
        Object.assign(placedCDs, newPlacedCDs);
        activeSetIds = new Set(newActiveSetIds);
        CD_POOL.forEach(c => { if (newCdWho[c.id]) c.who = newCdWho[c.id]; });
        buildPalette(); renderTimeline();
      }
      updatePlansBtn();
      ov.remove();
    });
  }

  renderStep1();
  ov.appendChild(box);
  document.body.appendChild(ov);
  ov.addEventListener('mousedown', e => { if (e.target === ov) ov.remove(); });
}

    if (!raw) { status.textContent = 'Please paste a Foji string.'; return; }

    // Start from Full Raid snapshot, then apply import on top
    const savedPlaced = captureCurrentTimeline();
    const fullRaidSnapshot = getFullRaidSnapshot();
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    Object.assign(placedCDs, JSON.parse(JSON.stringify(fullRaidSnapshot)));

    try {
      const count = parseFojiImport(raw);

      Object.keys(placedCDs).forEach(k => delete placedCDs[k]);

      status.textContent = 'Import failed: ' + e.message;
    }
  });

function generateShareId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function buildShareData() {
  const currentId = getActivePlanId();
  const plans = getPlans();
  const plan = currentId !== FULL_RAID_ID ? plans[currentId] : null;
  const subbedOut = new Set(plan?.subbedOut || []);

  const effectiveRoster = DEFAULT_ROSTER
    .filter(p => !subbedOut.has(p.who))
    .map(p => {
      const fill = activeRosterFills[p.who];
      if (fill) {
        const color = SPEC_CLASS_COLORS[fill.fillSpec] || p.color;
        return { ...p, spec: fill.fillSpec, who: fill.fillWho || p.who, cds: fill.fillCds || [], color };
      }
      return p;
    });

  // Strip placements that won't show on the live timeline so they don't surface
  // in the share view: CDs not in activeSetIds, or per-boss-disabled via the
  // Manage CDs modal (bossDisabledIds is not transmitted to the view page, so we
  // bake its effect into the placements here).
  const filteredPlaced = {};
  Object.entries(placedCDs).forEach(([bossId, rows]) => {
    const bossDisabled = bossDisabledIds[bossId];
    const filteredRows = {};
    Object.entries(rows).forEach(([rowKey, placements]) => {
      const kept = placements.filter(p => {
        const cd = CD_POOL.find(c => c.id === p.cdId);
        if (!cd) return false;
        if (cd.customType) return true;
        if (!activeSetIds.has(p.cdId)) return false;
        if (bossDisabled && bossDisabled.has(p.cdId)) return false;
        return true;
      });
      if (kept.length) filteredRows[rowKey] = kept;
    });
    if (Object.keys(filteredRows).length) filteredPlaced[bossId] = filteredRows;
  });

  // The plan wizard subs a spec in by retargeting CDs to a new WHO (e.g. Revival →
  // MWMONK1) without adding that player to DEFAULT_ROSTER. Add a roster entry for any
  // WHO that owns a surviving placement but isn't already in the roster, so the view's
  // roster filter keeps the CD and its spec badge resolves correctly.
  const finalRoster = [...effectiveRoster];
  const rosterWhos = new Set(finalRoster.map(p => p.who));
  Object.values(filteredPlaced).forEach(rows => {
    Object.values(rows).forEach(placements => {
      placements.forEach(p => {
        const cd = CD_POOL.find(c => c.id === p.cdId);
        if (!cd || cd.who === 'ALL' || rosterWhos.has(cd.who)) return;
        rosterWhos.add(cd.who);
        const specEntry = Object.entries(SPEC_CD_MAP).find(([, v]) => v.who === cd.who);
        const specName = specEntry ? specEntry[0] : null;
        finalRoster.push({
          name: specName || cd.who,
          spec: specName || '',
          who: cd.who,
          cds: [],
          color: (specName && SPEC_CLASS_COLORS[specName]) || cd.color,
          role: 'healer',
        });
      });
    });
  });

  return {
    placedCDs: filteredPlaced,
    bossReady: JSON.parse(JSON.stringify(bossReady)),
    roster: finalRoster,
    activeSetIds: [...activeSetIds],
    createdAt: Date.now(),
  };
}

async function createShareLink(btn) {
  if (!_fbDb) { alert('Not connected to Firebase.'); return; }
  btn.textContent = 'Generating…';
  btn.disabled = true;

  // Save current plan state first so share reflects latest changes
  const currentId = getActivePlanId();
  if (currentId === FULL_RAID_ID) {
    saveFullRaidSnapshot();
  } else {
    const plans = getPlans();
    if (plans[currentId]) {
      const snapshot = captureCurrentTimeline();
      plans[currentId].placedCDs = snapshot.placedCDs;
      plans[currentId].activeSetIds = snapshot.activeSetIds;
      plans[currentId].savedAt = Date.now();
      savePlans(plans);
    }
  }
  try {
    const id = generateShareId();
    const data = buildShareData();
    await _fbDb.ref(FB_SHARES_PATH + '/' + id).set(data);
    const url = window.location.origin + window.location.pathname + '?view=' + id;
    window.open(url, '_blank');
    btn.textContent = 'Share Link';
    btn.disabled = false;
  } catch(e) {
    console.error(e);
    btn.textContent = btn.id === 'screenshotBtn' ? 'Share Link' : '🔗 Share Link';
    btn.disabled = false;
    alert('Failed to generate link: ' + e.message);
  }
}

// View mode — runs if ?view=ID in URL
async function initViewMode(viewId) {
  // Hide planner, show view page
  document.getElementById('app').style.display = 'none';
  document.getElementById('authScreen').style.display = 'none';

  const viewEl = document.createElement('div');
  viewEl.id = 'viewPage';
  viewEl.style.cssText = 'min-height:100vh;background:#080604;font-family:var(--app-font, Inter, system-ui, sans-serif);';

  // Single combined top bar + content
  viewEl.innerHTML = `
    <div style="background:linear-gradient(180deg,#181410 0%,#0c0a08 100%);border-bottom:2px solid #c83a2044;padding:0 32px;display:flex;align-items:center;gap:20px;height:48px;box-shadow:0 2px 16px rgba(0,0,0,0.5);">
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c83a20" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.8;"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><path d="M2 12h20"/></svg>
        <span style="font-family:Cinzel,Georgia,serif;font-size:10px;font-weight:700;color:#c83a20;letter-spacing:0.3em;text-transform:uppercase;opacity:0.8;">Raid CDs</span>
      </div>
    </div>
    <div id="viewContent" style="max-width:980px;margin:0 auto;padding:24px 28px;"></div>`;

  document.body.appendChild(viewEl);

  let viewRoster = DEFAULT_ROSTER;

  const viewContent = viewEl.querySelector('#viewContent');
  viewContent.innerHTML = '<div style="color:#5a4838;font-size:13px;padding:20px 0;">Loading…</div>';

  try {
    const db = firebase.database();
    const snap = await db.ref(FB_SHARES_PATH + '/' + viewId).once('value');
    const data = snap.val();
    if (!data) { viewContent.innerHTML = '<div style="color:#c84848;padding:20px 0;">Plan not found or expired.</div>'; return; }

    // Apply data into state — clear first to avoid stale data bleeding in
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    if (data.placedCDs) Object.assign(placedCDs, migrateRowKeys(data.placedCDs));
    if (data.bossReady) Object.assign(bossReady, data.bossReady);
    if (data.activeSetIds) {
      activeSetIds = new Set(data.activeSetIds);
    } else {
      activeSetIds = new Set(CD_POOL.filter(c => c.core).map(c => c.id));
    }
    // Always allow these in the view (only render if actually assigned to a row)
    ['ascend', 'slt'].forEach(id => activeSetIds.add(id));

    // Use the roster that was active when the share was created
    if (data.roster && Array.isArray(data.roster) && data.roster.length) {
      viewRoster = data.roster;
    }
    VIEW_ROSTER = viewRoster; // expose to the spotlight renderer (spec-icon resolution)

    // Filter activeSetIds to only CDs whose WHO is in the roster (removes stale/removed players' CDs)
    // Also exclude CDs that should never appear in the share view (VIEW_EXCLUDE_IDS)
    const rosterWhos = new Set(viewRoster.map(p => p.who));
    const VIEW_ALWAYS_IDS = new Set(['ascend', 'slt']);
    activeSetIds = new Set([...activeSetIds].filter(id => {
      if (VIEW_EXCLUDE_IDS.has(id)) return false;
      if (VIEW_ALWAYS_IDS.has(id)) return true;
      const cd = CD_POOL.find(c => c.id === id);
      if (!cd) return false;
      if (cd.who === 'ALL') return true;
      return rosterWhos.has(cd.who);
    }));

    const EMPTY_HTML = '<div style="color:#5a4838;font-size:13px;padding:20px 0;">No assignments placed.</div>';

    viewContent.innerHTML = BOSSES.map(b => buildViewBossBlock(b)).filter(Boolean).join('') || EMPTY_HTML;
    attachSsIconErrors(viewContent);

    // Image buttons — capture the parent boss block via html2canvas (normal mode), then
    // composite the boss-image glow directly onto the canvas with the 2D context's shadowBlur.
    // This reproduces the live drop-shadow silhouette glow (which html2canvas can't render)
    // reliably, because the boss images are same-origin so they draw without tainting.
    const SCALE = 1.25;
    const toBlob = (canvas) => new Promise((res, rej) => { try { canvas.toBlob(b => b ? res(b) : rej(new Error('no blob')), 'image/png'); } catch (err) { rej(err); } });

    viewContent.querySelectorAll('.view-img-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const block = btn.closest('.ss-boss-block');
        if (!block) return;
        const load = (cb) => { if (window.html2canvas) { cb(); return; } const s = document.createElement('script'); s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'; s.onload = cb; document.head.appendChild(s); };
        load(async () => {
          btn.textContent = '…';
          try {
            const imgEl = block.querySelector('.boss-banner-img');
            const canvas = await html2canvas(block, {
              backgroundColor: '#0a0804', scale: SCALE, useCORS: true, allowTaint: true,
              ignoreElements: el => el.classList && el.classList.contains('view-img-btn'),
              onclone: (doc) => {
                doc.querySelectorAll('.boss-banner-img').forEach(im => { im.style.filter = 'none'; });
              }
            });

            // Copy html2canvas output to a fresh canvas (avoids any residual clip paths
            // that html2canvas may leave on its own context, which silently swallow draw calls).
            const out = document.createElement('canvas');
            out.width = canvas.width; out.height = canvas.height;
            const ctx = out.getContext('2d');
            ctx.drawImage(canvas, 0, 0);

            // Glow pass: redraw boss image with canvas shadowBlur to replicate CSS drop-shadow.
            if (imgEl && imgEl.src) {
              const freshImg = new Image();
              freshImg.crossOrigin = 'anonymous';
              await new Promise(res => { freshImg.onload = res; freshImg.onerror = res; freshImg.src = imgEl.src; });
              if (freshImg.naturalWidth) {
                const rightVal  = parseFloat(imgEl.getAttribute('data-right'))  || 0;
                const offsetVal = parseFloat(imgEl.getAttribute('data-offset')) || 0;
                const imgHcss   = parseFloat(imgEl.getAttribute('data-imgh'))   || 230;
                const imgWcss   = freshImg.naturalWidth * imgHcss / freshImg.naturalHeight;
                const g1 = imgEl.getAttribute('data-glow1');
                const g2 = imgEl.getAttribute('data-glow2');
                const g1s = (g1 || '#fff').replace(/^(#[0-9a-f]{6})[0-9a-f]{2}$/i, '$1');
                const g2s = (g2 || g1s).replace(/^(#[0-9a-f]{6})[0-9a-f]{2}$/i, '$1');
                const bx = Math.round(1 * SCALE), by = Math.round(1 * SCALE);
                const bw = out.width - 2 * bx, bh = Math.round(150 * SCALE);
                const ix = bx + bw + (-rightVal) * SCALE - imgWcss * SCALE;
                const iy = by + bh + (-offsetVal) * SCALE - imgHcss * SCALE;
                const iw = imgWcss * SCALE, ih = imgHcss * SCALE;

                ctx.save();
                ctx.beginPath(); ctx.rect(bx, by, bw, bh); ctx.clip();
                ctx.shadowColor = g1s; ctx.shadowBlur = 12 * SCALE; ctx.drawImage(freshImg, ix, iy, iw, ih);
                ctx.shadowColor = g1s; ctx.shadowBlur = 12 * SCALE; ctx.drawImage(freshImg, ix, iy, iw, ih);
                ctx.shadowColor = g2s; ctx.shadowBlur = 32 * SCALE; ctx.drawImage(freshImg, ix, iy, iw, ih);
                ctx.shadowColor = g2s; ctx.shadowBlur = 32 * SCALE; ctx.drawImage(freshImg, ix, iy, iw, ih);
                ctx.shadowBlur = 0;                                  ctx.drawImage(freshImg, ix, iy, iw, ih);
                ctx.restore();
              }
            }

            const blob = await toBlob(out);
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Image for Disc'; }, 2000);
          } catch (e) {
            btn.textContent = 'Image for Disc';
          }
        });
      });
    });
  } catch(e) {
    viewContent.innerHTML = `<div style="color:#c84848;padding:20px 0;">Error loading plan: ${e.message}</div>`;
  }
}

function buildHPalaContent() {
  let html = '';
  BOSSES.forEach(boss => {
    const bossData = placedCDs[boss.id] || {};
    const rows = [];
    boss.sections.forEach((sec, si) => {
      sec.abilities.forEach((ab, ai) => {
        const rowKey = `${si}-${encodeURIComponent(ab.name)}`;
        const placements = (bossData[rowKey] || []).filter(p => HPALA_CDS.includes(p.cdId));
        if (!placements.length) return;
        const sorted = [...placements].sort((a,b) => (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
        rows.push({ ab, sorted });
      });
    });
    if (!rows.length) return;

    const portraitUrl = BOSS_PORTRAIT_URLS[boss.id] || null;
    const pImg = portraitUrl ? `<img src="${portraitUrl}" onerror="this.style.display='none'" style="width:80px;height:60px;object-fit:cover;object-position:center top;flex-shrink:0;filter:brightness(0.75);border-right:1px solid #3a2e20;">` : '';

    const header = `<div style="display:flex;overflow:hidden;height:60px;background:#100e0a;border-bottom:1px solid #3a2e20;">
      ${pImg}
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 16px;background:#0e0c0a;">
        <div style="font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#c83a2066;margin-bottom:3px;">Cooldowns</div>
        <div style="font-size:16px;font-weight:800;color:#c8d0e8;letter-spacing:0.02em;">${boss.name}</div>
      </div>
    </div>`;

    const rowsHtml = rows.map(({ab, sorted}) => buildHPalaRow(ab, sorted, hpalaViewStyle)).join('');
    html += `<div style="border:1px solid #2a2218;border-radius:8px;overflow:hidden;margin-bottom:16px;">${header}<div>${rowsHtml}</div></div>`;
  });
  return html || '<div style="color:#5a4838;font-size:13px;padding:20px;">No holy paladin CDs placed yet.</div>';
}

let _cdClipboard = null;
let _mouseX = 0, _mouseY = 0;
document.addEventListener('mousemove', e => { _mouseX = e.clientX; _mouseY = e.clientY; });

document.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;

  if (e.key === 'c') {
    const el = document.elementFromPoint(_mouseX, _mouseY);

    if (!placedEl) return;
    e.preventDefault();
    const rowKey = placedEl.dataset.rowKey;
    const boss = getBoss();
    const row = (placedCDs[boss.id] || {})[rowKey] || [];
    const p = row.find(p => String(p.id) === placedEl.dataset.placedId);
    if (!p) return;
    _cdClipboard = { cdId: p.cdId, offset: p.offset, hpPct: p.hpPct,
      customWho: p.customWho, customTts: p.customTts, customName: p.customName,
      customAbility: p.customAbility, customSpellId: p.customSpellId, customBossAbility: p.customBossAbility };
    placedEl.style.outline = '2px solid #fff8';
    setTimeout(() => { if (placedEl.isConnected) placedEl.style.outline = ''; }, 350);
  }

  if (e.key === 'v') {
    if (!_cdClipboard) return;
    const hit = document.elementFromPoint(_mouseX, _mouseY);
    const track = hit && hit.closest('.drop-target');
    if (!track) return;
    e.preventDefault();
    const boss = getBoss();
    const rowKey = track.dataset.rowKey;
    const bossId = track.dataset.bossId;
    const rect = track.getBoundingClientRect();
    const cellIndex = Math.floor((_mouseX - rect.left) / (30 * 2.8));
    const time = (cellIndex * 30) + 15;
    const meta = { customWho: _cdClipboard.customWho, customTts: _cdClipboard.customTts,
      customName: _cdClipboard.customName, customAbility: _cdClipboard.customAbility,
      customSpellId: _cdClipboard.customSpellId, customBossAbility: _cdClipboard.customBossAbility,
      hpPct: _cdClipboard.hpPct };
    placeCdWithOffset(bossId, rowKey, _cdClipboard.cdId, time, _cdClipboard.offset, cellIndex, meta);
  }
});





// ── Animation System ──
// Animations: drop, remove, bossSwitch, readyCheck always on
function anim(key) { return key === 'remove'; }

// ── Drop pop animation ──
// Patch renderPlacedOnTrack to fire anim on freshly placed icons
const _origRenderPlaced = renderPlacedOnTrack;
let _lastPlacedId = null;
window.renderPlacedOnTrack = function(boss, rowKey, track, totalW, pps, bossData) {
  _origRenderPlaced(boss, rowKey, track, totalW, pps, bossData);
  if (anim('drop') && _lastPlacedId) {
    const el = track.querySelector(`[data-placed-id="${_lastPlacedId}"]`);
    if (el) { el.classList.remove('anim-pop-in'); void el.offsetWidth; el.classList.add('anim-pop-in'); }
    _lastPlacedId = null;
  }
}

// Patch placeCd to record last placed id
const __origPlaceCd2 = placeCd;
window.placeCd = function(bossId, rowKey, cdId, time, cell) {
  const before = (placedCDs[bossId]?.[rowKey] || []).map(p => p.id);
  __origPlaceCd2(bossId, rowKey, cdId, time, cell);
  const after = placedCDs[bossId]?.[rowKey] || [];
  const newP = after.find(p => !before.includes(p.id));
  if (newP) _lastPlacedId = newP.id;
};

// ── Remove animation ──
const __origRemovePlaced = removePlaced;
function __rawRemove(bossId, rowKey, placedId) { __origRemovePlaced(bossId, rowKey, placedId); }
window.removePlaced = function(bossId, rowKey, placedId) {
  if (anim('remove')) {
    const el = document.querySelector(`[data-placed-id="${placedId}"]`);
    if (el) {
      el.classList.add('anim-pop-out');
      el.addEventListener('animationend', () => __origRemovePlaced(bossId, rowKey, placedId), { once: true });
      return;
    }
  }
  __origRemovePlaced(bossId, rowKey, placedId);
};







// ── Boss switch fade ──
let _bossJustSwitched = false;
const __bossSelectEl = document.getElementById('bossSelect');
if (__bossSelectEl) {
  __bossSelectEl.addEventListener('change', () => { _bossJustSwitched = true; }, true);
}
const __origRenderTimelineAnim = renderTimeline;
window.renderTimeline = function() {
  __origRenderTimelineAnim();
  if (anim('bossSwitch') && _bossJustSwitched) {
    const area = document.getElementById('timelineArea');
    if (area) { area.classList.remove('anim-timeline-fade'); void area.offsetWidth; area.classList.add('anim-timeline-fade'); }
    _bossJustSwitched = false;
  }
};



// ── Ready check ──
document.addEventListener('change', e => {
  if (!anim('readyCheck')) return;
  if (e.target && e.target.id === 'bossReadyCheck' && e.target.checked) {
    const label = e.target.closest('label') || e.target.parentElement;
    if (label) { label.classList.remove('anim-check-draw'); void label.offsetWidth; label.classList.add('anim-check-draw'); }
  }
});





</script>
