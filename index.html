<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-auth-compat.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siege of Orgrimmar — Raid Cooldown Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --bg2: #141210;
    --bg3: #1c1916;
    --border: #2e2620;
    --border2: #483830;
    --text: #d8c8b0;
    --text2: #8a7060;
    --text3: #504038;
    --accent: #c83a20;
    --accent2: #8a2010;
    --forge: #e07820;
    --sha: #6a3a8a;
    --red: #c84848;
    --blue: #c83a20;
    --green: #48a868;
    --purple: #8868c8;
    --orange: #c87838;
    --teal: #38a8b8;
    --pink: #c84888;
    --yellow: #c8b838;
    --gold: #c83a20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* TOP BAR */
  .topbar {
    background: linear-gradient(180deg, #1e1a16 0%, #0c0a08 100%);
    border-top: 3px solid #c83a20;
    padding: 6px 20px 6px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 2px 12px rgba(200,58,32,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .topbar-title {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    white-space: nowrap;
    margin-right: 8px;
    flex-shrink: 0;
    text-decoration: none;
  }
  .topbar-title svg {
    display: block;
    color: #c83a20;
    filter: drop-shadow(0 0 4px #c83a2088);
  }
  .topbar-title-text {
    font-family: 'Cinzel', 'Palatino Linotype', Georgia, serif;
    font-size: 11px;
    font-weight: 700;
    color: #e07820;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    text-shadow: 0 0 8px #e0782066;
    line-height: 1;
  }

  .boss-select {
    background: linear-gradient(135deg, #14110c 0%, #100d09 100%) #100d09;
    color-scheme: dark;
    border: 1px solid #2e2620;
    color: var(--text);
    padding: 6px 10px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    min-width: 200px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .boss-select:hover { border-color: var(--accent); }
  .boss-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,58,32,0.20); }

  /* Chip-style buttons: dark gradient base with the button's accent colour
     washing in from the left — same design language as the CD chips/pills. */
  .btn {
    --btn-accent: #b89a72;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background:
      linear-gradient(100deg, color-mix(in srgb, var(--btn-accent) 13%, transparent) 0%, transparent 62%),
      linear-gradient(135deg, #14110c 0%, #100d09 100%);
    border: 1px solid color-mix(in srgb, var(--btn-accent) 28%, #1c1710);
    border-radius: 7px;
    color: var(--btn-accent);
    padding: 6px 13px;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s;
  }
  .btn svg { flex-shrink: 0; opacity: 0.9; }
  .btn:hover {
    border-color: color-mix(in srgb, var(--btn-accent) 65%, #1c1710);
    color: color-mix(in srgb, var(--btn-accent) 72%, #ffffff);
    background:
      linear-gradient(100deg, color-mix(in srgb, var(--btn-accent) 24%, transparent) 0%, color-mix(in srgb, var(--btn-accent) 5%, transparent) 62%),
      linear-gradient(135deg, #14110c 0%, #100d09 100%);
    box-shadow: 0 0 12px -5px var(--btn-accent), 0 2px 8px rgba(0,0,0,0.35);
  }
  .btn:active { transform: translateY(1px); }
  .btn-danger { --btn-accent: #c84848; }

  .hint {
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
    letter-spacing: 0.03em;
  }


  /* MAIN LAYOUT */
  .main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .main-top { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* BOTTOM PANEL */
  .bottom-panel {
    flex-shrink: 0;
    height: 320px;
    min-height: 38px;
    max-height: 90vh;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .resize-handle { display: none; }

  /* Auth screen */
  #authScreen { position:fixed;inset:0;background:#0a0804;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0; }
  .auth-box { background:#141008;border:1px solid #3a2e20;border-radius:12px;padding:36px 40px;width:380px;max-width:92vw;display:flex;flex-direction:column;align-items:center;gap:20px; }
  .auth-title { font-size:18px;font-weight:800;color:#c83a20;letter-spacing:0.06em;text-align:center; }
  .auth-sub { font-size:11px;color:#5a4838;text-align:center;letter-spacing:0.04em; }
  .auth-google-btn { display:flex;align-items:center;gap:10px;padding:11px 20px;border-radius:6px;border:1px solid #4a3828;background:#241e14;color:#d8c8b0;font-size:13px;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:border-color 0.15s; }
  .auth-google-btn:hover { border-color:#c83a20; }
  .auth-google-btn svg { flex-shrink:0; }
  .auth-status { font-size:11px;color:#8a7060;text-align:center;min-height:16px; }
  .auth-error { font-size:11px;color:#c84848;text-align:center; }
  .auth-pending { background:#1a1610;border:1px solid #c83a2033;border-radius:8px;padding:16px;font-size:11px;color:#8a7060;text-align:center;line-height:1.7;width:100%; }
  .auth-pending strong { color:#c83a20; }
  .auth-signout { position:fixed;top:8px;right:12px;font-size:10px;color:#4a3828;background:transparent;border:none;cursor:pointer;letter-spacing:0.04em;z-index:10000; }
  .auth-signout:hover { color:#8a7060; }

  /* Fill state indicators */
  .fill-banner { background: linear-gradient(90deg,#c83a2022,#c83a2011,transparent); border-bottom: 2px solid #c83a20; padding: 5px 16px; display:flex; align-items:center; gap:10px; font-size:11px; font-weight:700; color:#c83a20; letter-spacing:0.06em; }
  .fill-banner-pill { background:#c83a2022; border:1px solid #c83a2066; border-radius:20px; padding:2px 10px; font-size:10px; color:#c83a20; font-weight:700; }
  .fill-stripe { height:3px; background:linear-gradient(90deg,#c83a20,#c83a2088,transparent); }
  .fill-sidebar-badge { position:fixed; left:0; top:50%; transform:translateY(-50%); background:#c83a20; color:#0e0c0a; font-size:9px; font-weight:900; letter-spacing:0.1em; writing-mode:vertical-rl; text-orientation:mixed; padding:12px 4px; border-radius:0 4px 4px 0; z-index:50; cursor:default; }
  .fill-topbar-badge { background:#c83a20; color:#0e0c0a; font-size:9px; font-weight:900; letter-spacing:0.08em; padding:3px 8px; border-radius:3px; text-transform:uppercase; }
  .fill-pulse-dot { width:9px; height:9px; border-radius:50%; background:#c83a20; animation:fill-pulse 1.8s ease-in-out infinite; flex-shrink:0; }
  @keyframes fill-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  /* EXPAND BUTTON STYLES */
  .expand-tabbar-btn {
    margin-left: auto;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    border-left: 1px solid var(--border);
    border-bottom: 2px solid transparent;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .expand-tabbar-btn:hover { color: var(--accent); }
  .expand-tabbar-btn.expanded { color: var(--accent); border-bottom-color: var(--accent); }

  .expand-fullbar {
    width: 100%;
    height: 18px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: ns-resize;
    font-size: 9px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    user-select: none;
    flex-shrink: 0;
    margin-top: auto;
    transition: background 0.15s, color 0.15s;
  }
  .expand-fullbar:hover { background: var(--border); color: var(--accent); }

  .expand-corner-btn {
    position: absolute;
    top: 6px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: border-color 0.15s, color 0.15s;
  }
  .expand-corner-btn:hover { border-color: var(--accent); color: var(--accent); }
  .bottom-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .bottom-tab {
    padding: 7px 18px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    cursor: pointer;
    border-right: 1px solid var(--border);
    border-bottom: 2px solid transparent;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.15s, background 0.15s;
  }
  .bottom-tab:hover { color: var(--text2); background: var(--bg3); }
  .bottom-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg2); }
  .bottom-content {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 12px 18px;
  }

  /* SUMMARY PANEL */
  .summary-toolbar { display:flex; align-items:center; gap:6px; margin-bottom:8px; flex-shrink:0; }
  .summary-view-btn { padding:3px 10px; border-radius:3px; font-size:10px; cursor:pointer; border:1px solid var(--border2); background:var(--bg3); color:var(--text3); letter-spacing:0.04em; text-transform:uppercase; }
  .summary-view-btn.active { border-color:var(--accent); color:var(--accent); }
  .summary-empty { color: var(--text3); font-size: 12px; padding: 8px 0; }

  /* VIEW: TABLE */
  .sv-table { width:100%; border-collapse:collapse; font-size:11px; }
  .sv-table th { text-align:left; color:var(--text3); font-weight:500; padding:2px 8px 5px 0; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; border-bottom:1px solid var(--border); }
  .sv-table td { padding:4px 8px 4px 0; border-bottom:1px solid var(--border); vertical-align:middle; }
  .sv-table td:first-child { color:var(--text2); width:160px; font-size:11px; }
  .sv-icons { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
  .sv-icon-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .sv-icon { width:28px; height:28px; border-radius:4px; border:1.5px solid; object-fit:cover; display:block; }
  .sv-icon-label { font-size:9px; font-weight:600; text-align:center; max-width:32px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sv-offset-badge { font-size:9px; color:var(--text3); }

  /* VIEW: CARDS */
  .sv-cards { display:flex; flex-wrap:wrap; gap:8px; }
  .sv-card { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:7px 10px; min-width:140px; }
  .sv-card-title { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
  .sv-card-icons { display:flex; flex-wrap:wrap; gap:4px; }

  /* VIEW: COMPACT */
  .sv-compact { display:flex; flex-direction:column; gap:5px; }
  .sv-compact-row { display:flex; align-items:center; gap:12px; padding:5px 0; border-bottom:1px solid var(--border); }
  .sv-compact-label { width:200px; flex-shrink:0; font-size:15px; font-weight:500; color:var(--text); }
  .sv-compact-icons { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .sv-compact-icon { width:40px; height:40px; border-radius:5px; border:1.5px solid; object-fit:cover; }
  .sv-tip-label { font-size:9px; font-weight:600; opacity:0; transition:opacity 0.15s; text-align:center; }
  .sv-compact-row:hover .sv-tip-label { opacity:1; }

  /* SHEET PREVIEW */
  .sp-table { width:100%; border-collapse:collapse; font-size:11px; }
  .sp-table th { text-align:left; color:var(--accent); font-weight:600; padding:4px 8px; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; border-bottom:1px solid var(--border2); background:var(--bg3); white-space:nowrap; }
  .sp-table td { padding:4px 8px; border-bottom:1px solid var(--border); vertical-align:middle; white-space:nowrap; color:var(--text); }
  .sp-table tr:hover td { background:var(--bg3); }
  .sp-boss-header td { background:var(--bg3); color:var(--accent); font-weight:600; font-size:12px; padding:6px 8px; border-bottom:1px solid var(--border2); border-top:2px solid var(--border2); }
  .sp-who { font-weight:600; }
  .sp-cd-name { display:flex; align-items:center; gap:5px; }
  .sp-cd-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .sp-offset { color:#8a7060; }
  .sp-custom { color:#c87020; font-style:italic; }

  /* NOTES PANEL */
  .notes-area {
    width: 100%; height: 100%; min-height: 140px;
    background: transparent; border: none; resize: none;
    color: var(--text); font-family: inherit; font-size: 12px;
    line-height: 1.6; outline: none;
  }
  .notes-area::placeholder { color: var(--text3); }

  /* CD PALETTE */
  .palette {
    width: 234px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #0d0b08 0%, #0b0906 100%);
    border-right: 1px solid #221c14;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .palette-header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 11px 11px 9px;
    border-bottom: 1px solid #1c1710;
    position: sticky;
    top: 0;
    background: #0d0b08;
    z-index: 1;
    flex-shrink: 0;
  }

  .palette-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #7a6248;
    font-weight: 800;
    padding: 0;
    white-space: nowrap;
  }

  .palette-count {
    font-size: 8.5px;
    font-weight: 800;
    color: #55432f;
    background: rgba(255,255,255,0.03);
    border: 1px solid #241e14;
    border-radius: 8px;
    padding: 1px 6px;
    line-height: 1.5;
  }

  .palette-fade-btn {
    margin-left: auto;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid #2e2620;
    background: transparent;
    color: #504038;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .palette-fade-btn:hover { border-color: #4a3c2c; color: #8a7050; }
  .palette-fade-btn.fade-on {
    border-color: #705028;
    color: #c89030;
    background: rgba(200,144,48,0.07);
  }

  .palette-chips {
    padding: 7px 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cd-chip {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 5px 8px 5px 6px;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.045);
    user-select: none;
    cursor: grab;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
    background: linear-gradient(135deg, #14110c 0%, #100d09 100%);
  }
  /* Faint wash of the spell colour bleeding in from the icon side */
  .cd-chip::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--chip-color, transparent) 0%, transparent 60%);
    opacity: 0.06;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .cd-chip:hover { border-color: rgba(255,255,255,0.12); box-shadow: 0 2px 12px rgba(0,0,0,0.45); }
  .cd-chip:hover::before { opacity: 0.14; }
  .cd-chip:active { cursor: grabbing; }
  .cd-chip.reorder-dragging { opacity: 0.25; }
  .cd-chip.reorder-over { border-color: #a07828; border-style: dashed; }
  .cd-chip.placed-fade { opacity: 0.25; }
  .cd-chip.placed-fade:hover { opacity: 0.55; }

  .cd-chip-icon {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    flex-shrink: 0;
    position: relative;
    border: 1px solid rgba(255,255,255,0.14);
    overflow: hidden;
    background: #0a0806;
  }
  .cd-chip-icon img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    transform: scale(1.1);   /* crop the icon's baked-in dark border */
    pointer-events: none;
  }
  .cd-chip-icon-fb {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .cd-chip-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .cd-chip-short {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.2;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cd-chip-timer {
    flex-shrink: 0;
    align-self: center;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.03em;
    color: #6a5540;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 5px;
    padding: 2px 5px;
  }

  /* TIMELINE AREA */
  .timeline-area {
    flex: 1;
    overflow: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .boss-info {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    padding: 2px 0;
  }
  .boss-ready-wrap {
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .boss-ready-wrap input[type=checkbox] { display: none; }
  .boss-ready-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 5px 14px;
    border-radius: 999px;
    border: none;
    color: var(--text2);
    background: rgba(255,255,255,0.07);
    transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }
  .boss-ready-wrap:hover .boss-ready-label { background: rgba(255,255,255,0.13); color: var(--text); }
  .boss-ready-wrap:active .boss-ready-label { transform: scale(0.96); }
  .boss-ready-wrap.ready .boss-ready-label {
    background: #1f7a36;
    color: #ffffff;
  }
  .boss-ready-wrap.ready:hover .boss-ready-label { background: #1a6a2f; color: #ffffff; }

  .boss-name { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; text-transform: uppercase; }
  .boss-desc { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }

  /* TIMELINE GRID */
  .timeline-grid { position: relative; }

  /* ABILITY ROW */
  .ability-row {
    display: flex;
    align-items: stretch;
    margin-bottom: 3px;
    min-height: 69px;
    height: 69px;
  }
  .ability-label {
    width: 180px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 4px 10px;
    background: linear-gradient(135deg, #14110c 0%, #100d09 100%);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 7px 0 0 7px;
  }
  .ability-label-text { font-size: 13px; color: var(--text2); line-height: 1.3; font-weight: 500; letter-spacing: 0.01em; }
  .ability-marker { width: 3px; align-self: stretch; border-radius: 0; margin-right: 8px; flex-shrink: 0; }
  .track {
    flex: 1;
    position: relative;
    overflow: visible;
    min-height: 40px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 0 7px 7px 0;
  }
  .track-gridline {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--border2);
    opacity: 0.9;
    pointer-events: none;
  }



  /* CD PLACED ON TRACK */
  .placed-cd {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 75px !important;
    min-width: 75px;
    height: 57px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0;
    font-size: 10.5px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    cursor: pointer;
    z-index: 3;
    border: 1px solid transparent;
    opacity: 0.94;
    letter-spacing: 0.04em;
    transition: opacity 0.12s, box-shadow 0.12s;
  }
  .placed-cd { overflow: hidden; position: absolute; }
  .placed-cd:hover { opacity: 1; z-index: 10; transform: translateY(-50%) scale(1.06); box-shadow: 0 3px 14px rgba(0,0,0,0.5); }

  /* Label inside a placed CD. For icon pills (.pcd-img) the spell icon IS the
     pill background, and the name sits on a dark scrim along the bottom. */
  .cd-icon-text {
    transition: opacity 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 0;
    max-width: 100%;
    padding: 0 4px;
  }
  .pcd-name {
    line-height: 1;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .placed-cd.pcd-img .cd-icon-text {
    position: absolute;
    inset: 0;
    justify-content: flex-end;
    padding: 0;
    background: linear-gradient(180deg, rgba(6,4,2,0) 46%, rgba(6,4,2,0.85) 100%);
  }
  .placed-cd.pcd-img .pcd-name {
    padding: 0 4px 4px;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.95), 0 0 2px rgba(0,0,0,0.85);
  }
  .placed-cd.pcd-img .cd-offset-inner { background: rgba(0,0,0,0.72); }
  .cd-offset-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.12s;
    pointer-events: none;
    background: rgba(0,0,0,0.55);
    border-radius: inherit;
  }
  .cd-offset-value {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .cd-offset-hint {
    font-size: 9px;
    font-weight: 500;
    opacity: 0.6;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .placed-cd:hover .cd-icon-text { opacity: 0; }
  .placed-cd:hover .cd-offset-inner { opacity: 1; }


  /* DRAG GHOST */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    padding: 4px 8px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 500;
    opacity: 0.9;
    display: none;
  }

  /* SECTION DIVIDER — phase / intermission header strip */
  .phase-divider {
    width: 100%;
    margin: 16px 0 8px;
    padding: 6px 0 6px 18px;
    position: relative;
    display: flex;
    align-items: center;
    box-sizing: border-box;
    background: linear-gradient(90deg, rgba(224,120,32,0.12) 0%, rgba(224,120,32,0.03) 38%, rgba(224,120,32,0) 70%);
    border-top: 1px solid var(--border2);
    border-bottom: 1px solid var(--border);
  }
  .phase-divider::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--forge);
    box-shadow: 0 0 8px rgba(224,120,32,0.55);
  }
  .phase-divider::after {
    content: attr(data-label);
    font-size: 10.5px;
    font-weight: 700;
    color: var(--forge);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    white-space: nowrap;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .health-tick {

  }
  .health-tick::after {
    content: '';

    width: 1px;
    height: 6px;
    background: var(--border2);
    margin: 2px auto 0;
  }

    gap: 8px;

  .offset-popup input[type=number] {
    width: 100%;
    background: #141008;

  .offset-popup button {

  /* ── TIMELINE ICON STYLE: Colour Ring (baked in) ──────────────────────────
     2px border in the CD's colour (--ec, set inline per CD) + soft glow. */

  .placed-cd { border-radius: 6px; border: 1px solid transparent; }
  .placed-cd.pcd-img { border:2px solid var(--ec); border-radius:8px; box-shadow:0 0 10px -3px var(--ec), 0 2px 6px rgba(0,0,0,0.45); }


  /* ── ANIMATION SYSTEM ── */
  @keyframes anim-pop-in {
    0%   { transform: translateY(-50%) scale(0.3); opacity: 0; }
    70%  { transform: translateY(-50%) scale(1.12); opacity: 1; }
    100% { transform: translateY(-50%) scale(1); opacity: 0.9; }
  }
  @keyframes anim-pop-out {
    0%   { transform: translateY(-50%) scale(1); opacity: 0.9; }
    100% { transform: translateY(-50%) scale(0); opacity: 0; }
  }
  @keyframes anim-swap-flash {
    0%,100% { filter: none; }
    50%      { filter: brightness(2) saturate(0); }
  }
  @keyframes anim-row-flash-red {
    0%,100% { background: transparent; }
    50%      { background: rgba(200,72,72,0.18); }
  }
  @keyframes anim-export-pulse {

// ---- Roster Functions ----
function snapshotBaseWho() {
  CD_POOL.forEach(cd => { if (!baseWhoLabels[cd.id]) baseWhoLabels[cd.id] = cd.who; });
}

function swapPlacementsAllBosses(cdFrom, cdTo, newWho) {
  BOSSES.forEach(boss => {
    const bossData = placedCDs[boss.id];
    if (!bossData) return;
    Object.entries(bossData).forEach(([rowKey, row]) => {
      if (!row) return;
      row.forEach(p => {
        if (p.cdId === cdFrom) {
          if (cdTo) { p.cdId = cdTo; if (newWho) p.who = newWho; }
          else { p.cdId = '__removed__'; }
        }
      });
      // Remove marked, then compact — shift remaining icons to fill gaps
      const before = row.filter(p => p.cdId === '__removed__').map(p => p.cell ?? getCellIndex(p.time));
      row.splice(0, row.length, ...row.filter(p => p.cdId !== '__removed__'));
      // For each removed cell position, shift all icons that were after it one cell left
      before.forEach(removedCell => {
        row.forEach(p => {
          const pCell = p.cell ?? getCellIndex(p.time);
          if (pCell > removedCell) {
            p.cell = pCell - 1;
            p.time = (p.cell * 30) + 15;
          }
        });
      });
    });
  });
}

function refreshActiveSetFromFills() {
  snapshotBaseWho();
  // Restore base WHO labels
  CD_POOL.forEach(cd => { if (baseWhoLabels[cd.id]) cd.who = baseWhoLabels[cd.id]; });
  // Update WHO labels for active fills (for export purposes)
  Object.values(activeRosterFills).forEach(fill => {
    (fill.fillCds || []).forEach(id => {
      const cd = CD_POOL.find(c => c.id === id);
      if (cd && fill.fillWho) cd.who = fill.fillWho;
    });
  });
  // Palette always shows the base active set — fills don't change what's available to drag
buildPalette();
  renderTimeline();
}

function updateFillIndicator() {
  // Remove old indicators
  document.getElementById('fillBannerEl')?.remove();
  document.getElementById('fillStripeEl')?.remove();
  document.getElementById('fillSidebarEl')?.remove();
  const badge = document.getElementById('fillTopbarBadge');
  if (badge) badge.style.display = 'none';

  const fills = Object.entries(activeRosterFills);

  // Always update the Fill button regardless of fill state
  const rosterBtn = document.getElementById('rosterBtn');
  if (rosterBtn) {
    if (!fills.length) {
      rosterBtn.textContent = 'Sub';
      rosterBtn.style.color = '';
      rosterBtn.style.borderColor = '';
      rosterBtn.style.background = '';
    } else {
      const firstCol = SPEC_CLASS_COLORS[fills[0][1].fillSpec] || '#c83a20';
      const parts = fills.map(([, f]) => SPEC_SHORT_NAMES[f.fillSpec] || f.fillSpec.split(' ').map(w=>w[0]).join(''));
      rosterBtn.textContent = 'Sub: ' + parts.join(' · ');
      rosterBtn.style.color = firstCol;
      rosterBtn.style.borderColor = firstCol;
      rosterBtn.style.background = firstCol + '18';
    }
  }

  if (!fills.length) return;

  const summary = fills.map(([, f]) => `${f.fillSpec}`).join(' · ');
  const label = `FILL ACTIVE — ${summary}`;

  switch(fillIndicatorStyle) {
    case 'banner': {
      const el = document.createElement('div');
      el.id = 'fillBannerEl';
      el.className = 'fill-banner';
      el.innerHTML = `<div class="fill-pulse-dot"></div><span>${label}</span>`;
      const topbar = document.getElementById('topbar');
      topbar?.after(el);
      break;
    }
    case 'stripe': {
      const el = document.createElement('div');
      el.id = 'fillStripeEl';
      el.className = 'fill-stripe';
      const topbar = document.getElementById('topbar');
      topbar?.after(el);
      break;
    }
    case 'topbar-badge': {
      if (badge) {
        badge.style.display = 'flex';
        badge.innerHTML = `<span class="fill-topbar-badge">⚡ FILL: ${summary}</span>`;
      }
      break;
    }
    case 'pulse-dot': {
      if (badge) {
        badge.style.display = 'flex';
        badge.innerHTML = `<div class="fill-pulse-dot" title="${label}"></div>`;
      }
      break;
    }
    case 'sidebar': {
      const el = document.createElement('div');
      el.id = 'fillSidebarEl';
      el.className = 'fill-sidebar-badge';
      el.textContent = 'FILL ACTIVE';
      el.title = label;
      document.body.appendChild(el);
      break;
    }
    case 'none': default: break;
  }
}

// Key: "OUTGOING_WHO::INCOMING_SPEC" e.g. "ELE1::Retribution"
const SAVED_FILLS_KEY = 'tot_rcd_saved_fills';

function getSavedFills() {
  try { return JSON.parse(localStorage.getItem(SAVED_FILLS_KEY) || '{}'); } catch(e) { return {}; }
}

function saveFillState(playerWho, fillSpecName, fillPlacedState, basePlacedState) {
  const key = `${playerWho}::${fillSpecName}`;
  const saves = getSavedFills();
  saves[key] = {
    playerWho,
    fillSpecName,
    placedCDs: JSON.parse(JSON.stringify(fillPlacedState)),
    basePlacedCDs: basePlacedState ? JSON.parse(JSON.stringify(basePlacedState)) : null,
    savedAt: Date.now(),
  };
  localStorage.setItem(SAVED_FILLS_KEY, JSON.stringify(saves));
}

function loadSavedFillState(key) {
  const saves = getSavedFills();
  return saves[key] || null;
}

function deleteSavedFillState(key) {
  const saves = getSavedFills();
  delete saves[key];
  localStorage.setItem(SAVED_FILLS_KEY, JSON.stringify(saves));
}

function getFillKey(playerWho, fillSpecName) {
  return `${playerWho}::${fillSpecName}`;
}

function checkForSavedFill(playerWho, fillSpecName, onLoad, onFresh) {
  const key = getFillKey(playerWho, fillSpecName);
  const saved = loadSavedFillState(key);
  if (!saved) { onFresh(); return; }

  // Show saved fill menu based on style
  showSavedFillMenu(playerWho, fillSpecName, saved, onLoad, onFresh);
}

      ov.innerHTML = `<div style="font-size:12px;font-weight:700;color:${col};margin-bottom:8px;letter-spacing:0.06em;">SAVED FILL FOUND</div>
        <div style="font-size:11px;color:#8a7060;margin-bottom:24px;line-height:1.6;"><span style="color:${col};font-weight:700;">${short}</span> replacing ${playerWho}<br/><span style="color:#5a4838;">Saved ${savedDate} at ${savedTime}</span></div>

        <button id="sfFresh" style="padding:10px;border-radius:6px;border:1px solid #3a2e20;background:transparent;color:#8a7060;font-size:12px;cursor:pointer;margin-bottom:auto;">Start Fresh</button>
        <button id="sfDelete" style="padding:8px;border:none;background:transparent;color:#c84848;font-size:10px;cursor:pointer;">Delete saved plan</button>`;
      document.body.appendChild(ov);
      ov.querySelector('#sfLoad').addEventListener('click', () => { ov.remove(); onLoad(saved); });
      ov.querySelector('#sfFresh').addEventListener('click', () => { ov.remove(); onFresh(); });
      ov.querySelector('#sfDelete').addEventListener('click', () => { deleteSavedFillState(getFillKey(playerWho, fillSpecName)); ov.remove(); onFresh(); });
      break;
    }
    case 'inline': {
      // Will be shown inside the Fill tab — just call fresh for now, tab handles it
      onFresh();
      break;
    }
  }
}

function applyFill(playerWho, fillSpecName) {
  snapshotBaseWho();
  const player = DEFAULT_ROSTER.find(p => p.who === playerWho);
  const fillSpec = SPEC_CD_MAP[fillSpecName];
  if (!player || !fillSpec) return;

  const originalCds = player.cds;
  const fillCds = fillSpec.cds;
  const fillWho = fillSpec.who;

  // Snapshot the ENTIRE placedCDs state before making any changes
  const placedSnapshot = JSON.parse(JSON.stringify(placedCDs));

  // Swap original CDs to fill CDs on the live timeline
  originalCds.forEach((cdId, i) => {
    const replacementId = fillCds[i] || null;
    swapPlacementsAllBosses(cdId, replacementId, fillWho);
  });

  activeRosterFills[playerWho] = { fillSpec: fillSpecName, originalCds, fillCds, fillWho, placedSnapshot };
  updateFillIndicator();
  isDirty = true;
  refreshActiveSetFromFills();
}

function revertFill(playerWho) {
  const fill = activeRosterFills[playerWho];
  if (!fill) return;

  // Save the current fill state (what was built during this fill) before reverting
  saveFillState(playerWho, fill.fillSpec, placedCDs, fill.placedSnapshot);

  // Restore the full placedCDs snapshot taken at fill time
  if (fill.placedSnapshot) {
    Object.keys(placedCDs).forEach(k => delete placedCDs[k]);
    Object.assign(placedCDs, JSON.parse(JSON.stringify(fill.placedSnapshot)));
  }

  delete activeRosterFills[playerWho];
  updateFillIndicator();
  isDirty = true;
  refreshActiveSetFromFills();
}

function showRosterModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  let pendingSubs = []; // [{who, spec}] queued for a multi-sub plan

  function buildPendingSubsHtml() {
    if (!pendingSubs.length) return '';
    const chips = pendingSubs.map(s => {
      const player = DEFAULT_ROSTER.find(p => p.who === s.who);
      const col = SPEC_CLASS_COLORS[s.spec] || '#c83a20';
      const short = SPEC_SHORT_NAMES[s.spec] || s.spec;
      return `<span class="sub-chip">
        <span style="color:${player?.color||'#c8d0e8'};font-weight:600;">${player?.name||s.who}</span>
        <span class="sub-chip-arrow">▶</span>
        <span style="color:${col};font-weight:600;">${short}</span>
        <button class="remove-pending-btn sub-chip-x" data-who="${s.who}" title="Remove">✕</button>
      </span>`;
    }).join('');
    return `<div class="sub-tray">
      <div class="sub-tray-head">
        <span class="sub-tray-title">Selected to sub · ${pendingSubs.length}</span>
        <button id="create-multi-plan-btn" class="sub-create-btn">Create Plan →</button>
      </div>
      <div class="sub-tray-chips">${chips}</div>
    </div>`;
  }

  function refreshPendingAndRoster() {
    overlay.querySelector('#pendingSubsSection').innerHTML = buildPendingSubsHtml();
    overlay.querySelector('#rosterList').innerHTML = buildRosterHtml();
    wireRosterButtons();
  }

  function getSpecOpts() {
    const groups = {
      'Healers':  ['Holy Paladin','Discipline','Holy Priest','Restoration Sham','Restoration Dru','Mistweaver'],
      'Tanks':    ['Brewmaster','Protection Pal','Protection War','Blood DK','Guardian Dru'],
      'Ranged':   ['Shadow Priest','Elemental','Enhancement','Balance Dru','Frost Mage','Fire Mage','Arcane Mage','Destruction','Affliction','Demonology','Survival Hunt','Marksmanship','Beast Mastery'],
      'Melee':    ['Arms Warrior','Fury Warrior','Assassination','Combat Rogue','Subtlety','Unholy DK','Frost DK','Windwalker','Feral Dru','Retribution'],
      'Other':    ['None / Absent'],
    };
    return Object.entries(groups).map(([label, specs]) =>
      `<optgroup label="${label}">${specs.filter(s => SPEC_CD_MAP[s]).map(spec =>
        `<option value="${spec}">${spec}</option>`
      ).join('')}</optgroup>`
    ).join('');
  }

  function cdTag(id, faded) {
    const cd = CD_POOL.find(c => c.id === id);
    if (!cd) return '';
    return `<span class="sub-cd-tag${faded ? ' faded' : ''}" style="border-color:${cd.color};color:${cd.textColor};background:${cd.color}22">${cd.short}</span>`;
  }

  function buildRosterHtml() {
    const roles = ['tank','healer','ranged','melee'];
    const roleLabels = { tank:'Tanks', healer:'Healers', ranged:'Ranged DPS', melee:'Melee DPS' };
    let html = '';
    let firstRole = true;
    roles.forEach(role => {
      const players = DEFAULT_ROSTER.filter(p => p.role === role);
      if (!players.length) return;
      html += `<div class="sub-role-label${firstRole ? ' first' : ''}">${roleLabels[role]}</div>`;
      firstRole = false;
      players.forEach(player => {
        const fill = activeRosterFills[player.who];
        const pending = pendingSubs.find(s => s.who === player.who);
        const cdTags = player.cds.map(id => cdTag(id)).join('') ||
          '<span class="sub-empty-note">No tracked cooldowns</span>';

        // CD line + badge + actions per state
        let stateClass = '', badge = '', cdLine = cdTags, actions = '';

        if (fill) {
          stateClass = ' active-fill';
          badge = `<span class="sub-state-badge fill">Subbed · ${fill.fillSpec}</span>`;
          const origIds = fill.originalCds || [];
          const fillIds = fill.fillCds || [];
          const maxLen = Math.max(origIds.length, fillIds.length);
          const parts = [];
          for (let i = 0; i < maxLen; i++) {
            const from = origIds[i], to = fillIds[i];
            if (from && to)      parts.push(`${cdTag(from)}<span class="sub-arrow purple">▶</span>${cdTag(to)}`);
            else if (from)       parts.push(cdTag(from, true));
            else if (to)         parts.push(cdTag(to));
          }
          cdLine = parts.join('<span style="color:#3a3024;margin:0 3px;">·</span>') || cdTags;
          actions = `<button class="sub-btn danger revert-fill-btn" data-who="${player.who}">Revert</button>`;
        } else if (pending) {
          stateClass = ' queued';
          const col = SPEC_CLASS_COLORS[pending.spec] || '#9ad072';
          const short = SPEC_SHORT_NAMES[pending.spec] || pending.spec;
          badge = `<span class="sub-state-badge queued">Queued</span>`;
          cdLine = `${player.cds.map(id => cdTag(id)).join('') || '<span class="sub-empty-note">label only</span>'}
            <span class="sub-arrow">▶</span>
            <span class="sub-spec-pill" style="border-color:${col};color:${col};background:${col}1a">${short}</span>`;
          actions = `<button class="sub-btn primary set-fill-btn" data-who="${player.who}">Edit</button>
            <button class="sub-btn danger icon remove-pending-btn" data-who="${player.who}" title="Remove">✕</button>`;
        } else {
          actions = `<button class="sub-btn primary set-fill-btn" data-who="${player.who}">Set Sub</button>`;
        }

        html += `<div class="sub-player${stateClass}">
          <div class="sub-player-info">
            <div class="sub-player-top">
              <span class="sub-player-name" style="color:${player.color};">${player.name}</span>
              <span class="sub-player-spec">${player.spec}</span>
              ${badge}
            </div>
            <div class="sub-player-cds">${cdLine}</div>
          </div>
          <div class="sub-act">${actions}</div>
        </div>`;
      });
    });
    return html;
  }

  function buildPlansSection() {
    const plans = getPlans();
    const activePlanId = getActivePlanId();
    const entries = Object.values(plans).sort((a,b) => a.savedAt - b.savedAt);
    const planRow = (id, name, isActive) => `<div class="sub-plan-row${isActive ? ' active' : ''}" data-plan-id="${id}">
      ${isActive ? '<span class="sub-plan-dot"></span>' : ''}
      <span class="sub-plan-name">${name}</span>
      ${id === FULL_RAID_ID ? '' : `<button class="sub-plan-del" data-id="${id}" title="Delete plan">✕</button>`}
    </div>`;
    let rows = planRow(FULL_RAID_ID, 'Full Raid', activePlanId === FULL_RAID_ID);
    entries.forEach(plan => { rows += planRow(plan.id, plan.name, activePlanId === plan.id); });
    return `<div class="sub-section-label">
        <span>Plans</span>
        <button id="planImportBtn" class="sub-import-btn">↓ Import Foji</button>
      </div>
      <div class="sub-plans">${rows}</div>`;
  }

  function renderModal() {
    overlay.innerHTML = `
      <div class="sub-modal">
        <div class="sub-modal-head">
          <div class="sub-modal-title">Substitutions</div>
          <div class="sub-modal-sub">Pick a saved plan, or set one or more players to sub out and create a new plan.</div>
        </div>
        <div class="sub-modal-body">
          <div id="plansSection">${buildPlansSection()}</div>
          <div class="sub-section-label" style="margin-top:18px;"><span>Roster</span></div>
          <div id="pendingSubsSection">${buildPendingSubsHtml()}</div>
          <div id="rosterList">${buildRosterHtml()}</div>
        </div>
        <div class="sub-modal-foot">
          <button id="rosterClose" class="sub-btn">Done</button>
        </div>
      </div>`;

    overlay.querySelector('#rosterClose').addEventListener('click', () => overlay.remove());
    overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });
    wireRosterButtons();
  }

  function refreshPlansSection() {
    overlay.querySelector('#plansSection').innerHTML = buildPlansSection();
    wirePlanRows();
  }

  function wirePlanRows() {
    overlay.querySelectorAll('.sub-plan-row').forEach(row => {
      row.addEventListener('click', () => {
        switchToPlan(row.dataset.planId);
        refreshPlansSection();
        updatePlansBtn();
      });
    });
    overlay.querySelectorAll('.sub-plan-del').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        if (getActivePlanId() === id) switchToPlan(FULL_RAID_ID);
        deletePlan(id);
        refreshPlansSection();
        updatePlansBtn();
      });
    });
    const importBtn = overlay.querySelector('#planImportBtn');
    if (importBtn) importBtn.addEventListener('click', () => { overlay.remove(); showImportFojiAsPlan(); });
  }

  function wireRosterButtons() {
    wirePlanRows();
    overlay.querySelectorAll('.set-fill-btn').forEach(btn => {
      btn.addEventListener('click', () => showFillPicker(btn.dataset.who));
    });
    overlay.querySelectorAll('.revert-fill-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        revertFill(btn.dataset.who);
        overlay.querySelector('#rosterList').innerHTML = buildRosterHtml();
        wireRosterButtons();
      });
    });
    overlay.querySelectorAll('.remove-pending-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        pendingSubs = pendingSubs.filter(s => s.who !== btn.dataset.who);
        refreshPendingAndRoster();
      });
    });
    const createBtn = overlay.querySelector('#create-multi-plan-btn');
    if (createBtn) createBtn.addEventListener('click', () => {
      overlay.remove();
      showMultiSubPlanPrompt([...pendingSubs]);
    });
  }

  function showFillPicker(playerWho) {
    const player = DEFAULT_ROSTER.find(p => p.who === playerWho);
    const existing = document.getElementById('fillPickerOverlay');
    if (existing) existing.remove();

    const pov = document.createElement('div');
    pov.id = 'fillPickerOverlay';
    pov.className = 'sub-picker-overlay';
    pov.innerHTML = `
      <div class="sub-picker">
        <div class="sub-picker-head">
          <div class="sub-picker-title">Sub out <b>${player.name}</b></div>
          <div class="sub-picker-out">Covers: ${player.cds.map(id => { const cd = CD_POOL.find(c=>c.id===id); return cd ? cd.name : id; }).join(', ') || 'no tracked cooldowns'}</div>
        </div>
        <div class="sub-picker-body">
          <div>
            <div class="sub-picker-flabel">Who is subbing in?</div>
            <select id="fillSpecSelect" class="sub-picker-select">${getSpecOpts()}</select>
          </div>
          <div id="fillPreview" class="sub-picker-preview"></div>
        </div>
        <div class="sub-picker-foot">
          <button id="confirmFill" class="sub-btn primary">Add to plan</button>
          <button id="cancelFill" class="sub-btn">Cancel</button>
        </div>
      </div>`;

    document.body.appendChild(pov);

    function updatePreview() {
      const specName = pov.querySelector('#fillSpecSelect').value;
      const spec = SPEC_CD_MAP[specName];
      const preview = pov.querySelector('#fillPreview');
      const outIds = player.cds;
      const inIds = spec?.cds || [];
      if (outIds.length === 0 && inIds.length === 0) {
        preview.innerHTML = '<span style="color:#5a4838;">No cooldown changes — only the assignment label updates.</span>';
        return;
      }
      const maxLen = Math.max(outIds.length, inIds.length);
      let rows = '<div class="sub-swap-head">Changes across all bosses</div>';
      for (let i = 0; i < maxLen; i++) {
        const fromCd = outIds[i] ? CD_POOL.find(c => c.id === outIds[i]) : null;
        const toCd   = inIds[i]  ? CD_POOL.find(c => c.id === inIds[i])  : null;
        const fromLabel = fromCd ? fromCd.name : '—';
        const toLabel   = toCd   ? `${toCd.name} <span style="opacity:0.6;">(${spec.who})</span>` : 'removed';
        rows += `<div class="sub-swap-row">
          <span class="sub-swap-from">− ${fromLabel}</span>
          <span class="sub-swap-mid">▶</span>
          <span class="sub-swap-to${toCd ? '' : ' removed'}">+ ${toLabel}</span>
        </div>`;
      }
      preview.innerHTML = rows;
    }

    pov.querySelector('#fillSpecSelect').addEventListener('change', updatePreview);
    updatePreview();

    pov.querySelector('#confirmFill').addEventListener('click', () => {
      const specName = pov.querySelector('#fillSpecSelect').value;
      pov.remove();
      pendingSubs = pendingSubs.filter(s => s.who !== playerWho);
      pendingSubs.push({who: playerWho, spec: specName});
      refreshPendingAndRoster();
    });

    pov.querySelector('#cancelFill').addEventListener('click', () => pov.remove());
    pov.addEventListener('mousedown', e => { if (e.target === pov) pov.remove(); });
  }

  document.body.appendChild(overlay);
  renderModal();
}

// ---- Build palette ----
let paletteReorderDrag = null;

function buildPalette() {
  const el = document.getElementById('palette');
  const boss = getBoss();
  const fadeActive = fadeModeByBoss[boss.id] || false;
  const cds = getCDS();
  el.innerHTML = `<div class="palette-header">
    <span class="palette-label">Raid Cooldowns</span>
    <span class="palette-count">${cds.length}</span>
    <button id="fadeModeBtn" class="palette-fade-btn${fadeActive ? ' fade-on' : ''}" title="Fade raid cooldowns when placed in the timeline">◑ Fade</button>
  </div>
  <div class="palette-chips" id="paletteChips"></div>`;
  el.querySelector('#fadeModeBtn').addEventListener('click', () => {
    fadeModeByBoss[boss.id] = !fadeModeByBoss[boss.id];
    isDirty = true;
    buildPalette();
  });
  cds.forEach(cd => {
    const chip = document.createElement('div');
    chip.className = 'cd-chip';
    chip.dataset.cdId = cd.id;
    // Check if this CD is placed anywhere on the current boss (valid rows only)
    const boss = getBoss();
    const bossData = placedCDs[boss.id] || {};
    const validRowKeys = new Set();
    boss.sections.forEach((sec, si) => sec.abilities.forEach(ab => validRowKeys.add(`${si}-${encodeURIComponent(ab.name)}`)));
    const isPlaced = Object.entries(bossData).some(([rk, row]) => validRowKeys.has(rk) && row && row.some(p => p.cdId === cd.id));
    if (fadeModeByBoss[boss.id] && isPlaced) chip.classList.add('placed-fade');

    chip.style.setProperty('--chip-color', cd.color);
    const cdMins = cd.cd > 0 ? (cd.cd % 60 === 0 ? `${cd.cd/60}m` : `${cd.cd}s`) : null;
    // Spell icon (falls back to a coloured monogram block if no icon URL exists)
    const iconUrl = getCdIconUrl(cd.id);
    chip.innerHTML = `
      <div class="cd-chip-icon" style="box-shadow:0 0 9px -2px ${cd.color}">
        ${iconUrl
          ? `<img src="${iconUrl}" alt="" loading="lazy" draggable="false">`
          : `<span class="cd-chip-icon-fb" style="color:${cd.textColor};background:${cd.color}1e">${(cd.short || '?').slice(0, 3)}</span>`}
      </div>
      <div class="cd-chip-body">
        <span class="cd-chip-short" style="color:${cd.textColor}">${cd.palShort || cd.short}</span>
      </div>
      ${cdMins ? `<div class="cd-chip-timer">${cdMins}</div>` : ''}
    `;

    // Unified drag: vertical = reorder, horizontal = palette drag to timeline
    chip.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const startX = e.clientX, startY = e.clientY;
      let decided = false;

      function onFirstMove(ev) {
        const dx = Math.abs(ev.clientX - startX);
        const dy = Math.abs(ev.clientY - startY);
        if (dx < 5 && dy < 5) return;
        decided = true;
        document.removeEventListener('mousemove', onFirstMove);
        document.removeEventListener('mouseup', onCancel);

        if (dy >= dx) {
          // Vertical — reorder
          paletteReorderDrag = cd.id;
          chip.classList.add('reorder-dragging');
          function onMove(ev2) {
            const target = document.elementFromPoint(ev2.clientX, ev2.clientY);
            const targetChip = target ? target.closest('.cd-chip') : null;
            document.querySelectorAll('.cd-chip').forEach(c => c.classList.remove('reorder-over'));
            if (targetChip && targetChip !== chip) targetChip.classList.add('reorder-over');
          }
          function onUp(ev2) {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            chip.classList.remove('reorder-dragging');
            document.querySelectorAll('.cd-chip').forEach(c => c.classList.remove('reorder-over'));
            const target = document.elementFromPoint(ev2.clientX, ev2.clientY);
            const targetChip = target ? target.closest('.cd-chip[data-cd-id]') : null;
            const targetId = targetChip ? targetChip.dataset.cdId : null;
            if (targetId && targetId !== paletteReorderDrag) {
              const current = getCDS().map(c => c.id);
              const fromIdx = current.indexOf(paletteReorderDrag);
              const toIdx = current.indexOf(targetId);
              current.splice(fromIdx, 1);
              current.splice(toIdx, 0, paletteReorderDrag);
              paletteOrder[boss.id] = current;
              buildPalette();
              isDirty = true;
              scheduleAutoSave();
            }
            paletteReorderDrag = null;
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        } else {
          // Horizontal — timeline drag
          startDragFromPalette(e, cd);
        }
      }

      function onCancel() {
        document.removeEventListener('mousemove', onFirstMove);
      }

      document.addEventListener('mousemove', onFirstMove);
      document.addEventListener('mouseup', onCancel, { once: true });
    });

    el.querySelector('#paletteChips').appendChild(chip);
  });
}

// ---- Render timeline ----
function getBoss() { return BOSSES.find(b => b.id === currentBossId); }

function renderTimeline() {
  const boss = getBoss();
  const area = document.getElementById('timelineArea');
  area.innerHTML = '';

  // Boss title
  const info = document.createElement('div');
  info.className = 'boss-info';
  const isReady = bossReady[boss.id] || false;
  info.innerHTML = `
    <span class="boss-name">${boss.name}</span>
    <span class="boss-desc">~${Math.floor(boss.duration/60)}:${String(boss.duration%60).padStart(2,'0')} avg</span>
    <label class="boss-ready-wrap${isReady ? ' ready' : ''}" title="Mark as ready for export">
      <input type="checkbox" id="bossReadyCheck" ${isReady ? 'checked' : ''}>
      <span class="boss-ready-label">${isReady ? '✓ Ready' : 'Mark Ready'}</span>
    </label>`;
  info.querySelector('#bossReadyCheck').addEventListener('change', e => {
    bossReady[boss.id] = e.target.checked;
    isDirty = true;
    const wrap = info.querySelector('.boss-ready-wrap');
    const lbl = info.querySelector('.boss-ready-label');
    if (e.target.checked) { wrap.classList.add('ready'); lbl.textContent = '✓ Ready'; }
    else { wrap.classList.remove('ready'); lbl.textContent = 'Mark Ready'; }
    refreshBossSelectLabels();
  });
  area.appendChild(info);

  const grid = document.createElement('div');
  grid.className = 'timeline-grid';

  const PX_PER_SEC = 2.8;
  const LABEL_W = 160;
  const totalW = Math.max(boss.duration * PX_PER_SEC, 1600);

  // Collect all abilities flat per section
  const bossData = getPlacedKey(boss.id);

  boss.sections.forEach((section, si) => {
    // Only show phase divider between sections (not before the first one)
    if (section.label && si > 0) {
      const div = document.createElement('div');
      div.className = 'phase-divider';
      div.dataset.label = section.label;
      grid.appendChild(div);
    }

    section.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${encodeURIComponent(ab.name)}`;
      const row = buildAbilityRow(boss, rowKey, ab, totalW, PX_PER_SEC, LABEL_W, bossData);
      grid.appendChild(row);
    });
  });

  area.appendChild(grid);
  buildPalette();
  renderBottomPanel();
}

function buildAbilityRow(boss, rowKey, ab, totalW, pps, LABEL_W, bossData) {
  const row = document.createElement('div');
  row.className = 'ability-row';

  const label = document.createElement('div');
  label.className = 'ability-label';
  if (ab.encounterStart) {
    label.innerHTML = `<div class="ability-marker" style="background:#ffffff66"></div><div class="ability-label-text" style="color:#8a7060;font-style:italic;">${ab.name}</div>`;
  } else if (ab.hpAssign) {
    label.innerHTML = `<div class="ability-marker" style="background:${ab.color}"></div><div class="ability-label-text" style="display:flex;flex-direction:column;justify-content:center;gap:2px;"><span style="font-size:12px;font-weight:600;color:${ab.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ab.hpLabel ? ab.name : 'HP Assign'}</span><span style="font-size:10px;font-weight:500;color:var(--text);letter-spacing:0.04em;">${formatTime(ab.time)}</span></div>`;
  } else {
    label.innerHTML = `<div class="ability-marker" style="background:${ab.color}"></div><div class="ability-label-text" style="display:flex;flex-direction:column;justify-content:center;gap:2px;"><span style="font-size:12px;font-weight:600;color:${ab.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${formatAbilityName(ab.name)}</span><span style="font-size:10px;font-weight:500;color:var(--text);letter-spacing:0.04em;">${formatTime(ab.time)}</span></div>`;
  }
  row.appendChild(label);

  const track = document.createElement('div');
  track.className = 'track';
  const isEncStart = !!(ab && ab.encounterStart);
  track.style.width = (isEncStart ? Math.max(totalW + 400, 3200) : Math.max(totalW + 400, 1600)) + 'px';

  // Grid lines every 30s — extend to cover full track width
  const gridEnd = isEncStart ? Math.max(boss.duration, 3200 / pps) : boss.duration;
  for (let t = 30; t < gridEnd; t += 30) {
    const gl = document.createElement('div');
    gl.className = 'track-gridline';
    gl.style.left = (t * pps) + 'px';
    track.appendChild(gl);
  }

  // Placed CDs on this row
  renderPlacedOnTrack(boss, rowKey, track, totalW, pps, bossData);

  // Drop target
  track.addEventListener('dragover', e => { e.preventDefault(); });
  track.addEventListener('drop', e => { handleDrop(e, boss, rowKey, track, totalW, pps); });
  track.addEventListener('contextmenu', e => { e.preventDefault(); }); // suppress browser menu

  // Mouse drop for custom drag
  track.dataset.rowKey = rowKey;
  track.dataset.bossId = boss.id;
  track.dataset.castTime = ab.time;
  track.classList.add('drop-target');

  row.appendChild(track);
  return row;
}

function renderPlacedOnTrack(boss, rowKey, track, totalW, pps, bossData) {
  // Look up the ability object for this row so we can pass it to popups
  const parts = rowKey.split('-');
  const _si = Number(parts[0]);
  const _abName = decodeURIComponent(parts.slice(1).join('-'));
  const _ab = boss.sections[_si]?.abilities.find(ab => ab.name === _abName) || null;
  const placed = (bossData[rowKey] || []);
  placed.forEach(p => {
    const cd = CDS.find(c => c.id === p.cdId);
    if (!cd) return;
    const ICON_W = 75;
    const CELL_W = 30 * pps; // 60px per cell
    // p.time is stored as center of cell (e.g. 15, 45, 75...)
    // cellIndex = floor(p.time / 30), cell center = cellIndex * CELL_W + CELL_W/2
    const cellIndex = Math.floor(p.time / 30);
    const cellCenterX = cellIndex * CELL_W + CELL_W / 2;
    const left = Math.max(0, cellCenterX - ICON_W / 2);

    const el = document.createElement('div');
    el.className = 'placed-cd';
    el.dataset.placedId = p.id;
    el.dataset.rowKey = rowKey;
    // Effective colour / icon / label. A custom assign with a chosen ability
    // renders exactly like a native CD: that ability's spell icon, short name
    // and class colour. A free-form custom gets a parchment-note icon + CUST.
    let ec = cd.color, et = cd.textColor;
    let _iconUrl = getCdIconUrl(cd.id);
    let _label = cd.pillShort || cd.short;   // pillShort = timeline-only label override
    if (cd.customType) {
      _label = 'CUST';
      if (p.customAbility) {
        const _ca = CUSTOM_ABILITY_COLORS[p.customAbility];
        if (_ca) { ec = _ca.color; et = _ca.textColor; }
        if (CUSTOM_ABILITY_SHORTS[p.customAbility]) _label = CUSTOM_ABILITY_SHORTS[p.customAbility];
        if (CUSTOM_ABILITY_ICONS[p.customAbility]) _iconUrl = CUSTOM_ABILITY_ICONS[p.customAbility];
      }
    }
    // Full-bleed spell icon as the pill itself, with a tinted border + soft glow.
    // Falls back to the sidebar-chip gradient fill when there's no icon at all.
    if (_iconUrl) {
      el.classList.add('pcd-img');
      // Frame look (border/radius/glow) lives in CSS keyed off [data-icon] so the
      // icon-style dropdown can restyle it; --ec carries the CD colour into CSS.
      // background-clip:padding-box stops the icon art from bleeding out past the
      // border's anti-aliased inner edge (showed as a thin bright line at the
      // bottom middle of the pill).
      el.style.cssText = `left:${left}px; --ec:${ec}; background:url("${_iconUrl}") center/cover no-repeat #0a0806; background-clip:padding-box; color:${et};`;
    } else {
      const cdBg = `linear-gradient(100deg, ${ec}30 0%, ${ec}0a 62%), linear-gradient(135deg, #14110c 0%, #100d09 100%)`;
      el.style.cssText = `left:${left}px; background:${cdBg}; border-color:${ec}66; color:${et};`;
    }
    const offsetStr = p.offset != null ? ` +${p.offset}s` : '';
    const displayWho = (cd.customType) ? (p.customWho || cd.who || 'ALL') : cd.who;
    const displayName = (cd.customType && p.customAbility) ? p.customAbility : cd.name;
    el.title = `${displayName} (${displayWho})${offsetStr} · Right-click to edit · Middle-click to remove`;

    const iconText = document.createElement('span');
    iconText.className = 'cd-icon-text';
    if (cd.customType) {
      // Assignee's class colour on the label (as before)
      const _whoForColor = p.customWho && p.customWho !== 'ALL' ? p.customWho : null;
      const _whoPlayer = _whoForColor && typeof DEFAULT_ROSTER !== 'undefined' && DEFAULT_ROSTER.find(r => r.who === _whoForColor);
      if (_whoPlayer) { iconText.style.color = _whoPlayer.color; }
    }
    iconText.innerHTML = `<span class="pcd-name">${_label}</span>`;
    el.appendChild(iconText);
    // Offset shown inside icon on hover
    if (_ab && _ab.hpAssign) { // Always show count/HP % on hover
      const _hpDef = (_ab.hpAscend) ? 1 : ((_ab.hpMax) ? _ab.hpMax : 40);
      const hpPct = p.hpPct != null ? p.hpPct : _hpDef;
      const inner = document.createElement('div');
      inner.className = 'cd-offset-inner';
      const _hpHint = _ab.hpLabel ? 'count' : 'HP';
      const _hpVal = _ab.hpLabel ? hpPct : hpPct + '%';
      inner.innerHTML = `<span class="cd-offset-value">${_hpVal}</span><span class="cd-offset-hint">${_hpHint}</span>`;
      inner.style.color = cd.textColor;
      el.appendChild(inner);
    } else if (p.offset != null) {
      const offText = p.offset === 0 ? '0s' : (p.offset > 0 ? '+' : '') + p.offset + 's';
      const inner = document.createElement('div');
      inner.className = 'cd-offset-inner';
      inner.innerHTML = `<span class="cd-offset-value">${offText}</span><span class="cd-offset-hint">offset</span>`;
      inner.style.color = cd.textColor;
      el.appendChild(inner);
    }
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      showOffsetPopup(e, boss.id, rowKey, p, cd, _ab);
    });
    el.addEventListener('mousedown', e => {
      if (e.button === 1) {
        e.preventDefault();
        e.stopPropagation();
        removePlaced(boss.id, rowKey, p.id);
        return;
      }
      if (e.button !== 0) return;
      if (e.ctrlKey || e.metaKey) return;
      e.preventDefault();
      e.stopPropagation();
      startDragPlaced(e, boss.id, rowKey, p, cd);
    });
    el.addEventListener('click', e => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        e.stopPropagation();
        showOffsetPopup(e, boss.id, rowKey, p, cd, _ab);
      }
    });
    track.appendChild(el);
  });
}

// ---- Drag & Drop ----
// activeDrag: { cd, isMove, moveBossId, moveRowKey, movePlacedId, moveOffset }
let activeDrag = null;
let dragMoved = false;
let _dragStartX = 0, _dragStartY = 0;

function startDragFromPalette(e, cd) {
  if (e.button !== 0) return;
  activeDrag = { cd, isMove: false };
  dragMoved = false;
  _dragStartX = e.clientX; _dragStartY = e.clientY;
  showDragGhost(cd.color, cd.textColor, cd.short);
  moveDragGhost(e);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragUp);
  e.preventDefault();
}

function startDragPlaced(e, bossId, rowKey, p, cd) {
  activeDrag = { cd, isMove: true, moveBossId: bossId, moveRowKey: rowKey, movePlacedId: p.id, moveOffset: p.offset, moveCell: p.cell != null ? p.cell : getCellIndex(p.time) };
  dragMoved = false;
  _dragStartX = e.clientX; _dragStartY = e.clientY;
  const offsetStr = p.offset != null ? ` +${p.offset}s` : '';
  showDragGhost(cd.color, cd.textColor, cd.short + offsetStr);
  moveDragGhost(e);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragUp);
}

function showDragGhost(color, textColor, label) {
  dragGhostEl.style.display = 'block';
  dragGhostEl.style.background = color + '33';
  dragGhostEl.style.border = '1px solid ' + color;
  dragGhostEl.style.color = textColor;
  dragGhostEl.textContent = label;
}

function onDragMove(e) {
  if (!dragMoved) {
    const dx = Math.abs(e.clientX - _dragStartX);
    const dy = Math.abs(e.clientY - _dragStartY);
    if (dx > 8 || dy > 8) dragMoved = true;
  }
  moveDragGhost(e);
}

function moveDragGhost(e) {
  dragGhostEl.style.left = (e.clientX + 12) + 'px';
  dragGhostEl.style.top = (e.clientY - 10) + 'px';

  // Visual feedback: turn ghost red if this CD already exists in the hovered row
  if (activeDrag) {
    dragGhostEl.style.display = 'none';
    const hit = document.elementFromPoint(e.clientX, e.clientY);
    dragGhostEl.style.display = 'block';
    const track = hit ? hit.closest('.drop-target') : null;
    if (track) {
      const rowKey = track.dataset.rowKey;
      const bossId = track.dataset.bossId;
      const cdId = activeDrag.cd.id;
      const rowPlacements = (placedCDs[bossId] || {})[rowKey] || [];
      // For moves, exclude the dragged item itself from the check
      const _ghostCd = CD_POOL.find(c => c.id === cdId);
      const _ghostParts = rowKey.split('-');
      const _ghostSi = Number(_ghostParts[0]);
      const _ghostAbName = decodeURIComponent(_ghostParts.slice(1).join('-'));
      const _ghostBoss = BOSSES.find(b => b.id === bossId);
      const _ghostAb = _ghostBoss && _ghostBoss.sections[_ghostSi]?.abilities.find(ab => ab.name === _ghostAbName);
      const cd = activeDrag.cd;
      dragGhostEl.style.background = cd.color + '33';
      dragGhostEl.style.border = '1px solid ' + cd.color;
      dragGhostEl.style.color = cd.textColor;
      dragGhostEl.textContent = cd.short;
    }
  }
}

function onDragUp(e) {
  dragGhostEl.style.display = 'none';
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragUp);

  if (!activeDrag) return;
  const drag = activeDrag;
  activeDrag = null;

  // If barely moved, treat as click (no-op for move drags)
  if (!dragMoved && drag.isMove) return;

  // Find drop target — temporarily hide ghost so elementFromPoint works
  dragGhostEl.style.display = 'none';
  const hit = document.elementFromPoint(e.clientX, e.clientY);
  const track = hit ? hit.closest('.drop-target') : null;

  if (track) {
    const boss = getBoss();
    const pps = 2.8;
    const rowKey = track.dataset.rowKey;
    const bossId = track.dataset.bossId;

    // Snap to center of the 30s grid cell the cursor is over
    const rect = track.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    const cellSize = 30;
    const cellIndex = Math.floor(relX / (cellSize * pps));
    // Store cell center as time — icon will be centered on this
    let time = (cellIndex * cellSize) + (cellSize / 2);
    time = Math.max(0, Math.min(boss.duration, time));

    if (drag.isMove) {
      // Check if target cell is occupied — if so, swap displaced CD to source cell
      const targetRow = (placedCDs[bossId] || {})[rowKey] || [];
      const displaced = targetRow.find(p => (p.cell != null ? p.cell : getCellIndex(p.time)) === cellIndex);

      // Remove dragged item from its origin (sync)
      // Snapshot custom meta before removing so we can restore it
      const _draggedRow = (placedCDs[drag.moveBossId] || {})[drag.moveRowKey] || [];
      const _draggedP = _draggedRow.find(p => p.id === drag.movePlacedId);
      const _dragMeta = _draggedP ? { customWho: _draggedP.customWho, customTts: _draggedP.customTts, customName: _draggedP.customName, customAbility: _draggedP.customAbility, customSpellId: _draggedP.customSpellId, customBossAbility: _draggedP.customBossAbility, hpPct: _draggedP.hpPct, targetWhos: _draggedP.targetWhos } : null;
      __rawRemove(drag.moveBossId, drag.moveRowKey, drag.movePlacedId);

      if (displaced && (drag.moveBossId !== bossId || drag.moveRowKey !== rowKey)) {
        // Move displaced CD to source position (different row swap)
        const srcCellIndex = drag.moveCell;
        const srcCellCenter = (srcCellIndex * 30) + 15;
        const displacedMeta = { customWho: displaced.customWho, customTts: displaced.customTts, customName: displaced.customName, customAbility: displaced.customAbility, customSpellId: displaced.customSpellId, customBossAbility: displaced.customBossAbility, hpPct: displaced.hpPct, targetWhos: displaced.targetWhos };
        __rawRemove(bossId, rowKey, displaced.id);
        placeCdWithOffset(drag.moveBossId, drag.moveRowKey, displaced.cdId, srcCellCenter, displaced.offset, srcCellIndex, displacedMeta);
      } else if (displaced && drag.moveRowKey === rowKey) {
        // Same row swap: remove displaced then move it to source cell
        const srcCellIndex = drag.moveCell;
        const srcCellCenter = (srcCellIndex * 30) + 15;
        const displacedMeta = { customWho: displaced.customWho, customTts: displaced.customTts, customName: displaced.customName, customAbility: displaced.customAbility, customSpellId: displaced.customSpellId, customBossAbility: displaced.customBossAbility, hpPct: displaced.hpPct, targetWhos: displaced.targetWhos };
        __rawRemove(bossId, rowKey, displaced.id);
        placeCdWithOffset(bossId, rowKey, displaced.cdId, srcCellCenter, displaced.offset, srcCellIndex, displacedMeta);
      }

      placeCdWithOffset(bossId, rowKey, drag.cd.id, time, drag.moveOffset, cellIndex, _dragMeta);
    } else {
      // Fresh drag from palette — just replace whatever is there
      placeCd(bossId, rowKey, drag.cd.id, time, cellIndex);
    }
  }
}

function getCellIndex(time) { return Math.floor(time / 30); }

function placeCd(bossId, rowKey, cdId, time, cell) {
  if (!placedCDs[bossId]) placedCDs[bossId] = {};
  if (!placedCDs[bossId][rowKey]) placedCDs[bossId][rowKey] = [];
  const c = cell != null ? cell : getCellIndex(time);
  placedCDs[bossId][rowKey] = placedCDs[bossId][rowKey].filter(p => (p.cell != null ? p.cell : getCellIndex(p.time)) !== c);
  placedCDs[bossId][rowKey].push({ cdId, time, offset: 0, cell: c, id: Date.now() + Math.random() });
  isDirty = true;
  renderTimeline();
}

function placeCdWithOffset(bossId, rowKey, cdId, time, offset, cell, _preserveMeta) {
  if (!placedCDs[bossId]) placedCDs[bossId] = {};
  if (!placedCDs[bossId][rowKey]) placedCDs[bossId][rowKey] = [];
  const cd = CD_POOL.find(c => c.id === cdId);
  const c = cell != null ? cell : getCellIndex(time);
  placedCDs[bossId][rowKey] = placedCDs[bossId][rowKey].filter(p => (p.cell != null ? p.cell : getCellIndex(p.time)) !== c);
  const newEntry = { cdId, time, offset: offset ?? null, cell: c, id: Date.now() + Math.random(), hpPct: 40 };
  // Preserve custom meta if provided (for moves)
  if (_preserveMeta) { Object.assign(newEntry, _preserveMeta); if (_preserveMeta.hpPct != null) newEntry.hpPct = _preserveMeta.hpPct; }
  placedCDs[bossId][rowKey].push(newEntry);
  isDirty = true;
  renderTimeline();
}

function removePlaced(bossId, rowKey, placedId) {
  if (!placedCDs[bossId] || !placedCDs[bossId][rowKey]) return;
  placedCDs[bossId][rowKey] = placedCDs[bossId][rowKey].filter(p => p.id !== placedId);
  isDirty = true;
  renderTimeline();
}

function handleRightClick(e, boss, rowKey, bossData) {
  // Find closest placed CD to click
  const track = e.currentTarget;
  const rect = track.getBoundingClientRect();
  const relX = e.clientX - rect.left;
  const placed = bossData[rowKey] || [];
  if (placed.length === 0) return;
  const pps = 3.5;
  let closest = null, minDist = Infinity;
  placed.forEach(p => {
    const cd = CDS.find(c => c.id === p.cdId);
    const left = p.time * pps;
    const width = Math.max((cd ? cd.dur : 10) * pps, 30);
    const center = left + width / 2;
    const dist = Math.abs(relX - center);
    if (dist < minDist) { minDist = dist; closest = p; }
  });
  if (closest && minDist < 80) {
    removePlaced(boss.id, rowKey, closest.id);
  }
}

// Determine which boss ability key to use for a row
function getBossAbilityKey(boss, rowKey, abName) {
  if (abName && abName.startsWith('HP Assign')) return boss.id.toUpperCase() + '_HEALTH';
  if (abName && abName.startsWith('Encounter Start')) return (BOSS_ABILITY_KEYS[boss.id] || { key: boss.id.toUpperCase() + '_ENC_START' }).key;

  // Check ability name map for this boss
  const abilityMap = FOJI_ABILITY_NAME_MAP[boss.id];
  if (abilityMap) {
    for (const [pattern, fojiKey] of Object.entries(abilityMap)) {
      if (abName.includes(pattern)) {
        return fojiKey;
      }
    }
  }

  // Fallback — try generating from ability name itself
  const nameUpperClean = abName.replace(/\s+\d+.*$/, '').replace(/\s+/g, '_').toUpperCase();
  return boss.id.replace(/-/g, '').toUpperCase() + '_' + nameUpperClean;
}

// Extract cast number from ability name (e.g. "Discharge 3" -> 3)
function getCastNumber(abName) {
  // Phase/intermission transitions fire exactly once — always cast 1
  if (/^(Phase|Intermission)\s+\d+/i.test(abName)) return 1;
  // Handle "Ball Lightning-P2 (1)" style — number in parens at end
  const mp = abName.match(/\((\d+)\)\s*$/);
  if (mp) return parseInt(mp[1]);
  // Handle "Bestial Cry 3" style — trailing number
  const m = abName.match(/(\d+)\s*$/);
  return m ? parseInt(m[1]) : 1;
}

function buildFojiExport() {
  const lines = [];

  BOSSES.forEach(boss => {
    const bossData = placedCDs[boss.id];
    if (!bossData) return;

    // Iterate in canonical section → ability order so export is always sorted earliest to latest
    boss.sections.forEach((section, si) => {
      section.abilities.forEach((ab, ai) => {
        const rowKey = `${si}-${encodeURIComponent(ab.name)}`;
        const placements = bossData[rowKey];
        if (!placements || placements.length === 0) return;

        // HP assign rows use the per-placement hpPct as cast number (health %), always count 1 per row
        const castNum = ab.hpAssign ? 1 : getCastNumber(ab.name);
        const bossAbKey = getBossAbilityKey(boss, rowKey, ab.name);

        const sortedPlacements = [...placements].sort((a, b) => ab.hpAssign ? (ab.hpAscend ? (a.hpPct ?? 1) - (b.hpPct ?? 1) : (b.hpPct ?? 40) - (a.hpPct ?? 40)) : (a.offset ?? 0) - (b.offset ?? 0));
        sortedPlacements.forEach(p => {
          // For HP assign rows, cast number = the placement's health % value
          const _hpCastDef = ab.hpAscend ? 1 : (ab.hpMax || 40);
          const _pCastNum = ab.hpAssign ? (p.hpPct != null ? p.hpPct : _hpCastDef) : castNum;
          const cd = CD_POOL.find(c => c.id === p.cdId);
          if (!cd) return;
          const _exportCd = cd;
          const isCustomPlacement = !!cd.customType;
          // Export only CDs still active in Manage CDs (and not disabled for this boss). Custom
          // placements always export. This keeps the export in sync with the timeline after a CD is
          // de-selected or a player is subbed out — orphaned placements no longer leak into the export.
          if (!isCustomPlacement) {
            if (!activeSetIds.has(p.cdId)) return;
            const _bossDisabled = bossDisabledIds[boss.id];
            if (_bossDisabled && _bossDisabled.has(p.cdId)) return;
          }
          let _bossAbKey = bossAbKey;
          let _castNum = _pCastNum;
          if (isCustomPlacement && p.customBossAbility && FOJI_ABILITY_KEYS[p.customBossAbility]) {
            _bossAbKey = FOJI_ABILITY_KEYS[p.customBossAbility];
            _castNum = getCastNumber(p.customBossAbility);
          }
          const isPersonals = p.cdId === 'personals';
          const isHstone = p.cdId === 'hstone';
          const isDem = p.cdId === 'dem';
          const isXuen = p.cdId === 'xuen';
          const offset = p.offset != null ? p.offset : 0;
          const _exportOffset = ab.hpAssign ? (ab.hpOffset != null ? ab.hpOffset : 1) : offset;
          const spellId = isCustomPlacement
            ? (p.customAbility && CUSTOM_ABILITY_SPELL_IDS[p.customAbility] ? CUSTOM_ABILITY_SPELL_IDS[p.customAbility] : (p.customSpellId || 'nil'))
            : (isXuen || isHstone) ? 'nil' : (CD_SPELL_IDS[p.cdId] || 'nil');
          const customIconId = isCustomPlacement ? (p.customSpellId || 'nil') : 'nil';
          const _whoRaw = isCustomPlacement ? (p.customWho || _exportCd.who || 'ALL') : (cd.who || 'UNKNOWN');
          const _whoRemap = { 'DK1':'UHDK1', 'RSHAM1':'ELE1', 'MWMONK1':'MISTWEAVE1' };
          const baseWho = _whoRemap[_whoRaw] || _whoRaw;
          const ttsText = isPersonals ? 'Use Personals' : isHstone ? 'Healthstone' : isDem ? 'Green banner' : isXuen ? 'Xewen' : (isCustomPlacement && p.customTts ? p.customTts : 'nil');
          const displayText = isPersonals ? 'Use Personals' : isHstone ? 'Healthstone' : isDem ? 'Green banner' : isXuen ? 'Xuen' : (isCustomPlacement && p.customName ? p.customName : ttsText);
          const iconId = (isPersonals || isHstone) ? '134951' : customIconId;
          // Expand multi-target assignments into one line per player
          const _targetWhos = (isPersonals || isHstone || isCustomPlacement) && Array.isArray(p.targetWhos) && p.targetWhos.length > 0
            ? p.targetWhos.map(w => _whoRemap[w] || w)
            : [baseWho];
          _targetWhos.forEach(who => {
            lines.push(`${_bossAbKey}/${_castNum}/${who}/${_exportOffset}/${spellId}/nil/${ttsText}/${displayText}/${iconId}`);
          });
        });
      });
    });
  });

  return lines.join('*');
}

function showManageModal() {
