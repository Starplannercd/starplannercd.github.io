  const orderedCDs = [
    ...cdOrder.map(id => CD_POOL.find(c => c.id === id)).filter(Boolean),
    ...CD_POOL.filter(c => !cdOrder.includes(c.id))
  ];

  function isBossActive(cd) {
    return activeSetIds.has(cd.id) && !bossDisabledIds[bossId].has(cd.id);
  }

  function makeCdItem(cd) {
    const isActive = isBossActive(cd);
    return `<div class="manage-item ${isActive ? 'active' : ''}" data-cdid="${cd.id}">
      <div class="manage-item-dot" style="background:${cd.color}"></div>
      <div style="flex:1;">
        <div class="manage-item-name">${cd.name}</div>
        <div class="manage-item-who">${cd.who}</div>
      </div>
      <div class="manage-check">${isActive ? '✓' : ''}</div>
    </div>`;
  }

  const activeCDs   = orderedCDs.filter(c => activeSetIds.has(c.id) && isBossActive(c));
  const inactiveCDs = orderedCDs.filter(c => activeSetIds.has(c.id) && !isBossActive(c));

  const itemsHtml = `
    <div style="font-size:11px;font-weight:600;color:#48a868;padding:4px 4px 2px;grid-column:1/-1;border-bottom:1px solid #241e14;margin-bottom:4px;">● Active</div>
    ${activeCDs.map(makeCdItem).join('')}
    <div style="font-size:11px;font-weight:600;color:#5a4838;padding:12px 4px 2px;grid-column:1/-1;border-bottom:1px solid #241e14;margin-bottom:4px;">○ Inactive</div>
    ${inactiveCDs.map(makeCdItem).join('')}
  `;

  overlay.innerHTML = `
    <div class="modal-box" style="width:520px;">
      <h3>Manage Raid Cooldowns</h3>
      <div class="modal-sub">Showing CDs for <strong>${boss?.name ?? bossId}</strong>. Changes apply to this boss only — all CDs are on by default for every boss.</div>
      <div class="manage-grid" id="manageGrid">${itemsHtml}</div>
      <div class="modal-footer">
        <button id="manageDone" class="copy-btn">Done</button>
        <button id="manageCancel">Cancel</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  // Snapshot per-boss disabled set for cancel
  const snapshot = new Set(bossDisabledIds[bossId]);

  overlay.querySelector('#manageGrid').addEventListener('click', e => {
    const item = e.target.closest('.manage-item');
    if (!item) return;
    const cdId = item.dataset.cdid;
    if (bossDisabledIds[bossId].has(cdId)) {
      bossDisabledIds[bossId].delete(cdId);
      item.classList.add('active');
      item.querySelector('.manage-check').textContent = '✓';
    } else {
      bossDisabledIds[bossId].add(cdId);
      item.classList.remove('active');
      item.querySelector('.manage-check').textContent = '';
    }
  });

  overlay.querySelector('#manageDone').addEventListener('click', () => {
    overlay.remove();
    buildPalette();
    renderTimeline();
  });

  overlay.querySelector('#manageCancel').addEventListener('click', () => {
    bossDisabledIds[bossId] = snapshot;
    overlay.remove();
  });

  overlay.addEventListener('mousedown', e => {
    if (e.target === overlay) {
      bossDisabledIds[bossId] = snapshot;
      overlay.remove();
    }
  });
}


// ---- Dirty tracking ----
let isDirty = false;
const _origPlaceCd = placeCd;
function placeCd(bossId, rowKey, cdId, time) {
  isDirty = true;
  if (!placedCDs[bossId]) placedCDs[bossId] = {};

function showConfirm(titleHtml, subText, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box" style="width:360px;gap:10px;">
      <h3 style="color:#c84848;">${titleHtml}</h3>
      ${subText ? `<div class="modal-sub">${subText}</div>` : ''}
      <div class="modal-footer" style="margin-top:4px;">
        <button id="confirmYes" style="border-color:#c84848;color:#c84848;">Yes, clear</button>
        <button id="confirmNo" class="copy-btn">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmYes').addEventListener('click', () => { overlay.remove(); onConfirm(); });
  overlay.querySelector('#confirmNo').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });
}


// ---- Save / Load ----
function saveToFile() {
  // Build the current plan data
  const data = {
    version: 1,
    placedCDs,
    bossReady,
    bossNotes,
    activeSetIds: [...activeSetIds],
    paletteOrder: paletteOrder,
    fadeModeByBoss,
    activeRosterFills,
    cdWho: Object.fromEntries(CD_POOL.map(c => [c.id, c.who])),
  };

  // Embed plan into a copy of this HTML — inject as a JSON data attribute script
  const json = JSON.stringify(data);
  // Use a script tag with type="application/json" so no escaping needed
  const bootstrapScript = '<script id="sharePayload" type="application/json">' + json + '<\/script>' +
    '<script>document.addEventListener("DOMContentLoaded",function(){' +
    'try{var el=document.getElementById("sharePayload");' +
    'if(el){localStorage.setItem("tot_rcd_autosave",el.textContent);}}catch(e){}' +
    '});<\/script>';

  const htmlSource = document.documentElement.outerHTML;
  const shareHtml = htmlSource.replace('</head>', bootstrapScript + '</head>');

  const blob = new Blob([shareHtml], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tot_rcd_shared.html';
  a.click();
  URL.revokeObjectURL(url);
  isDirty = false;
}

function loadFromFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.placedCDs) Object.assign(placedCDs, data.placedCDs);
      if (data.bossReady) Object.assign(bossReady, data.bossReady);
      if (data.bossNotes) Object.assign(bossNotes, data.bossNotes);
      if (data.activeSetIds) {
        const coreIds = CD_POOL.filter(c => c.core).map(c => c.id);
        activeSetIds = new Set([...data.activeSetIds, ...coreIds]);
      }
      if (data.paletteOrder && !Array.isArray(data.paletteOrder)) Object.assign(paletteOrder, data.paletteOrder);
      if (data.fadeModeByBoss) Object.assign(fadeModeByBoss, data.fadeModeByBoss);
      if (data.activeRosterFills) { activeRosterFills = data.activeRosterFills; refreshActiveSetFromFills(); }
      if (data.cdWho) {
        CD_POOL.forEach(c => { if (data.cdWho[c.id]) c.who = data.cdWho[c.id]; });
      }
      isDirty = false;
      buildPalette();
      renderTimeline();
      renderBottomPanel();
    } catch(err) {
      alert('Failed to load file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function buildSummaryForBoss(boss) {
  const bossData = placedCDs[boss.id] || {};
  const rows = [];
  boss.sections.forEach((sec, si) => {
    sec.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${encodeURIComponent(ab.name)}`;
      const placements = bossData[rowKey];
      if (!placements || !placements.length) return;
      const _bossDisabled = bossDisabledIds[boss.id];
      const sorted = [...placements]
        .filter(p => p.cdId !== 'custom' && !['lhammer','lhammer2','divfavor'].includes(p.cdId) && activeSetIds.has(p.cdId) && !(_bossDisabled && _bossDisabled.has(p.cdId)))
        .sort((a, b) => (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
      if (sorted.length) rows.push({ ab, sorted });
    });
  });
  return rows;
}

// Radial-gradient glow behind boss image. The image also carries a CSS drop-shadow that
// hugs the silhouette (looks great live, but html2canvas can't render it) — the capture
// boosts this radial via onclone to approximate that look. Tagged for that boost.
function bossGlowHtml(v) {
  const sz    = v.tight ? 180 : 260;
  const top   = v.tight ? -55 : -90;
  const right = v.tight ? -10 : -30;
  const stops = v.tight ? `${v.glow[0]} 0%, ${v.glow[1]} 16%, transparent 42%` : `${v.glow[0]} 0%, ${v.glow[1]} 25%, transparent 55%`;
  return `<div class="boss-glow" data-g1="${v.glow[0]}" data-g2="${v.glow[1]}" data-tight="${v.tight?1:0}" style="position:absolute;top:${top}px;right:${right}px;width:${sz}px;height:${sz}px;background:radial-gradient(circle at 50% 50%, ${stops});pointer-events:none;z-index:0;"></div>`;
}
function bossImgHtml(v, h) {
  const ht = h || 148;
  return `<img class="boss-banner-img" data-glow1="${v.glow[0]}" data-glow2="${v.glow[1]}" data-right="${v.right}" data-offset="${v.offset}" data-imgh="${ht}" src="${v.file}" onerror="this.style.display='none'" style="position:absolute;right:${v.right};bottom:${v.offset};height:${ht}px;pointer-events:none;filter:drop-shadow(0 0 10px ${v.glow[0]}) drop-shadow(0 0 28px ${v.glow[1]});opacity:0.92;z-index:1;" />`;
}

function buildSsBossHeader(boss, portraitUrl, showImgBtn) {

      ${imgBtn}

function renderSsBossBlock(boss, showImgBtn) {
  const rows = buildSummaryForBoss(boss);
  if (!rows.length) return '';
  const portraitUrl = BOSS_PORTRAIT_URLS[boss.id] || null;

  const rowsHtml = rows.map(({ ab, sorted }) => {
    const iconsHtml = sorted.map(p => {
      const cd = CD_POOL.find(c => c.id === p.cdId);
      if (!cd) return '';
      const iconEl = buildSsIconEl(cd, p, ab);

    return buildSsRow(ab, iconsHtml);

  return `<div class="ss-boss-block" style="margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid #2a2218;">

}

// Per-CD spec-icon overrides (override the owning player's spec icon for specific abilities)
const CD_SPEC_ICON = {
  dh:     'spell_holy_guardianspirit',  // Divine Hymn → Holy Priest
  ascend: 'spell_nature_magicimmunity', // Ascendance → Resto Shaman
  slt:    'spell_nature_magicimmunity', // Spirit Link Totem → Resto Shaman
  dem:    'classicon_warrior',          // Demo Banner → Warrior (base class)
  rc:     'classicon_warrior',          // Rallying Cry → Warrior (base class)
};

const NO_SPEC_ICON = new Set(['personals', 'hstone']);
function getSpecIconUrl(cd) {
  if (NO_SPEC_ICON.has(cd.id)) return null;
  if (CD_SPEC_ICON[cd.id]) return SPEC_ICON_CDN + CD_SPEC_ICON[cd.id] + '.jpg';
  const player = VIEW_ROSTER.find(pl => pl.who === cd.who);
  if (!player) return null;
  const name = SPEC_ICONS[player.spec];
  return name ? SPEC_ICON_CDN + name + '.jpg' : null;
}

// Blend two #rrggbb hex colors (t=0 → a, t=1 → b)
function blendHex(a, b, t) {
  const parse = h => { h = h.replace('#',''); if (h.length === 3) h = h.split('').map(x => x+x).join(''); return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)]; };
  const A = parse(a), B = parse(b);
  return '#' + A.map((v,i) => Math.round(v + (B[i]-v)*t).toString(16).padStart(2,'0')).join('');
}

// Per-placement render parts (cd icon, spec icon, fallback who-label, offset/hp info)
function viewCdParts(p, ab) {
  const cd = CD_POOL.find(c => c.id === p.cdId);
  if (!cd) return null;
  return {
    cd,
    url:      getCdIconUrl(cd.id),
    specIcon: getSpecIconUrl(cd),
    who:      VIEW_CD_NAMES[cd.id] || cd.short,
    info:     getSsInfoLabel(cd, p, ab),
    color:    cd.color,
    textColor: cd.textColor,
  };
}
function viewIconImg(parts, size) {
  const sz = size || 44;
  const fb = `<div style="width:${sz}px;height:${sz}px;border-radius:6px;background:${parts.color}22;border:1px solid ${parts.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${parts.textColor};">${parts.cd.short}</div>`;
  return parts.url
    ? `<img class="ss-real-icon" data-fallback="${encodeURIComponent(fb)}" src="${parts.url}" style="width:${sz}px;height:${sz}px;border-radius:6px;display:block;" title="${parts.cd.name}" />`
    : fb;
}
// Spec-icon badge overlaid on the CD icon's bottom-left corner (nothing if unresolved)

}

function buildViewBossBlock(boss) {
  const rows = buildSummaryForBoss(boss);

// Spotlight — hero banner, abilities as bands with large icons + spec-icon labels
function viewBlockSpotlight(boss, rows, v, color) {
  const body = rows.map(({ ab, sorted }) => {
    const cells = sorted.map(p => {
      const parts = viewCdParts(p, ab); if (!parts) return '';
      const off = parts.info ? `<span style="position:absolute;top:-6px;right:-6px;font-size:9px;font-weight:800;color:#fff;background:#000d;border:1px solid #fff9;border-radius:6px;padding:1px 4px;white-space:nowrap;z-index:2;">${parts.info}</span>` : '';
      return `<div style="position:relative;display:inline-block;">${viewIconImg(parts, 52)}${off}${viewSpecBadge(parts)}</div>`;
    }).join('');
    // Per-ability accent: blend boss theme with this ability/phase colour (stays on-theme, varies per row)
    const accent = blendHex(color, ab.color || color, 0.5);
    const nameColor = blendHex('#e8e2d8', accent, 0.5);
    const timeHtml = ab.hpAssign ? '' : `<span style="font-size:11px;font-weight:700;color:${accent};font-variant-numeric:tabular-nums;">${formatTime(ab.time)}</span>`;
    return `<div style="display:flex;align-items:stretch;min-height:60px;">
      <div style="width:172px;flex-shrink:0;display:flex;align-items:center;gap:9px;padding:10px 16px;">
        <span style="width:3px;align-self:stretch;background:${accent};border-radius:2px;flex-shrink:0;"></span>
        <div style="display:flex;flex-direction:column;gap:3px;min-width:0;">
          <span style="font-size:13px;font-weight:700;color:${nameColor};line-height:1.25;">${formatAbilityName(ab.name)}</span>
          ${timeHtml}
        </div>
      </div>
      <div style="display:flex;gap:13px;flex-wrap:wrap;align-items:center;padding:10px 18px;flex:1;">${cells}</div>
    </div>`;
  }).join('');
  const hero = v ? `<div class="boss-banner" style="position:relative;overflow:hidden;height:150px;background:${v.bg};">
      ${bossGlowHtml(v)}
      ${bossImgHtml(v, 230)}

    SS_ICON_INFO_STYLES.forEach(s => {

      btn.innerHTML = `<div style="font-size:11px;font-weight:700;margin-bottom:2px;">${s.name}</div><div style="font-size:9px;opacity:0.5;">${s.desc}</div>`;
      btn.addEventListener('click', () => {

    const toolbar = overlay.querySelector('.ss-toolbar');

function formatAbilityName(name) {
  // "Whirling Corruption P2 1" → "Whirling Corruption (P2) 1"
  const w = name.match(/^(.+) P([23]) (\d+)$/);
  if (w) return `${w[1]} (P${w[2]}) ${w[3]}`;
  // Reformat "Ball Lightning P1-2" based on current style
  const m = name.match(/^Ball Lightning-(P[23]) \((\d+)\)$/);
  if (!m) return name;
  const phase = m[1], cast = m[2];
  if (blLabelStyle === 'prefix') return `${phase}: Ball Lightning ${cast}`;
  return `Ball Lightning (${phase}) · ${cast}`;
}

// Spell icon URL from Blizzard CDN via wowhead
function spellIconUrl(spellId) {
  if (!spellId || spellId === 'nil') return null;
  return `https://wow.zamimg.com/images/wow/icons/medium/spell_${spellId}.jpg`;
}

// Build icon element html for a CD placement
function cdIconHtml(cd, p, size) {
  const spellId = CD_SPELL_IDS[cd.id];
  const offStr = p && p.offset != null && p.offset !== 0 ? `${p.offset > 0 ? '+' : ''}${p.offset}s` : '';
  const iconUrl = spellId && spellId !== 'nil'
    ? `https://wow.zamimg.com/images/wow/icons/medium/inv_misc_questionmark.jpg`
    : null;
  // We use a colored square as fallback since we can't fetch cross-origin icons
  return `<div class="sv-icon-wrap">
    <div class="sv-icon" style="width:${size}px;height:${size}px;border-radius:4px;border:1.5px solid ${cd.color};background:${cd.color}33;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.38)}px;font-weight:700;color:${cd.textColor};flex-shrink:0;">${cd.short}</div>
    ${offStr ? `<div class="sv-offset-badge">${offStr}</div>` : ''}
  </div>`;
}

function getSummaryRows() {
  const boss = getBoss();
  const bossData = placedCDs[boss.id] || {};
  const rows = [];
  boss.sections.forEach((sec, si) => {
    sec.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${encodeURIComponent(ab.name)}`;
      const placements = bossData[rowKey];
      if (!placements || !placements.length) return;
      const sorted = [...placements].sort((a, b) => (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
      rows.push({ ab, sorted });
    });
  });
  return rows;
}

function renderSummary(el) {
  const boss = getBoss();
  const rows = getSummaryRows();

  // Toolbar
  const toolbar = '';

  if (!rows.length) {
    el.innerHTML = toolbar + `<div class="summary-empty">No cooldowns assigned for ${boss.name} yet.</div>`;
    wireToolbar(el);
    return;
  }

  let viewHtml = '';

  if (summaryView === 'table') {
    viewHtml = `<table class="sv-table"><thead><tr><th>Ability</th><th>Cooldowns</th></tr></thead><tbody>`;
    rows.forEach(({ ab, sorted }) => {
      const iconsHtml = sorted.map(p => {
        const cd = CD_POOL.find(c => c.id === p.cdId); if (!cd) return '';
        return cdIconHtml(cd, p, 28);
      }).join('');
      viewHtml += `<tr><td>${ab.name}</td><td><div class="sv-icons">${iconsHtml}</div></td></tr>`;
    });
    viewHtml += `</tbody></table>`;
  }

  else if (summaryView === 'cards') {
    viewHtml = `<div class="sv-cards">`;
    rows.forEach(({ ab, sorted }) => {
      const iconsHtml = sorted.map(p => {
        const cd = CD_POOL.find(c => c.id === p.cdId); if (!cd) return '';
        return cdIconHtml(cd, p, 32);
      }).join('');
      viewHtml += `<div class="sv-card"><div class="sv-card-title">${ab.name}</div><div class="sv-card-icons">${iconsHtml}</div></div>`;
    });
    viewHtml += `</div>`;
  }

  else if (summaryView === 'compact') {
    viewHtml = `<div class="sv-compact">`;

    rows.forEach(({ ab, sorted }) => {
      const abTime = formatTime(ab.time);

      if (offsetStyle === 'badge') {
        // Badge below icon
        const iconsHtml = sorted.map(p => {
          const cd = CD_POOL.find(c => c.id === p.cdId); if (!cd) return '';
          const off = p.offset != null && p.offset !== 0 ? `${p.offset > 0 ? '+' : ''}${p.offset}s` : '';
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <div class="sv-compact-icon" style="border-color:${cd.color};background:${cd.color}33;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${cd.textColor};">${cd.short}</div>
            ${off ? `<span style="font-size:9px;color:var(--text3);font-weight:500;">${off}</span>` : '<span style="font-size:9px;opacity:0;">·</span>'}
          </div>`;
        }).join('');
        viewHtml += `<div class="sv-compact-row" style="align-items:flex-start;padding:6px 0;"><div class="sv-compact-label" style="padding-top:4px;">${formatAbilityName(ab.name)}<span style="font-size:12px;font-weight:400;color:var(--text3);margin-left:8px;">${abTime}</span></div><div class="sv-compact-icons">${iconsHtml}</div></div>`;

      } else if (offsetStyle === 'tooltip') {
        const iconsHtml = sorted.map(p => {
          const cd = CD_POOL.find(c => c.id === p.cdId); if (!cd) return '';
          return `<div class="sv-compact-icon" style="border-color:${cd.color};background:${cd.color}33;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${cd.textColor};">${cd.short}</div>`;
        }).join('');
        viewHtml += `<div class="sv-compact-row"><div class="sv-compact-label">${formatAbilityName(ab.name)}<span style="font-size:12px;font-weight:400;color:var(--text3);margin-left:8px;">${abTime}</span></div><div class="sv-compact-icons" style="align-items:flex-start;">${iconsHtml}</div></div>`;

      } else if (offsetStyle === 'column') {
        // Separate offset column
        const iconsHtml = sorted.map(p => {
          const cd = CD_POOL.find(c => c.id === p.cdId); if (!cd) return '';
          return `<div class="sv-compact-icon" style="border-color:${cd.color};background:${cd.color}33;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${cd.textColor};">${cd.short}</div>`;
        }).join('');
        const offsetsHtml = sorted.map(p => {
          const cd = CD_POOL.find(c => c.id === p.cdId); if (!cd) return '';
          const off = p.offset != null && p.offset !== 0 ? `${p.offset > 0 ? '+' : ''}${p.offset}s` : '—';
          return `<span style="font-size:10px;color:${p.offset != null && p.offset !== 0 ? cd.textColor : 'var(--text3)'};min-width:40px;text-align:center;">${off}</span>`;
        }).join('');
        viewHtml += `<div class="sv-compact-row"><div class="sv-compact-label">${formatAbilityName(ab.name)}<span style="font-size:12px;font-weight:400;color:var(--text3);margin-left:8px;">${abTime}</span></div><div class="sv-compact-icons" style="flex-direction:column;gap:2px;"><div style="display:flex;gap:6px;">${iconsHtml}</div><div style="display:flex;gap:6px;">${offsetsHtml}</div></div></div>`;
      }
    });
    viewHtml += `</div>`;
  }

  el.innerHTML = toolbar + viewHtml;
  wireToolbar(el);
}

// ---- Sheet Preview ----
function getPlayerName(who) {
  const p = DEFAULT_ROSTER.find(r => r.who === who);
  return p ? p.name : who;
}

function getPlayerColor(who) {
  const p = DEFAULT_ROSTER.find(r => r.who === who);
  return p ? p.color : '#d8c8b0';
}

function renderSheetPreview(el) {
  const boss = getBoss();
  const bossData = placedCDs[boss.id] || {};

  // Build rows in section/ability order
  const rows = [];
  boss.sections.forEach((sec, si) => {
    sec.abilities.forEach((ab, ai) => {
      const rowKey = `${si}-${encodeURIComponent(ab.name)}`;
      const placements = bossData[rowKey];
      if (!placements || !placements.length) return;
      const castNum = getCastNumber(ab.name);
      const sorted = [...placements].sort((a, b) => ab.hpAssign ? (ab.hpAscend ? (a.hpPct ?? 1) - (b.hpPct ?? 1) : (b.hpPct ?? 40) - (a.hpPct ?? 40)) : (a.cell ?? getCellIndex(a.time)) - (b.cell ?? getCellIndex(b.time)));
      sorted.forEach(p => {
        const cd = CD_POOL.find(c => c.id === p.cdId);
        if (!cd) return;
        const who = p.cdId === 'custom' ? (p.customWho || 'ALL') : cd.who;
        const playerName = getPlayerName(who);
        const playerColor = getPlayerColor(who);
        const offset = ab.hpAssign ? (ab.hpOffset != null ? ab.hpOffset : 1) : (p.offset != null ? p.offset : 0);
        const cdName = p.cdId === 'custom' ? 'Custom Spell Assignment' : cd.name;
        const tts = p.cdId === 'custom' && p.customTts ? p.customTts : (p.cdId === 'personals' ? 'Personals' : '');
        const displayName = p.cdId === 'custom' && p.customName ? p.customName : (p.cdId === 'personals' ? 'Personals' : '');
        const customIcon = p.cdId === 'personals' ? '134951' : '';
        const _rowHpDef = ab.hpAscend ? 1 : (ab.hpMax || 40);
        const _rowCastNum = ab.hpAssign ? (p.hpPct != null ? p.hpPct : _rowHpDef) : castNum;
        rows.push({ ab, castNum: _rowCastNum, who, playerName, playerColor, offset, cd, cdName, tts, displayName, customIcon });
      });
    });
  });

  if (!rows.length) {
    el.innerHTML = '<div class="summary-empty">No cooldowns assigned for ' + boss.name + ' yet.</div>';
    return;
  }

  let html = `<table class="sp-table">
    <thead><tr>
      <th>#</th>
      <th>Boss / Spell</th>
      <th>Count</th>
      <th>Delay</th>
      <th>PlayerKey</th>
      <th>Player Name</th>
      <th>Cooldown Spell</th>
      <th>Override TTS</th>
      <th>Custom Name</th>
      <th>Custom Icon</th>
    </tr></thead><tbody>`;

  rows.forEach((r, i) => {
    const delayColor = r.offset < 0 ? '#ff8888' : r.offset > 0 ? '#88ff88' : '#8a7060';
    html += `<tr>
      <td style="color:#5a4838;">${i + 1}</td>
      <td>${formatAbilityName(r.ab.name)}</td>
      <td style="color:#d8c8b0;">${r.castNum}</td>
      <td style="color:${delayColor};font-weight:600;">${r.offset}</td>
      <td class="sp-who" style="color:${r.playerColor};">${r.who}</td>
      <td style="color:${r.playerColor};">${r.playerName}</td>
      <td><div class="sp-cd-name"><div class="sp-cd-dot" style="background:${r.cd.color};"></div>${r.cdName}</div></td>
      <td style="color:#c87020;">${r.tts || ''}</td>
      <td style="color:#c87020;">${r.displayName || ''}</td>
      <td style="color:#8a7060;">${r.customIcon || ''}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

function showImportFojiModal() {

    <textarea id="importFojiInput" style="width:100%;height:160px;background:#141008;border:1px solid #4a3828;color:#d8c8b0;padding:10px;border-radius:6px;font-size:11px;font-family:monospace;resize:vertical;" placeholder="Paste Foji string here..."></textarea>
    <div id="importFojiStatus" style="font-size:11px;color:#c84848;min-height:16px;margin-top:6px;"></div>
    <div class="modal-footer" style="margin-top:12px;display:flex;gap:8px;">
      <button id="importFojiConfirm" class="btn copy-btn">Import</button>
      <button id="importFojiClose" class="btn">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#importFojiClose').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#importFojiConfirm').addEventListener('click', () => {
    const raw = overlay.querySelector('#importFojiInput').value.trim();
    const status = overlay.querySelector('#importFojiStatus');
    if (!raw) { status.textContent = 'Please paste a Foji string.'; return; }
    try {
      const count = parseFojiImport(raw);
      status.style.color = '#48a868';
      status.textContent = `Imported ${count} assignment${count !== 1 ? 's' : ''} successfully.`;
      renderTimeline();
      buildPalette();
      isDirty = true;
      if (typeof scheduleAutoSave === 'function') scheduleAutoSave();
      setTimeout(() => overlay.remove(), 800);
    } catch(e) {
      status.style.color = '#c84848';
      status.textContent = 'Import failed: ' + e.message;
    }
  });
}

function parseFojiImport(raw) {
  const lines = raw.split('*').map(l => l.trim()).filter(Boolean);
  if (!lines.length) throw new Error('No entries found.');
  let count = 0;

  // Build reverse lookup: Foji key → { boss, si, ai, ab }
  const keyMap = {};
  BOSSES.forEach(boss => {
    boss.sections.forEach((sec, si) => {
      sec.abilities.forEach((ab, ai) => {
        const key = getBossAbilityKey(boss, `${si}-${ai}`, ab.name);
        if (!keyMap[key]) keyMap[key] = [];
        keyMap[key].push({ boss, si, ai, ab });
      });
    });
  });
  // Also add FOJI_ABILITY_KEYS reverse lookup for custom entries
  Object.entries(FOJI_ABILITY_KEYS).forEach(([name, key]) => {
    // already handled above via getBossAbilityKey
  });

  // Reverse CD lookup: spellId → cdId
  const spellToCd = {};
  Object.entries(CD_SPELL_IDS).forEach(([cdId, spellId]) => {
    if (spellId && spellId !== 'nil') spellToCd[spellId] = cdId;
  });
  // Custom abilities
  Object.entries(CUSTOM_ABILITY_SPELL_IDS).forEach(([name, spellId]) => {
    if (spellId) spellToCd['custom:' + spellId] = name;
  });

  // Phase 1: parse every line into a resolved placement (don't touch state yet)
  const parsed = [];   // { bossId, rowKey, cdId, placement }
  lines.forEach(line => {
    const parts = line.split('/');
    if (parts.length < 9) return;
    const [bossAbKey, castNumStr, who, offsetStr, spellId, , tts, displayText] = parts;
    const castNum = parseInt(castNumStr) || 1;
    const offset = parseInt(offsetStr) || 0;

    // Find matching rows
    const matches = keyMap[bossAbKey] || [];
    const rowMatch = matches.find(m => getCastNumber(m.ab.name) === castNum) || matches[0];
    if (!rowMatch) return;

    const { boss, si } = rowMatch;
    // Row keys everywhere else in the app are si-<encoded ability name>, NOT si-<index>.
    const rowKey = `${si}-${encodeURIComponent(rowMatch.ab.name)}`;

    // Find cdId from spellId
    let cdId = spellId && spellId !== 'nil' ? spellToCd[spellId] : null;

    // Special cases
    if (spellId === 'nil' && tts === 'Personals') cdId = 'personals';
    if (spellId === 'nil' && tts === 'Use Personals') cdId = 'personals';
    if (spellId === 'nil' && tts === 'Healthstone') cdId = 'hstone';
    if (spellId === '114203') cdId = 'dem';

    if (!cdId) {
      // Try matching by WHO for custom assign
      cdId = 'custom';
    }

    const cd = CD_POOL.find(c => c.id === cdId);
    if (!cd) return;

    const placement = {
      cdId,
      time: rowMatch.ab.time,
      offset: offset || null,
      cell: getCellIndex(rowMatch.ab.time),
      id: Date.now() + Math.random(),
    };

    // For custom, set meta
    if (cdId === 'custom') {
      placement.customWho = who;
      placement.customTts = tts !== 'nil' ? tts : '';
      placement.customName = displayText !== 'nil' ? displayText : '';
      // Try to find matching custom ability by spell ID
      const customAbEntry = Object.entries(CUSTOM_ABILITY_SPELL_IDS).find(([, sid]) => sid === spellId);
      if (customAbEntry) placement.customAbility = customAbEntry[0];
    }

    parsed.push({ bossId: boss.id, rowKey, cdId, placement });
  });

  if (!parsed.length) throw new Error('No recognizable assignments in that string.');

  // Phase 2: the import replaces the plan for every boss it mentions —
  // clear those bosses' timelines first so stale placements don't linger.
  const bossIds = new Set(parsed.map(x => x.bossId));
  bossIds.forEach(bid => { placedCDs[bid] = {}; });

  // Make every imported CD visible: activate it in Manage CDs and clear any
  // per-boss disable, otherwise its placements would render invisible.
  parsed.forEach(({ bossId, cdId }) => {
    activeSetIds.add(cdId);
    if (bossDisabledIds[bossId]) bossDisabledIds[bossId].delete(cdId);
  });

  // Phase 3: place everything (skip duplicate non-custom CDs on the same row)
  parsed.forEach(({ bossId, rowKey, cdId, placement }) => {
    if (!placedCDs[bossId][rowKey]) placedCDs[bossId][rowKey] = [];
    if (cdId !== 'custom' && placedCDs[bossId][rowKey].some(p => p.cdId === cdId)) return;
    placedCDs[bossId][rowKey].push(placement);
    count++;
  });

  return count;
}

// Migrate old index-based rowKeys (e.g. "0-1") to ability-name-based (e.g. "0-Swelling%20Corruption%201")
function migrateRowKeys(cds) {
  const migrated = {};
  Object.entries(cds).forEach(([bossId, bossData]) => {
    const boss = BOSSES.find(b => b.id === bossId);
    if (!boss) { migrated[bossId] = bossData; return; }
    migrated[bossId] = {};
    Object.entries(bossData).forEach(([rowKey, placements]) => {
      const parts = rowKey.split('-');
      const si = Number(parts[0]);
      const aiOrName = parts.slice(1).join('-');
      // Check if it's the old format (numeric ability index)
      const ai = Number(aiOrName);
      if (!isNaN(ai) && boss.sections[si]?.abilities[ai]) {
        // Old format — convert to ability name
        const abilityName = boss.sections[si].abilities[ai].name;
        const newRowKey = `${si}-${encodeURIComponent(abilityName)}`;
        migrated[bossId][newRowKey] = placements;
      } else {
        // Already new format
        migrated[bossId][rowKey] = placements;
      }
    });
  });
  return migrated;
}

function fbApplyData(data) {
  if (!data) return false;
  if (data.placedCDs) Object.assign(placedCDs, migrateRowKeys(data.placedCDs));
  if (data.bossReady) Object.assign(bossReady, data.bossReady);
  if (data.bossNotes) Object.assign(bossNotes, data.bossNotes);
  if (data.activeSetIds) {
    const coreIds = CD_POOL.filter(c => c.core).map(c => c.id);
    activeSetIds = new Set([...data.activeSetIds, ...coreIds]);
  }
  if (data.cdWho) CD_POOL.forEach(c => { if (data.cdWho[c.id]) c.who = data.cdWho[c.id]; });
  if (data.paletteOrder && !Array.isArray(data.paletteOrder)) Object.assign(paletteOrder, data.paletteOrder);
  if (data.fadeModeByBoss) Object.assign(fadeModeByBoss, data.fadeModeByBoss);
  if (data.activeRosterFills) activeRosterFills = data.activeRosterFills;
  if (data.bossDisabledIds) {
    bossDisabledIds = {};
    Object.entries(data.bossDisabledIds).forEach(([k, v]) => { bossDisabledIds[k] = new Set(v); });
  }
  return true;
}

  if (_fbRef) {

// ---- Bottom panel drag-to-expand (snap back on release) ----
(function() {
  const panel = document.getElementById('bottomPanel');
  const bar = document.getElementById('expandFullbar');
  if (!panel || !bar) return;
  const DEFAULT_H = 320;
  const COLLAPSED_H = 20; // just the bar itself
  const COLLAPSE_THRESHOLD = 60; // drag down this many px to collapse
  let dragStartY = null, dragStartH = null, isDragging = false;
  let isCollapsed = true;

  function setCollapsed(v) {
    isCollapsed = v;
    panel.style.transition = 'height 0.2s ease';
    panel.style.height = (v ? COLLAPSED_H : DEFAULT_H) + 'px';
    panel.style.minHeight = (v ? COLLAPSED_H : 110) + 'px';
    // Hide the content when collapsed — otherwise its padding keeps a minimum
    // height that pushes the bar below the panel's clipped edge.
    const content = document.getElementById('bottomContent');
    if (content) content.style.display = v ? 'none' : 'block';
    bar.textContent = (v ? '▲ ' : '▼ ') + 'Sheet Preview';
  }

  bar.style.cursor = 'ns-resize';
  setCollapsed(true); // start collapsed

  bar.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragStartY = e.clientY;
    dragStartH = panel.offsetHeight;
    isDragging = false;
    panel.style.transition = 'none';

    function onMove(ev) {
      const dy = dragStartY - ev.clientY; // drag up = positive, drag down = negative
      if (Math.abs(dy) > 4) isDragging = true;
      if (!isDragging) return;
      if (!isCollapsed) {
        const newH = Math.max(COLLAPSED_H, Math.min(window.innerHeight * 0.9, dragStartH + dy));
        panel.style.height = newH + 'px';
      }
    }

    function onUp(ev) {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (!isDragging) {
        // Click — toggle collapse
        setCollapsed(!isCollapsed);
        return;
      }
      const dy = dragStartY - ev.clientY;
      if (!isCollapsed && dy < -COLLAPSE_THRESHOLD) {
        // Dragged down far enough — collapse
        setCollapsed(true);
      } else if (!isCollapsed) {
        // Snap back to default
        panel.style.transition = 'height 0.2s ease';
        panel.style.height = DEFAULT_H + 'px';
      }
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

async function wclGenVerifier() {
  var arr = new Uint8Array(32); crypto.getRandomValues(arr);
  return btoa(String.fromCharCode.apply(null, arr)).replace(/[+/=]/g, function(c){return{'+':'-','/':'_','=':''}[c];});
}
async function wclGenChallenge(v) {
  var hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode.apply(null, new Uint8Array(hash))).replace(/[+/=]/g, function(c){return{'+':'-','/':'_','=':''}[c];});
}
function wclGetToken() { return localStorage.getItem(WCL_TOKEN_KEY); }
function wclIsAuthed() {
  var exp = localStorage.getItem(WCL_TOKEN_EXP_KEY);
  return !!wclGetToken() && !!exp && Date.now() < parseInt(exp);
}
async function wclLogin() {
  var v = await wclGenVerifier(), ch = await wclGenChallenge(v);
  var state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('wcl_v', v); sessionStorage.setItem('wcl_s', state);
  var p = new URLSearchParams({client_id:WCL_CLIENT_ID,redirect_uri:WCL_REDIRECT,response_type:'code',code_challenge:ch,code_challenge_method:'S256',state:state,scope:'view-user-profile'});
  window.location.href = WCL_AUTH_URL + '?' + p.toString();
}
async function wclHandleCallback() {
  var p = new URLSearchParams(window.location.search);
  var code = p.get('code'), state = p.get('state');
  if (!code || state !== sessionStorage.getItem('wcl_s')) return false;
  var v = sessionStorage.getItem('wcl_v');
  var body = new URLSearchParams({grant_type:'authorization_code',client_id:WCL_CLIENT_ID,redirect_uri:WCL_REDIRECT,code:code,code_verifier:v});
  try {
    var res = await fetch(WCL_TOKEN_URL, {method:'POST',body:body,headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    var data = await res.json();
    if (data.access_token) {
      localStorage.setItem(WCL_TOKEN_KEY, data.access_token);
      localStorage.setItem(WCL_TOKEN_EXP_KEY, String(Date.now() + (data.expires_in||3600)*1000));
      sessionStorage.removeItem('wcl_v'); sessionStorage.removeItem('wcl_s');
      var returnTo = sessionStorage.getItem('wcl_return');
      sessionStorage.removeItem('wcl_return');

}

// ── Sync boss timeline from our guild's latest kill ──────────────────────────
async function wclFindLatestKill(bossName) {
  var d = await wclQuery('{userData{currentUser{id guilds{id name}}}}', {});
  var cu = d && d.userData && d.userData.currentUser;
  if (!cu) throw new Error('Could not read your WarcraftLogs profile.');
  // Search guild logs first, then the user's personal logs
  var sources = (cu.guilds || []).map(function(g){ return { arg: 'guildID', id: g.id }; });
  sources.push({ arg: 'userID', id: cu.id });
  var bn = bossName.toLowerCase();
  for (var si = 0; si < sources.length; si++) {
    var s = sources[si];
    var r;
    try {
      r = await wclQuery(
        'query($i:Int!){reportData{reports(' + s.arg + ':$i,limit:15){data{code fights(killType:Kills){id name startTime endTime}}}}}',
        {i: s.id}
      );
    } catch(e) { continue; }
    var reps = (r && r.reportData && r.reportData.reports && r.reportData.reports.data) || [];
    // Reports come newest first; match kills by boss name so zone/encounter-ID
    // differences can't hide them. Take the most recent matching kill.
    for (var ri = 0; ri < reps.length; ri++) {
      var fights = (reps[ri].fights || []).filter(function(f){
        var fn = (f.name || '').toLowerCase();
        return fn === bn || fn.indexOf(bn) !== -1 || bn.indexOf(fn) !== -1;
      });
      if (fights.length) return { code: reps[ri].code, fight: fights[fights.length-1] };
    }
  }
  return null;
}

async function wclFetchEnemyCasts(code, fight) {
  var abilityNames = {};
  var casts = [];
  var cursor = fight.startTime;
  var first = true;
  while (cursor != null) {
    var q = first
      ? 'query($c:String!,$f:Int!,$s:Float!,$e:Float!){reportData{report(code:$c){masterData{abilities{gameID name}} events(fightIDs:[$f],dataType:Casts,hostilityType:Enemies,startTime:$s,endTime:$e){data nextPageTimestamp}}}}'
      : 'query($c:String!,$f:Int!,$s:Float!,$e:Float!){reportData{report(code:$c){events(fightIDs:[$f],dataType:Casts,hostilityType:Enemies,startTime:$s,endTime:$e){data nextPageTimestamp}}}}';
    var d = await wclQuery(q, {c:code, f:fight.id, s:cursor, e:fight.endTime});
    var rep = d.reportData.report;
    if (first && rep.masterData) (rep.masterData.abilities||[]).forEach(function(a){ abilityNames[a.gameID] = a.name; });
    first = false;
    (rep.events.data||[]).forEach(function(ev){
      if (ev.type !== 'cast') return;
      casts.push({ name: abilityNames[ev.abilityGameID] || '', t: (ev.timestamp - fight.startTime)/1000 });
    });
    cursor = rep.events.nextPageTimestamp;
  }
  return casts;
}

// Rebuild the boss's ability rows from actual cast times. Rows whose base name
// matches a logged enemy cast get replaced with one row per cast (so counts
// shrink or grow to match the kill); unmatched rows are left untouched.
function rebuildBossFromCasts(boss, casts, killDurSec) {
  var sec = boss.sections[0];
  var castByName = {};
  casts.forEach(function(c){
    if (!c.name) return;
    var k = c.name.toLowerCase();
    (castByName[k] = castByName[k] || []).push(c.t);
  });

  var keepRows = [];
  var groups = {};
  sec.abilities.forEach(function(ab){
    if (ab.encounterStart) { keepRows.push(Object.assign({}, ab)); return; }
    var base = ab.name.replace(/\s+\d+$/, '');
    var key = base.toLowerCase();
    if (key === 'ds set') key = '__dsset__';   // Thok screech sets
    if (!groups[key]) groups[key] = { base: base, template: ab, rows: [] };
    groups[key].rows.push(ab);
  });

  var rebuilt = [];
  var syncedCount = 0;
  Object.keys(groups).forEach(function(key){
    var g = groups[key];
    var times = null;
    if (key === '__dsset__') {
      // A gap of >60s between Deafening Screech casts starts a new set
      var ds = (castByName['deafening screech'] || []).slice().sort(function(a,b){return a-b;});
      if (ds.length) {
        times = [ds[0]];
        for (var i=1; i<ds.length; i++) if (ds[i]-ds[i-1] > 60) times.push(ds[i]);
      }
    } else {
      times = castByName[g.base.toLowerCase()] || null;
      if (times) times = times.slice().sort(function(a,b){return a-b;});
    }
    if (!times || !times.length) {
      g.rows.forEach(function(ab){ rebuilt.push(Object.assign({}, ab)); });
      return;
    }
    syncedCount++;
    times.forEach(function(t, i){
      var row = Object.assign({}, g.template);
      row.name = times.length > 1 ? g.base + ' ' + (i+1) : g.base;
      row.time = Math.round(t);
      if (key === '__dsset__' && row.hpLabel) row.hpLabel = row.name + ' — screech count';
      rebuilt.push(row);
    });
  });

  rebuilt.sort(function(a,b){ return a.time - b.time; });
  sec.abilities = keepRows.concat(rebuilt);
  var lastT = rebuilt.length ? rebuilt[rebuilt.length-1].time : 0;
  boss.duration = Math.max(Math.ceil(killDurSec/30)*30, Math.ceil((lastT+30)/30)*30);
  return syncedCount;
}

async function syncBossFromLogs() {
  var btn = document.getElementById('syncKillBtn');
  var boss = getBoss();
  if (!wclIsAuthed()) { alert('Log in with WarcraftLogs first (open the WCL tab and log in), then try again.'); return; }
  btn.disabled = true;
  var origHtml = btn.innerHTML;
  try {
    btn.textContent = 'Finding kill…';
    var kill = await wclFindLatestKill(boss.name);
    if (!kill) throw new Error('No kill of '+boss.name+' found in your guild\'s recent logs.');
    btn.textContent = 'Reading casts…';
    var casts = await wclFetchEnemyCasts(kill.code, kill.fight);
    var killDur = (kill.fight.endTime - kill.fight.startTime)/1000;
    var n = rebuildBossFromCasts(boss, casts, killDur);
    saveBossAbilityOverride(boss);
    refreshBossSelectLabels();
    renderTimeline();
    var mins = Math.floor(killDur/60), secs = Math.round(killDur%60);
    alert('Synced '+boss.name+' to your latest kill ('+mins+':'+String(secs).padStart(2,'0')+').\n'+n+' abilit'+(n===1?'y':'ies')+' retimed from the log.');
  } catch(e) {
    alert('Sync failed: ' + e.message);
    console.error(e);
  }
  btn.innerHTML = origHtml;
  btn.disabled = false;
}

function renderWclDisplay(container, logsData, logCount, bossName, avgDuration, spellMap, mode, logsHpsData) {
  if (!spellMap) spellMap = WCL_SPELLS;
  if (!mode) mode = 'raid';
  if (!logsData || !logsData.length) {
    container.innerHTML = '<div style="color:#5a4838;font-size:12px;padding:20px 0;">No data found.</div>';
    return;
  }

  var currentBossTimelineXs = []; // markers from BOSSES timeline, shared with buildHeatmapRow

  var CD_DURATIONS = {
    62618:10, 31821:8, 86150:8, 105809:20, 31884:20,
    108280:10, 108281:10, 115213:3, 15286:30,
    76577:5, 97462:10, 114203:10,
    114049:15, 98008:6
  };

  // Collect all spell IDs across all logs
  var allSids = [];
  logsData.forEach(function(log) {
    Object.keys(log.casts).forEach(function(sid) {
      if (allSids.indexOf(+sid) < 0) allSids.push(+sid);
    });
  });
  var SPELL_ORDER = [62618,31821,86150,105809,31884,108280,108281,114049,98008,115213,15286,76577,97462,114203,
    33206,47585,498,108271,30823,45438,198158,104773,118038,871,5277,31224];
  allSids.sort(function(a,b) {
    var ai=SPELL_ORDER.indexOf(a), bi=SPELL_ORDER.indexOf(b);
    if(ai<0)ai=99; if(bi<0)bi=99; return ai-bi;
  });

  // Shared timeline width based on longest log
  var maxDuration = Math.max.apply(null, logsData.map(function(l){return l.duration;}));
  var W = Math.max(560, Math.ceil(maxDuration / 1000 / 15) * 32);
  var sharedPps = W / (maxDuration / 1000);
  var tickEvery = 15;
  var _wclBox = document.getElementById('wclModalBox');
  if (_wclBox) { var _needed = W + 66 + 60; if (_needed > 700) _wclBox.style.width = Math.min(_needed, window.innerWidth * 0.96) + 'px'; }
  var ROW_H = 32;
  var LABEL_W = 66;
  var BUCKET_MS = 5000;
  var numBuckets = Math.ceil(maxDuration / BUCKET_MS);

  // View mode toggle
  var viewMode = 'wave';

  function fmtT(ms) {
    var s = Math.round(ms/1000);
    return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
  }
  function fmtS(s) {
    return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
  }

  function smartTick(durationMs, targetLabels) {
    var dSec = durationMs / 1000;
    var candidates = [10,15,20,30,45,60,90,120];
    for (var ci=0; ci<candidates.length; ci++) {
      if (Math.floor(dSec / candidates[ci]) <= targetLabels) return candidates[ci];
    }
    return 120;
  }

  function buildRuler() {
    var html = '<div style="display:flex;margin-bottom:4px;">';
    html += '<div style="width:'+LABEL_W+'px;flex-shrink:0;"></div>';
    html += '<div style="position:relative;width:'+W+'px;height:22px;">';
    var dSec = Math.ceil(maxDuration / 1000);
    for (var ts=0; ts<=dSec; ts+=15) {
      var tx = Math.round(ts * sharedPps);
      if (tx > W) break;
      var isMajor = (ts % 60 === 0);
      var isHalf  = (ts % 30 === 0);
      var tickH   = isMajor ? 8 : isHalf ? 5 : 4;
      var lineCol = isMajor ? '#6a5040' : isHalf ? '#c83a2066' : '#342818';
      var txtCol  = isMajor ? '#d8c8b0' : isHalf ? '#806050' : '#6e5a48';
      var txtSize = isMajor ? '10' : '9';
      var fontW   = isMajor ? '700' : '400';
      html += '<div style="position:absolute;left:'+tx+'px;bottom:0;width:1px;height:'+tickH+'px;background:'+lineCol+';transform:translateX(-50%);"></div>';
      html += '<span style="position:absolute;left:'+tx+'px;top:0;font-size:'+txtSize+'px;font-weight:'+fontW+';color:'+txtCol+';transform:translateX(-50%);white-space:nowrap;line-height:1;">'+fmtS(ts)+'</span>';
    }
    html += '</div></div>';
    return html;
  }


  // Collect all cast times per spell across all logs for heatmap
  var allCastsBySpell = {};
  logsData.forEach(function(log) {
    Object.keys(log.casts).forEach(function(sid) {
      if (!allCastsBySpell[sid]) allCastsBySpell[sid] = [];
      log.casts[sid].forEach(function(t){ allCastsBySpell[sid].push(t); });
    });
  });

  function buildHeatmapRow(sid, heatStyle) {
    var spell = spellMap[+sid]; if (!spell) return '';
    var times = allCastsBySpell[sid] || [];
    if (!times.length) return '';
    var buckets = new Array(numBuckets).fill(0);
    times.forEach(function(t){ var b=Math.floor(t/BUCKET_MS); if(b<numBuckets) buckets[b]++; });
    var maxB = Math.max.apply(null, buckets.concat([1]));
    var cellW = W / numBuckets;
    var color = spell.color;

    // Contrast helper: use cubic power so sparse vs dense is very obvious
    function intensity(count) { return Math.pow(count/maxB, 0.4); }
    function opacity(count) { var i=intensity(count); return (i*0.92+0.08).toFixed(3); }

    var html = '<div style="display:flex;align-items:center;margin-bottom:3px;">';
    html += '<div style="width:'+LABEL_W+'px;flex-shrink:0;font-size:9px;font-weight:700;color:'+color+';text-align:right;padding-right:7px;white-space:nowrap;">'+spell.short+'</div>';

    var H = 34; // row height for most styles

    if (heatStyle==='bars') {
      // 1. Vertical bars — height encodes frequency
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var barH = Math.max(2, Math.round(intensity(buckets[bi])*H));
        html += '<div style="position:absolute;left:'+(bi*cellW).toFixed(1)+'px;bottom:0;width:'+Math.ceil(cellW)+'px;height:'+barH+'px;background:'+color+';"></div>';
      }

    } else if (heatStyle==='opacity') {
      // 2. Full-height opacity blocks
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        html += '<div style="position:absolute;left:'+(bi*cellW).toFixed(1)+'px;top:0;width:'+Math.ceil(cellW+0.5)+'px;height:100%;background:'+color+';opacity:'+opacity(buckets[bi])+';"></div>';
      }

    } else if (heatStyle==='dots') {
      // 3. Dot strip — each cast is a circle
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      times.forEach(function(t) {
        var x = Math.round((t/1000)*sharedPps);
        html += '<div style="position:absolute;left:'+x+'px;top:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:'+color+';opacity:0.65;"></div>';
      });

    } else if (heatStyle==='gradient') {
      // 4. Radial glow blobs
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var cx = bi*cellW + cellW/2;
        var gw = Math.max(cellW*4, 16);
        html += '<div style="position:absolute;left:'+(cx-gw/2).toFixed(1)+'px;top:0;width:'+gw.toFixed(1)+'px;height:100%;background:radial-gradient(ellipse at center,'+color+' 0%,transparent 70%);opacity:'+opacity(buckets[bi])+';"></div>';
      }

    } else if (heatStyle==='spike') {
      // 5. Center-spike: thin tall spike, height = frequency, very sharp contrast
      H = 40;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var spikeH = Math.max(3, Math.round(intensity(buckets[bi])*H));
        var top2 = Math.round((H-spikeH)/2);
        html += '<div style="position:absolute;left:'+(bi*cellW+cellW/2-1).toFixed(1)+'px;top:'+top2+'px;width:2px;height:'+spikeH+'px;background:'+color+';border-radius:1px;"></div>';
      }

    } else if (heatStyle==='wave') {
      // 6. Wave/area chart — SVG polyline
      H = 40;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      var pts = '0,'+H;
      for (var bi=0; bi<numBuckets; bi++) {
        var x2 = (bi*cellW+cellW/2).toFixed(1);
        var y2 = (H - Math.pow(buckets[bi]/maxB, 0.25)*H*0.92).toFixed(1);
        pts += ' '+x2+','+y2;
      }
      pts += ' '+W+','+H;
      html += '<svg width="'+W+'" height="'+H+'" style="position:absolute;top:0;left:0;"><polygon points="'+pts+'" fill="'+color+'" fill-opacity="0.5"/><polyline points="'+pts.replace('0,'+H+' ','').replace(' '+W+','+H,'')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-opacity="0.9"/></svg>';

    } else if (heatStyle==='heatgrid') {
      // 7. Multi-row grid — each row = one log, column = time bucket, filled if cast happened
      var rowH = Math.max(2, Math.floor(H / logsData.length));
      H = rowH * logsData.length;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      logsData.forEach(function(log, li) {
        var casts = log.casts[+sid] || [];
        casts.forEach(function(t) {
          var x3 = Math.round((t/1000)*sharedPps);
          html += '<div style="position:absolute;left:'+x3+'px;top:'+(li*rowH)+'px;width:3px;height:'+(rowH)+'px;background:'+color+';opacity:0.8;transform:translateX(-50%);"></div>';
        });
      });

    } else if (heatStyle==='ribbon') {
      // 8. Ribbon — horizontal band that thickens at common times
      H = 20;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var rh = Math.max(2, Math.round(intensity(buckets[bi])*(H)));
        var ry = Math.round((H-rh)/2);
        html += '<div style="position:absolute;left:'+(bi*cellW).toFixed(1)+'px;top:'+ry+'px;width:'+Math.ceil(cellW+0.5)+'px;height:'+rh+'px;background:'+color+';opacity:'+opacity(buckets[bi])+';"></div>';
      }

    } else if (heatStyle==='colortemp') {
      // 9. Color temperature — sparse=dark blue, dense=bright yellow/white
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var v = intensity(buckets[bi]);
        // Interpolate: 0=deep purple → 0.5=orange → 1.0=white
        var r,g,b2;
        if (v < 0.5) { var t2=v/0.5; r=Math.round(60+t2*195); g=Math.round(0+t2*60); b2=Math.round(120-t2*120); }
        else { var t2=(v-0.5)/0.5; r=Math.round(255); g=Math.round(60+t2*195); b2=Math.round(t2*255); }
        var col = 'rgb('+r+','+g+','+b2+')';
        html += '<div style="position:absolute;left:'+(bi*cellW).toFixed(1)+'px;top:0;width:'+Math.ceil(cellW+0.5)+'px;height:100%;background:'+col+';"></div>';
      }

    } else if (heatStyle==='outline') {
      // 10. Outline only — border box height by frequency, unfilled
      H = 40;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var bh = Math.max(3, Math.round(intensity(buckets[bi])*H));
        var bt2 = Math.round((H-bh)/2);
        html += '<div style="position:absolute;left:'+(bi*cellW).toFixed(1)+'px;top:'+bt2+'px;width:'+Math.ceil(cellW)+'px;height:'+bh+'px;border:1px solid '+color+';opacity:'+opacity(buckets[bi])+';box-sizing:border-box;"></div>';
      }

    } else if (heatStyle==='scatter') {
      // 11. Scatter — dots sized by count
      H = 40;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var sz = Math.max(3, Math.round(intensity(buckets[bi])*16));
        var cx2 = (bi*cellW+cellW/2).toFixed(1);
        html += '<div style="position:absolute;left:'+cx2+'px;top:50%;transform:translate(-50%,-50%);width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+color+';opacity:'+opacity(buckets[bi])+';"></div>';
      }

    } else if (heatStyle==='stacked') {
      // 12. Stacked dots — multiple dots stacked vertically, one per cast
      var dotSz = 4, dotGap = 1;
      var maxStack = logsData.length;
      H = Math.max(20, maxStack*(dotSz+dotGap));
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        for (var di=0; di<buckets[bi]; di++) {
          var dy = H - (di+1)*(dotSz+dotGap);
          html += '<div style="position:absolute;left:'+(bi*cellW+cellW/2-dotSz/2).toFixed(1)+'px;top:'+dy+'px;width:'+dotSz+'px;height:'+dotSz+'px;border-radius:50%;background:'+color+';opacity:0.75;"></div>';
        }
      }

    } else if (heatStyle==='piano') {
      // 13. Piano roll — thin vertical ticks on a baseline, height = count
      H = 32;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      html += '<div style="position:absolute;bottom:0;left:0;right:0;height:1px;background:#2a2218;"></div>';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var ph = Math.max(2, Math.round(intensity(buckets[bi])*(H-2)));
        html += '<div style="position:absolute;left:'+(bi*cellW+cellW/2-1).toFixed(1)+'px;bottom:1px;width:2px;height:'+ph+'px;background:'+color+';opacity:'+opacity(buckets[bi])+';border-radius:1px 1px 0 0;"></div>';
      }

    } else if (heatStyle==='mirror') {
      // 14. Mirror bars — bars grow from center outward symmetrically
      H = 32;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      html += '<div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#1a1c28;"></div>';
      for (var bi=0; bi<numBuckets; bi++) {
        if (!buckets[bi]) continue;
        var mh = Math.max(2, Math.round(intensity(buckets[bi])*(H/2)));
        html += '<div style="position:absolute;left:'+(bi*cellW).toFixed(1)+'px;top:'+(H/2-mh)+'px;width:'+Math.ceil(cellW)+'px;height:'+(mh*2)+'px;background:'+color+';opacity:'+opacity(buckets[bi])+';"></div>';
      }

    } else {
      // 15. Carpet — tiny dense cells, full width coverage, alpha only
      H = 16;
      html += '<div style="position:relative;width:'+W+'px;height:'+H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
      for (var bi=0; bi<numBuckets; bi++) {
        var op2 = buckets[bi] ? Math.pow(buckets[bi]/maxB,0.5)*0.95 : 0;
        if (op2 < 0.02) continue;
        html += '<div style="position:absolute;left:'+(bi*cellW).toFixed(1)+'px;top:0;width:'+Math.ceil(cellW+0.5)+'px;height:100%;background:'+color+';opacity:'+op2.toFixed(3)+';"></div>';
      }
    }

    // Shared gridlines matching ruler tick positions
    var rTick2 = smartTick(maxDuration, 15);
    for (var gti=1; gti*rTick2*1000<=maxDuration; gti++) {
      html += '<div style="position:absolute;left:'+Math.round(gti*rTick2*sharedPps)+'px;top:0;bottom:0;width:1px;background:rgba(80,100,160,0.18);pointer-events:none;"></div>';
    }
    // Timeline ability markers from BOSSES array (manually-set timings)
    currentBossTimelineXs.forEach(function(ev) {
      html += '<div style="position:absolute;left:'+ev.x+'px;top:0;bottom:0;width:7px;background:'+ev.color+';opacity:0.1;transform:translateX(-50%);pointer-events:none;"></div>';
      html += '<div title="'+ev.label+'" style="position:absolute;left:'+ev.x+'px;top:0;bottom:0;width:1px;background:'+ev.color+';opacity:0.55;transform:translateX(-50%);pointer-events:none;"></div>';
    });
    html += '</div></div>';
    return html;
  }

  function buildTimelineRow(sid, log) {
    var spell = spellMap[+sid]; if (!spell) return '';
    var times = log.casts[+sid] || [];
    var active = times.length > 0;
    var color = spell.color;
    var cdDurPx = ((CD_DURATIONS[+sid]||10)*sharedPps);
    var html = '<div style="display:flex;align-items:center;margin-bottom:2px;">';
    html += '<div style="width:'+LABEL_W+'px;flex-shrink:0;font-size:9px;font-weight:700;color:'+(active?color:'#2a2218')+';text-align:right;padding-right:7px;white-space:nowrap;">'+spell.short+'</div>';
    html += '<div style="position:relative;width:'+W+'px;height:'+ROW_H+'px;background:#05060a;border-radius:2px;overflow:hidden;">';
    for (var ti=1; ti*tickEvery*1000<=maxDuration; ti++) {
      html += '<div style="position:absolute;left:'+Math.round(ti*tickEvery*sharedPps)+'px;top:0;bottom:0;border-left:1px solid #0e0c0a;pointer-events:none;"></div>';
    }
    times.forEach(function(t) {
      var x = Math.round((t/1000)*sharedPps);
      html += '<div style="position:absolute;left:'+x+'px;top:0;width:'+Math.round(cdDurPx)+'px;height:100%;background:'+color+';opacity:0.12;"></div>';
      html += '<div style="position:absolute;left:'+x+'px;top:3px;bottom:3px;width:5px;background:'+color+';border-radius:2px;"></div>';
      html += '<div style="position:absolute;left:'+(x+7)+'px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:'+color+';white-space:nowrap;text-shadow:0 1px 3px #000;">'+fmtT(t)+'</div>';
    });
    html += '</div></div>';
    return html;
  }

  function renderAll() {
    var avgSec = Math.round(avgDuration/1000);
    var avgStr = Math.floor(avgSec/60)+':'+(avgSec%60<10?'0':'')+(avgSec%60);

    // Tally role counts across all logs
    var tankCounts = {}, healCounts = {}, dpsCounts = {};
    logsData.forEach(function(log) {
      var r = log.roles;
      if (!r) return;
      tankCounts[r.tanks]  = (tankCounts[r.tanks]  || 0) + 1;
      healCounts[r.healers] = (healCounts[r.healers] || 0) + 1;
      dpsCounts[r.dps]     = (dpsCounts[r.dps]     || 0) + 1;
    });
    function modeOf(obj) {
      var best = null, bestN = 0;
      Object.keys(obj).forEach(function(k) { if (obj[k] > bestN) { bestN = obj[k]; best = k; } });
      return best !== null ? best : '?';
    }
    var logsWithRoles = logsData.filter(function(l){ return l.roles && (l.roles.tanks || l.roles.healers); }).length;
    var roleStr = '';
    if (logsWithRoles > 0) {
      var modalT = modeOf(tankCounts), modalH = modeOf(healCounts);
      var matchCount = logsData.filter(function(l){
        return l.roles && String(l.roles.tanks)===String(modalT) && String(l.roles.healers)===String(modalH);
      }).length;
      roleStr = '<span style="font-size:10px;color:#5a6080;margin-left:4px;">'
        + '<span style="color:#4888c8;">'+modalT+'T</span>'
        + ' <span style="color:#48a868;">'+modalH+'H</span>'
        + '<span style="color:#3a4050;"> &middot; '+matchCount+'/'+logsWithRoles+' logs</span>'
        + '</span>';
    }
    var toggleHtml = '<div style="display:flex;align-items:baseline;gap:16px;margin-bottom:12px;padding:10px 14px;background:#0a0b14;border-radius:6px;border:1px solid #1a1c2a;"><span style="font-size:13px;font-weight:800;color:#d8e0f0;letter-spacing:0.03em;">'+bossName+'</span><span style="font-size:10px;color:#5a6080;font-weight:600;">'+logCount+' logs</span><span style="font-size:10px;color:#5a6080;">avg kill &nbsp;&nbsp;<strong style="color:#9aa0b8;font-size:12px;">'+avgStr+'</strong></span>'+roleStr+'</div>';

    // ── Timeline ability markers (from manually-set BOSSES timings, no WCL data) ──
    var tlBoss = BOSSES.find(function(b){ return b.name === bossName; })
              || BOSSES.find(function(b){ return b.name === 'The '+bossName; })
              || BOSSES.find(function(b){ return b.name.replace(/^The\s+/i,'') === bossName.replace(/^The\s+/i,''); });
    var tlMarkers = [];
    if (tlBoss) {
      tlBoss.sections.forEach(function(sec) {
        (sec.abilities || []).forEach(function(ab) {
          if (ab.encounterStart) return;
          if (/health\s*%/i.test(ab.name)) return;
          var tSec = ab.time || 0;
          var xPx = Math.round(tSec * sharedPps);
          var baseName = ab.name.replace(/\s+\d+$/, '');
          tlMarkers.push({ x: xPx, color: ab.color || '#c83a20', label: ab.name, baseName: baseName });
        });
      });
    }
    currentBossTimelineXs = tlMarkers;

    function buildBossTimelineRow() {
      if (!tlMarkers.length) return '';
      var html = '<div style="display:flex;align-items:center;margin-bottom:6px;">';
      html += '<div style="width:'+LABEL_W+'px;flex-shrink:0;font-size:8px;font-weight:700;color:#4a4a90;text-align:right;padding-right:7px;white-space:nowrap;text-transform:uppercase;letter-spacing:0.08em;">Timeline</div>';
      html += '<div style="position:relative;width:'+W+'px;height:42px;background:#060710;border-radius:3px;overflow:hidden;border:1px solid #11122a;">';
      var groupCount = {};
      tlMarkers.forEach(function(m) {
        var idx = (groupCount[m.baseName] = (groupCount[m.baseName] || 0) + 1);
        var tSec = Math.round(m.x / sharedPps);
        var timeStr = Math.floor(tSec/60)+':'+(tSec%60<10?'0':'')+tSec%60;
        // Soft glow bloom
        html += '<div style="position:absolute;left:'+m.x+'px;top:0;bottom:0;width:9px;background:'+m.color+';opacity:0.1;transform:translateX(-50%);pointer-events:none;"></div>';
        // Crisp line
        html += '<div title="'+m.label+' ('+timeStr+')" style="position:absolute;left:'+m.x+'px;top:0;bottom:0;width:1px;background:'+m.color+';opacity:0.88;transform:translateX(-50%);pointer-events:none;"></div>';
        // Diamond cap at top
        html += '<div style="position:absolute;left:'+m.x+'px;top:3px;width:5px;height:5px;background:'+m.color+';transform:translateX(-50%) rotate(45deg);box-shadow:0 0 5px '+m.color+';pointer-events:none;"></div>';
        if (idx === 1) {
          // Glowing label
          html += '<div style="position:absolute;left:'+m.x+'px;top:13px;transform:translateX(-50%);font-size:8px;font-weight:800;color:'+m.color+';white-space:nowrap;letter-spacing:0.03em;pointer-events:none;text-shadow:0 0 8px '+m.color+',0 1px 4px #000;">'+m.baseName+'</div>';
        }
      });
      html += '</div></div>';
      return html;
    }

    var bodyHtml = '<div style="background:#08090e;border:1px solid #1a1c2a;border-radius:8px;padding:12px 14px;">';
    bodyHtml += buildRuler();
    bodyHtml += buildBossTimelineRow();
    allSids.forEach(function(sid){ bodyHtml += buildHeatmapRow(sid, 'wave'); });
    bodyHtml += '</div>';

    // HPS chart below heatmap (raid mode only)
    if (mode !== 'personal' && logsHpsData && logsHpsData.length) {
      var HEAL_BUCKET_MS = 10000;
      var numHealB = Math.ceil(maxDuration / HEAL_BUCKET_MS);
      var avgHpsBuckets = new Array(numHealB).fill(0);
      var hpsCounts = new Array(numHealB).fill(0);
      logsHpsData.forEach(function(ld) {
        (ld.buckets||[]).forEach(function(healAmt, bi) {
          if (bi < numHealB) { avgHpsBuckets[bi] += healAmt / (HEAL_BUCKET_MS/1000); hpsCounts[bi]++; }
        });
      });
      for (var ii=0; ii<numHealB; ii++) { if (hpsCounts[ii]) avgHpsBuckets[ii] /= hpsCounts[ii]; }
      var maxHps = Math.max.apply(null, avgHpsBuckets.concat([1]));
      var HPSW = W, HPSH = 56;
      var hpsCellW = HPSW / numHealB;
      var pts = '0,'+HPSH;
      for (var hbi=0; hbi<numHealB; hbi++) {
        var hx = ((hbi+0.5)*hpsCellW).toFixed(1);
        var hy = (HPSH - Math.pow(avgHpsBuckets[hbi]/maxHps, 0.55)*HPSH*0.9).toFixed(1);
        pts += ' '+hx+','+hy;
      }
      pts += ' '+HPSW+','+HPSH;
      var polyLine = pts.slice(pts.indexOf(' ')+1, pts.lastIndexOf(' '));
      var maxHpsLabel = maxHps >= 1000000 ? (maxHps/1000000).toFixed(1)+'M' : maxHps >= 1000 ? Math.round(maxHps/1000)+'k' : Math.round(maxHps)+'';
      // Build smart ruler for HPS (~15 labels)
      var hpsTick = smartTick(maxDuration, 15);
      var hpsRulerHtml = '<div style="display:flex;margin-bottom:3px;"><div style="width:'+LABEL_W+'px;flex-shrink:0;"></div><div style="position:relative;width:'+HPSW+'px;height:16px;">';
      for (var hri=0; hri*hpsTick*1000<=maxDuration; hri++) {
        var hrx = Math.min(Math.round(hri*hpsTick*sharedPps), HPSW);
        var hrlabel = Math.floor(hri*hpsTick/60)+':'+(hri*hpsTick%60<10?'0':'')+(hri*hpsTick%60);
        hpsRulerHtml += '<div style="position:absolute;left:'+hrx+'px;top:0;bottom:0;border-left:1px solid #2e2620;"></div>';
        hpsRulerHtml += '<span style="position:absolute;left:'+hrx+'px;top:2px;font-size:9px;font-weight:700;color:#5a6080;transform:translateX(-50%);white-space:nowrap;">'+hrlabel+'</span>';
      }
      hpsRulerHtml += '</div></div>';

      bodyHtml += '<div style="background:#08090e;border:1px solid #1a1c2a;border-radius:8px;padding:12px 14px;margin-top:10px;">';
      bodyHtml += '<div style="font-size:10px;font-weight:700;color:#48a868;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">Avg Raid HPS <span style="font-size:9px;color:#3a4060;font-weight:400;text-transform:none;">peak '+maxHpsLabel+' HPS</span></div>';
      bodyHtml += hpsRulerHtml;
      bodyHtml += '<div style="display:flex;align-items:center;margin-bottom:2px;"><div style="width:'+LABEL_W+'px;flex-shrink:0;font-size:9px;font-weight:700;color:#48a868;text-align:right;padding-right:7px;">HPS</div>';
      bodyHtml += '<div style="position:relative;width:'+HPSW+'px;height:'+HPSH+'px;background:#05060a;border-radius:3px;overflow:hidden;">';
      // Gridlines matching HPS ruler
      for (var hti=1; hti*hpsTick*1000<=maxDuration; hti++) {
        bodyHtml += '<div style="position:absolute;left:'+Math.round(hti*hpsTick*sharedPps)+'px;top:0;bottom:0;border-left:1px solid rgba(255,255,255,0.05);pointer-events:none;"></div>';
      }
      bodyHtml += '<svg width="'+HPSW+'" height="'+HPSH+'" style="position:absolute;top:0;left:0;overflow:visible;">';
      bodyHtml += '<polygon points="'+pts+'" fill="#48a868" fill-opacity="0.25"/>';
      bodyHtml += '<polyline points="'+polyLine+'" fill="none" stroke="#48a868" stroke-width="2" stroke-opacity="0.9"/>';
      bodyHtml += '</svg></div></div></div>';
    }

    container.innerHTML = toggleHtml + bodyHtml;
    container.querySelectorAll('.wcl-view-btn').forEach(function(btn){
      btn.addEventListener('click', function(){ viewMode=btn.dataset.view; renderAll(); });
    });
  }

  renderAll();
}

      results.innerHTML = '<div style="color:#5a4838;font-size:12px;">Fetching '+diffLabel+' 10-man rankings...</div>';

      var allRankEntries = [];
      var crawlPage = 1;
      var crawlQuery = 'query($id:Int!,$pg:Int!){worldData{encounter(id:$id){fightRankings(difficulty:'+fetchDifficulty+',size:10,metric:execution,page:$pg)}}}';
      while (allRankEntries.length < 140 && crawlPage <= 14) {

        var cpage = (crd&&crd.worldData&&crd.worldData.encounter&&crd.worldData.encounter.fightRankings&&crd.worldData.encounter.fightRankings.rankings)||[];
        if (!cpage.length) break;

      var logsData = [];
      var fightDurations = [];
      var logsHpsData = [];
      var processed = 0;
      var limit = pageRankings.length;

      for (var ri=0; ri<limit; ri++) {
        var r = pageRankings[ri];
        var code = r.report&&r.report.code, fid = r.report&&r.report.fightID;
        if (!code||!fid) continue;
        try {
          var q = 'query($c:String!,$fid:Int!){reportData{report(code:$c){fights(fightIDs:[$fid]){startTime endTime} events(fightIDs:[$fid],dataType:Casts,startTime:0,endTime:9999999){data} healingEvents:events(fightIDs:[$fid],dataType:Healing,startTime:0,endTime:9999999){data}}}}';
          var d = await wclQuery(q, {c:code, fid:fid});
          var rep = d&&d.reportData&&d.reportData.report;
          var evts = (rep&&rep.events&&rep.events.data)||[];
          var healEvts = (rep&&rep.healingEvents&&rep.healingEvents.data)||[];
          var fight = rep&&rep.fights&&rep.fights[0];
          if (!fight) continue;
          var fStart = fight.startTime;
          var fDur = fight.endTime - fight.startTime;

          // ── Avg duration filter ──
          var _durEl = document.getElementById('wclAvgDur');
          var _durVal = _durEl ? _durEl.value.trim() : '';
          if (_durVal) {
            var _dp = _durVal.split(':');
            if (_dp.length === 2) {
              var _targetMs = (parseInt(_dp[0]||0)*60 + parseInt(_dp[1]||0))*1000;
              if (_targetMs > 0 && (fDur < _targetMs - 30000 || fDur > _targetMs + 30000)) {
                processed++; continue;
              }
            }
          }

          fightDurations.push(fDur);

          // Infer roles from unique sourceIDs casting known role-signature spells
          var roleCounts = { tanks: 0, healers: 0, dps: 0 };
          try {
            // Tank cooldowns: Shield Wall 871, Last Stand 12975, Demoralizing Shout 1160, Frenzied Regen 22842, Savage Defense 62606, Brewmaster ISB 115308, Prot Paladin Ardent Defender 31850
            // Tank-exclusive spells only — abilities no DPS spec can cast
            var TANK_SIDS = {
              12975:1,  // Prot War: Last Stand
              2565:1,   // Prot War: Shield Block
              23922:1,  // Prot War: Shield Slam
              6572:1,   // Prot War: Revenge
              31935:1,  // Prot War: Avenger's Shield — wait, Prot Pal only
              53595:1,  // Prot Pal: Hammer of the Righteous
              53600:1,  // Prot Pal: Shield of the Righteous
              31850:1,  // Prot Pal: Ardent Defender
              31935:1,  // Prot Pal: Avenger's Shield
              62606:1,  // Guardian Druid: Savage Defense
              22842:1,  // Guardian Druid: Frenzied Regeneration
              80964:1,  // Guardian Druid: Pulverize
              115308:1, // Brewmaster: Invoke Lightning (ISB — Iron Sides)
              115295:1, // Brewmaster: Guard
              119582:1, // Brewmaster: Purifying Brew
              121253:1, // Brewmaster: Keg Smash
            };
            // Healer-exclusive spells only — abilities no DPS spec can cast
            var HEALER_SIDS = {
              34861:1,  // Holy Priest: Circle of Healing
              47540:1,  // Disc Priest: Penance
              33076:1,  // Disc Priest: Prayer of Mending (actually shared — remove)
              82327:1,  // Holy Pal: Holy Radiance
              20473:1,  // Holy Pal: Holy Shock
              54968:1,  // Holy Pal: Beacon of Light
              48438:1,  // Resto Druid: Wild Growth
              18562:1,  // Resto Druid: Swiftmend
              33763:1,  // Resto Druid: Lifebloom
              61295:1,  // Resto Shaman: Riptide
              974:1,    // Resto Shaman: Earth Shield
              16190:1,  // Resto Shaman: Mana Tide Totem
              116670:1, // MW Monk: Uplift
              115151:1, // MW Monk: Renewing Mist
              124682:1, // MW Monk: Enveloping Mist
              115313:1, // MW Monk: Surging Mist
            };
            var tankSrcs = {}, healSrcs = {};
            evts.forEach(function(ev) {
              if (ev.type !== 'cast') return;
              var sid = ev.abilityGameID, src = ev.sourceID;
              if (TANK_SIDS[sid])   tankSrcs[src]  = 1;
              if (HEALER_SIDS[sid]) healSrcs[src]  = 1;
            });
            roleCounts.tanks   = Object.keys(tankSrcs).length;
            roleCounts.healers = Object.keys(healSrcs).length;
            roleCounts.dps     = Math.max(0, 10 - roleCounts.tanks - roleCounts.healers);
          } catch(rce) {}

          // Build HPS buckets (10s windows) for this log
          var HEAL_BUCKET_MS = 10000;
          var numHealBuckets = Math.ceil(fDur / HEAL_BUCKET_MS);
          var healBuckets = new Array(numHealBuckets).fill(0);
          healEvts.forEach(function(ev) {
            if (ev.type !== 'heal' && ev.type !== 'absorbed') return;
            var rel = ev.timestamp - fStart;
            if (rel < 0 || rel >= fDur) return;
            var b = Math.floor(rel / HEAL_BUCKET_MS);
            healBuckets[b] = (healBuckets[b] || 0) + (ev.amount || 0);
          });
          if (!logsHpsData) logsHpsData = [];
          logsHpsData.push({ buckets: healBuckets, duration: fDur });

          // Build lookup of all spell IDs cast in this log
          var allCastSids = {};
          evts.forEach(function(ev){ if(ev.type==='cast') allCastSids[ev.abilityGameID]=true; });

          if (wclMode === 'personal') {
            // Comp filter — must have at least 3 of our class signatures
            if (!logMatchesOurComp(allCastSids)) { continue; }

            // Collect personal defensive casts per spell per source
            var logCasts = {};
            Object.keys(WCL_PERSONAL_SPELLS).forEach(function(sid) {
              var sid2 = parseInt(sid);
              var castsBySrc2 = {};
              evts.forEach(function(ev){
                if (ev.type!=='cast' || ev.abilityGameID!==sid2) return;
                var rel = ev.timestamp - fStart;
                if (rel<0||rel>900000) return;
                var key = ev.sourceID||'0';
                if (!castsBySrc2[key]) castsBySrc2[key]=[];
                castsBySrc2[key].push(rel);
              });
              // Pick the source with most casts
              var srcKeys = Object.keys(castsBySrc2);
              if (!srcKeys.length) return;
              srcKeys.sort(function(a,b){ return castsBySrc2[b].length - castsBySrc2[a].length; });
              logCasts[sid2] = castsBySrc2[srcKeys[0]].sort(function(a,b){return a-b;});
            });
            logsData.push({ duration: fDur, casts: logCasts, code: code, rank: ri+1, roles: roleCounts });
          } else {
            // Raid CDs mode
            var castsBySrc = {};
            evts.forEach(function(ev){
              if (ev.type!=='cast') return;

              if (!WCL_SPELLS[sid]) return;
              var rel = ev.timestamp - fStart;
              if (rel<0||rel>900000) return;
              var key = sid+'_'+(ev.sourceID||'0');
              if (!castsBySrc[key]) castsBySrc[key]=[];
              castsBySrc[key].push(rel);
            });
            var spellSources = {};
            Object.keys(castsBySrc).forEach(function(key){
              var sid = key.split('_')[0];
              if (!spellSources[sid]) spellSources[sid]={};
              spellSources[sid][key] = castsBySrc[key];
            });
            var logCasts = {};
            Object.keys(spellSources).forEach(function(sid){
              var sources = spellSources[sid];
              var best = Object.keys(sources).sort(function(a,b){
                var diff = sources[b].length - sources[a].length;
                return diff!==0 ? diff : (sources[a][0]||0)-(sources[b][0]||0);
              })[0];
              logCasts[sid] = sources[best].sort(function(a,b){return a-b;});
            });
            logsData.push({ duration: fDur, casts: logCasts, code: code, rank: ri+1, roles: roleCounts });
          }
          processed++;
          results.innerHTML='<div style="color:#5a4838;font-size:12px;">Processing rank '+(ri+1)+' of '+limit+'...</div>';
          if (processed >= 40) break;
        } catch(le){ console.warn('WCL log error ri='+ri+':', le); }
      }

      if (!processed) {
        results.innerHTML='<div style="color:#c84848;font-size:12px;">No logs could be processed.</div>';
        btn.textContent='Fetch CD Timing Data'; btn.disabled=false; return;
      }

      var avgDuration = fightDurations.length ? Math.round(wclMedian(fightDurations)) : 300000;
      var bossName2 = bossEl.options[bossEl.selectedIndex].text;
      var spellMap = wclMode === 'personal' ? WCL_PERSONAL_SPELLS : WCL_SPELLS;

        localStorage.setItem(cacheKey, JSON.stringify({logsData:logsData,processed:processed,bossName:bossName2,avgDuration:avgDuration,hpsData:logsHpsData,ts:Date.now()}));
      } catch(e) {}
