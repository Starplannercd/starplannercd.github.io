name: Fetch raid gear

on:
  schedule:
    - cron: "23 12 * * 1,6" # Mondays & Saturdays 12:23 UTC — post-raid + late-week catch-up
  workflow_dispatch: {}      # "Run workflow" button for on-demand refreshes

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch gear from Blizzard API
        run: node scripts/fetch-gear.mjs
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}

      - name: Commit gear.json if changed
        run: |
          git config user.name "gear-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/gear.json data/ilvl-history.json data/item-levels.json
          if git diff --cached --quiet; then
            echo "No gear changes."
          else
            git commit -m "Update raid gear data (bot)"
            git push
          fi
