<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional BIS — Siege of Orgrimmar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Numen';
    src: url('fonts/Numen.ttf') format('truetype');
    font-display: swap;
  }

  :root {
    --bg: #0e0c0a;
    --bg2: #141210;
    --bg3: #1c1916;
    --border: #2e2620;
    --border2: #483830;
    --text: #d8c8b0;
    --text2: #8a7060;
    --text3: #504038;
    --accent: #c83a20;
    --accent2: #8a2010;
    --forge: #e07820;
    --green: #48a868;
    --orange: #c87838;
    --yellow: #c8b838;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  a { color: var(--forge); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: linear-gradient(180deg, #231b12 0%, #0c0a08 100%);
    border-top: 3px solid var(--accent);
    border-bottom: 1px solid var(--border2);
    box-shadow: 0 4px 16px rgba(0,0,0,.55);
    padding: 13px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { flex-shrink: 0; filter: drop-shadow(0 2px 4px rgba(0,0,0,.6)); }
  .topbar h1 {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1.05;
  }
  .topbar h1 span {
    color: var(--forge);
    text-shadow: 0 0 12px rgba(224,120,32,.35);
  }
  .brandsub { color: var(--text3); font-size: 9.5px; text-transform: uppercase; letter-spacing: 3.5px; margin-top: 3px; }
  .tabs { display: flex; gap: 8px; margin-left: auto; }
  .tab {
    padding: 7px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: border-color .12s ease, color .12s ease;
  }
  .tab.active { background: var(--bg3); color: var(--text); border-color: var(--forge); }
  .tab:hover { color: var(--text); }
  .meta-line { color: var(--text2); font-size: 12px; }
  .meta-line b { color: var(--text); font-weight: 600; }

  #content { max-width: 1100px; margin: 0 auto; padding: 20px; }

  .banner {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-left: 4px solid var(--orange);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 16px;
    color: var(--text);
    font-size: 13px;
  }
  .banner.err { border-left-color: var(--accent); }

  /* Boss cards */
  .boss-grid { display: flex; flex-direction: column; gap: 10px; }
  .boss-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .boss-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .boss-name { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; }
  .seg.major { background: var(--accent); }
  .seg.moderate { background: var(--orange); }
  .seg.minor { background: var(--text2); }

  /* columns chart */
  .col-wrap { overflow-x: auto; padding: 8px 4px 4px; }
  .col-chart { display: flex; align-items: flex-end; gap: 10px; min-width: 820px; }
  .col-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex: 1; user-select: none; }
  .col-bar {
    height: 170px;
    width: 30px;
    background: rgba(28,25,22,.9);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }
  .col-bar .seg { width: 100%; }
  .col-num { font-family: 'Numen', 'Cinzel', serif; font-weight: 400; font-size: 19px; letter-spacing: 1px; }
  .col-num.zero { color: var(--green); }
  .col-item.sel .col-bar { box-shadow: 0 0 0 2px var(--forge); }
  .col-item:hover .col-bar { box-shadow: 0 0 0 1px var(--forge); }
  .col-item.extra { opacity: .7; }

  .plabel { margin-top: 6px; font-size: 11px; color: var(--text2); text-align: center; }

  /* boss detail: style toggle + four layouts */
  .dstyle { margin-left: auto; display: flex; gap: 5px; }
  .dpill {
    padding: 3px 11px;
    border: 1px solid var(--border);
    border-radius: 11px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }
  .dpill.active { color: var(--text); border-color: var(--forge); }
  .dpill:hover { color: var(--text); }
  .q-epic, a.q-epic { color: #a335ee; }
  .icon-fallback { display: inline-block; background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; flex-shrink: 0; }
  .loot-row { display: flex; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(46,38,32,.5); }
  .loot-row:last-child { border-bottom: none; }
  .loot-row img { width: 38px; height: 38px; border-radius: 4px; border: 1px solid var(--border2); display: block; flex-shrink: 0; }
  .loot-sub { color: var(--text3); font-size: 11px; margin-left: 8px; }
  .needby { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .needby .nb { display: inline-flex; gap: 5px; align-items: center; }
  .dcard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 4px 0; }
  .dcard { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 12px 10px; text-align: center; }
  .dcard img { width: 48px; height: 48px; border-radius: 5px; border: 1px solid var(--border2); display: block; margin: 0 auto 8px; }
  .dcard .icon-fallback { width: 48px; height: 48px; margin: 0 auto 8px; display: block; }
  .dcard .dname { font-size: 12px; line-height: 1.3; margin-bottom: 8px; min-height: 31px; }
  .dcard .dneed { font-size: 11.5px; display: flex; flex-direction: column; gap: 3px; align-items: center; }
  .rgroup { margin-bottom: 14px; }
  .rgroup h4 { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px; margin-bottom: 5px; }
  table.dtable { width: 100%; border-collapse: collapse; }
  table.dtable th, table.dtable td { text-align: left; padding: 5px 10px; font-size: 12.5px; }
  table.dtable th { color: var(--text3); font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
  table.dtable tr:nth-child(even) td { background: rgba(28,25,22,.5); }
  .boss-detail { border-top: 1px solid var(--border); padding: 8px 16px 12px 54px; display: none; }
  .boss-card.open .boss-detail { display: block; }
  .need-row {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(46,38,32,.5);
    flex-wrap: wrap;
  }
  .need-row:last-child { border-bottom: none; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; align-self: center; }
  .dot.minor { background: var(--text2); }
  .dot.moderate { background: var(--orange); }
  .dot.major { background: var(--accent); }
  .need-char { font-weight: 600; flex: 0 0 110px; }
  .need-slot { color: var(--text2); flex: 0 0 70px; }
  .need-cur { color: var(--text2); font-size: 12px; }
  .need-cur .lower { color: var(--yellow); }
  .muted-note { color: var(--text3); font-size: 11px; font-style: italic; margin: 14px 4px 6px; }
  .boss-card.extra { opacity: .75; }

  /* Raider view */
  .raider-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 14px; }
  .raider-head { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .raider-name { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
  .raider-score { margin-left: auto; font-weight: 700; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: .5px;
  }
  .badge.err { background: var(--accent2); color: #fff; }
  .badge.stale { background: #6a5210; color: #e8d890; }
  table.slots { width: 100%; border-collapse: collapse; }
  table.slots td, table.slots th { padding: 5px 16px; text-align: left; font-size: 12.5px; }
  table.slots th { color: var(--text3); font-weight: 600; text-transform: uppercase; font-size: 10.5px; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
  table.slots tr:nth-child(even) td { background: rgba(28,25,22,.5); }
  td.st-obtained { color: var(--green); font-weight: 700; }
  td.eq { color: var(--text2); }

  .footer { text-align: center; color: var(--text3); font-size: 11px; padding: 24px 0 30px; }
  .footer a { color: var(--text2); }

  #selftest { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 18px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
</style>

<body>
<div class="topbar">
  <div class="brand">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M9.2 7V5.6A1.6 1.6 0 0 1 10.8 4h2.4a1.6 1.6 0 0 1 1.6 1.6V7" stroke="#e07820" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="2.8" y="7" width="18.4" height="13" rx="2" fill="#241c12" stroke="#e07820" stroke-width="1.5"/>
      <path d="M2.8 12.2h18.4" stroke="#e07820" stroke-width="1.2"/>
      <rect x="10.3" y="11" width="3.4" height="2.6" rx="0.7" fill="#c8b838" stroke="#e07820" stroke-width="0.8"/>
    </svg>
    <div>
      <h1>Professional <span>BIS</span></h1>
      <div class="brandsub">Siege of Orgrimmar</div>
    </div>
  </div>
  <div class="meta-line" id="gearStamp">loading…</div>
  <div class="tabs">
    <div class="tab" data-view="bosses">Bosses</div>
    <div class="tab" data-view="raiders">Raiders</div>
  </div>
</div>
<div id="content"></div>
<div class="footer">
  Gear auto-refreshes every Monday &amp; Saturday
</div>

<script>
'use strict';

/* ============================== constants ============================== */

const BOSSES = [
  ['immerseus', 'Immerseus'],
  ['protectors', 'Fallen Protectors'],
  ['norushen', 'Norushen'],
  ['sha', 'Sha of Pride'],
  ['galakras', 'Galakras'],
  ['juggernaut', 'Iron Juggernaut'],
  ['shamans', 'Dark Shamans'],
  ['nazgrim', 'General Nazgrim'],
  ['malkorok', 'Malkorok'],
  ['spoils', 'Spoils of Pandaria'],
  ['thok', 'Thok the Bloodthirsty'],
  ['siegecrafter', 'Siegecrafter Blackfuse'],
  ['paragons', 'Paragons of the Klaxxi'],
  ['garrosh', 'Garrosh Hellscream'],
];
const EXTRA_GROUPS = [['multiple', 'Multiple Bosses'], ['outside', 'Outside SoO']];
const BOSS_NAME = Object.fromEntries(BOSSES.concat(EXTRA_GROUPS));

// Final tier: heroic Garrosh loot can only drop once the end goal is already
// dead, so his items are shown for reference but never counted as "needed".
const GOAL_BOSS = 'garrosh';

// Blizzard API slot type -> BiS slot name. Rings/trinkets/weapons matched as pools.
const SLOT_MAP = {
  HEAD: 'Head', NECK: 'Neck', SHOULDER: 'Shoulders', CHEST: 'Chest', ROBE: 'Chest',
  WRIST: 'Bracers', HANDS: 'Gloves', WAIST: 'Belt', LEGS: 'Legs', FEET: 'Boots',
};
const POOLS = [
  { bisSlots: ['Ring 1', 'Ring 2'], apiSlots: ['FINGER_1', 'FINGER_2'] },
  { bisSlots: ['Trinket 1', 'Trinket 2'], apiSlots: ['TRINKET_1', 'TRINKET_2'] },
  { bisSlots: ['Weapon', 'Offhand'], apiSlots: ['MAIN_HAND', 'OFF_HAND', 'RANGED'] },
];

const CLASS_COLORS = {
  PALADIN: '#f58cba', DRUID: '#ff7d0a', PRIEST: '#ffffff', MONK: '#00ff96',
  HUNTER: '#abd473', WARLOCK: '#9482c9', MAGE: '#69ccf0', SHAMAN: '#0070de',
  WARRIOR: '#c79c6e', ROGUE: '#fff569', DEATHKNIGHT: '#c41f3b',
};

const MINOR_AT = 566, MODERATE_AT = 553; // equipped ilvl thresholds for need size

/* ============================== matching ============================== */

const normName = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');

function bucketOf(equipped) {
  if (!equipped) return 'major';
  if (equipped.ilvl >= MINOR_AT) return 'minor';
  if (equipped.ilvl >= MODERATE_AT) return 'moderate';
  return 'major';
}

function strictMatch(bis, eq) {
  return !!(eq && bis.heroicId && (eq.id === bis.heroicId || eq.id === bis.wfId));
}

// bisEntries (n<=2 with slot labels) vs equipped items (n<=3 for weapons pool):
// choose the assignment maximizing strict matches, then pair leftovers by ilvl desc.
function matchPool(bisEntries, equipped) {
  const perms = (arr) => arr.length <= 1 ? [arr] :
    arr.flatMap((v, i) => perms(arr.slice(0, i).concat(arr.slice(i + 1))).map((p) => [v].concat(p)));
  let best = null;
  const eqPerms = perms(equipped.length ? equipped : [null]);
  for (const ep of eqPerms) {
    const pairs = bisEntries.map((b, i) => [b, ep[i] || null]);
    const score = pairs.filter(([b, e]) => strictMatch(b, e)).length;
    if (!best || score > best.score) best = { score, pairs };
  }
  // re-pair non-matching bis entries with leftover equipped by descending ilvl
  const used = new Set(best.pairs.filter(([b, e]) => strictMatch(b, e)).map(([, e]) => e));
  const leftoverEq = equipped.filter((e) => !used.has(e)).sort((a, b) => b.ilvl - a.ilvl);
  const out = [];
  for (const [b, e] of best.pairs) {
    if (strictMatch(b, e)) { out.push([b, e]); }
    else { out.push([b, leftoverEq.shift() || null]); }
  }
  return out;
}

// -> [{bis, equipped, status, lowerVersion}]  status: obtained|minor|moderate|major|needsId
function evaluateCharacter(bisItems, equippedItems) {
  const eqBySlot = {};
  const eqPools = POOLS.map(() => []);
  for (const eq of equippedItems || []) {
    const poolIdx = POOLS.findIndex((p) => p.apiSlots.includes(eq.slot));
    if (poolIdx >= 0) { eqPools[poolIdx].push(eq); continue; }
    const slot = SLOT_MAP[eq.slot];
    if (slot) eqBySlot[slot] = eq;
  }

  const pairs = []; // [bis, equipped]
  for (const pool of POOLS) {
    const bisEntries = bisItems.filter((b) => pool.bisSlots.includes(b.slot));
    if (!bisEntries.length) continue;
    const eqPool = eqPools[POOLS.indexOf(pool)];
    const twoHander = eqPool.find((e) => e.invType === 'TWOHWEAPON');
    if (twoHander && bisEntries.some((b) => b.slot === 'Offhand')) {
      // an equipped two-hander occupies both weapon slots: pair it with the
      // Weapon AND Offhand BiS rows so an empty offhand isn't a fake need
      bisEntries.forEach((b) => pairs.push([b, twoHander]));
    } else {
      matchPool(bisEntries, eqPool).forEach((p) => pairs.push(p));
    }
  }
  for (const b of bisItems) {
    if (POOLS.some((p) => p.bisSlots.includes(b.slot))) continue;
    pairs.push([b, eqBySlot[b.slot] || null]);
  }

  // keep original list order
  pairs.sort((a, b) => bisItems.indexOf(a[0]) - bisItems.indexOf(b[0]));

  return pairs.map(([bis, equipped]) => {
    let status, lowerVersion = false;
    if (!bis.heroicId) status = 'needsId';
    else if (strictMatch(bis, equipped)) status = 'obtained';
    else if ((bis.slot === 'Weapon' || bis.slot === 'Offhand') && equipped && equipped.ilvl >= MINOR_AT) {
      // any heroic-ilvl weapon/offhand is close enough to BiS to stop farming for
      status = 'good';
    } else {
      status = bucketOf(equipped);
      lowerVersion = !!(equipped && normName(equipped.name) === normName(bis.name));
    }
    return { bis, equipped, status, lowerVersion };
  });
}

// evaluations: {charName: rows[]} -> {bossKey: {total, minor, moderate, major, rows:[{char, row}]}}
function aggregateByBoss(evaluations) {
  const agg = {};
  for (const key of Object.keys(BOSS_NAME)) agg[key] = { total: 0, minor: 0, moderate: 0, major: 0, rows: [] };
  for (const [charName, rows] of Object.entries(evaluations)) {
    for (const row of rows) {
      if (row.status === 'obtained' || row.status === 'good' || row.status === 'needsId') continue;
      const a = agg[row.bis.source] || agg.outside;
      a.total++; a[row.status]++;
      a.rows.push({ char: charName, row });
    }
  }
  return agg;
}

/* ============================== data / state ============================== */

const state = { roster: null, bis: null, gear: null, evaluations: {}, agg: null };

function recompute() {
  const bis = state.bis;
  state.mergedSpecs = bis.specs;
  state.evaluations = {};
  state.noData = [];
  state.fetchErrors = [];
  state.needsIdCount = 0;
  for (const ch of state.roster.characters) {
    const spec = bis.specs[ch.spec];
    const entry = state.gear && state.gear.characters && state.gear.characters[ch.name];
    if (!spec) { state.fetchErrors.push(ch.name + ': unknown spec "' + ch.spec + '" — check data/roster.json'); continue; }
    state.needsIdCount += spec.items.filter((i) => !i.heroicId).length ? 1 : 0;
    if (!entry || !entry.items || !entry.items.length) { state.noData.push(ch.name); continue; }
    if (entry.ok === false) state.fetchErrors.push(ch.name + ': ' + (entry.error || 'fetch failed') + (entry.items.length ? ' — showing older gear' : ''));
    state.evaluations[ch.name] = evaluateCharacter(spec.items, entry.items);
  }
  state.agg = aggregateByBoss(state.evaluations);
}

/* ============================== rendering ============================== */

const $ = (sel) => document.querySelector(sel);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const whItem = (id, name) => id
  ? '<a href="https://www.wowhead.com/mop-classic/item=' + id + '" target="_blank" rel="noopener">' + esc(name) + '</a>'
  : esc(name);
const whSearch = (name) => '<a href="https://www.wowhead.com/mop-classic/search?q=' + encodeURIComponent(name) + '" target="_blank" rel="noopener">search</a>';

function relTime(iso) {
  if (!iso) return 'unknown';
  const d = (Date.now() - new Date(iso).getTime()) / 864e5;
  if (d < 0.8) return 'today';
  if (d < 1.5) return 'yesterday';
  return Math.round(d) + ' days ago';
}

function banners() {
  let html = '';
  if (!state.gear) {
    html += '<div class="banner err"><b>No gear data yet.</b> The Blizzard API fetch hasn\'t run. Once the GitHub secrets are set up, go to the repo → Actions → “Fetch raid gear” → Run workflow.</div>';
  }
  if (state.noData.length) {
    html += '<div class="banner">No gear data for: <b>' + state.noData.map(esc).join(', ') + '</b> — they\'re excluded from boss counts.</div>';
  }
  for (const e of state.fetchErrors) html += '<div class="banner err">' + esc(e) + '</div>';
  const missingIds = [];
  for (const [slug, spec] of Object.entries(state.mergedSpecs || {})) {
    const n = spec.items.filter((i) => !i.heroicId).length;
    if (n && state.roster.characters.some((c) => c.spec === slug)) missingIds.push(spec.label + ' (' + n + ')');
  }
  if (missingIds.length) {
    html += '<div class="banner">Missing item IDs: <b>' + esc(missingIds.join(', ')) + '</b> — those slots aren\'t counted yet.</div>';
  }
  return html;
}

/* ---- Bosses tab: five switchable layouts (Garrosh, the goal boss, is never shown) ---- */

let bossSelected = null;

// thematic per-boss colors for the column labels
const BOSS_COLORS = {
  immerseus: '#48b8c8',    // corrupted waters
  protectors: '#58c088',   // jade celestials
  norushen: '#e8d890',     // orb of light
  sha: '#b070d8',          // sha purple
  galakras: '#e06838',     // proto-drake flame
  juggernaut: '#9aa0ac',   // siege iron
  shamans: '#78b048',      // toxic totems
  nazgrim: '#c79c6e',      // kor'kron leather
  malkorok: '#c04040',     // dark blood
  spoils: '#d8b840',       // treasure gold
  thok: '#e06070',         // raw devilsaur
  siegecrafter: '#e8983c', // goblin sparks
  paragons: '#a8c048',     // klaxxi amber
};

const BOSS_SHORT = {
  immerseus: 'Immerseus', protectors: 'Protectors', norushen: 'Norushen', sha: 'Sha of Pride',
  galakras: 'Galakras', juggernaut: 'Iron Jugg.', shamans: 'Shamans', nazgrim: 'Nazgrim',
  malkorok: 'Malkorok', spoils: 'Spoils', thok: 'Thok', siegecrafter: 'Siegecrafter',
  paragons: 'Paragons', multiple: 'Multiple', outside: 'Outside',
};

function farmBosses() { return BOSSES.filter(([k]) => k !== GOAL_BOSS); }
function activeExtras() { return EXTRA_GROUPS.filter(([k]) => state.agg[k].total > 0); }

const DETAIL_STYLES = [['loot', 'Loot'], ['cards', 'Cards'], ['raiders', 'By raider'], ['table', 'Table']];
let detailStyle = localStorage.getItem('soo-bis-detailstyle') || 'loot';
if (!DETAIL_STYLES.some(([k]) => k === detailStyle)) detailStyle = 'loot';

const classColorOf = (charName) => {
  const ch = state.roster.characters.find((c) => c.name === charName);
  return ch ? CLASS_COLORS[ch.class] || 'inherit' : 'inherit';
};

const whItemEpic = (id, name) => id
  ? '<a class="q-epic" href="https://www.wowhead.com/mop-classic/item=' + id + '" target="_blank" rel="noopener">' + esc(name) + '</a>'
  : '<span class="q-epic">' + esc(name) + '</span>';

function iconImg(bis, px) {
  if (!bis.icon) return '<span class="icon-fallback" style="width:' + px + 'px;height:' + px + 'px"></span>';
  return '<img src="https://wow.zamimg.com/images/wow/icons/large/' + esc(bis.icon) + '.jpg" alt="" loading="lazy"' +
    (px !== 48 ? ' style="width:' + px + 'px;height:' + px + 'px"' : '') + '>';
}

function detailData(key) {
  const order = { major: 0, moderate: 1, minor: 2 };
  const rows = state.agg[key].rows.slice()
    .sort((x, y) => order[x.row.status] - order[y.row.status] || x.char.localeCompare(y.char));
  const byItem = [];
  const imap = new Map();
  for (const e of rows) {
    const k = e.row.bis.heroicId + '|' + e.row.bis.name;
    if (!imap.has(k)) { imap.set(k, { bis: e.row.bis, needers: [] }); byItem.push(imap.get(k)); }
    imap.get(k).needers.push(e);
  }
  const byChar = [];
  const cmap = new Map();
  for (const e of rows) {
    if (!cmap.has(e.char)) { cmap.set(e.char, { char: e.char, rows: [] }); byChar.push(cmap.get(e.char)); }
    cmap.get(e.char).rows.push(e.row);
  }
  return { rows, byItem, byChar };
}

function detailLoot(d) {
  let html = '';
  for (const { bis, needers } of d.byItem) {
    html += '<div class="loot-row">' + iconImg(bis, 38) + '<div>';
    html += whItemEpic(bis.heroicId, bis.name) + '<span class="loot-sub">' + esc(bis.slot) + '</span>';
    html += '<div class="needby">needed by:' + needers.map(({ char, row }) =>
      ' <span class="nb"><span style="color:' + classColorOf(char) + '">' + esc(char) + '</span>' +
      '<span class="dot ' + row.status + '" title="' + row.status + ' upgrade"></span></span>').join('') + '</div>';
    html += '</div></div>';
  }
  return html;
}

function detailCards(d) {
  let html = '<div class="dcard-grid">';
  for (const { bis, needers } of d.byItem) {
    html += '<div class="dcard">' + iconImg(bis, 48);
    html += '<div class="dname">' + whItemEpic(bis.heroicId, bis.name) + '</div>';
    html += '<div class="dneed">' + needers.map(({ char, row }) =>
      '<span class="nb"><span class="dot ' + row.status + '"></span> <span style="color:' + classColorOf(char) + '">' + esc(char) + '</span></span>').join('') + '</div>';
    html += '</div>';
  }
  return html + '</div>';
}

function detailRaiders(d) {
  let html = '';
  for (const { char, rows } of d.byChar) {
    html += '<div class="rgroup"><h4 style="color:' + classColorOf(char) + '">' + esc(char) + '</h4>';
    for (const row of rows) {
      html += '<div class="need-row">';
      html += '<span class="dot ' + row.status + '" title="' + row.status + ' upgrade"></span>';
      html += '<span class="need-slot">' + esc(row.bis.slot) + '</span>';
      html += '<span>' + whItemEpic(row.bis.heroicId, row.bis.name) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}

function detailTable(d) {
  let html = '<table class="dtable"><tr><th>Player</th><th>Slot</th><th>BiS item</th><th>Currently has</th><th>Upgrade</th></tr>';
  for (const { char, row } of d.rows) {
    html += '<tr><td style="color:' + classColorOf(char) + ';font-weight:600">' + esc(char) + '</td>';
    html += '<td style="color:var(--text2)">' + esc(row.bis.slot) + '</td>';
    html += '<td>' + whItemEpic(row.bis.heroicId, row.bis.name) + '</td>';
    html += '<td style="color:var(--text2)">' + (row.equipped
      ? esc(row.equipped.name) + ' (' + row.equipped.ilvl + ')' + (row.lowerVersion ? ' <span class="lower">← same item, lower difficulty</span>' : '')
      : '—') + '</td>';
    html += '<td><span class="dot ' + row.status + '"></span> ' + row.status + '</td></tr>';
  }
  return html + '</table>';
}

function selectedDetailHtml() {
  if (!bossSelected) return '<div class="muted-note">Click a boss to see who needs what.</div>';
  const name = BOSS_NAME[bossSelected] || bossSelected;
  const a = state.agg[bossSelected];
  let body;
  if (!a.total) {
    body = '<div class="muted-note">Nothing needed from here.</div>';
  } else {
    const d = detailData(bossSelected);
    body = detailStyle === 'cards' ? detailCards(d)
      : detailStyle === 'raiders' ? detailRaiders(d)
      : detailStyle === 'table' ? detailTable(d)
      : detailLoot(d);
  }
  const pills = DETAIL_STYLES.map(([k, label]) =>
    '<span class="dpill' + (k === detailStyle ? ' active' : '') + '" data-dstyle="' + k + '">' + label + '</span>').join('');
  return '<div class="boss-card open" style="margin-top:14px">' +
    '<div class="boss-head" style="cursor:default"><span class="boss-name" style="flex:none;color:' + (BOSS_COLORS[bossSelected] || 'var(--text)') + '">' + esc(name) + '</span>' +
    '<div class="dstyle">' + pills + '</div></div>' +
    '<div class="boss-detail" style="padding-left:16px">' + body + '</div></div>';
}

function renderBossColumns() {
  const all = farmBosses().concat(activeExtras());
  const maxTotal = Math.max(1, ...all.map(([k]) => state.agg[k].total));
  const px = (n) => (n ? Math.max(4, Math.round((n / maxTotal) * 170)) : 0);
  let html = '<div class="col-wrap"><div class="col-chart">';
  for (const [key, name] of all) {
    const a = state.agg[key];
    const extra = key === 'multiple' || key === 'outside';
    html += '<div class="col-item' + (extra ? ' extra' : '') + (bossSelected === key ? ' sel' : '') +
      '" data-select="' + key + '" title="' + esc(name) + ': ' + a.total + ' needed">';
    html += '<div class="col-num' + (a.total ? '' : ' zero') + '">' + (a.total || '✓') + '</div>';
    html += '<div class="col-bar">' +
      (a.minor ? '<span class="seg minor" style="height:' + px(a.minor) + 'px"></span>' : '') +
      (a.moderate ? '<span class="seg moderate" style="height:' + px(a.moderate) + 'px"></span>' : '') +
      (a.major ? '<span class="seg major" style="height:' + px(a.major) + 'px"></span>' : '') +
      '</div>';
    html += '<div class="plabel" style="color:' + (BOSS_COLORS[key] || 'var(--text2)') + '">' + esc(BOSS_SHORT[key] || name) + '</div>';
    html += '</div>';
  }
  html += '</div></div>' + selectedDetailHtml();
  return html;
}

function renderBosses() {
  let html = banners() + renderBossColumns();
  $('#content').innerHTML = html;
  document.querySelectorAll('[data-select]').forEach((el) => {
    el.addEventListener('click', () => {
      bossSelected = bossSelected === el.dataset.select ? null : el.dataset.select;
      renderBosses();
    });
  });
  document.querySelectorAll('[data-dstyle]').forEach((el) => {
    el.addEventListener('click', () => {
      detailStyle = el.dataset.dstyle;
      localStorage.setItem('soo-bis-detailstyle', detailStyle);
      renderBosses();
    });
  });
}

function renderRaiders() {
  let html = banners();
  for (const ch of state.roster.characters) {
    const entry = state.gear && state.gear.characters && state.gear.characters[ch.name];
    const rows = state.evaluations[ch.name];
    const col = CLASS_COLORS[ch.class] || 'inherit';
    html += '<div class="raider-card">';
    html += '<div class="raider-head">';
    html += '<span class="raider-name" style="color:' + col + '">' + esc(ch.name) + '</span>';
    if (entry && entry.ok === false) html += '<span class="badge err" title="' + esc(entry.error || '') + '">FETCH FAILED' + (entry.items && entry.items.length ? ' — OLD DATA' : '') + '</span>';
    else if (entry && entry.fetchedAt && Date.now() - new Date(entry.fetchedAt).getTime() > 9 * 864e5) html += '<span class="badge stale">DATA ' + relTime(entry.fetchedAt).toUpperCase() + '</span>';
    if (rows) {
      const counted = rows.filter((r) => r.status !== 'needsId' && r.bis.source !== GOAL_BOSS);
      const got = counted.filter((r) => r.status === 'obtained' || r.status === 'good').length;
      const total = counted.length;
      html += '<span class="raider-score" style="color:' + col + '" title="Garrosh items not counted (final boss)">' + got + ' / ' + total + ' BiS</span>';
    } else {
      html += '<span class="raider-score" style="color:var(--text3)">no gear data</span>';
    }
    html += '</div>';
    if (rows) {
      html += '<table class="slots"><tr><th>Slot</th><th>BiS item</th><th>Boss</th><th>Status</th><th>Currently equipped</th></tr>';
      for (const r of rows) {
        let st, cls = '';
        if (r.status === 'obtained') { st = '✓ BiS'; cls = 'st-obtained'; }
        else if (r.status === 'good') { st = '✓ heroic weapon (not BiS)'; cls = 'st-obtained'; }
        else if (r.status === 'needsId') st = '<span style="color:var(--text3)">needs ID (' + whSearch(r.bis.name) + ')</span>';
        else if (r.bis.source === GOAL_BOSS) st = '<span style="color:var(--text3)">goal boss — not counted</span>';
        else st = '<span class="dot ' + r.status + '"></span> ' + r.status + ' upgrade' + (r.lowerVersion ? ' <span style="color:var(--yellow)">(has lower difficulty)</span>' : '');
        html += '<tr><td>' + esc(r.bis.slot) + '</td><td>' + whItem(r.bis.heroicId, r.bis.name) + '</td>' +
          '<td style="color:var(--text2)">' + esc(BOSS_NAME[r.bis.source] || r.bis.sourceLabel || '') + '</td>' +
          '<td class="' + cls + '">' + st + '</td>' +
          '<td class="eq">' + (r.equipped ? esc(r.equipped.name) + ' (' + r.equipped.ilvl + ')' : '—') + '</td></tr>';
      }
      html += '</table>';
    }
    html += '</div>';
  }
  $('#content').innerHTML = html;
}

/* ============================== router / boot ============================== */

function currentView() {
  const h = location.hash.replace('#', '');
  return ['bosses', 'raiders'].includes(h) ? h : 'bosses';
}

function render() {
  const view = currentView();
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.view === view));
  if (!state.bis) return;
  recompute();
  if (view === 'raiders') renderRaiders();
  else renderBosses();
}

document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => { location.hash = t.dataset.view; }));
window.addEventListener('hashchange', render);

async function boot() {
  const bust = '?v=' + Date.now();
  try {
    [state.roster, state.bis] = await Promise.all([
      fetch('data/roster.json' + bust).then((r) => { if (!r.ok) throw new Error('roster.json: HTTP ' + r.status); return r.json(); }),
      fetch('data/bis.json' + bust).then((r) => { if (!r.ok) throw new Error('bis.json: HTTP ' + r.status); return r.json(); }),
    ]);
  } catch (e) {
    $('#content').innerHTML = '<div class="banner err"><b>Failed to load data files:</b> ' + esc(e.message) + '</div>';
    $('#gearStamp').textContent = '';
    return;
  }
  try {
    state.gear = await fetch('data/gear.json' + bust).then((r) => (r.ok ? r.json() : null));
  } catch { state.gear = null; }

  $('#gearStamp').innerHTML = state.gear && state.gear.fetchedAt
    ? 'gear data: <b>' + relTime(state.gear.fetchedAt) + '</b> (' + esc(String(state.gear.fetchedAt).slice(0, 10)) + ')'
    : 'gear data: <b>none yet</b>';

  if (new URLSearchParams(location.search).has('selftest')) runSelfTest();
  render();
}

/* ============================== selftest ============================== */

function runSelfTest() {
  const out = [];
  const t = (name, cond) => out.push((cond ? 'PASS' : 'FAIL') + '  ' + name);
  const bisFix = [
    { slot: 'Head', name: 'BiS Hat', heroicId: 100, wfId: 1096, source: 'immerseus', bisIlvl: 566 },
    { slot: 'Ring 1', name: 'Ring A', heroicId: 200, wfId: 1196, source: 'sha', bisIlvl: 566 },
    { slot: 'Ring 2', name: 'Ring B', heroicId: 300, wfId: 1296, source: 'thok', bisIlvl: 566 },
    { slot: 'Weapon', name: 'Big Axe', heroicId: 400, wfId: 1396, source: 'garrosh', bisIlvl: 582 },
    { slot: 'Belt', name: 'Cool Belt', heroicId: 500, wfId: 1496, source: 'spoils', bisIlvl: 566 },
    { slot: 'Neck', name: 'No ID Neck', heroicId: null, wfId: null, source: 'norushen', bisIlvl: 566 },
  ];
  const eq = (slot, id, ilvl, name) => ({ slot, id, ilvl, name: name || 'x', quality: 'EPIC' });

  let r = evaluateCharacter(bisFix, [eq('HEAD', 100, 566, 'BiS Hat')]);
  t('heroic ID match -> obtained', r.find((x) => x.bis.slot === 'Head').status === 'obtained');

  r = evaluateCharacter(bisFix, [eq('HEAD', 1096, 572)]);
  t('warforged ID match -> obtained', r.find((x) => x.bis.slot === 'Head').status === 'obtained');

  r = evaluateCharacter(bisFix, [eq('FINGER_1', 300, 566), eq('FINGER_2', 200, 566)]);
  t('rings swapped -> both obtained', r.filter((x) => x.bis.slot.startsWith('Ring') && x.status === 'obtained').length === 2);

  r = evaluateCharacter(bisFix, [eq('FINGER_1', 200, 566), eq('FINGER_2', 999, 553)]);
  t('ring pool: one match not double-consumed', r.find((x) => x.bis.slot === 'Ring 1').status === 'obtained' && r.find((x) => x.bis.slot === 'Ring 2').status === 'moderate');

  r = evaluateCharacter(bisFix, [eq('OFF_HAND', 400, 582)]);
  t('BiS weapon equipped in offhand -> obtained (pool)', r.find((x) => x.bis.slot === 'Weapon').status === 'obtained');

  r = evaluateCharacter(bisFix, [eq('MAIN_HAND', 999, 566)]);
  t('non-BiS heroic weapon -> good (counts as done)', r.find((x) => x.bis.slot === 'Weapon').status === 'good');
  r = evaluateCharacter(bisFix, [eq('MAIN_HAND', 999, 565)]);
  t('non-heroic weapon -> still a need', r.find((x) => x.bis.slot === 'Weapon').status === 'moderate');

  const bisWithOffhand = bisFix.concat([{ slot: 'Offhand', name: 'Frill', heroicId: 700, wfId: 1696, source: 'galakras', bisIlvl: 566 }]);
  const staff = { slot: 'MAIN_HAND', id: 998, ilvl: 566, name: 'Heroic Staff', quality: 'EPIC', invType: 'TWOHWEAPON' };
  r = evaluateCharacter(bisWithOffhand, [staff]);
  t('heroic 2H covers weapon AND offhand', r.find((x) => x.bis.slot === 'Weapon').status === 'good' && r.find((x) => x.bis.slot === 'Offhand').status === 'good');
  r = evaluateCharacter(bisWithOffhand, [{ ...staff, ilvl: 553 }]);
  t('normal 2H -> both weapon rows still needs', r.find((x) => x.bis.slot === 'Weapon').status === 'moderate' && r.find((x) => x.bis.slot === 'Offhand').status === 'moderate');

  r = evaluateCharacter(bisFix, [eq('WAIST', 777, 566), eq('HEAD', 778, 565), eq('MAIN_HAND', 779, 553), eq('FINGER_1', 780, 552)]);
  t('bucket 566 -> minor', r.find((x) => x.bis.slot === 'Belt').status === 'minor');
  t('bucket 565 -> moderate', r.find((x) => x.bis.slot === 'Head').status === 'moderate');
  t('bucket 553 -> moderate', r.find((x) => x.bis.slot === 'Weapon').status === 'moderate');
  t('bucket 552 -> major', r.find((x) => x.bis.slot === 'Ring 1').status === 'major');

  r = evaluateCharacter(bisFix, []);
  t('empty slot -> major', r.find((x) => x.bis.slot === 'Belt').status === 'major');
  t('null ID -> needsId', r.find((x) => x.bis.slot === 'Neck').status === 'needsId');

  r = evaluateCharacter(bisFix, [eq('WAIST', 888, 553, 'Cool Belt')]);
  t('same name lower difficulty -> flagged, not obtained', (() => { const x = r.find((y) => y.bis.slot === 'Belt'); return x.status === 'moderate' && x.lowerVersion === true; })());

  const agg = aggregateByBoss({ A: evaluateCharacter(bisFix, [eq('HEAD', 100, 566)]) });
  t('aggregation: obtained + needsId excluded', agg.immerseus.total === 0 && agg.norushen.total === 0);
  t('aggregation: needs counted per boss', agg.sha.total === 1 && agg.garrosh.total === 1 && agg.spoils.total === 1);

  const div = document.createElement('div');
  div.id = 'selftest';
  div.textContent = 'SELFTEST\n' + out.join('\n') + '\n' + (out.every((l) => l.startsWith('PASS')) ? 'ALL PASS' : 'FAILURES PRESENT');
  document.body.insertBefore(div, $('#content'));
}

boot();
</script>
</body>
</html>
