<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siege of Orgrimmar — BiS Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --bg2: #141210;
    --bg3: #1c1916;
    --border: #2e2620;
    --border2: #483830;
    --text: #d8c8b0;
    --text2: #8a7060;
    --text3: #504038;
    --accent: #c83a20;
    --accent2: #8a2010;
    --forge: #e07820;
    --green: #48a868;
    --orange: #c87838;
    --yellow: #c8b838;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  a { color: var(--forge); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: linear-gradient(180deg, #1e1a16 0%, #0c0a08 100%);
    border-bottom: 3px solid var(--accent);
    border-top: 3px solid var(--accent);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .topbar h1 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }
  .topbar h1 span { color: var(--accent); }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab {
    padding: 6px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .tab.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .tab:hover { color: var(--text); }
  .meta-line { color: var(--text2); font-size: 12px; }
  .meta-line b { color: var(--text); font-weight: 600; }

  #content { max-width: 1100px; margin: 0 auto; padding: 20px; }

  .banner {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-left: 4px solid var(--orange);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 16px;
    color: var(--text);
    font-size: 13px;
  }
  .banner.err { border-left-color: var(--accent); }

  /* Boss cards */
  .boss-grid { display: flex; flex-direction: column; gap: 10px; }
  .boss-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .boss-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .boss-name { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; }
  .seg.major { background: var(--accent); }
  .seg.moderate { background: var(--orange); }
  .seg.minor { background: var(--text2); }

  /* columns chart */
  .col-wrap { overflow-x: auto; padding: 8px 4px 4px; }
  .col-chart { display: flex; align-items: flex-end; gap: 10px; min-width: 820px; }
  .col-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex: 1; user-select: none; }
  .col-bar {
    height: 170px;
    width: 30px;
    background: rgba(28,25,22,.9);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }
  .col-bar .seg { width: 100%; }
  .col-num { font-family: 'Cinzel', serif; font-weight: 700; font-size: 15px; }
  .col-num.zero { color: var(--green); }
  .col-item.sel .col-bar { box-shadow: 0 0 0 2px var(--forge); }
  .col-item:hover .col-bar { box-shadow: 0 0 0 1px var(--forge); }
  .col-item.extra { opacity: .7; }

  /* orbit */
  .orbit-wrap { overflow-x: auto; }
  .orbit { position: relative; width: 460px; height: 460px; margin: 0 auto; }
  .orbit::before { content: ''; position: absolute; inset: 52px; border: 1px dashed rgba(72,56,48,.7); border-radius: 50%; }
  .onode { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; cursor: pointer; z-index: 1; user-select: none; }
  .onode.sel .pdot { box-shadow: 0 0 0 2px var(--forge); }
  .onode:hover .pdot { border-color: var(--forge); }
  .orbit-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; }
  .orbit-center .obig { font-family: 'Cinzel', serif; font-size: 46px; font-weight: 700; line-height: 1; }
  .orbit-center .osub { color: var(--text2); font-size: 11px; margin-top: 6px; text-transform: uppercase; letter-spacing: 1.5px; }
  .orbit-center .oskip { color: var(--green); font-size: 12px; margin-top: 5px; font-weight: 600; }

  /* bubbles */
  .bub-wrap { display: flex; flex-wrap: wrap; gap: 10px 24px; justify-content: center; align-items: flex-end; padding: 16px 0 6px; }
  .bub { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .bubc {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-weight: 700;
    background: var(--bg3);
    border: 2px solid var(--border2);
    color: var(--text);
  }
  .bubc.major { border-color: var(--accent); background: rgba(200,58,32,.14); }
  .bubc.moderate { border-color: var(--orange); background: rgba(200,120,56,.12); }
  .bubc.zero { border-color: var(--green); color: var(--green); }
  .bub.sel .bubc { box-shadow: 0 0 0 2px var(--forge); }
  .bub:hover .bubc { border-color: var(--forge); }
  .bub.extra { opacity: .7; }

  /* boss view switcher */
  .viewtabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .viewtab {
    padding: 4px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  .viewtab:hover { color: var(--text); }
  .viewtab.active { color: var(--text); border-color: var(--forge); }

  /* tiles */
  .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .tile {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 10px 10px;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .tile:hover { background: var(--bg3); }
  .tile.sel { border-color: var(--forge); }
  .tile.extra { opacity: .7; }
  .tile .tname { font-family: 'Cinzel', serif; font-size: 12.5px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile .tnum { font-family: 'Cinzel', serif; font-size: 30px; font-weight: 700; line-height: 1.15; }
  .tile .tnum.zero { color: var(--green); font-size: 19px; padding: 7px 0; }
  .tile .tdots { margin-top: 5px; font-size: 11.5px; color: var(--text2); display: flex; gap: 10px; justify-content: center; min-height: 15px; }

  /* raid path */
  .path-wrap { overflow-x: auto; padding: 16px 4px 4px; }
  .path { display: flex; align-items: flex-start; min-width: 860px; }
  .pnode { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; position: relative; user-select: none; }
  .pnode::before { content: ''; position: absolute; top: 23px; left: -50%; width: 100%; height: 2px; background: var(--border2); z-index: 0; }
  .pnode:first-child::before { display: none; }
  .pnodetop { height: 46px; display: flex; align-items: center; position: relative; z-index: 1; }
  .pdot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px;
    background: var(--bg3);
    border: 2px solid var(--border2);
    color: var(--text2);
  }
  .pdot.t0 { width: 26px; height: 26px; border-color: var(--green); color: var(--green); }
  .pdot.t2 { width: 40px; height: 40px; border-color: var(--orange); color: var(--text); }
  .pdot.t3 { width: 46px; height: 46px; border-color: var(--accent); background: rgba(200,58,32,.14); color: var(--text); font-size: 15px; }
  .pnode.sel .pdot { box-shadow: 0 0 0 2px var(--forge); }
  .pnode:hover .pdot { border-color: var(--forge); }
  .plabel { margin-top: 6px; font-size: 11px; color: var(--text2); text-align: center; }
  .boss-detail { border-top: 1px solid var(--border); padding: 8px 16px 12px 54px; display: none; }
  .boss-card.open .boss-detail { display: block; }
  .need-row {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(46,38,32,.5);
    flex-wrap: wrap;
  }
  .need-row:last-child { border-bottom: none; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; align-self: center; }
  .dot.minor { background: var(--text2); }
  .dot.moderate { background: var(--orange); }
  .dot.major { background: var(--accent); }
  .need-char { font-weight: 600; flex: 0 0 110px; }
  .need-slot { color: var(--text2); flex: 0 0 70px; }
  .need-cur { color: var(--text2); font-size: 12px; }
  .need-cur .lower { color: var(--yellow); }
  .muted-note { color: var(--text3); font-size: 11px; font-style: italic; margin: 14px 4px 6px; }
  .boss-card.extra { opacity: .75; }

  /* Raider view */
  .raider-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 14px; }
  .raider-head { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .raider-name { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
  .raider-score { margin-left: auto; font-weight: 700; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: .5px;
  }
  .badge.err { background: var(--accent2); color: #fff; }
  .badge.stale { background: #6a5210; color: #e8d890; }
  table.slots { width: 100%; border-collapse: collapse; }
  table.slots td, table.slots th { padding: 5px 16px; text-align: left; font-size: 12.5px; }
  table.slots th { color: var(--text3); font-weight: 600; text-transform: uppercase; font-size: 10.5px; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
  table.slots tr:nth-child(even) td { background: rgba(28,25,22,.5); }
  td.st-obtained { color: var(--green); font-weight: 700; }
  td.eq { color: var(--text2); }

  /* Editor */
  .editor-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  select, input[type=text], input[type=number] {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 4px;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 12.5px;
  }
  input.bad { border-color: var(--accent); background: rgba(200,58,32,.1); }
  button {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 4px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
  }
  button:hover { border-color: var(--forge); color: var(--forge); }
  button.primary { border-color: var(--green); color: var(--green); }
  table.editor { width: 100%; border-collapse: collapse; }
  table.editor td, table.editor th { padding: 4px 6px; text-align: left; }
  table.editor th { color: var(--text3); font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; }
  table.editor input[type=text] { width: 100%; }
  table.editor input.id { width: 90px; }
  table.editor input.lvl { width: 60px; }

  .footer { text-align: center; color: var(--text3); font-size: 11px; padding: 24px 0 30px; }
  .footer a { color: var(--text2); }

  #selftest { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 18px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="topbar">
  <h1>SoO <span>BiS</span> Tracker</h1>
  <div class="meta-line" id="gearStamp">loading…</div>
  <div class="tabs">
    <div class="tab" data-view="bosses">Bosses</div>
    <div class="tab" data-view="raiders">Raiders</div>
    <div class="tab" data-view="editor">BiS Editor</div>
  </div>
</div>
<div id="content"></div>
<div class="footer">
  Gear auto-refreshes every Monday · manual refresh: GitHub repo → Actions → “Fetch raid gear” → Run workflow<br>
  <a href="index.html">← Raid Cooldown Planner</a>
</div>

<script>
'use strict';

/* ============================== constants ============================== */

const BOSSES = [
  ['immerseus', 'Immerseus'],
  ['protectors', 'Fallen Protectors'],
  ['norushen', 'Norushen'],
  ['sha', 'Sha of Pride'],
  ['galakras', 'Galakras'],
  ['juggernaut', 'Iron Juggernaut'],
  ['shamans', 'Dark Shamans'],
  ['nazgrim', 'General Nazgrim'],
  ['malkorok', 'Malkorok'],
  ['spoils', 'Spoils of Pandaria'],
  ['thok', 'Thok the Bloodthirsty'],
  ['siegecrafter', 'Siegecrafter Blackfuse'],
  ['paragons', 'Paragons of the Klaxxi'],
  ['garrosh', 'Garrosh Hellscream'],
];
const EXTRA_GROUPS = [['multiple', 'Multiple Bosses'], ['outside', 'Outside SoO']];
const BOSS_NAME = Object.fromEntries(BOSSES.concat(EXTRA_GROUPS));

// Final tier: heroic Garrosh loot can only drop once the end goal is already
// dead, so his items are shown for reference but never counted as "needed".
const GOAL_BOSS = 'garrosh';

// Blizzard API slot type -> BiS slot name. Rings/trinkets/weapons matched as pools.
const SLOT_MAP = {
  HEAD: 'Head', NECK: 'Neck', SHOULDER: 'Shoulders', CHEST: 'Chest', ROBE: 'Chest',
  WRIST: 'Bracers', HANDS: 'Gloves', WAIST: 'Belt', LEGS: 'Legs', FEET: 'Boots',
};
const POOLS = [
  { bisSlots: ['Ring 1', 'Ring 2'], apiSlots: ['FINGER_1', 'FINGER_2'] },
  { bisSlots: ['Trinket 1', 'Trinket 2'], apiSlots: ['TRINKET_1', 'TRINKET_2'] },
  { bisSlots: ['Weapon', 'Offhand'], apiSlots: ['MAIN_HAND', 'OFF_HAND', 'RANGED'] },
];

const CLASS_COLORS = {
  PALADIN: '#f58cba', DRUID: '#ff7d0a', PRIEST: '#ffffff', MONK: '#00ff96',
  HUNTER: '#abd473', WARLOCK: '#9482c9', MAGE: '#69ccf0', SHAMAN: '#0070de',
  WARRIOR: '#c79c6e', ROGUE: '#fff569', DEATHKNIGHT: '#c41f3b',
};

const OVERRIDE_KEY = 'soo-bis-overrides';
const MINOR_AT = 566, MODERATE_AT = 553; // equipped ilvl thresholds for need size

/* ============================== matching ============================== */

const normName = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');

function bucketOf(equipped) {
  if (!equipped) return 'major';
  if (equipped.ilvl >= MINOR_AT) return 'minor';
  if (equipped.ilvl >= MODERATE_AT) return 'moderate';
  return 'major';
}

function strictMatch(bis, eq) {
  return !!(eq && bis.heroicId && (eq.id === bis.heroicId || eq.id === bis.wfId));
}

// bisEntries (n<=2 with slot labels) vs equipped items (n<=3 for weapons pool):
// choose the assignment maximizing strict matches, then pair leftovers by ilvl desc.
function matchPool(bisEntries, equipped) {
  const perms = (arr) => arr.length <= 1 ? [arr] :
    arr.flatMap((v, i) => perms(arr.slice(0, i).concat(arr.slice(i + 1))).map((p) => [v].concat(p)));
  let best = null;
  const eqPerms = perms(equipped.length ? equipped : [null]);
  for (const ep of eqPerms) {
    const pairs = bisEntries.map((b, i) => [b, ep[i] || null]);
    const score = pairs.filter(([b, e]) => strictMatch(b, e)).length;
    if (!best || score > best.score) best = { score, pairs };
  }
  // re-pair non-matching bis entries with leftover equipped by descending ilvl
  const used = new Set(best.pairs.filter(([b, e]) => strictMatch(b, e)).map(([, e]) => e));
  const leftoverEq = equipped.filter((e) => !used.has(e)).sort((a, b) => b.ilvl - a.ilvl);
  const out = [];
  for (const [b, e] of best.pairs) {
    if (strictMatch(b, e)) { out.push([b, e]); }
    else { out.push([b, leftoverEq.shift() || null]); }
  }
  return out;
}

// -> [{bis, equipped, status, lowerVersion}]  status: obtained|minor|moderate|major|needsId
function evaluateCharacter(bisItems, equippedItems) {
  const eqBySlot = {};
  const eqPools = POOLS.map(() => []);
  for (const eq of equippedItems || []) {
    const poolIdx = POOLS.findIndex((p) => p.apiSlots.includes(eq.slot));
    if (poolIdx >= 0) { eqPools[poolIdx].push(eq); continue; }
    const slot = SLOT_MAP[eq.slot];
    if (slot) eqBySlot[slot] = eq;
  }

  const pairs = []; // [bis, equipped]
  for (const pool of POOLS) {
    const bisEntries = bisItems.filter((b) => pool.bisSlots.includes(b.slot));
    if (!bisEntries.length) continue;
    const eqPool = eqPools[POOLS.indexOf(pool)];
    const twoHander = eqPool.find((e) => e.invType === 'TWOHWEAPON');
    if (twoHander && bisEntries.some((b) => b.slot === 'Offhand')) {
      // an equipped two-hander occupies both weapon slots: pair it with the
      // Weapon AND Offhand BiS rows so an empty offhand isn't a fake need
      bisEntries.forEach((b) => pairs.push([b, twoHander]));
    } else {
      matchPool(bisEntries, eqPool).forEach((p) => pairs.push(p));
    }
  }
  for (const b of bisItems) {
    if (POOLS.some((p) => p.bisSlots.includes(b.slot))) continue;
    pairs.push([b, eqBySlot[b.slot] || null]);
  }

  // keep original list order
  pairs.sort((a, b) => bisItems.indexOf(a[0]) - bisItems.indexOf(b[0]));

  return pairs.map(([bis, equipped]) => {
    let status, lowerVersion = false;
    if (!bis.heroicId) status = 'needsId';
    else if (strictMatch(bis, equipped)) status = 'obtained';
    else if ((bis.slot === 'Weapon' || bis.slot === 'Offhand') && equipped && equipped.ilvl >= MINOR_AT) {
      // any heroic-ilvl weapon/offhand is close enough to BiS to stop farming for
      status = 'good';
    } else {
      status = bucketOf(equipped);
      lowerVersion = !!(equipped && normName(equipped.name) === normName(bis.name));
    }
    return { bis, equipped, status, lowerVersion };
  });
}

// evaluations: {charName: rows[]} -> {bossKey: {total, minor, moderate, major, rows:[{char, row}]}}
function aggregateByBoss(evaluations) {
  const agg = {};
  for (const key of Object.keys(BOSS_NAME)) agg[key] = { total: 0, minor: 0, moderate: 0, major: 0, rows: [] };
  for (const [charName, rows] of Object.entries(evaluations)) {
    for (const row of rows) {
      if (row.status === 'obtained' || row.status === 'good' || row.status === 'needsId') continue;
      const a = agg[row.bis.source] || agg.outside;
      a.total++; a[row.status]++;
      a.rows.push({ char: charName, row });
    }
  }
  return agg;
}

/* ============================== data / state ============================== */

const state = { roster: null, bis: null, gear: null, evaluations: {}, agg: null, overridesActive: false };

function loadOverrides() {
  try { return JSON.parse(localStorage.getItem(OVERRIDE_KEY)) || {}; } catch { return {}; }
}

function mergedBis() {
  const merged = JSON.parse(JSON.stringify(state.bis));
  const ov = loadOverrides();
  // self-heal: a local draft that matches the published data is obsolete — drop it
  let dropped = false;
  for (const [slug, items] of Object.entries(ov)) {
    if (merged.specs[slug] && JSON.stringify(merged.specs[slug].items) === JSON.stringify(items)) {
      delete ov[slug];
      dropped = true;
    }
  }
  if (dropped) {
    if (Object.keys(ov).length) localStorage.setItem(OVERRIDE_KEY, JSON.stringify(ov));
    else localStorage.removeItem(OVERRIDE_KEY);
  }
  state.overridesActive = Object.keys(ov).length > 0;
  for (const [slug, items] of Object.entries(ov)) {
    if (!merged.specs[slug]) merged.specs[slug] = { label: slug, class: '', items: [] };
    merged.specs[slug].items = items;
  }
  return merged;
}

function recompute() {
  const bis = mergedBis();
  state.mergedSpecs = bis.specs;
  state.evaluations = {};
  state.noData = [];
  state.fetchErrors = [];
  state.needsIdCount = 0;
  for (const ch of state.roster.characters) {
    const spec = bis.specs[ch.spec];
    const entry = state.gear && state.gear.characters && state.gear.characters[ch.name];
    if (!spec) { state.fetchErrors.push(ch.name + ': unknown spec "' + ch.spec + '" (add it in the BiS Editor)'); continue; }
    state.needsIdCount += spec.items.filter((i) => !i.heroicId).length ? 1 : 0;
    if (!entry || !entry.items || !entry.items.length) { state.noData.push(ch.name); continue; }
    if (entry.ok === false) state.fetchErrors.push(ch.name + ': ' + (entry.error || 'fetch failed') + (entry.items.length ? ' — showing older gear' : ''));
    state.evaluations[ch.name] = evaluateCharacter(spec.items, entry.items);
  }
  state.agg = aggregateByBoss(state.evaluations);
}

/* ============================== rendering ============================== */

const $ = (sel) => document.querySelector(sel);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const whItem = (id, name) => id
  ? '<a href="https://www.wowhead.com/mop-classic/item=' + id + '" target="_blank" rel="noopener">' + esc(name) + '</a>'
  : esc(name);
const whSearch = (name) => '<a href="https://www.wowhead.com/mop-classic/search?q=' + encodeURIComponent(name) + '" target="_blank" rel="noopener">search</a>';

function relTime(iso) {
  if (!iso) return 'unknown';
  const d = (Date.now() - new Date(iso).getTime()) / 864e5;
  if (d < 0.8) return 'today';
  if (d < 1.5) return 'yesterday';
  return Math.round(d) + ' days ago';
}

function banners() {
  let html = '';
  if (!state.gear) {
    html += '<div class="banner err"><b>No gear data yet.</b> The Blizzard API fetch hasn\'t run. Once the GitHub secrets are set up, go to the repo → Actions → “Fetch raid gear” → Run workflow.</div>';
  }
  if (state.noData.length) {
    html += '<div class="banner">No gear data for: <b>' + state.noData.map(esc).join(', ') + '</b> — they\'re excluded from boss counts.</div>';
  }
  for (const e of state.fetchErrors) html += '<div class="banner err">' + esc(e) + '</div>';
  const missingIds = [];
  for (const [slug, spec] of Object.entries(state.mergedSpecs || {})) {
    const n = spec.items.filter((i) => !i.heroicId).length;
    if (n && state.roster.characters.some((c) => c.spec === slug)) missingIds.push(spec.label + ' (' + n + ')');
  }
  if (missingIds.length) {
    html += '<div class="banner">Missing item IDs: <b>' + esc(missingIds.join(', ')) + '</b> — those slots aren\'t counted yet. Fill them in the <a href="#editor">BiS Editor</a>.</div>';
  }
  if (state.overridesActive) {
    html += '<div class="banner">Viewing <b>local BiS edits</b> (only on this computer). Export from the <a href="#editor">BiS Editor</a> and commit <code>data/bis.json</code> to share with the raid.</div>';
  }
  return html;
}

/* ---- Bosses tab: five switchable layouts (Garrosh, the goal boss, is never shown) ---- */

const BOSS_VIEWS = [['tiles', 'Tiles'], ['path', 'Path'], ['columns', 'Columns'], ['orbit', 'Orbit'], ['bubbles', 'Bubbles']];
let bossView = localStorage.getItem('soo-bis-bossview') || 'tiles';
if (!BOSS_VIEWS.some(([k]) => k === bossView)) bossView = 'tiles';
let bossSelected = null;

const BOSS_SHORT = {
  immerseus: 'Immerseus', protectors: 'Protectors', norushen: 'Norushen', sha: 'Sha of Pride',
  galakras: 'Galakras', juggernaut: 'Iron Jugg.', shamans: 'Shamans', nazgrim: 'Nazgrim',
  malkorok: 'Malkorok', spoils: 'Spoils', thok: 'Thok', siegecrafter: 'Siegecrafter',
  paragons: 'Paragons', multiple: 'Multiple', outside: 'Outside',
};

function farmBosses() { return BOSSES.filter(([k]) => k !== GOAL_BOSS); }
function activeExtras() { return EXTRA_GROUPS.filter(([k]) => state.agg[k].total > 0); }

function needRowsHtml(key) {
  const a = state.agg[key];
  if (!a.total) return '<div class="muted-note">Nothing needed from here.</div>';
  const order = { major: 0, moderate: 1, minor: 2 };
  const rows = a.rows.slice().sort((x, y) => order[x.row.status] - order[y.row.status] || x.char.localeCompare(y.char));
  let html = '';
  for (const { char, row } of rows) {
    const ch = state.roster.characters.find((c) => c.name === char);
    const col = ch ? CLASS_COLORS[ch.class] || 'inherit' : 'inherit';
    html += '<div class="need-row">';
    html += '<span class="dot ' + row.status + '" title="' + row.status + ' upgrade"></span>';
    html += '<span class="need-char" style="color:' + col + '">' + esc(char) + '</span>';
    html += '<span class="need-slot">' + esc(row.bis.slot) + '</span>';
    html += '<span>' + whItem(row.bis.heroicId, row.bis.name) + '</span>';
    html += '<span class="need-cur">— has: ' + (row.equipped
      ? esc(row.equipped.name) + ' (' + row.equipped.ilvl + ')' + (row.lowerVersion ? ' <span class="lower">← same item, lower difficulty</span>' : '')
      : 'nothing equipped') + '</span>';
    html += '</div>';
  }
  return html;
}

function selectedDetailHtml() {
  if (!bossSelected) return '<div class="muted-note">Click a boss to see who needs what.</div>';
  const name = BOSS_NAME[bossSelected] || bossSelected;
  return '<div class="boss-card open" style="margin-top:14px">' +
    '<div class="boss-head" style="cursor:default"><span class="boss-name" style="flex:none">' + esc(name) + '</span></div>' +
    '<div class="boss-detail" style="padding-left:16px">' + needRowsHtml(bossSelected) + '</div></div>';
}

function renderBossTiles() {
  let html = '<div class="tile-grid">';
  for (const [key, name] of farmBosses().concat(activeExtras())) {
    const a = state.agg[key];
    const extra = key === 'multiple' || key === 'outside';
    const dots = [];
    if (a.major) dots.push('<span><span class="dot major"></span> ' + a.major + '</span>');
    if (a.moderate) dots.push('<span><span class="dot moderate"></span> ' + a.moderate + '</span>');
    if (a.minor) dots.push('<span><span class="dot minor"></span> ' + a.minor + '</span>');
    html += '<div class="tile' + (extra ? ' extra' : '') + (bossSelected === key ? ' sel' : '') + '" data-select="' + key + '">';
    html += '<div class="tname" title="' + esc(name) + '">' + esc(name) + '</div>';
    html += a.total ? '<div class="tnum">' + a.total + '</div>' : '<div class="tnum zero">SKIP ✓</div>';
    html += '<div class="tdots">' + dots.join('') + '</div>';
    html += '</div>';
  }
  html += '</div>' + selectedDetailHtml();
  return html;
}

function renderBossColumns() {
  const all = farmBosses().concat(activeExtras());
  const maxTotal = Math.max(1, ...all.map(([k]) => state.agg[k].total));
  const px = (n) => (n ? Math.max(4, Math.round((n / maxTotal) * 170)) : 0);
  let html = '<div class="col-wrap"><div class="col-chart">';
  for (const [key, name] of all) {
    const a = state.agg[key];
    const extra = key === 'multiple' || key === 'outside';
    html += '<div class="col-item' + (extra ? ' extra' : '') + (bossSelected === key ? ' sel' : '') +
      '" data-select="' + key + '" title="' + esc(name) + ': ' + a.total + ' needed">';
    html += '<div class="col-num' + (a.total ? '' : ' zero') + '">' + (a.total || '✓') + '</div>';
    html += '<div class="col-bar">' +
      (a.minor ? '<span class="seg minor" style="height:' + px(a.minor) + 'px"></span>' : '') +
      (a.moderate ? '<span class="seg moderate" style="height:' + px(a.moderate) + 'px"></span>' : '') +
      (a.major ? '<span class="seg major" style="height:' + px(a.major) + 'px"></span>' : '') +
      '</div>';
    html += '<div class="plabel">' + esc(BOSS_SHORT[key] || name) + '</div>';
    html += '</div>';
  }
  html += '</div></div>' + selectedDetailHtml();
  return html;
}

function renderBossOrbit() {
  const bosses = farmBosses();
  const maxTotal = Math.max(1, ...bosses.map(([k]) => state.agg[k].total));
  const size = 460, r = 178;
  let html = '<div class="orbit-wrap"><div class="orbit">';
  bosses.forEach(([key, name], idx) => {
    const a = state.agg[key];
    const ang = -Math.PI / 2 + (idx / bosses.length) * 2 * Math.PI;
    const x = Math.round(size / 2 + r * Math.cos(ang));
    const y = Math.round(size / 2 + r * Math.sin(ang));
    let tier = 0;
    if (a.total) tier = a.total <= maxTotal / 3 ? 1 : (a.total <= (2 * maxTotal) / 3 ? 2 : 3);
    html += '<div class="onode' + (bossSelected === key ? ' sel' : '') + '" data-select="' + key +
      '" style="left:' + x + 'px;top:' + y + 'px" title="' + esc(name) + ': ' + a.total + ' needed">';
    html += '<div class="pdot t' + tier + '">' + (a.total || '✓') + '</div>';
    html += '<div class="plabel">' + esc(BOSS_SHORT[key] || name) + '</div>';
    html += '</div>';
  });
  const remaining = bosses.reduce((s, [k]) => s + state.agg[k].total, 0);
  const skippable = bosses.filter(([k]) => state.agg[k].total === 0);
  html += '<div class="orbit-center"><div class="obig">' + remaining + '</div><div class="osub">BiS items left</div>' +
    (skippable.length ? '<div class="oskip">✓ ' + skippable.length + ' boss' + (skippable.length > 1 ? 'es' : '') + ' skippable</div>' : '') +
    '</div>';
  html += '</div></div>';
  const extras = activeExtras();
  if (extras.length) {
    html += '<div class="muted-note" style="text-align:center">Off the map: ' + extras.map(([k, n]) => esc(n) + ' (' + state.agg[k].total + ')').join(', ') + '</div>';
  }
  html += selectedDetailHtml();
  return html;
}

function renderBossBubbles() {
  const all = farmBosses().concat(activeExtras());
  const sorted = all.slice().sort((x, y) => state.agg[y[0]].total - state.agg[x[0]].total);
  const maxTotal = Math.max(1, ...all.map(([k]) => state.agg[k].total));
  let html = '<div class="bub-wrap">';
  for (const [key, name] of sorted) {
    const a = state.agg[key];
    const extra = key === 'multiple' || key === 'outside';
    const d = a.total ? Math.round(40 + (a.total / maxTotal) * 66) : 30;
    let cls = 'zero';
    if (a.total) {
      // color by the dominant need bucket (ties resolve to the more severe)
      if (a.major >= a.moderate && a.major >= a.minor) cls = 'major';
      else if (a.moderate >= a.minor) cls = 'moderate';
      else cls = 'minor';
    }
    const fs = Math.max(13, Math.round(d / 3.2));
    html += '<div class="bub' + (extra ? ' extra' : '') + (bossSelected === key ? ' sel' : '') +
      '" data-select="' + key + '" title="' + esc(name) + ': ' + a.total + ' needed">';
    html += '<div class="bubc ' + cls + '" style="width:' + d + 'px;height:' + d + 'px;font-size:' + fs + 'px">' + (a.total || '✓') + '</div>';
    html += '<div class="plabel">' + esc(BOSS_SHORT[key] || name) + '</div>';
    html += '</div>';
  }
  html += '</div>' + selectedDetailHtml();
  return html;
}

function renderBossPath() {
  const maxTotal = Math.max(1, ...farmBosses().map(([k]) => state.agg[k].total));
  let html = '<div class="path-wrap"><div class="path">';
  for (const [key, name] of farmBosses()) {
    const a = state.agg[key];
    let tier = 0;
    if (a.total) tier = a.total <= maxTotal / 3 ? 1 : (a.total <= (2 * maxTotal) / 3 ? 2 : 3);
    html += '<div class="pnode' + (bossSelected === key ? ' sel' : '') + '" data-select="' + key + '" title="' + esc(name) + ': ' + a.total + ' needed">';
    html += '<div class="pnodetop"><div class="pdot t' + tier + '">' + (a.total || '✓') + '</div></div>';
    html += '<div class="plabel">' + esc(BOSS_SHORT[key] || name) + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  const extras = activeExtras();
  if (extras.length) {
    html += '<div class="muted-note">Not on the path: ' + extras.map(([k, n]) => esc(n) + ' (' + state.agg[k].total + ')').join(', ') + '</div>';
  }
  html += selectedDetailHtml();
  return html;
}

function renderBosses() {
  let html = banners();
  html += '<div class="viewtabs">' + BOSS_VIEWS.map(([k, label]) =>
    '<span class="viewtab' + (k === bossView ? ' active' : '') + '" data-view="' + k + '">' + label + '</span>').join('') + '</div>';
  if (bossView === 'path') html += renderBossPath();
  else if (bossView === 'columns') html += renderBossColumns();
  else if (bossView === 'orbit') html += renderBossOrbit();
  else if (bossView === 'bubbles') html += renderBossBubbles();
  else html += renderBossTiles();
  $('#content').innerHTML = html;

  document.querySelectorAll('.viewtab').forEach((el) => el.addEventListener('click', () => {
    bossView = el.dataset.view;
    localStorage.setItem('soo-bis-bossview', bossView);
    bossSelected = null;
    renderBosses();
  }));
  document.querySelectorAll('[data-select]').forEach((el) => {
    el.addEventListener('click', () => {
      bossSelected = bossSelected === el.dataset.select ? null : el.dataset.select;
      renderBosses();
    });
  });
}

function renderRaiders() {
  let html = banners();
  for (const ch of state.roster.characters) {
    const entry = state.gear && state.gear.characters && state.gear.characters[ch.name];
    const rows = state.evaluations[ch.name];
    const col = CLASS_COLORS[ch.class] || 'inherit';
    html += '<div class="raider-card">';
    html += '<div class="raider-head">';
    html += '<span class="raider-name" style="color:' + col + '">' + esc(ch.name) + '</span>';
    if (entry && entry.ok === false) html += '<span class="badge err" title="' + esc(entry.error || '') + '">FETCH FAILED' + (entry.items && entry.items.length ? ' — OLD DATA' : '') + '</span>';
    else if (entry && entry.fetchedAt && Date.now() - new Date(entry.fetchedAt).getTime() > 9 * 864e5) html += '<span class="badge stale">DATA ' + relTime(entry.fetchedAt).toUpperCase() + '</span>';
    if (rows) {
      const counted = rows.filter((r) => r.status !== 'needsId' && r.bis.source !== GOAL_BOSS);
      const got = counted.filter((r) => r.status === 'obtained' || r.status === 'good').length;
      const total = counted.length;
      html += '<span class="raider-score" style="color:' + (got === total ? 'var(--green)' : 'var(--text)') + '" title="Garrosh items not counted (final boss)">' + got + ' / ' + total + ' BiS</span>';
    } else {
      html += '<span class="raider-score" style="color:var(--text3)">no gear data</span>';
    }
    html += '</div>';
    if (rows) {
      html += '<table class="slots"><tr><th>Slot</th><th>BiS item</th><th>Boss</th><th>Status</th><th>Currently equipped</th></tr>';
      for (const r of rows) {
        let st, cls = '';
        if (r.status === 'obtained') { st = '✓ BiS'; cls = 'st-obtained'; }
        else if (r.status === 'good') { st = '✓ heroic weapon (not BiS)'; cls = 'st-obtained'; }
        else if (r.status === 'needsId') st = '<span style="color:var(--text3)">needs ID (' + whSearch(r.bis.name) + ')</span>';
        else if (r.bis.source === GOAL_BOSS) st = '<span style="color:var(--text3)">goal boss — not counted</span>';
        else st = '<span class="dot ' + r.status + '"></span> ' + r.status + ' upgrade' + (r.lowerVersion ? ' <span style="color:var(--yellow)">(has lower difficulty)</span>' : '');
        html += '<tr><td>' + esc(r.bis.slot) + '</td><td>' + whItem(r.bis.heroicId, r.bis.name) + '</td>' +
          '<td style="color:var(--text2)">' + esc(BOSS_NAME[r.bis.source] || r.bis.sourceLabel || '') + '</td>' +
          '<td class="' + cls + '">' + st + '</td>' +
          '<td class="eq">' + (r.equipped ? esc(r.equipped.name) + ' (' + r.equipped.ilvl + ')' : '—') + '</td></tr>';
      }
      html += '</table>';
    }
    html += '</div>';
  }
  $('#content').innerHTML = html;
}

/* ============================== editor ============================== */

let editorSpec = null;

function renderEditor() {
  const specs = state.mergedSpecs;
  if (!editorSpec || !specs[editorSpec]) editorSpec = state.roster.characters[0].spec;
  const spec = specs[editorSpec];
  let html = banners();
  html += '<div class="editor-bar"><label>Spec: </label><select id="edSpec">';
  for (const [slug, s] of Object.entries(specs)) {
    html += '<option value="' + slug + '"' + (slug === editorSpec ? ' selected' : '') + '>' + esc(s.label) + '</option>';
  }
  html += '</select>';
  html += '<button id="edSave" class="primary">Save (this browser)</button>';
  html += '<button id="edExport">Export bis.json</button>';
  html += '<button id="edReset">Discard local edits</button>';
  html += '</div>';
  html += '<div class="banner" style="border-left-color:var(--text3)">Tip: heroic IDs are on Wowhead MoP-Classic item pages (the <i>Heroic</i> ' + esc(String(MINOR_AT)) + ' version). Entering a Heroic ID auto-fills Warforged as +996 — correct for almost every SoO item; tier pieces have no Warforged version (keep both IDs the same). Rows with missing IDs are highlighted.</div>';
  html += '<table class="editor"><tr><th>Slot</th><th>Item name</th><th>Heroic ID</th><th>Warforged ID</th><th>Boss</th><th>BiS ilvl</th><th>Wowhead</th></tr>';
  spec.items.forEach((it, idx) => {
    html += '<tr data-idx="' + idx + '">';
    html += '<td><input type="text" class="slot" value="' + esc(it.slot) + '" style="width:80px"></td>';
    html += '<td><input type="text" class="name" value="' + esc(it.name) + '"></td>';
    html += '<td><input type="number" class="id heroic' + (it.heroicId ? '' : ' bad') + '" value="' + (it.heroicId || '') + '"></td>';
    html += '<td><input type="number" class="id wf' + (it.heroicId ? '' : ' bad') + '" value="' + (it.wfId || '') + '"></td>';
    html += '<td><select class="src">';
    for (const [key, name] of BOSSES.concat(EXTRA_GROUPS)) {
      html += '<option value="' + key + '"' + (key === it.source ? ' selected' : '') + '>' + esc(name) + '</option>';
    }
    html += '</select></td>';
    html += '<td><input type="number" class="lvl" value="' + (it.bisIlvl || 566) + '"></td>';
    html += '<td>' + whSearch(it.name) + '</td>';
    html += '</tr>';
  });
  html += '</table>';
  $('#content').innerHTML = html;

  $('#edSpec').addEventListener('change', (e) => { editorSpec = e.target.value; renderEditor(); });

  // heroic ID entry auto-fills WF (+996) when WF is empty or previously linked
  document.querySelectorAll('tr[data-idx] input.heroic').forEach((inp) => {
    inp.addEventListener('change', () => {
      const tr = inp.closest('tr');
      const wf = tr.querySelector('input.wf');
      const v = parseInt(inp.value, 10);
      if (v && !wf.dataset.touched) wf.value = v + 996;
    });
  });
  document.querySelectorAll('tr[data-idx] input.wf').forEach((inp) => {
    inp.addEventListener('input', () => { inp.dataset.touched = '1'; });
  });

  const collect = () => {
    const items = [];
    document.querySelectorAll('tr[data-idx]').forEach((tr) => {
      const num = (cls) => { const v = parseInt(tr.querySelector('input.' + cls).value, 10); return Number.isFinite(v) ? v : null; };
      items.push({
        slot: tr.querySelector('input.slot').value.trim(),
        name: tr.querySelector('input.name').value.trim(),
        heroicId: num('heroic'),
        wfId: num('wf') || num('heroic'),
        source: tr.querySelector('select.src').value,
        sourceLabel: BOSS_NAME[tr.querySelector('select.src').value],
        bisIlvl: num('lvl') || 566,
      });
    });
    return items;
  };

  $('#edSave').addEventListener('click', () => {
    const ov = loadOverrides();
    ov[editorSpec] = collect();
    localStorage.setItem(OVERRIDE_KEY, JSON.stringify(ov));
    recompute(); renderEditor();
  });
  $('#edExport').addEventListener('click', () => {
    const ov = loadOverrides();
    ov[editorSpec] = collect();
    localStorage.setItem(OVERRIDE_KEY, JSON.stringify(ov));
    recompute();
    const out = JSON.parse(JSON.stringify(state.bis));
    for (const [slug, items] of Object.entries(loadOverrides())) {
      if (!out.specs[slug]) out.specs[slug] = { label: slug, class: '', items: [] };
      out.specs[slug].items = items;
    }
    out.meta.generated = new Date().toISOString().slice(0, 10);
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bis.json';
    a.click();
    alert('Downloaded bis.json.\n\nReplace data/bis.json in the starplannercd.github.io repo with this file and push — then everyone sees the update.');
  });
  $('#edReset').addEventListener('click', () => {
    if (confirm('Discard ALL local BiS edits on this computer?')) {
      localStorage.removeItem(OVERRIDE_KEY);
      recompute(); renderEditor();
    }
  });
}

/* ============================== router / boot ============================== */

function currentView() {
  const h = location.hash.replace('#', '');
  return ['bosses', 'raiders', 'editor'].includes(h) ? h : 'bosses';
}

function render() {
  const view = currentView();
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.view === view));
  if (!state.bis) return;
  recompute();
  if (view === 'bosses') renderBosses();
  else if (view === 'raiders') renderRaiders();
  else renderEditor();
}

document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => { location.hash = t.dataset.view; }));
window.addEventListener('hashchange', render);

async function boot() {
  const bust = '?v=' + Date.now();
  try {
    [state.roster, state.bis] = await Promise.all([
      fetch('data/roster.json' + bust).then((r) => { if (!r.ok) throw new Error('roster.json: HTTP ' + r.status); return r.json(); }),
      fetch('data/bis.json' + bust).then((r) => { if (!r.ok) throw new Error('bis.json: HTTP ' + r.status); return r.json(); }),
    ]);
  } catch (e) {
    $('#content').innerHTML = '<div class="banner err"><b>Failed to load data files:</b> ' + esc(e.message) + '</div>';
    $('#gearStamp').textContent = '';
    return;
  }
  try {
    state.gear = await fetch('data/gear.json' + bust).then((r) => (r.ok ? r.json() : null));
  } catch { state.gear = null; }

  $('#gearStamp').innerHTML = state.gear && state.gear.fetchedAt
    ? 'gear data: <b>' + relTime(state.gear.fetchedAt) + '</b> (' + esc(String(state.gear.fetchedAt).slice(0, 10)) + ')'
    : 'gear data: <b>none yet</b>';

  if (new URLSearchParams(location.search).has('selftest')) runSelfTest();
  render();
}

/* ============================== selftest ============================== */

function runSelfTest() {
  const out = [];
  const t = (name, cond) => out.push((cond ? 'PASS' : 'FAIL') + '  ' + name);
  const bisFix = [
    { slot: 'Head', name: 'BiS Hat', heroicId: 100, wfId: 1096, source: 'immerseus', bisIlvl: 566 },
    { slot: 'Ring 1', name: 'Ring A', heroicId: 200, wfId: 1196, source: 'sha', bisIlvl: 566 },
    { slot: 'Ring 2', name: 'Ring B', heroicId: 300, wfId: 1296, source: 'thok', bisIlvl: 566 },
    { slot: 'Weapon', name: 'Big Axe', heroicId: 400, wfId: 1396, source: 'garrosh', bisIlvl: 582 },
    { slot: 'Belt', name: 'Cool Belt', heroicId: 500, wfId: 1496, source: 'spoils', bisIlvl: 566 },
    { slot: 'Neck', name: 'No ID Neck', heroicId: null, wfId: null, source: 'norushen', bisIlvl: 566 },
  ];
  const eq = (slot, id, ilvl, name) => ({ slot, id, ilvl, name: name || 'x', quality: 'EPIC' });

  let r = evaluateCharacter(bisFix, [eq('HEAD', 100, 566, 'BiS Hat')]);
  t('heroic ID match -> obtained', r.find((x) => x.bis.slot === 'Head').status === 'obtained');

  r = evaluateCharacter(bisFix, [eq('HEAD', 1096, 572)]);
  t('warforged ID match -> obtained', r.find((x) => x.bis.slot === 'Head').status === 'obtained');

  r = evaluateCharacter(bisFix, [eq('FINGER_1', 300, 566), eq('FINGER_2', 200, 566)]);
  t('rings swapped -> both obtained', r.filter((x) => x.bis.slot.startsWith('Ring') && x.status === 'obtained').length === 2);

  r = evaluateCharacter(bisFix, [eq('FINGER_1', 200, 566), eq('FINGER_2', 999, 553)]);
  t('ring pool: one match not double-consumed', r.find((x) => x.bis.slot === 'Ring 1').status === 'obtained' && r.find((x) => x.bis.slot === 'Ring 2').status === 'moderate');

  r = evaluateCharacter(bisFix, [eq('OFF_HAND', 400, 582)]);
  t('BiS weapon equipped in offhand -> obtained (pool)', r.find((x) => x.bis.slot === 'Weapon').status === 'obtained');

  r = evaluateCharacter(bisFix, [eq('MAIN_HAND', 999, 566)]);
  t('non-BiS heroic weapon -> good (counts as done)', r.find((x) => x.bis.slot === 'Weapon').status === 'good');
  r = evaluateCharacter(bisFix, [eq('MAIN_HAND', 999, 565)]);
  t('non-heroic weapon -> still a need', r.find((x) => x.bis.slot === 'Weapon').status === 'moderate');

  const bisWithOffhand = bisFix.concat([{ slot: 'Offhand', name: 'Frill', heroicId: 700, wfId: 1696, source: 'galakras', bisIlvl: 566 }]);
  const staff = { slot: 'MAIN_HAND', id: 998, ilvl: 566, name: 'Heroic Staff', quality: 'EPIC', invType: 'TWOHWEAPON' };
  r = evaluateCharacter(bisWithOffhand, [staff]);
  t('heroic 2H covers weapon AND offhand', r.find((x) => x.bis.slot === 'Weapon').status === 'good' && r.find((x) => x.bis.slot === 'Offhand').status === 'good');
  r = evaluateCharacter(bisWithOffhand, [{ ...staff, ilvl: 553 }]);
  t('normal 2H -> both weapon rows still needs', r.find((x) => x.bis.slot === 'Weapon').status === 'moderate' && r.find((x) => x.bis.slot === 'Offhand').status === 'moderate');

  r = evaluateCharacter(bisFix, [eq('WAIST', 777, 566), eq('HEAD', 778, 565), eq('MAIN_HAND', 779, 553), eq('FINGER_1', 780, 552)]);
  t('bucket 566 -> minor', r.find((x) => x.bis.slot === 'Belt').status === 'minor');
  t('bucket 565 -> moderate', r.find((x) => x.bis.slot === 'Head').status === 'moderate');
  t('bucket 553 -> moderate', r.find((x) => x.bis.slot === 'Weapon').status === 'moderate');
  t('bucket 552 -> major', r.find((x) => x.bis.slot === 'Ring 1').status === 'major');

  r = evaluateCharacter(bisFix, []);
  t('empty slot -> major', r.find((x) => x.bis.slot === 'Belt').status === 'major');
  t('null ID -> needsId', r.find((x) => x.bis.slot === 'Neck').status === 'needsId');

  r = evaluateCharacter(bisFix, [eq('WAIST', 888, 553, 'Cool Belt')]);
  t('same name lower difficulty -> flagged, not obtained', (() => { const x = r.find((y) => y.bis.slot === 'Belt'); return x.status === 'moderate' && x.lowerVersion === true; })());

  const agg = aggregateByBoss({ A: evaluateCharacter(bisFix, [eq('HEAD', 100, 566)]) });
  t('aggregation: obtained + needsId excluded', agg.immerseus.total === 0 && agg.norushen.total === 0);
  t('aggregation: needs counted per boss', agg.sha.total === 1 && agg.garrosh.total === 1 && agg.spoils.total === 1);

  const div = document.createElement('div');
  div.id = 'selftest';
  div.textContent = 'SELFTEST\n' + out.join('\n') + '\n' + (out.every((l) => l.startsWith('PASS')) ? 'ALL PASS' : 'FAILURES PRESENT');
  document.body.insertBefore(div, $('#content'));
}

boot();
</script>
</body>
</html>
